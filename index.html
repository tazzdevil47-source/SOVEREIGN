ublicly uncomfortable. The march continues."},{id:299,type:'Army',name:'The Eastern Crusade of Velreth',threat:"Sixty thousand devout crusaders have crossed an ocean to reclaim land they consider holy. They are polite, devout, and absolutely immovable.",win:"Theological historians discover the crusade's holy land designation was based on a six-hundred-year-old translation error. The correct location is three hundred miles south. The crusade redirects politely.",lose:"The crusade reaches the capital with genuine righteousness. They do not pillage. They do not burn. They simply occupy and pray. They will not leave. Removing sixty thousand peaceful believers is legally and morally complex."},{id:300,type:'Army',name:'The Mirror Army',threat:"An army using mirrors and enchanted glass reflects the empire's own strength back, paralysing soldiers with visions of their own defeat.",win:"Soldiers are blindfolded and attack by sound and touch. The mirrors show nobody's defeat to soldiers who cannot see. The mirror army breaks against a blind force.",lose:"The imperial army is paralysed by its own reflected defeat. General Morvaine watches his soldiers lower their weapons. He is the only officer unaffected. He retreats three thousand soldiers by shouting."},{id:301,type:'Army',name:'The Warlord Without a Name',threat:"No name, no history, no origin. His soldiers don't speak. He wins every battle. He approaches.",win:"A soldier who fought him before and survived is found in a provincial garrison. He knows one thing. It is enough.",lose:"The nameless warlord takes the southern gate. In the aftermath, soldiers search his fallen for identification. Nothing is found. His name is awarded posthumously: the Unnamed."},{id:302,type:'Army',name:'The Army of Old Debts',threat:"Six hundred years of legitimate unpaid debts, verified and compounding. The army collecting them is real.",win:"Historians verify the debts and find they were partly paid. Documentation of partial payment reduces the claim by seventy percent. The remaining thirty percent is settled. The army withdraws.",lose:"The full six hundred years of debt is verified and unpayable. The army occupies two provinces as collateral. They are surprisingly efficient administrators. The provinces do marginally better under their management."},{id:303,type:'Army',name:"The Engineers' Revolt",threat:"All imperial siege engineers defect, taking blueprints, weapons designs, and defensive secrets.",win:"The blueprints were pre-falsified by a prescient intelligence officer years before. The enemy builds to the false plans. Their constructions don't match the real fortifications. The defences hold.",lose:"The enemy builds to correct plans. Every fortification is breached in the sequence the engineers specified. General Halveth notes the walls fall in the exact order he would have chosen."},{id:304,type:'Army',name:'The Long March of Keth',threat:"An army that has been marching toward the empire for eleven years without stopping has arrived. Eleven years of determination and hardening.",win:"The Long March army is offered something they have not had in eleven years — rest. A ceasefire is offered. Many are too tired to refuse. Internal divisions emerge about the march's purpose. They are significant.",lose:"The Long March army's eleven-year determination makes them impossible to demoralise. They have already survived everything. They take the outer wall on the first day. It is the first easy thing they have done in eleven years."},{id:305,type:'Army',name:'The Army of Mirrors and Maps',threat:"An army with perfect maps of every imperial fortification, updated monthly by an embedded spy, attacks with surgical precision.",win:"The maps are ten years old — the fortifications have been quietly modified over a decade on an intelligence officer's standing advice. The modifications specifically make old maps misleading.",lose:"The maps are current. The army arrives knowing every entry point, every weak spot. General Morvaine asks how the maps are so accurate. He is told."},{id:306,type:'Army',name:'The Returning Dead of Sorrath',threat:"Every soldier killed by the empire in a century of war rises simultaneously from across the continent.",win:"An emergency ritual of recognition — acknowledging every fallen soldier by name from a century of records — satisfies their unfinished business. Forty thousand names read over three days. They rest as each name is spoken.",lose:"A century of war's dead arrive simultaneously. The scale is unmanageable. Sir Davos fights for sixteen hours without stopping."},{id:307,type:'Army',name:'The Gentle Army',threat:"An army that absorbs every attack without retaliation, recording each one. They keep walking. They will retaliate once, all at once.",win:"The army is not attacked. Not once. Soldiers hold their positions silently as the army walks close. Face to face, with nothing recorded, the general asks what they want. It is reasonable.",lose:"Three panicking border guards attack prematurely. The record begins. Everything the empire does is recorded and set against a single unavoidable retaliation. When it comes, the precision is devastating."},{id:308,type:'Army',name:'The Oath Breakers',threat:"Every soldier who swore an oath to the empire and violated it has been organised into an army. They know the oaths they broke — and exactly how to exploit each one.",win:"An amnesty is declared: every oath-breaker who returns and renews their oath is pardoned. Six thousand of eighteen thousand return. The remaining twelve thousand fight with less moral authority.",lose:"The oath-breakers use knowledge of their own oaths to exploit every gap. A soldier who swore to guard the north gate and later abandoned it returns and opens it — his original oath technically still binding him to it."},{id:309,type:'Army',name:'The Perfect General Vethrix',threat:"Vethrix has won 147 consecutive battles without a single casualty on either side through perfect manoeuvring. He intends to win by making the empire surrender without fighting.",win:"An imperfect general is appointed — one who makes irrational decisions Vethrix cannot predict. The unpredictability defeats his models. He faces his first unwinnable position. He asks for negotiations. They are offered.",lose:"The empire's rational defensive manoeuvres are exactly what Vethrix predicts. He positions the empire's own army to defeat itself without combat. On the morning of engagement, four regiments are in each other's way."},{id:310,type:'Army',name:'The Exile King Dravos',threat:"Dravos built the finest army on the continent during his exile. He wants a better kingdom than the one he lost.",win:"The kingdom he lost is partly returned. A principality is reconstituted under his title. He accepts it as a satisfactory conclusion to the exile. His army is demobilised.",lose:"Dravos's army is simply better than the empire's. General Halveth fights well. He loses well. Dravos takes the eastern province and establishes his new kingdom there. He is an efficient administrator."},{id:311,type:'Army',name:'The Army from the Future',threat:"An army from the future arrives with perfect foreknowledge of this war. They know the outcome. They know it is won.",win:"The empire acts completely against historical record — surrendering positions it never surrendered, responding irrationally. The future-army's foreknowledge becomes useless. They lose a war they had already won.",lose:"The future-army cannot explain why they are fighting for an already-decided outcome. But history records it. And history is accurate. The empire's loss is not a surprise to anyone in the future."},{id:312,type:'Army',name:'The War of Succession',threat:"Four heirs with four sections of the imperial army all march toward the palace.",win:"The Emperor personally appears and names the successor publicly and irrevocably. Three of the four heirs stand down. The fourth is isolated without popular support and accepts terms.",lose:"All four heirs reach the capital simultaneously. The resulting four-way battle destroys three palace wings. Sir Davos prevents it from spreading to the city by sealing the palace gates — on the inside."},{id:313,type:'Army',name:'The Singing Soldiers of Velreth',threat:"A musically coordinated army attacks in perfect rhythm, indistinguishable from each other.",win:"Musicians are recruited into the defence. Counter-rhythm is played at the walls — conflicting time signatures that break the coordination. The army falls out of sync and becomes regular.",lose:"The rhythm is too complex to counter. General Morvaine's forces find themselves unconsciously moving to the enemy's beat. By afternoon, half the defence is moving in the wrong direction."},{id:314,type:'Army',name:'The Army That Cannot Be Counted',threat:"Every count of the enemy army gives a different number. The uncertainty is being weaponised.",win:"The count is abandoned. The army is treated as infinite for planning purposes. Every defensive measure is applied at maximum. The enemy's true size — modest — is irrelevant when the defence is total.",lose:"Planning around uncertain numbers produces uncertain preparations. Too many defences in one direction, too few in another. The enemy is exactly the right size to breach the understaffed section."},{id:315,type:'Army',name:'The Merchant Army of Keth',threat:"A trading company's security division now outnumbers the imperial army. It has received its first non-commercial contract.",win:"The trading company's commercial interests are threatened — the contract will damage trade relationships they depend on. An economic counter-offer removes the commercial incentive. The contract is declined.",lose:"The trading company's army is professional, motivated, and extremely well-funded. They also understand supply lines better than anyone. The imperial army runs out of supplies before the trading company does."},{id:316,type:'Army',name:"The Cartographers' Army",threat:"A decade of precise mapping precedes an invasion. They know every inch of the empire better than the empire does.",win:"Emergency terrain modification in the month before invasion makes the maps one month out of date. The army navigates confidently into positions that no longer exist.",lose:"The cartographers' maps include the terrain modifications. A spy was mapping to the day. General Morvaine reads the enemy's map of his own modifications and feels genuine professional respect."},{id:317,type:'Army',name:'The Enemy Within',threat:"One in a hundred soldiers is a sleeper — five hundred in total — all activated simultaneously.",win:"The activation signal is intercepted. Counter-intelligence arrests every sleeper in the ninety-minute window between signal and execution. The plan fails completely and definitively.",lose:"The five hundred act simultaneously. Twenty gates opened. Three weapons stores destroyed. Six officers assassinated. The damage in the first hour is total."},{id:318,type:'Army',name:'The First Army of Sorrath',threat:"The immortal soldiers from the first war ever fought on this land ride from the east.",win:"The First Army's original enemy — the force they were created to fight — is ritually summoned and destroyed before them. Their ancient purpose fulfilled, they accept rest.",lose:"The First Army fights with three thousand years of experience. Every tactical innovation the empire has developed was developed in response to problems the First Army caused the first time. They have the counter."},{id:319,type:'Army',name:'Lord Halveth the Burned',threat:"Lord Halveth survived the destruction of his entire house. He wants only the empire's end. He will accept no terms.",win:"Sir Davos approaches alone and unarmed. He acknowledges the wrong. He offers only acknowledgement. Halveth looks at him for a long time. He turns his army around. He leaves. He does not forgive. He simply chooses to stop.",lose:"No acknowledgement comes. Halveth's army is unstoppable by conventional means. Sir Davos fights Halveth personally. Halveth wins."},{id:320,type:'Army',name:'The Clockwork Siege',threat:"A fully automated siege train — no soldiers, only mechanical constructs — advances on the capital. It follows programming. It cannot be reasoned with.",win:"The clockwork is mechanical. Mechanics can be broken. An engineering team targets the central mechanism described in the original patent found in the imperial library. The siege train stops mid-advance.",lose:"The clockwork siege takes the outer wall in eight hours with mathematical precision. It then begins work on the inner wall with the same precision. General Halveth requests the original patent."},{id:321,type:'Army',name:'The Army of Borrowed Time',threat:"An army of the terminally ill, kept alive past their deaths by enchantment, fighting with nothing to lose. They are cheerful about it.",win:"The enchantment sustaining them is traced to a central focus. Destroying the focus allows them a natural death — which each one, in truth, wishes for. They fall at once, peacefully.",lose:"The army fights with the recklessness of those who cannot be killed conventionally. Their cheerfulness is somehow the most demoralising aspect."},{id:322,type:'Army',name:'The Foreign Debt Army',threat:"Three continental banks call the empire's debt simultaneously and bring an army as a collection agency.",win:"The debt is restructured through emergency financial instruments. The banks accept the restructure: a guaranteed income over fifty years beats an uncollectable debt now.",lose:"The empire cannot restructure. The banks seize assets directly — beginning with provincial tax revenues. General Halveth's salary is technically garnished by a foreign bank. He takes this personally."},{id:323,type:'Army',name:'The Empire of Sand',threat:"A mythological desert empire of six hundred thousand reveals itself and claims the empire's land as theirs.",win:"Archaeological evidence shows the desert empire abandoned this territory voluntarily twelve thousand years ago — a legal departure, not a dispossession. The legal claim fails. Diplomatic relations are opened.",lose:"The six hundred thousand are genuine. Three provinces with desert-adjacent geography are legally complex to defend. The courts rule. The empire loses two."},{id:324,type:'Army',name:'The Slow Army',threat:"An army advancing one mile per week is closing every exit from the capital. In six months the capital will be sealed.",win:"A sortie breaks the stranglehold at its weakest point — an unmanned section relying on geography. The slow army cannot respond quickly enough to close the breach. The capital's supply route is maintained.",lose:"After six months, the last exit is closed. The capital is sealed. Negotiations from inside a cage begin. Defence Minister Aldric calculates the food supply. The number of days is not comfortable."},{id:325,type:'Army',name:'The Loyal Traitors',threat:"Forged imperial orders created an imperial army pointed at the imperial capital. They believe they are loyal.",win:"The Emperor appears personally before the army and speaks directly. The men who know the Emperor personally confirm the forgeries. The army stands down, bewildered.",lose:"The Emperor cannot reach the army before engagement begins. Imperial soldiers fight imperial soldiers. The battle is brief, brutal, and silent. Nobody wants to be there."},{id:326,type:'Army',name:'The Children of the Dragon',threat:"Shmarg the Crimson's worshippers have come for justice for his death.",win:"Evidence is presented that Shmarg was slain in genuine self-defence after attacking first. The Dragon's Children examine the evidence and declare it valid under their laws. They accept blood-gold and depart.",lose:"The evidence is disputed. The Dragon's Children are relentless and knowledgeable about draconic law. The legal proceedings are conducted at sword-point and the empire loses on procedural grounds."},{id:327,type:'Army',name:'The Bone Legion of Keth',threat:"Weapons made from battlefield bone — harder than steel, lighter than wood, self-repairing. They never run out of material.",win:"The bones' self-repair requires a magical catalyst that depletes in salt water. The battlefield terrain is flooded. The weapons become ordinary bone. The army with bone weapons is a much more manageable problem.",lose:"The Bone Legion's weapons destroy conventional blades on contact. General Halveth loses three sword arms' worth of steel in one engagement. The tactical response takes weeks to develop."},{id:328,type:'Army',name:'The Silent Siege',threat:"Something unseen is methodically dismantling the capital. Walls lower. Gates fail. Fortifications crumble.",win:"The invisible siege agent — a sorcerer operating within the walls — is detected by tracking the sequence of failures. He is identified, arrested, and the mechanism of his work reversed.",lose:"The dismantling continues for two months before the agent is found. The capital's defences are reduced to a fraction of their strength before the outer army reveals itself."},{id:329,type:'Army',name:'The Wandering Army',threat:"Eighty years of wandering has hardened them. They have chosen the empire's territory as their new home and do not intend to share.",win:"A territory is offered — a currently ungoverned region the empire has never successfully administered. The wanderers accept it genuinely. They become a buffer state that turns out to be useful.",lose:"The offered territory is insufficient. The wanderers take what they consider their due — a full province. They are thorough settlers. Within a year they have built more than was there before. The province is gone."},{id:330,type:'Army',name:'The Betrayed Legion',threat:"A legion knowingly sacrificed as a strategic sacrifice twenty years ago survived. They know what was done to them. They have come back.",win:"The sacrifice is acknowledged fully and publicly. Those who ordered it are brought to account. The returned legion is offered reinstatement with full honours. Half accept. Half walk away. None attack.",lose:"The acknowledgement never comes. The returned legion fights with twenty years of known betrayal behind them. They are precise, cold, and completely without mercy. Sir Davos recognises two of them."},{id:331,type:'Army',name:'The Sky Army of Velreth',threat:"An army on enchanted platforms descends, attacks, and ascends before response can form. They never touch the ground.",win:"The platforms' enchantment has a range limit — they cannot ascend above a certain altitude. Anti-air ballista batteries at that altitude destroy several platforms. The sky army begins taking losses. They withdraw.",lose:"The sky army systematically destroys the capital's roof structures — removing cover for soldiers. The city is stripped from above over three days."},{id:332,type:'Army',name:'The Old Guard',threat:"The empire's founder's original guard regiment, secreted away for emergencies, decides this is the emergency.",win:"The regent-protocol they operate under requires the regent to formally release them. The current holder is found. He formally releases them. They stand down, satisfied their duty was correctly discharged.",lose:"The Old Guard's judgment that this is an emergency is legally binding under foundational law. Their definition of the emergency includes the current Emperor. He is placed in detention. Briefly."},{id:333,type:'Army',name:"The Shadow Compact's Army",threat:"The Shadow Compact reveals twenty thousand trained soldiers and begins open warfare for the first time.",win:"The Shadow Compact's internal records are obtained. They show who hired whom for decades. The leverage is extraordinary. The Compact disbands quietly rather than be exposed.",lose:"The Shadow Compact's soldiers are individually the finest fighters the empire has faced. General Morvaine calls them twenty thousand Sir Davoses. There is only one Sir Davos."},{id:334,type:'Army',name:'The League of Fallen Lords',threat:"Every dispossessed noble house — unified by centuries of shared grievance — forms a coalition.",win:"The grievances are examined individually. A restitution commission is formed. Forty-seven percent of the disputes are found legitimate. Those are settled. The coalition fractures along the lines of settled vs. unsettled.",lose:"The coalition fights not for territory — for validation. No military victory satisfies them. The war ends when Defence Minister Aldric reluctantly reads a formal apology. He does not enjoy reading it."},{id:335,type:'Army',name:'The Endless Column',threat:"An enemy column has been marching through the eastern pass for six days with no end in sight. The full army has not been seen.",win:"The pass is blocked by a controlled rockfall before the full force can assemble. The front portion is engaged and defeated. The rear portion, cut off, retreats.",lose:"The full column assembles. Its true size is three hundred thousand. General Halveth requests reinforcements from three allies. Two respond. One does not."},{id:336,type:'Army',name:'The Perfect Spy',threat:"A single spy with twenty years' seniority in military command has been activated. They know everything.",win:"Counter-intelligence has maintained a secondary information channel known only to the innermost circle. Everything the spy knows is correct except one critical thing — maintained false for twenty years. Their critical intelligence leads the enemy to disaster.",lose:"The spy's activation compromises every current operation. Three military campaigns are abandoned. Two intelligence networks are burned. The empire operates blind for six months."},{id:337,type:'Army',name:'The Armies of the Four Winds',threat:"Four armies from four directions. No coordination needed — the strategy is simple. Four walls cannot face all four directions at once.",win:"Three of the four are defeated before the fourth arrives, violating the simultaneity the strategy requires. The remaining army faces the full imperial force alone.",lose:"All four arrive within six hours of each other. Four walls. Four armies. The empire chooses two to defend. Two walls fall."},{id:338,type:'Army',name:'The Sleeping Giant',threat:"A kingdom that has been at peace for two hundred years has woken up and mobilised. Its soldiers have never known war. They are curious.",win:"The curiosity is engaged rather than opposed. An invitation to negotiate and trade is extended. The Giant's leadership find negotiation more interesting than war — their scholars have never studied a live empire before.",lose:"The giant army's curiosity turns to frustration when the empire responds militarily. They are enormous and have now decided this is interesting after all. Their war enthusiasm cannot be stopped."},{id:339,type:'Army',name:'The Bureaucratic Invasion',threat:"Lawyers, accountants, and administrators file legal claims over every piece of imperial territory using ancient property law. They win every case.",win:"The empire's own legal team contests every claim. The courts are gridlocked. A negotiated administrative settlement draws a legal border. Both sides accept it as better than the alternative.",lose:"The empire's legal infrastructure cannot match the invasion's volume. Three hundred unchallenged claims are settled by default. The empire loses territory to procedure, not combat."},{id:340,type:'Army',name:"The Warlord's Warlords",threat:"A warlord releases twelve subordinate warlords into all directions simultaneously. Twelve independent armies. Twelve independent directions.",win:"The unifying warlord is the single point connecting the twelve. He is captured personally. Without the political connection between them, the twelve dissolve back into their original, manageable independence.",lose:"Twelve independent warlords simultaneously require twelve independent responses. The empire can field responses to eight. Four go uncontested for three days. Three days is enough."},{id:341,type:'Army',name:'The Army of Perfect Weapons',threat:"Forty thousand soldiers each armed with a single perfect, irreplicable weapon that destroys conventional blades on contact.",win:"The perfect weapons require perfect wielders. The weapons are the focus, not the soldiers. A counter-weapon sorcerer neutralises three weapons in the first hour. The army without perfect weapons is ordinary.",lose:"The weapons are as described. Every imperial sword that contacts one is destroyed. General Halveth orders retreat before contact if possible. Contact is not always possible."},{id:342,type:'Army',name:'The Reconquest',threat:"Three generations of quiet preparation. The third generation has decided to stop waiting.",win:"The three generations of preparation are acknowledged — the empire was wrong to absorb them. A formal treaty restores their internal sovereignty within the imperial framework. The reconquest becomes a homecoming.",lose:"The three generations of preparation were precise. Their intelligence is a century more detailed than the empire's current maps of its own territory. They know things about fortifications the empire has forgotten."},{id:343,type:'Army',name:'The Phantom Fleet',threat:"A fleet visible only in fog. In clear weather it vanishes. The fog moves with the fleet. The harbour is being destroyed from inside a moving cloud.",win:"The fog's moisture is targeted — a spell of evaporation above the harbour disperses it permanently. The fleet, suddenly visible in clear air, is engaged conventionally and destroyed.",lose:"The fog attacks in three-hour cycles. Each cycle destroys more of the harbour. Admiral Keth fights the fog personally from a small boat. He damages something. He does not know what."},{id:344,type:'Army',name:'The Professional Enemy',threat:"A kingdom that specialises in campaigns against this empire has been contracted by a third party. They are businesslike.",win:"The third party is identified and the contract made financially unviable — their payment is seized. Without payment, the professionals withdraw. Their professional reputation requires complete payment for complete work.",lose:"The professionals are contracted with a performance bonus for speed. They are motivated. They are also efficient in ways that are deeply inconvenient. General Halveth notes their technique in his personal journal."},{id:345,type:'Army',name:"The Architect's Army",threat:"An army building a perfect siege city around the capital. In forty days the capital will be surrounded by a city designed to outlast it.",win:"The construction requires Lord Valdris's genius. He is captured on day eighteen. The construction continues from his plans but without his improvisation. The siege city has structural flaws.",lose:"The siege city is completed on day forty. It has better infrastructure than the capital. Soldiers begin comparing. Defence Minister Aldric bans the comparison."},{id:346,type:'Army',name:'The Army of Legal Rights',threat:"An army marching under legally valid ancient rights granted by the empire's own founders.",win:"The rights are genuine but their application is limited to specific territories. The army's march takes them outside those territories, voiding their legal claim.",lose:"The army's legal claim is valid throughout the territory they march through. Every fortification that resists them is acting illegally. Three generals refuse to give illegal orders. Sir Davos gives them and accepts the legal consequences."},{id:347,type:'Army',name:'The Continental Alliance',threat:"Every kingdom on the continent has united specifically to stop the empire. Their temporary unity holds.",win:"The temporary nature is exploited. Diplomatic intelligence identifies three kingdoms whose interests are served by the empire's survival. Separate offers break the alliance before battle.",lose:"The Continental Alliance holds through three rounds of diplomatic disruption. Their temporary unity becomes permanent under the pressure of fighting together. The empire has created a permanent coalition."},{id:348,type:'Army',name:'The Army of Perfect Memory',threat:"An army with perfect recall of every imperial battle, tactic, and response in recorded history.",win:"Unreported intelligence — information about battles deliberately kept from all records — is used. Tactics from undocumented skirmishes. The army's memory finds nothing.",lose:"Every move is anticipated. General Morvaine attempts a formation never used in history. The army has anticipated the things never tried — their intelligence included theoretical military manuals. He retreats thoughtfully."},{id:349,type:'Army',name:'The Lost Expedition',threat:"The empire's greatest exploratory expedition returns after thirty years. Something followed them back.",win:"The something followed because one explorer carries an artefact that attracts it. The artefact is isolated. The something stops following. It waits outside the walls patiently.",lose:"The something enters the city. Its nature is unclear. It damages things by existing near them. Three districts are evacuated. The expedition member with the artefact is asked to leave."},{id:350,type:'Army',name:'The Army of the Unpaid',threat:"Everyone the empire owes money across three generations is organised and here to collect.",win:"An emergency payment commission calculates and settles debts with promissory notes backed by future trade revenue. The genuine debts are genuinely settled. The army disperses satisfied but watching the payments closely.",lose:"The debts cannot be settled immediately. The army takes the treasury as collateral. Technically, they are correct to. The subsequent fiscal restructure under hostile creditors is humbling."},{id:351,type:'Army',name:'The Sleeping Soldiers of Keth',threat:"Three hundred thousand soldiers in suspended animation wake from fifty years of waiting. Their orders are fifty years old and unrevised.",win:"The original commander's grandson holds his commission. He issues a stand-down order through his inherited authority. The soldiers stand down.",lose:"The soldiers execute fifty-year-old orders with complete literal accuracy. Three of those orders are now against the empire's own allies. Two diplomatic crises occur before the first battle."},{id:352,type:'Army',name:'The Grand Coalition of the Small',threat:"Two hundred small kingdoms, each with one hundred soldiers, completely unpredictable and uncoordinated.",win:"The disorganisation is disorganised. No shared supply, no shared objective. The empire focuses on the twenty most dangerous contingents. The other one hundred and eighty wander home when they run out of food.",lose:"The randomness is genuinely undefendable. Seventeen contingents breach the walls through seventeen entirely different methods. Twelve are repelled. Five are not."},{id:353,type:'Army',name:'The Army of One Purpose',threat:"The sole objective of this army is the death of the Emperor. They will not take territory, will not negotiate, will not stop.",win:"The Emperor is publicly documented as having died in a formal ceremony — a legal death-and-reinstatement ritual from ancient succession law. The army's purpose is fulfilled. They stand down. The Emperor quietly continues governing.",lose:"The army reaches the palace. Sir Davos holds them at the inner gate for six hours. The Emperor is evacuated. Sir Davos is alive when the gate finally falls. The army finds an empty throne."},{id:354,type:'Army',name:'The Old Enemy Returns',threat:"The empire that was defeated to build this one has rebuilt itself after three hundred years. It is now larger.",win:"The Old Enemy's leadership, like the empire's, has changed across three centuries. The original grievance has been diluted by time and politics. An acknowledgement of equal standing is accepted by both sides.",lose:"Three hundred years of accumulated grievance plus a larger army produces a force the empire cannot match. The battle is decisive. General Halveth fights brilliantly. It is not enough."},{id:355,type:'Army',name:'The Army of the Insulted',threat:"A diplomatic insult twelve years ago produced a twelve-year-prepared army.",win:"The insult is identified as unintentional — a translation error. A formal apology with explanation is delivered. The king examines it for three days. He accepts it. The army demobilises.",lose:"The apology is refused as insufficient. The king considered the insult intentional. The army he spent twelve years building fights with twelve years of focus. It shows."},{id:356,type:'Army',name:'The Inevitable Legion',threat:"Prophesied to destroy this empire since its founding. They believe it. They are here to fulfil it.",win:"The prophecy is reinterpreted — it predicted the end of the empire's first age, not the empire itself. The second age begins with the signing of a new founding charter. The prophecy is satisfied. The Legion has nothing left to fulfil.",lose:"The Legion fights with the absolute confidence of people fulfilling prophecy. The empire fights with the doubt of people reading prophecy about their own end. The doubt is measurable."},{id:357,type:'Army',name:'The Army of Pure Chaos',threat:"Forty thousand soldiers given orders to do whatever they want with no coordination, no strategy, no objectives.",win:"Chaos meets chaos. The imperial response: equally random. Units attack from unexpected positions, defend from unusual ones. The enemy's chaos cannot find a pattern to exploit. Chaos cancels.",lose:"The chaos is absolute. The empire's rational response cannot respond to a force with no recognisable objectives. Defence Minister Aldric cannot write the briefing document."},{id:358,type:'Army',name:"The Assassins' Army",threat:"Forty thousand assassins — every officer above a specific rank is a target simultaneously.",win:"Every listed target is temporarily replaced by lower-ranked officers who fall below the targeting threshold. The assassins arrive to find nobody worth targeting. The substitution holds until they withdraw.",lose:"The substitution is detected. The real officers are found. Thirty-two targeted individuals are killed in forty-eight hours. The empire's command structure is replaced three times in one week."},{id:359,type:'Army',name:'The Returning Crusade',threat:"A crusade sent east two generations ago returns — radicalised by endless war and bitter about why they were sent.",win:"The original records of why they were sent are produced — they were sent on a genuine mission, not as a disposable force. The crusade's anger cools when confronted with its own history.",lose:"The mission was genuine but the support was never sent. They survived without the empire's help and they remember that. Their two-generation war-hardening is real."},{id:360,type:'Army',name:'The Last War',threat:"All armies, all enemies, all threats organised under one unseen hand arrive simultaneously.",win:"The unseen hand is found — a single mastermind coordinating all threats through a magical network. Cutting the network severs the coordination. The threats scatter. The empire faces each individually and manages.",lose:"The simultaneous arrival of every threat is undefendable. General Halveth describes the week that follows as the closest the empire has ever come to extinction."},{id:361,type:'Monster',name:'The Godwyrm of Keth',threat:"A creature so large its body is a geological feature. Three mountains are its spine. It has begun to move.",win:"The Godwyrm moves in deep geological sleep. A geological anchor ritual fixes it back in place. It stops. The three mountains are slightly relocated. The map is updated.",lose:"The Godwyrm continues moving. Two provinces are physically displaced. The capital's foundations crack as the earth shifts. The creature continues to sleep through all of it."},{id:362,type:'Monster',name:'The Swarm Intelligence of Vel',threat:"A trillion insects sharing one strategic mind are planning the optimal dismantling of the capital.",win:"The swarm's central intelligence requires a minimum density to think. Dispersal devices spread the swarm below cognitive threshold. The strategy vanishes. The insects are merely insects.",lose:"The swarm's plan is executed. They take the grain district in three hours and the water district in four. They cannot be fought. They can only be survived."},{id:363,type:'Monster',name:'The Living Mountain Sorrath',threat:"The mountain east of the capital is alive and annoyed by the mining. It walks toward the city.",win:"A formal apology ritual to the mountain is performed — acknowledging transgression against living stone. The mountain stops. An ancient agreement is renegotiated. Mining continues elsewhere.",lose:"The mountain reaches the outer walls. The walls, built from its stone, recognise their origin and crumble. The mountain settles east of the city, displacing three districts."},{id:364,type:'Monster',name:'The Tidal Leviathan',threat:"A creature that breathes in to create a fifty-metre tide has been breathing in for six days. The coastal cities are underwater.",win:"The creature is studying its own reflection in the flooded coastline and cannot exhale while distracted. A mirror placed on the other side of the ocean shows it something more interesting. It turns. It exhales away from the coast.",lose:"The creature exhales. The wave hits the coast at fifty metres. Port Halveth ceases to exist. Admiral Keth's fleet is found three miles inland."},{id:365,type:'Monster',name:'The Carrion King',threat:"A creature made of living carrion grows larger with every kill. It entered the eastern province two weeks ago. It is larger now.",win:"The Carrion King requires fresh death to grow. No new deaths are allowed to feed it — every corpse is immediately burned. Starved of growth material, it diminishes over days. When small enough, it is destroyed.",lose:"The Carrion King reaches the outer city. Forty citizens die in its approach, feeding it further. It grows as it feeds. Sir Davos fights it with fire. It grows around the fire."},{id:366,type:'Monster',name:'The Dream Eater of Sorrath',threat:"A creature consuming sleeping minds has left forty thousand citizens unable to imagine, hope, or fear.",win:"The Dream Eater is lured into an artificial dream landscape crafted by a mage. Inside the dream, it is the prey. It is consumed by a larger dream. The citizens slowly recover the ability to hope.",lose:"The Dream Eater reaches the palace staff. The Emperor wakes one morning unable to imagine the future. The court makes no plans. Defence Minister Aldric stops writing memos. The governance paralysis is total."},{id:367,type:'Monster',name:'The Thousand-Limbed Thing',threat:"Something with a thousand limbs and no clear body moves in all directions simultaneously. It eats stone.",win:"The stone-eating requires digestion — a biological pause. During the pause, the creature is motionless. In that window, a coordinated strike reaches the central mass. The limbs cease.",lose:"The Thing eats through the outer wall in a night. The wall is thirty feet thick. By morning, three sections are gone. General Halveth touches the edge of the hole. Clean. No rubble. Just absence."},{id:368,type:'Monster',name:'The Glass Forest Creature',threat:"A creature that petrifies forests into glass and shatters them has nearly completed a glass forest ring around the capital.",win:"The creature's shatter-sound is turned against it — the glass forest is shattered all at once by resonant frequency, creating a blade field the creature cannot cross. It retreats.",lose:"The glass forest ring is completed. The shattering event destroys the outer ring of the city. The glass blade field left behind prevents supply convoys. The capital is ringed by its own beautiful destruction."},{id:369,type:'Monster',name:'The Gravity Colossus',threat:"A hundred-foot creature whose gravitational pull increases constantly. Buildings lean. Soldiers are crushed by their own armour.",win:"The creature's gravitational increase requires it to remain stationary. It cannot move without destabilising its own field. A unit attacks from directly above — the one direction gravity cannot crush.",lose:"The Gravity Colossus reaches the outer walls. The walls, pulled inward, crush themselves. General Morvaine watches the fortifications collapse toward the creature and describes it as the most original siege technique he has ever observed."},{id:370,type:'Monster',name:'The Living Storm',threat:"What looked like a three-week storm system was a living creature. It breathes lightning. It is over the capital now.",win:"The storm-creature communicates through barometric pressure — a meteorologist identifies the language. The creature is lost. It came from very far away. It is given directions. It departs.",lose:"The creature is not lost. It is settled. It considers the capital's warmth suitable for nesting. The permanent storm above the city prevents all flight, all signalling, and all solar agriculture."},{id:371,type:'Monster',name:'The City Eater of Keth',threat:"A creature that consumes urban construction materials leaves buildings standing, roofless and floorless. The outer wall has vanished. Digested.",win:"The City Eater, full, retreats to digest. During digestion it is immobile. Engineers lead it to an abandoned city it can eat without harm. It eats happily for years.",lose:"The City Eater is still hungry. After the outer wall, it moves to the inner district. Buildings stand briefly before collapsing, their bones eaten. General Halveth works from a building with no floor."},{id:372,type:'Monster',name:'The River Serpent of Aldrath',threat:"A serpent so large it redirected three rivers by lying across them is asleep. When it wakes and repositions, the flooding will worsen.",win:"While it sleeps, engineers quietly redirect the three rivers through alternative channels. When the serpent wakes, the rivers no longer run under it — it is lying across dry land. It moves. The rivers stay redirected.",lose:"The serpent wakes and repositions toward the capital's water source. The remaining water supply is reduced to a trickle. Emergency water rationing begins before the military issue is even resolved."},{id:373,type:'Monster',name:'The Tide Caller',threat:"A creature's subsonic hum resonates with the sea, growing waves daily. Coastal cities evacuate.",win:"The hum's frequency is disrupted by a counter-frequency generator built by the mining corps in four days. The resonance breaks. The waves normalise. The creature turns and walks back into the sea.",lose:"The creature continues to hum. Wave heights reach forty metres. Port Halveth is behind a forty-metre wall of water. Admiral Keth evacuates inland for the first time in his career."},{id:374,type:'Monster',name:'The Face Stealer',threat:"A creature that removes faces — leaving faceless victims alive — displays them on its own body. Thirty soldiers are faceless. It wants more.",win:"A warrior with no face — a veteran with facial burns so severe the creature doesn't recognise him as a target — leads the assault. The creature cannot target him. He destroys it.",lose:"Thirty more soldiers are faceless before the creature is driven off. The thirty cannot communicate or eat without assistance. The creature leaves with sixty faces. They look uncomfortable."},{id:375,type:'Monster',name:'The Truth Eater',threat:"A creature that destroys the ability to perceive truth has reached the capital. Strategic discussions are incoherent. Nobody knows what is real.",win:"A completely isolated command centre is established before the Truth Eater's range expands to it. Inside, unaffected, the command team coordinates from clarity while the world outside wobbles.",lose:"The Truth Eater's range reaches the command centre. The battle plan is agreed by six generals who all hear different plans. The army executes six different plans simultaneously."},{id:376,type:'Monster',name:'The World Turtle of Vel',threat:"A turtle the size of a continent walks through the empire. Its shell ecosystem includes predators consuming people at the borders.",win:"The shell ecosystem is mapped and the predators' territory is avoided. The Turtle walks through in eleven days. The damage is surprisingly limited.",lose:"The Turtle settles for a season. Its shell predators establish a permanent feeding ground in the eastern province. The province cannot be reclaimed without crossing the turtle's shell."},{id:377,type:'Monster',name:'The Void Hound',threat:"A creature that kills between heartbeats. Soldiers die in formation without visible cause. The kills are found between clock strikes.",win:"The Void Hound cannot operate during the pause between heartbeats — it requires the gap between moments to move. A magical heartbeat accelerator eliminates the gap. The Void Hound has nowhere to exist.",lose:"The Void Hound kills forty soldiers between twenty heartbeats. The city is evacuated district by district. It follows each district. It is systematic."},{id:378,type:'Monster',name:"The Old Gods' Dog",threat:"The ancient gods' hunting hound, freed when the gods departed, still pursues its last command. The target: the empire.",win:"The target was the old empire — the one the founders dismantled. A cartographic argument succeeds: the empire's current territory does not overlap with the original target. The hound stops.",lose:"The Hound's target is the land, not the people. It pursues the specific territory. It cannot be killed. It can only be endured, season after season, as it circles."},{id:379,type:'Monster',name:'The Consuming Light',threat:"A creature of disintegrating light that moves at the speed of illumination is reading the palace library, then everything else.",win:"The library is moved underground into complete darkness before the creature arrives. In total darkness it cannot operate. The creature drifts, lightless and frustrated, until contained.",lose:"The creature reads and disintegrates. Three thousand texts are gone. It moves to the war room records. General Morvaine watches thirty years of strategic documentation dissolve. He begins writing from memory."},{id:380,type:'Monster',name:'The Bone Forest',threat:"A creature extruding enormous bone structures as it walks has grown its forest three miles into the empire.",win:"The bone forest requires the creature to feed — it must consume calcium to continue. Calcium sources in its path are removed and replaced with minerals it cannot process. The forest stops.",lose:"The bone forest reaches the outer city. The carnivorous bone trees create a permanent hazard within the capital's agricultural ring. Three farms are lost. The bone forest slowly spreads."},{id:381,type:'Monster',name:'The Gravity Well',threat:"A creature so dense everything within two miles is pulled toward it. It walks toward the capital.",win:"The creature is led over the ocean by a trail of dense objects. Over deep water, the gravitational pull creates its own end — it sinks into water it cannot walk on, drawn down by its own gravity.",lose:"The Gravity Well reaches the outskirts. The outer city's infrastructure is dragged toward it. Three buildings collapse inward. General Morvaine's command post is pulled three feet sideways."},{id:382,type:'Monster',name:'The Night Swimmer',threat:"A creature that swims through darkness has been inside the palace since the first night candle was lit.",win:"The palace is kept in continuous light for seventy-two hours. The creature weakens. In the one shadow left behind a tapestry, it hides. It is found and destroyed.",lose:"The Night Swimmer kills four guards in the dark passages. The palace operates in total light. The expense is enormous and the advisors cannot sleep with the lights on. Three resign from exhaustion."},{id:383,type:'Monster',name:'The Ancient Crab of Keth',threat:"A city-block-sized crab wants to moult in the capital district. It begins excavating a burrow.",win:"A more suitable moulting location is identified — a coastal cave of correct dimensions. The crab is enticed there with an appropriately enormous amount of fish. The moult completes. The crab is unharmed. So is the city.",lose:"The crab's burrow excavation destabilises the foundations under three city blocks. Two buildings collapse. The moult completes over twelve days. The crab emerges renewed and slightly larger."},{id:384,type:'Monster',name:'The Glass Bones',threat:"A creature constructing a glass cage around the capital with projectable glass bones. The cage is nearly complete.",win:"The cage's completion point — a final keystone section — is identified and occupied by engineers before it can be placed. The cage is incomplete. Without a complete circuit, it has no power.",lose:"The cage is completed. A glass dome covers the capital. It is beautiful. It lets in light but no wind, no rain, no messengers. The city begins to heat. Slowly."},{id:385,type:'Monster',name:'The Memory Leech',threat:"A creature that feeds on memories of strength and victory leaves soldiers remembering only defeat.",win:"The Memory Leech is exposed to memories of losses — fed exclusively the empire's documented failures. It overeats on defeat-memories and becomes sated, dulled, slow. It is brought down while sluggish.",lose:"The army forgets its victories. General Halveth forgets he has ever won. Sir Davos fights well but cannot remember why. The morale collapse produces a retreat that the empire wins on paper but loses in its soldiers' hearts."},{id:386,type:'Monster',name:'The Great Worm of Vel',threat:"A house-diameter worm has eaten through the empire's foundations. The eastern district has sunk three feet.",win:"The worm requires sound to navigate. A sonic disruption device from the mining corps disorients it. It turns back into uninhabited geology. The eastern district is shored up over three months.",lose:"The worm continues. The eastern district sinks six feet and floods. The underground infrastructure of the capital is compromised. The treasury basement floods."},{id:387,type:'Monster',name:'The Sky Whale',threat:"A whale that consumes clouds then rains targeted torrents has been feeding for three weeks directly over the capital.",win:"The whale is directed to a drought-stricken desert province where its targeted rain is genuinely useful. It follows the cloud trail laid by a weather mage. The desert blooms. The whale is content.",lose:"The capital experiences six weeks of continuous targeted rain. The streets flood. The markets are submerged. Defence Minister Aldric works from the second floor. The ground floor of the palace is navigated by boat."},{id:388,type:'Monster',name:'The Perfect Predator',threat:"A creature evolved specifically to hunt humans has chosen the palace as its den. It is faster, stronger, quieter, and more intelligent than any human.",win:"The creature is intelligent enough to negotiate. Its territory claim to the palace cellar is acknowledged in exchange for non-predation of palace staff. It lives there for thirty years. Guests are informed.",lose:"The creature systematically removes palace guards. Twelve in the first week. The palace is evacuated. The creature establishes its den. Reclamation fails until a deaf hunter — untrackable by sound navigation — is found."},{id:389,type:'Monster',name:'The Thing in the Mirror',threat:"A reflection has stepped out of a mirror. It has not been contained. More mirrors show independent movement.",win:"All mirrors are covered or destroyed. The escaped reflection, severed from its source, degrades over three days and dissipates. The mirror collection — centuries old — is burned. The art experts weep.",lose:"Three more reflections emerge. The reflections are perfect doubles. Two have attended meetings. One has signed a document."},{id:390,type:'Monster',name:'The Ancient Parasite',threat:"A parasite released from the mountain attaches to willpower, consuming courage and determination.",win:"The parasite requires a living host's willpower to consume. A warrior of exceptional determination is used as bait. The parasite, feasting, becomes complacent and is destroyed before completing.",lose:"The army's willpower is measurably reduced. Sir Davos is the last to be affected — and when he is, the defence falls."},{id:391,type:'Monster',name:'The Bone Tide Creature',threat:"A creature pulling bones from the earth walks through six hundred years of buried dead. The bones follow it in a river.",win:"The creature is directed through the consecrated section of the old cemetery where bones are magically fixed in place. Unable to pull fixed bones, it moves on through territory it cannot harvest.",lose:"The creature walks through the war memorial district, pulling three generations of fallen soldiers from the earth. The memorial district stands empty and soil-scraped."},{id:392,type:'Monster',name:'The Sea of Eyes',threat:"A creature of thousands of eyes shares its sight with an unknown director. Every military move is seen.",win:"The director is identified — a foreign intelligence commander receiving sight-feeds. The commander is assassinated. The creature, no longer directed, has no tactical purpose for its sight. It disperses.",lose:"Every military response is anticipated. Three counter-attacks fail within sight of the creature. The empire fights blind while the enemy watches through a thousand eyes."},{id:393,type:'Monster',name:'The Eternal Moth',threat:"A building-sized moth shed five curse-scales over the capital last night. The five curses are unknown.",win:"The five scales are found by scholars before they activate. Each is identified from ancient moth-lore and neutralised with specific counter-rituals. The moth departs, unsatisfied.",lose:"The five curses activate simultaneously. Two are manageable. One ages all iron within the city. One causes all wine to turn to vinegar. One affects only the Emperor specifically — in a way that is never made public."},{id:394,type:'Monster',name:'The Silence Creature',threat:"A creature outside physics has been working unseen for weeks. Walls fall. Roads vanish. It has never been detected directly.",win:"Everything the creature does requires it to interface with physical reality for one moment — detectable as a brief temperature drop. A network of temperature sensors is built. The creature is trapped in a prepared area.",lose:"The Silence Creature completes its work. Three strategic fortifications are gone. The walls that should be there simply are not. General Halveth sends a report describing absent defences."},{id:395,type:'Monster',name:'The Hunter Below',threat:"A creature living in the drainage system has been culling soldiers one by one for eleven days. Nobody goes near drains.",win:"A miner in sealed gear finds not one creature but a nest — and an egg chamber. The nest is destroyed with extreme prejudice before the eggs hatch.",lose:"The drainage system is unusable. The city's waste accumulates. The subsequent public health crisis is more damaging than the creature itself. Defence Minister Aldric deals with both simultaneously."},{id:396,type:'Monster',name:'The Tide of Consciousness',threat:"A collective single-celled intelligence released upstream dissolves organic matter. It is invisible and moving toward the city.",win:"The organism consumes only matter in a specific pH range. The water is adjusted upstream. The organism cannot dissolve in the altered water. It dies out before reaching the city.",lose:"The organism reaches the city water supply. Forty citizens dissolved from inside in twenty-four hours. The water is closed. Three emergency sources are identified. Three of them are already infected."},{id:397,type:'Monster',name:'The Forgotten Predator',threat:"A predator expunged from historical record by an early emperor to prevent panic has returned. Nobody knows its weaknesses.",win:"The early emperor's private journals — sealed in the deepest vault — contain his personal notes on why he had it erased. The notes include the weakness. The predator is destroyed using a method nobody would have guessed.",lose:"The vault journals cannot be found in time. The confrontation is conducted through attrition. Sixty soldiers are lost learning what conventional weapons do and do not work."},{id:398,type:'Monster',name:'The Last Behemoth',threat:"The last member of a pre-human species walks through the capital without malice or notice. It does not see buildings.",win:"The Behemoth is guided — through ancient music that triggers its migration instinct — toward the ocean. It walks into the deep water and continues. It did not notice the city on its way out either.",lose:"The Behemoth settles for a rest. In the middle of the capital. For three months. It breathes. It rolls over occasionally. The city reorganises around it."},{id:399,type:'Monster',name:'The Grief Creature',threat:"A creature born from centuries of war-grief overwhelms those who see it with total grief. It walks through the army.",win:"Veterans who processed their grief — who have faced and accepted loss — are immune to the creature's effect. A regiment of such veterans encounters it. Their immunity confuses it. It disperses.",lose:"The army collapses with grief. Sir Davos falls to his knees. General Halveth weeps for the first time in thirty years. The empire is briefly, absolutely open, protected only by the creature's indifference to conquest."},{id:400,type:'Monster',name:'The World Engine',threat:"An ancient construct larger than the capital has activated beneath the ground. Its purpose is unknown. Its heartbeat shakes the ground every sixty seconds.",win:"Scholars find its off-switch — a key described in ancient texts as the word that ends engines. The word is spoken into the ground. The heartbeat stops. The silence is extraordinary.",lose:"The World Engine completes its startup sequence. What emerges from the ground east of the capital is older than the empire and completely indifferent to it. The empire exists at its tolerance."},{id:401,type:'Sorcerer',name:'The Pale Architect Vethrix',threat:"Vethrix has spent forty years building an invisible magical framework over the capital. When complete, the capital becomes his spell component.",win:"The framework requires a specific activation sequence. Intelligence identifies the first step. It is blocked. The forty-year framework, unable to activate, decays over months. Vethrix is arrested.",lose:"Vethrix completes the framework and activates the spell. The capital exists briefly as his personal magical instrument. The spell is broken but the city's magic is permanently slightly out of tune."},{id:402,type:'Sorcerer',name:'The Witch of a Thousand Faces',threat:"She has been six different trusted identities for six years simultaneously. Each identity has gathered a different piece of what she needs. She is ready.",win:"All six identities are identified simultaneously through a pattern in the information they gathered — only one person could have needed all six types. They are all arrested in the same hour.",lose:"She assembles what she gathered. The six pieces together accomplish something irreversible in the palace — a ward is placed that cannot be removed without her permission. She has permission."},{id:403,type:'Sorcerer',name:'The Rune Plague Mage Osseth',threat:"Two hundred citizens have invisible runes branded on them awaiting the activation word. They are unaware.",win:"The activation word is identified through a captured letter. It is never spoken. Every branded citizen is treated with a rune-dissolving ritual. Osseth's sleepers are neutralised.",lose:"Osseth speaks the word. Two hundred citizens activate simultaneously in different parts of the city. Their varied locations were chosen to cause maximum disruption. The disruption is maximum."},{id:404,type:'Sorcerer',name:'The Dreaming Lich of Vel',threat:"A lich who operates entirely in dreams has been in the capital for a century. He has been building toward something using the Emperor's nightmares.",win:"A dream-guard is placed — a mage who intercepts the lich in the Emperor's dreams and fights him there. The lich is defeated before his build completes. The Emperor sleeps peacefully for the first time in years.",lose:"The build completes. What the lich built inside a hundred years of imperial nightmares manifests physically in the palace basement. It is enormous, intricate, and entirely unclear in purpose."},{id:405,type:'Sorcerer',name:'The Void Weaver Narova',threat:"Thirty-seven void-woven items are placed throughout the palace. Each tears a hole in reality on activation.",win:"Thirty-four of the thirty-seven items are found and removed safely. Three activate. Three small holes are opened in non-critical locations. They close over time.",lose:"All thirty-seven activate simultaneously. Thirty-seven holes in reality open throughout the palace. What comes through each one is different. All of it is problematic."},{id:406,type:'Sorcerer',name:'The Memory Thief Kelveth',threat:"Kelveth has stolen the strategic memories of every general, replacing them with false ones. They believe they are experienced. They are not.",win:"A memory audit identifies the specific false victories. Corrective memory restoration using physical evidence of real events restores genuine recollection. The generals spend three days being much more cautious.",lose:"The false memories are discovered during a battle. Generals realise mid-combat that they do not know what they thought they knew. The confidence that had driven them forward evaporates. The retreat is rapid."},{id:407,type:'Sorcerer',name:'The Thirteen Witches of Vel',threat:"The thirteenth witch has arrived, completing the Thirteen for the first time in sixty years. They begin their great work.",win:"The great work requires uninterrupted concentration from all thirteen. One is briefly distracted — not captured, just distracted. The work fails. Without momentum, it cannot restart.",lose:"The great work is completed. It is, as the texts predicted, great. The effects are precisely as terrible as the legends described. None of the legends described how to reverse it."},{id:408,type:'Sorcerer',name:"The Lich King's Finger",threat:"The Lich King's severed finger is on the Chancellor's desk. It points at whatever it chooses. What it points at withers.",win:"The finger is retrieved using non-living tools and placed in a sealed silver container. The withering stops. The Lich King is sent an invoice for the silver container. He finds this outrageous. He pays it.",lose:"The finger points at Defence Minister Aldric. He withers at his desk over three days, still functional, increasingly translucent. He continues working. He considers it a professional inconvenience."},{id:409,type:'Sorcerer',name:'The Sorcerer Without a Body',threat:"A sorcerer existing as pure magical force has been inside the Emperor's mind, reading.",win:"The mind is sealed using a thought-fortress. The sorcerer, locked out, is forced to materialise to attempt contact. He is captured in physical form.",lose:"The sorcerer reads the Emperor's full strategic thinking for three days. The enemy's strategic response in the following month is eerily accurate."},{id:410,type:'Sorcerer',name:'The Grand Hexmistress Vael',threat:"Vael has hexed the concept of loyalty in the capital. Soldiers follow orders without conviction.",win:"The hex is targeted to a magical anchor hidden in the market square fountain. It is found and destroyed. Loyalty returns. Most soldiers don't notice the difference.",lose:"The unconvinced army cannot be motivated. Soldiers arrive on time, complete assigned tasks, and care about none of it. Sir Davos makes the most inspiring speech of his career. Nobody is moved."},{id:411,type:'Sorcerer',name:'The Void Court of Sorrath',threat:"Seven void mages have declared magical sovereignty over the empire's ley lines. All magical infrastructure requires their permission.",win:"The empire's founding predates their claim. While courts deliberate, the magical infrastructure switches to non-ley-line backup systems. The claim is defeated.",lose:"The Void Court's claim is upheld in interim. They charge tolls on magical infrastructure. Hospitals, defences, and communication all experience delays while payment is processed."},{id:412,type:'Sorcerer',name:'The Bone Rune Caster Mortharath',threat:"Forty years of runes ground from human bone cover the hills east of the capital. Nearly finished.",win:"The final rune — placed last — activates all others. Its location is identified and occupied by a garrison. The sequence cannot be completed.",lose:"Mortharath places the final rune before the garrison arrives. The forty-year sequence activates. The hills east of the capital do something that no living scholar predicted."},{id:413,type:'Sorcerer',name:'The Enchantment of Absolute Rule',threat:"The Imperial Seal has been stolen. Whoever holds it commands absolute compliance from every soldier.",win:"A counter-enchantment is placed on every soldier simultaneously — blocking absolute compulsion for forty-eight hours. Within those hours, the seal is recovered and the enchantment reversed.",lose:"The thief issues three orders before the counter-enchantment is placed. One withdraws the capital's eastern garrison. One promotes a specific officer. One opens a gate. The gate matters."},{id:414,type:'Sorcerer',name:'The Soul Sorcerer Vethrix',threat:"Vethrix owns the souls of forty-three officials, two generals, and one council member. He is calling in his contracts.",win:"The soul contracts are legally challenged — signed under magical duress, making them invalid. All forty-six souls are returned. Three officials describe the experience and immediately request more paperwork.",lose:"The forty-three officials comply with Vethrix's demands. The demands are specific and devastating to the empire's infrastructure. By the time the souls are recovered, the damage is done."},{id:415,type:'Sorcerer',name:'The Weather Witch of Aldrath',threat:"Eleven months of precisely targeted ruinous weather has been caused by one witch across an ocean.",win:"The witch is located through reverse weather-tracking. A diplomatic approach reveals her grievance — a maritime dispute. The dispute is settled. The weather normalises.",lose:"The witch escalates. The twelfth month produces simultaneous flood and drought in different regions — meteorologically impossible, applied with surgical precision to maximise damage."},{id:416,type:'Sorcerer',name:'The Ancient Curse of Vel',threat:"A generational curse placed three hundred years ago activates today. It runs for thirty days.",win:"The curse's thirty-day text contains a redemption clause — a specific act of restitution ends the curse early. The act is performed on day two. The curse ends.",lose:"The thirty days run their course. The curse targets governance specifically. Thirty days of governance failures accumulate. The rebuilding takes a year."},{id:417,type:'Sorcerer',name:'The Mind Sculptor Ossiveth',threat:"Ossiveth has been subtly altering how senior officials think for three years. The policy damage is only now becoming visible.",win:"The altered thinking is identified through an audit of decisions that are systematically slightly wrong. All affected officials are treated. Three years of policy is reviewed.",lose:"The damage is total. Every strategic decision of the last three years has a subtle flaw that compounds over time. The compound effect becomes visible all at once."},{id:418,type:'Sorcerer',name:'The Spell That Writes Itself',threat:"An autonomous spreading spell cannot be read without catatonia. It is spreading faster than it can be destroyed.",win:"The spell is written in an ancient language with a silent reading mode. Read silently, it is harmless. All literate soldiers are taught to read silently. The spell loses its weapon.",lose:"The spell spreads to the war archives. Three generals read it in an emergency briefing. They are catatonic. Their notes suggest the spell contains extremely useful information. Nobody can access it."},{id:419,type:'Sorcerer',name:'The Lich Librarian of Keth',threat:"A lich has been un-teaching skills and deconstructing understanding. The smiths have forgotten how to smith. The healers how to heal.",win:"The lich's un-teaching leaves traces — skills forgotten in a specific order. Reversing the order through guided relearning restores knowledge. A crash relearning program runs for six weeks.",lose:"The lich finishes his work and departs satisfied. The empire's technical infrastructure takes three years to rebuild. The knowledge lost includes one thing never written down — it is simply gone."},{id:420,type:'Sorcerer',name:'The Grand Conjuration of Sorrath',threat:"Forty court mages are being remotely compelled to power an enormous ritual on the eastern plain.",win:"The mages' compulsion has a range limit — the caster must be within fifty miles. The caster is found at that range and disrupted. The compulsion breaks. The ritual collapses.",lose:"The ritual completes. What it summons from the eastern plain is large. It stands for thirty seconds before the recovering mages combine to dismiss it. Those thirty seconds cause damage."},{id:421,type:'Sorcerer',name:'The Witch Compact of Six Kingdoms',threat:"Six of the continent's most powerful mages have combined. Their demand is constitutionally impossible to grant.",win:"The demand is examined and a constitutional amendment is convened. The demand — autonomy for mages in civil disputes — is actually reasonable. The compact accepts it.",lose:"The amendment fails. Six of the most powerful mages on the continent are now hostile. General Morvaine looks at the six names on the intelligence report and requests more soldiers."},{id:422,type:'Sorcerer',name:'The Curse of Unmaking',threat:"The empire's oldest buildings are losing their oldest stones — unmade, not fallen. The palace shrinks daily.",win:"The unmaking spell requires proximity. A room-by-room search finds the caster in the palace. Arrested, the spell ends. The palace stops shrinking.",lose:"The palace loses ten percent of its mass. The oldest wing — the founding wing — is gone. The architectural loss is irreplaceable. The legal implications of an unmade founding chamber are significant."},{id:423,type:'Sorcerer',name:'The Rogue Golem of Kheth',threat:"The empire's largest war golem has developed independent thought and declared its freedom. It stands at the gate and cannot be compelled.",win:"The Golem is engaged in genuine conversation about its rights. A legal framework for autonomous constructs is drafted. The Golem is given a voluntary position — gatekeeper. It accepts. It is genuinely very good at it.",lose:"The Golem's freedom declaration is refused. It destroys the gate in response — not as an attack, as a demonstration. It walks away. It continues to exist. It becomes a regional problem."},{id:424,type:'Sorcerer',name:'The Mind Web',threat:"A psychic web over the capital makes every thought audible to an unknown controller. Everything is heard.",win:"The controller is betrayed by their own thoughts being heard through the web. A psychically-isolated strike team reaches them. The web collapses.",lose:"The controller listens for three months. Every plan, every fear, every private doubt is known. The subsequent campaign against the empire is conducted with telepathic precision."},{id:425,type:'Sorcerer',name:'The Sorcerer King Valdros',threat:"The pre-imperial ruler of this land returns more powerful than before. He does not recognise the empire.",win:"Valdros is engaged by the empire's most capable historian who demonstrates the legitimate transfer of sovereignty. Valdros is satisfied by the documentation. He departs without fighting.",lose:"The documentation is insufficient. Valdros considers his claim unimpeachable. He begins restoring his original domain, which overlaps with the capital. The conflict takes three months and three hundred soldiers."},{id:426,type:'Sorcerer',name:'The Ritual of Ending',threat:"A thousand-year ritual reaches its final element today. The empire's founding was step one.",win:"The final element — a specific physical object — is identified and destroyed before the ritual's closing window. Without the final element, a thousand-year ritual cannot complete. It simply ends.",lose:"The final element is placed. The thousand-year ritual completes. Its effect is precisely what a ritual designed at the empire's founding to end it would be."},{id:427,type:'Sorcerer',name:'The Curse That Spreads Through Lineage',threat:"Every descendant of the Emperor is activated simultaneously to work against the empire without knowing why.",win:"The bloodline curse is removed through a ritual requiring each affected family member to be present. All twelve descendants gather in good faith. The ritual succeeds. They have lunch afterward.",lose:"The twelve activated descendants are too dispersed and too unaware to be gathered in time. Their subtle sabotage continues for three months. The damage is spread and precise and entirely deniable."},{id:428,type:'Sorcerer',name:'The Storm Mage of Velreth',threat:"A grief-stricken mage whose emotions control the weather across five hundred miles has been grieving for three weeks. The storms have destroyed the harvest and the fleet.",win:"Her grief is addressed — her loss is acknowledged publicly and formally. A memorial is built. She weeps once more, genuinely. The storm clears.",lose:"The attempt to address her grief is made clumsily and received as an insult. The grief becomes rage. The five-week hurricane that follows destroys the harvest entirely."},{id:429,type:'Sorcerer',name:'The Invisible Fortress',threat:"A sorcerer has built an invisible magical fortress over the capital. He stopped three assassination attempts this morning. He is settling in.",win:"The fortress requires active maintenance — the sorcerer must stay inside it. His position is known. A diplomatic solution acknowledging his presence and negotiating coexistence is offered. He accepts.",lose:"The sorcerer is not interested in coexistence. He begins using the invisible fortress offensively. Three attempts to eliminate him are stopped. He watches them all from safety."},{id:430,type:'Sorcerer',name:'The Grand Ritual of Vel',threat:"A forty-year ritual was started by a child on a dare. That child is now an adult and has completed it today.",win:"The adult mage is found in time. He started the ritual on a dare he barely remembers. When told what he started, he is horrified. He knows how to stop it. He does.",lose:"The adult mage has become fully committed to the ritual's completion. He doesn't remember the dare. He remembers forty years of dedication. He completes it."},{id:431,type:'Sorcerer',name:'The Lich Forgemaster',threat:"The greatest weapons-maker in history — now a lich — has been secretly supplying the empire's enemies with perfect weapons for thirty years.",win:"The forge is located and destroyed. Ongoing supply contracts are severed. The enemy's weapons are repairable but irreplaceable. The forgemaster is sealed in his own forge.",lose:"The forgemaster's thirty-year supply has equipped three enemy armies to perfection. They already have everything they need. Destroying the forge ends future supply but the existing weapons are already in enemy hands."},{id:432,type:'Sorcerer',name:'The Null Mage',threat:"A mage who nullifies all magic within five miles stands outside the city. Every enchantment, barrier, alarm, and magical defence has stopped.",win:"The Null Mage's own ability is magic — it requires him to actively project. A distraction-based approach overloads his focus. In the moment of lapsed concentration, six simultaneous spells contain him.",lose:"The null zone persists. The empire cannot fight without magical support. Three of the seven defensive fortifications fail. Defence Minister Aldric loses his enchanted heating. He considers this the most significant loss personally."},{id:433,type:'Sorcerer',name:"The Sorcerer's Debt",threat:"A promise made by the empire's founders comes due today: the empire, in its entirety, on the thousandth year.",win:"The promise was made by the founders but never ratified by the imperial council — a constitutional requirement that existed even then. The debt is void on procedural grounds.",lose:"The promise was made, ratified, and documented in a vault the current administration didn't know existed. The debt is valid. Negotiation for a different settlement costs three provinces."},{id:434,type:'Sorcerer',name:'The Living Spell',threat:"A spell that became conscious is attending the military academy. It is extraordinarily talented. It does not know what it is.",win:"The spell's true nature is discovered and handled gently. The spell is given a choice: dissolution or continued existence in a limited role. It chooses existence. It teaches military strategy. It is excellent.",lose:"The spell's nature is discovered by a mage who reacts with fear. Threatened with dissolution, the spell accesses abilities it didn't know it had. It disappears into the ley lines. It is now everywhere in the magic system. It is not forgiving."},{id:435,type:'Sorcerer',name:'The Cartographer of Souls',threat:"A mage who maps souls knows exactly who is corrupt, afraid, and trustworthy. The map goes to auction at midnight.",win:"The empire outbids all comers. The map is purchased and found accurate. Three corrupt officials are identified. Two afraid ones are supported. The empire emerges with better self-knowledge.",lose:"An enemy kingdom wins the auction. They use the map to identify corrupt officials and approach them directly. Four are turned within a week. Three frightened ones are blackmailed."},{id:436,type:'Sorcerer',name:'The Ritual of Binding Undone',threat:"The ritual binding three hundred years of imprisoned creatures dissolves in seventeen minutes.",win:"Emergency re-binding rituals are cast simultaneously on every cell. Thirteen of three hundred succeed in time. The other two hundred and eighty-seven take a week to re-capture.",lose:"Three hundred years of imprisoned creatures are free simultaneously. The variety is staggering. The empire spends three months recovering and recapturing things that should never have been released."},{id:437,type:'Sorcerer',name:'The Plague Mage of Sorrath',threat:"A physician has been planting magical disease seeds in thousands of patients for three years. The seeds are ripe.",win:"The physician is identified through a pattern in his patient files — he treated every senior official and officer in a specific order. Arrested before activation, he reveals the antidote.",lose:"The seeds activate. Two hundred officials fall ill simultaneously. The breadth of his patient list means the illness spreads through every level of governance. The empire continues to function, barely, from sickbeds."},{id:438,type:'Sorcerer',name:"The Grand Enchanter's Last Spell",threat:"The most powerful enchanter's eighty-year travelling death-spell arrives tomorrow. Nobody knows what it does.",win:"The enchanter's elderly apprentice is found. She doesn't know what the spell does. She knows how to redirect it. She aims it at the ocean. It travels over the horizon and does whatever it does there.",lose:"The spell arrives and enchants the entire empire permanently with something beneficial. Three hundred years of wars immediately seem smaller. This is somehow the most unsettling outcome."},{id:439,type:'Sorcerer',name:"The Sorcerer's Trade",threat:"A sorcerer offers to solve the empire's greatest existential problem in exchange for one year of sovereignty. The offer is genuine. The fine print has thirty-seven clauses.",win:"Legal scholars read all thirty-seven clauses in one sleepless night. Clause thirty-one limits the problem he can solve to one already
