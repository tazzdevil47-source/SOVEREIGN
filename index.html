<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#07070e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SOVEREIGN">
<title>SOVEREIGN</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:#07070e;color:#e5d5b5;font-family:'Crimson Text',serif;height:100%;overflow:hidden;}
  #root{height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
  input,select,textarea{font-family:'Crimson Text',serif;}
  input[type=range]{-webkit-appearance:none;appearance:none;height:28px;background:transparent;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;cursor:pointer;margin-top:-8px;}
  input[type=range]::-webkit-slider-runnable-track{height:8px;border-radius:4px;background:#1a1a30;}
  ::-webkit-scrollbar{display:none;}
  scrollbar-width:none;
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { LineChart, Line, AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

// ─── THEME ────────────────────────────────────────────────────────────
const T = {
  bg:'#07070e',card:'#0d0d1a',input:'#0a0a1e',
  gold:'#c9a227',goldLight:'#e8c547',goldDim:'#2a2008',
  crimson:'#8b1515',text:'#e5d5b5',muted:'#6a5a45',
  dim:'#2a2a45',border:'#1a1a30',steel:'#1e3a5f',
};
const css = {
  card:{ background:T.card,border:`1px solid ${T.border}`,borderRadius:12,padding:14,marginBottom:10 },
  inp:{ background:T.input,border:`1px solid ${T.border}`,borderRadius:8,padding:'11px 13px',color:T.text,width:'100%',outline:'none',fontSize:16,boxSizing:'border-box',fontFamily:'inherit',WebkitAppearance:'none',appearance:'none' },
  btn:{ background:T.gold,color:'#000',border:'none',borderRadius:8,padding:'12px 18px',cursor:'pointer',fontWeight:700,fontSize:14,fontFamily:'inherit',minHeight:46,touchAction:'manipulation' },
  btnO:{ background:'transparent',color:T.gold,border:`1px solid ${T.gold}55`,borderRadius:8,padding:'11px 14px',cursor:'pointer',fontSize:13,fontFamily:'inherit',minHeight:44,touchAction:'manipulation' },
  btnD:{ background:T.crimson,color:'#fff',border:'none',borderRadius:8,padding:'11px 14px',cursor:'pointer',fontSize:13,fontFamily:'inherit',minHeight:44,touchAction:'manipulation' },
  btnG:{ background:'transparent',color:T.muted,border:`1px solid ${T.border}`,borderRadius:8,padding:'10px 12px',cursor:'pointer',fontSize:12,fontFamily:'inherit',minHeight:42,touchAction:'manipulation' },
  lbl:{ color:T.muted,fontSize:10,letterSpacing:1.5,textTransform:'uppercase',marginBottom:5,display:'block' },
  h2:{ color:T.gold,fontFamily:"'Cinzel', serif",margin:'0 0 14px',fontSize:17,fontWeight:600,letterSpacing:1 },
  h3:{ color:T.text,margin:'0 0 10px',fontSize:14,fontWeight:600 },
};

// ─── STORAGE (localStorage) ───────────────────────────────────────────
const db = {
  get: async (k) => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):null; } catch { return null; } },
  set: async (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch(e){ console.error(e); } },
};

const today = () => new Date().toISOString().split('T')[0];
const fmt   = (d) => { try { return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short'}); } catch { return d; } };

// ─── NAV ─────────────────────────────────────────────────────────────
const NAV = [
  {id:'dashboard',label:'Command', sym:'⚔'},
  {id:'vitals',   label:'Vitals',  sym:'◈'},
  {id:'workout',  label:'Warfare', sym:'⛉'},
  {id:'zcycle',   label:'Mind',    sym:'Z'},
  {id:'ycycle',   label:'Treasury',sym:'Y'},
  {id:'food',     label:'Rations', sym:'◎'},
  {id:'lore',     label:'Lore',    sym:'✦'},
  {id:'campaigns',label:'Campaign',sym:'⊕'},
  {id:'calendar', label:'War Map', sym:'▦'},
  {id:'relations',label:'Alliance',sym:'◉'},
  {id:'todos',    label:'Orders',  sym:'▣'},
  {id:'summary',  label:'Intel',   sym:'≡'},
  {id:'settings', label:'Forge',   sym:'⚙'},
];

const DEFAULT_SETTINGS = {
  emperorName:'Emperor Vaelthor',
  commanderNames:['Commander Draven','Commander Syla','Commander Roran','Commander Kezath'],
  pageCommanders:{dashboard:0,vitals:1,workout:2,zcycle:3,ycycle:0,food:1,lore:2,campaigns:3,calendar:0,relations:1,todos:2,summary:3,settings:0},
  targetWeight:null,startWeight:null,motivationQuotes:[],
};

// ─── TOP BAR ──────────────────────────────────────────────────────────
const TopBar = ({settings,page}) => {
  const idx=(settings.pageCommanders||{})[page]??0;
  const cmd=settings.commanderNames?.[idx]||'—';
  return (
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 14px',background:'#090912',borderBottom:`1px solid ${T.border}`,flexShrink:0,minHeight:50}}>
      <div style={{display:'flex',flexDirection:'column',gap:1}}>
        <span style={{color:T.gold,fontFamily:"'Cinzel',serif",fontSize:11}}>{settings.emperorName}</span>
        <span style={{color:T.muted,fontSize:9}}>{cmd}</span>
      </div>
      <span style={{color:T.gold,fontFamily:"'Cinzel',serif",fontSize:12,letterSpacing:4,opacity:0.7}}>SOVEREIGN</span>
      <span style={{color:T.muted,fontSize:9}}>{new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}</span>
    </div>
  );
};

// ─── BOTTOM NAV ───────────────────────────────────────────────────────
const BottomNav = ({page,setPage}) => {
  const ref=useRef(null);
  useEffect(()=>{
    const el=ref.current?.querySelector(`[data-id="${page}"]`);
    if(el) el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  },[page]);
  return (
    <div style={{background:'#090912',borderTop:`1px solid ${T.border}`,flexShrink:0,overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
      <div ref={ref} style={{display:'flex',padding:'4px 6px',gap:2,width:'max-content',minWidth:'100%'}}>
        {NAV.map(n=>(
          <button key={n.id} data-id={n.id} onClick={()=>setPage(n.id)}
            style={{background:page===n.id?T.goldDim:'transparent',border:`1px solid ${page===n.id?T.gold+'55':'transparent'}`,cursor:'pointer',borderRadius:8,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'5px 10px',gap:2,minHeight:54,minWidth:54,touchAction:'manipulation'}}>
            <span style={{fontSize:16,color:page===n.id?T.gold:T.muted,lineHeight:1}}>{n.sym}</span>
            <span style={{color:page===n.id?T.gold:T.dim,fontSize:8,letterSpacing:0.3,textTransform:'uppercase',whiteSpace:'nowrap'}}>{n.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
};

// ─── HELPERS ─────────────────────────────────────────────────────────
const Chip = ({label,active,color='#c9a227',onClick,sm}) => (
  <button onClick={onClick} style={{background:active?color+'33':'transparent',border:`1px solid ${active?color:T.border}`,borderRadius:20,padding:sm?'3px 9px':'5px 12px',cursor:'pointer',color:active?color:T.dim,fontSize:sm?10:12,fontFamily:'inherit',minHeight:sm?28:36,touchAction:'manipulation',whiteSpace:'nowrap'}}>
    {label}
  </button>
);

const GraphPanel = ({title,data,dataKey,color,range,setRange}) => (
  <div style={css.card}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
      <span style={{color:T.gold,fontSize:12,fontWeight:600}}>{title}</span>
      <div style={{display:'flex',gap:3}}>
        {['7D','14D','30D','90D','ALL'].map(r=>(
          <button key={r} onClick={()=>setRange(r)} style={{...css.btnO,padding:'3px 7px',fontSize:9,minHeight:30,background:r===range?T.gold:'transparent',color:r===range?'#000':T.gold}}>{r}</button>
        ))}
      </div>
    </div>
    <ResponsiveContainer width="100%" height={140}>
      <AreaChart data={data}>
        <CartesianGrid strokeDasharray="3 3" stroke={T.border}/>
        <XAxis dataKey="date" tick={{fill:T.muted,fontSize:8}}/>
        <YAxis tick={{fill:T.muted,fontSize:8}} width={30}/>
        <Tooltip contentStyle={{background:T.card,border:`1px solid ${T.border}`,color:T.text,fontSize:11}}/>
        <Area type="monotone" dataKey={dataKey} stroke={color} fill={color+'22'} strokeWidth={2} dot={false}/>
      </AreaChart>
    </ResponsiveContainer>
  </div>
);

const buildGraph = (logs,field,range) => {
  const days=range==='7D'?7:range==='14D'?14:range==='30D'?30:range==='90D'?90:180;
  return Array.from({length:days},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(days-1-i));
    const key=d.toISOString().split('T')[0];
    return {date:fmt(key),[field]:(logs[key]||{})[field]??0};
  });
};

// ─── DASHBOARD ────────────────────────────────────────────────────────
const Dashboard = ({dailyLogs,settings,todos,campaigns,workouts}) => {
  const td=today(),log=dailyLogs[td]||{};
  const todayTodos=todos[td]||[];
  const done=todayTodos.filter(t=>t.done).length;
  const hasWorkout=workouts.some(w=>w.date===td);
  const activeCampaigns=campaigns.filter(c=>c.status==='active');
  const quotes=settings.motivationQuotes||[];
  const quote=quotes.length>0?quotes[new Date().getDay()%quotes.length]:null;
  const stats=[
    {l:'Water',  v:`${log.water||0}L`,                                          c:'#4a9edd'},
    {l:'Coffee', v:`${log.coffee||0}`,                                           c:'#c97a2a'},
    {l:'Sleep',  v:log.sleepHours?`${log.sleepHours}h`:'—',                    c:'#7a7add'},
    {l:'Z Cycle',v:log.zcycle!==undefined?`${log.zcycle>0?'+':''}${log.zcycle}%`:'—',c:'#aa7add'},
    {l:'Weight', v:log.weight?`${log.weight}kg`:'—',                            c:T.gold},
    {l:'Orders', v:`${done}/${todayTodos.length}`,                              c:'#2d8a3e'},
  ];
  return (
    <div style={{padding:14}}>
      {quote&&<div style={{...css.card,borderLeft:`3px solid ${T.gold}`,fontStyle:'italic',color:T.muted,fontSize:13,lineHeight:1.6}}>"{quote}"</div>}
      <div style={{...css.card,textAlign:'center',borderTop:`2px solid ${hasWorkout?'#2d8a3e':log.restDay?T.steel:T.border}`,padding:10}}>
        <span style={{color:hasWorkout?'#2d8a3e':log.restDay?'#4a8aaa':T.muted,fontSize:11,letterSpacing:2}}>
          {hasWorkout?'⚔ BATTLE WON':log.restDay?'🛡 REST DAY':'NO BATTLE LOGGED'}
        </span>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:10}}>
        {stats.map(s=>(
          <div key={s.l} style={{...css.card,marginBottom:0,textAlign:'center',padding:10,borderTop:`2px solid ${s.c}44`}}>
            <div style={{color:s.c,fontSize:17,fontWeight:700,fontFamily:"'Cinzel',serif"}}>{s.v}</div>
            <div style={{color:T.muted,fontSize:8,letterSpacing:0.5,textTransform:'uppercase',marginTop:2}}>{s.l}</div>
          </div>
        ))}
      </div>
      {activeCampaigns.length>0&&(
        <div style={css.card}>
          <div style={css.h3}>Active Campaigns</div>
          {activeCampaigns.slice(0,3).map(c=>{
            const pct=c.target>0?Math.min(100,Math.round((c.current/c.target)*100)):0;
            return (<div key={c.id} style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span style={{color:T.text,fontSize:12}}>{c.name}</span>
                <span style={{color:T.gold,fontSize:11}}>{pct}%</span>
              </div>
              <div style={{background:T.border,borderRadius:4,height:4}}>
                <div style={{background:T.gold,width:`${pct}%`,height:4,borderRadius:4}}/>
              </div>
            </div>);
          })}
        </div>
      )}
      {todayTodos.length>0&&(
        <div style={css.card}>
          <div style={css.h3}>Today's Orders</div>
          {todayTodos.slice(0,6).map(t=>(
            <div key={t.id} style={{display:'flex',gap:8,alignItems:'center',marginBottom:6}}>
              <span style={{color:t.done?'#2d8a3e':T.dim}}>{t.done?'✓':'○'}</span>
              <span style={{color:t.done?T.muted:T.text,fontSize:13,textDecoration:t.done?'line-through':'none'}}>{t.text}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

// ─── VITALS ───────────────────────────────────────────────────────────
const Vitals = ({dailyLogs,setDailyLogs}) => {
  const td=today(),log=dailyLogs[td]||{};
  const [range,setRange]=useState('7D');
  const upd=(key,val)=>{const u={...dailyLogs,[td]:{...(dailyLogs[td]||{}),[key]:val}};setDailyLogs(u);db.set('daily_logs',u);};
  const calcSleep=(bed,wake)=>{if(!bed||!wake)return null;const[bh,bm]=bed.split(':').map(Number),[wh,wm]=wake.split(':').map(Number);let d=(wh*60+wm)-(bh*60+bm);if(d<0)d+=1440;return Math.round(d/60*10)/10;};
  return (
    <div style={{padding:14}}>
      <h2 style={css.h2}>Vitals</h2>
      <div style={css.card}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <span style={{color:'#4a9edd',fontWeight:600}}>💧 Water</span>
          <span style={{color:T.gold,fontSize:26,fontWeight:700,fontFamily:"'Cinzel',serif"}}>{log.water||0}L</span>
        </div>
        <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:8}}>
          {[0.25,0.5,1,1.5,2,2.5,3].map(v=><Chip key={v} label={`${v}L`} active={log.water===v} color={T.gold} onClick={()=>upd('water',v)}/>)}
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>upd('water',Math.max(0,Math.round(((log.water||0)-0.25)*100)/100))} style={{...css.btnG,flex:1}}>− 0.25L</button>
          <button onClick={()=>upd('water',Math.round(((log.water||0)+0.25)*100)/100)} style={{...css.btn,flex:2}}>+ 0.25L</button>
        </div>
      </div>
      <div style={css.card}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <span style={{color:'#c97a2a',fontWeight:600}}>☕ Coffee</span>
          <span style={{color:T.gold,fontSize:26,fontWeight:700,fontFamily:"'Cinzel',serif"}}>{log.coffee||0}</span>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>upd('coffee',Math.max(0,(log.coffee||0)-1))} style={{...css.btnG,flex:1}}>− 1 cup</button>
          <button onClick={()=>upd('coffee',(log.coffee||0)+1)} style={{...css.btn,flex:2}}>Had a cup</button>
        </div>
        {(log.coffee||0)>=4&&<div style={{color:T.gold,fontSize:11,marginTop:8}}>⚠ High caffeine — watch your sleep</div>}
      </div>
      <div style={css.card}>
        <div style={{color:'#7a7add',fontWeight:600,marginBottom:10}}>😴 Sleep</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:8}}>
          <div><label style={css.lbl}>Bedtime</label>
            <input type="time" style={css.inp} value={log.bedtime||''} onChange={e=>{
              const hrs=calcSleep(e.target.value,log.wakeup);
              const u={...(dailyLogs[td]||{}),bedtime:e.target.value};
              if(hrs!==null)u.sleepHours=hrs;
              const updated={...dailyLogs,[td]:u};setDailyLogs(updated);db.set('daily_logs',updated);
            }}/>
          </div>
          <div><label style={css.lbl}>Wake Up</label>
            <input type="time" style={css.inp} value={log.wakeup||''} onChange={e=>{
              const hrs=calcSleep(log.bedtime,e.target.value);
              const u={...(dailyLogs[td]||{}),wakeup:e.target.value};
              if(hrs!==null)u.sleepHours=hrs;
              const updated={...dailyLogs,[td]:u};setDailyLogs(updated);db.set('daily_logs',updated);
            }}/>
          </div>
        </div>
        {log.sleepHours&&<div style={{color:log.sleepHours<6?T.crimson:log.sleepHours>=7?'#2d8a3e':T.gold,fontSize:26,fontWeight:700,fontFamily:"'Cinzel',serif"}}>{log.sleepHours}h <span style={{fontSize:11,fontWeight:400}}>{log.sleepHours<6?'⚠ Low':log.sleepHours>=7?'✓ Good':'~ Marginal'}</span></div>}
      </div>
      <GraphPanel title="Water (L)" data={buildGraph(dailyLogs,'water',range)} dataKey="water" color="#4a9edd" range={range} setRange={setRange}/>
      <GraphPanel title="Coffee (cups)" data={buildGraph(dailyLogs,'coffee',range)} dataKey="coffee" color="#c97a2a" range={range} setRange={setRange}/>
      <GraphPanel title="Sleep (h)" data={buildGraph(dailyLogs,'sleepHours',range)} dataKey="sleepHours" color="#7a7add" range={range} setRange={setRange}/>
    </div>
  );
};

// ─── WORKOUT ──────────────────────────────────────────────────────────
const WCATS={Core:['Pushups','Leg Raises','Plank','Crunches','Mountain Climbers','Sit-ups'],Glutes:['Squats','Lunges','Hip Thrusts','Glute Bridges','Donkey Kicks'],Arms:['Bicep Curls','Tricep Dips','Shoulder Press','Pull-ups','Lateral Raises'],Cardio:['Walk','Run','Cycling','Jump Rope','Swimming'],Mixed:['Burpees','HIIT','Circuit Training','Yoga','CrossFit']};

const Workout = ({workouts,setWorkouts}) => {
  const [cat,setCat]=useState('Core');
  const [exercise,setExercise]=useState('');
  const [value,setValue]=useState('');
  const [unit,setUnit]=useState('reps');
  const [timer,setTimer]=useState(0);
  const [timerOn,setTimerOn]=useState(false);
  const [cry,setCry]=useState('');
  const [loadingCry,setLoadingCry]=useState(false);
  const timerRef=useRef(null);
  const td=today();
  useEffect(()=>{if(timerOn)timerRef.current=setInterval(()=>setTimer(t=>t+1),1000);else clearInterval(timerRef.current);return()=>clearInterval(timerRef.current);},[timerOn]);
  const fmtT=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const addEx=()=>{if(!exercise||!value)return;const u=[...workouts,{id:Date.now(),date:td,category:cat,exercise,value,unit,timerSeconds:timer}];setWorkouts(u);db.set('workouts',u);setValue('');};
  const delEx=id=>{const u=workouts.filter(w=>w.id!==id);setWorkouts(u);db.set('workouts',u);};
  const getCry=async()=>{
    setLoadingCry(true);
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:80,system:'Write exactly 15-20 words. A fierce battle cry about retaking lost land. No explanation, no quotes, just the cry.',messages:[{role:'user',content:'Battle cry.'}]})});
      const d=await r.json();setCry(d.content?.[0]?.text?.trim()||'');
    }catch{setCry('The enemy holds our land. Today we march and take back everything that is ours.');}
    setLoadingCry(false);
  };
  const todayW=workouts.filter(w=>w.date===td);
  const histByDate=workouts.reduce((acc,w)=>{if(!acc[w.date])acc[w.date]=[];acc[w.date].push(w);return acc;},{});
  return (
    <div style={{padding:14}}>
      <h2 style={css.h2}>Warfare</h2>
      <div style={{...css.card,borderLeft:`3px solid ${T.crimson}`,background:'#0c0808'}}>
        {cry?<div style={{color:T.text,fontStyle:'italic',fontSize:14,lineHeight:1.7,marginBottom:10}}>"{cry}"</div>:<div style={{color:T.muted,fontSize:12,marginBottom:10}}>Summon your battle cry before you begin.</div>}
        <button onClick={getCry} disabled={loadingCry} style={{...css.btnD,fontSize:12,opacity:loadingCry?0.6:1}}>{loadingCry?'Summoning...':'⚔ Battle Cry'}</button>
      </div>
      <div style={{...css.card,textAlign:'center'}}>
        <div style={{color:T.gold,fontFamily:"'Cinzel',serif",fontSize:46,fontWeight:700,letterSpacing:4}}>{fmtT(timer)}</div>
        <div style={{display:'flex',gap:8,justifyContent:'center',marginTop:10}}>
          <button onClick={()=>setTimerOn(!timerOn)} style={timerOn?{...css.btnD,flex:2}:{...css.btn,flex:2}}>{timerOn?'⏸ Pause':'▶ Start'}</button>
          <button onClick={()=>{setTimer(0);setTimerOn(false);}} style={{...css.btnG,flex:1}}>Reset</button>
        </div>
      </div>
      <div style={css.card}>
        <div style={css.h3}>Log Exercise</div>
        <div style={{display:'flex',gap:5,overflowX:'auto',paddingBottom:6,marginBottom:8,WebkitOverflowScrolling:'touch'}}>
          {Object.keys(WCATS).map(c=><Chip key={c} label={c} active={cat===c} color={T.gold} onClick={()=>{setCat(c);setExercise('');}}/>)}
        </div>
        <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:8}}>
          {WCATS[cat].map(e=><Chip key={e} label={e} active={exercise===e} color={T.goldLight} onClick={()=>setExercise(e)} sm/>)}
        </div>
        <input placeholder="Or type custom exercise" style={{...css.inp,marginBottom:8}} value={exercise} onChange={e=>setExercise(e.target.value)}/>

const POWER_OPTS=['Connector','High status','Skilled communicator','Fast responder','Good collaborator','Time-waster','Good influence','Bad influence','Long-term value','Short-term only'];
const UTIL_CATS={Career:['Jobs','Referrals','Hiring','Resume','Interviews','Promotions','Recruiting','Industry knowledge'],Business:['Startup','Sales','Clients','Investing','Marketing','Branding','Finance','Legal','Operations'],Learning:['Programming','AI','Electronics','Math','Language learning','Research','Writing','Public speaking'],Lifestyle:['Fitness','Fashion','Grooming','Nutrition','Travel','Productivity','Cars'],Entertainment:['Video games','Anime','Movies','Music','Memes','Sports'],Social:['Deep talks','Networking','Events','Parties','Dating advice','Emotional support','Accountability']};

  const [search,setSearch]=useState('');

  const toggle=(field,val)=>setForm(f=>({...f,[field]:f[field].includes(val)?f[field].filter(x=>x!==val):[...f[field],val]}));
  const trustColor=t=>t==='Inner circle'?T.gold:t==='Trusted'?'#2d8a3e':t==='Low trust'||t==='Avoid sensitive info'?T.crimson:T.border;
  const save=()=>{if(!form.name.trim())return;if(editId){const u=relations.map(r=>r.id===editId?{...r,...form}:r);setRelations(u);db.set('relations',u);}else{const u=[...relations,{...form,id:Date.now()}];setRelations(u);db.set('relations',u);}setForm(emptyForm());setEditId(null);setShowForm(false);};
  const del=id=>{const u=relations.filter(r=>r.id!==id);setRelations(u);db.set('relations',u);};
  const startEdit=r=>{setForm({...r});setEditId(r.id);setShowForm(true);};
  const filtered=relations.filter(r=>{if(!search)return true;const q=search.toLowerCase();return[r.name,r.connectionType,r.trustLevel,...(r.utility||[]),...(r.interests||[]),...(r.energy||[]),...(r.powerTags||[])].some(v=>v?.toLowerCase().includes(q));});

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>

      </div>
      <input placeholder="Search name, skill, tag, trust..." style={{...css.inp,marginBottom:12}} value={search} onChange={e=>setSearch(e.target.value)}/>
      {showForm&&<div style={{...css.card,marginBottom:14}}>
        <div style={css.h3}>{editId?'Edit':'New'} Contact</div>
        <input placeholder="Name *" style={{...css.inp,marginBottom:8}} value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
        <label style={css.lbl}>Connection Type</label>
        <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:10}}>{CONN_TYPES.map(t=><Chip key={t} label={t} active={form.connectionType===t} color="#4a8aaa" onClick={()=>setForm(f=>({...f,connectionType:t}))} sm/>)}</div>
        <label style={css.lbl}>Utility</label>
        {Object.entries(UTIL_CATS).map(([cat,items])=>(<div key={cat} style={{marginBottom:8}}><div style={{color:T.dim,fontSize:9,letterSpacing:1,marginBottom:4,textTransform:'uppercase'}}>{cat}</div><div style={{display:'flex',gap:3,flexWrap:'wrap'}}>{items.map(i=><Chip key={i} label={i} active={form.utility.includes(i)} color={T.gold} onClick={()=>toggle('utility',i)} sm/>)}</div></div>))}
        <label style={{...css.lbl,marginTop:6}}>Interests</label>
        <div style={{display:'flex',gap:3,flexWrap:'wrap',marginBottom:10}}>{INTERESTS.map(t=><Chip key={t} label={t} active={form.interests.includes(t)} color="#4a9edd" onClick={()=>toggle('interests',t)} sm/>)}</div>
        <label style={css.lbl}>Trust Level</label>
        <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:10}}>{TRUST_LEVELS.map(t=><Chip key={t} label={t} active={form.trustLevel===t} color={trustColor(t)} onClick={()=>setForm(f=>({...f,trustLevel:t}))} sm/>)}</div>
        <label style={css.lbl}>Energy</label>
        <div style={{display:'flex',gap:3,flexWrap:'wrap',marginBottom:10}}>{ENERGY_OPTS.map(t=>{const neg=['Draining','Negative','Flaky','Ego-heavy','Opportunistic'].includes(t);return<Chip key={t} label={t} active={form.energy.includes(t)} color={neg?T.crimson:'#2d8a3e'} onClick={()=>toggle('energy',t)} sm/>;})}</div>
        <label style={css.lbl}>Power Tags</label>
        <div style={{display:'flex',gap:3,flexWrap:'wrap',marginBottom:10}}>{POWER_OPTS.map(t=><Chip key={t} label={t} active={form.powerTags.includes(t)} color="#aa7add" onClick={()=>toggle('powerTags',t)} sm/>)}</div>
        <label style={css.lbl}>Last Contacted</label>
        <input type="date" style={{...css.inp,marginBottom:8}} value={form.lastContacted} onChange={e=>setForm(f=>({...f,lastContacted:e.target.value}))}/>
        <textarea placeholder="Notes..." style={{...css.inp,height:60,resize:'vertical',marginBottom:8}} value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/>
        <div style={{display:'flex',gap:8}}><button onClick={save} style={{...css.btn,flex:2}}>{editId?'Update':'Save'}</button><button onClick={()=>{setShowForm(false);setEditId(null);}} style={{...css.btnG,flex:1}}>Cancel</button></div>
      </div>}
      {filtered.map(r=>{const daysSince=r.lastContacted?Math.floor((new Date()-new Date(r.lastContacted))/86400000):null;return(<div key={r.id} style={{...css.card,borderLeft:`3px solid ${trustColor(r.trustLevel)}`}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}><div style={{flex:1}}><div style={{color:T.text,fontWeight:700,fontSize:15,fontFamily:"'Cinzel',serif"}}>{r.name}</div><div style={{display:'flex',gap:5,flexWrap:'wrap',marginTop:4}}>{r.connectionType&&<span style={{color:T.muted,fontSize:9,background:T.input,padding:'1px 7px',borderRadius:8}}>{r.connectionType}</span>}{r.trustLevel&&<span style={{color:trustColor(r.trustLevel),fontSize:9,padding:'1px 7px',borderRadius:8,background:trustColor(r.trustLevel)+'22'}}>{r.trustLevel}</span>}{daysSince!==null&&<span style={{color:daysSince>30?T.crimson:T.muted,fontSize:9}}>{daysSince}d ago</span>}</div>{r.utility?.length>0&&<div style={{color:'#7aaadd',fontSize:10,marginTop:4}}>{r.utility.slice(0,5).join(' · ')}</div>}{r.interests?.length>0&&<div style={{color:T.muted,fontSize:10,marginTop:2}}>{r.interests.slice(0,5).join(' · ')}</div>}{r.energy?.length>0&&<div style={{color:'#7add7a',fontSize:10,marginTop:2}}>{r.energy.slice(0,3).join(' · ')}</div>}</div><div style={{display:'flex',gap:5,marginLeft:8}}><button onClick={()=>startEdit(r)} style={{...css.btnG,padding:'4px 10px',fontSize:11,minHeight:34}}>Edit</button><button onClick={()=>del(r.id)} style={{...css.btnD,padding:'4px 10px',fontSize:11,minHeight:34}}>Del</button></div></div></div>);})}
      {!filtered.length&&<div style={{color:T.muted,textAlign:'center',padding:40,fontSize:13}}>{search?'No contacts match.':'No contacts yet.'}</div>}
    </div>
  );
};

// ─── TO-DO ────────────────────────────────────────────────────────────
const MISS_REASONS=['Too sad','Binge eating','No time','Sick','Other commitment','Forgot','Other'];
const TodoList = ({todos,setTodos}) => {
  const [text,setText]=useState('');
  const td=today(),list=todos[td]||[];
  const upd=newList=>{const u={...todos,[td]:newList};setTodos(u);db.set('todos',u);};
  const add=()=>{if(!text.trim())return;upd([...list,{id:Date.now(),text,done:false,missReason:''}]);setText('');};
  const toggle=id=>upd(list.map(t=>t.id===id?{...t,done:!t.done}:t));
  const setMiss=(id,r)=>upd(list.map(t=>t.id===id?{...t,missReason:r}:t));
  const del=id=>upd(list.filter(t=>t.id!==id));
  const done=list.filter(t=>t.done).length;
  return (
    <div style={{padding:14}}>
      <h2 style={css.h2}>Orders — To-Do</h2>
      <div style={{...css.card,textAlign:'center'}}>
        <div style={{color:T.gold,fontSize:34,fontWeight:700,fontFamily:"'Cinzel',serif"}}>{done}/{list.length}</div>
        <div style={{color:T.muted,fontSize:9,letterSpacing:1,textTransform:'uppercase'}}>Orders Completed</div>
        {list.length>0&&<div style={{background:T.border,borderRadius:4,height:5,marginTop:8}}><div style={{background:done===list.length?'#2d8a3e':T.gold,width:`${list.length?(done/list.length)*100:0}%`,height:5,borderRadius:4,transition:'width 0.3s'}}/></div>}
      </div>
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        <input placeholder="New order..." style={css.inp} value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}/>
        <button onClick={add} style={{...css.btn,padding:'11px 16px'}}>Add</button>
      </div>
      {list.map(t=>(<div key={t.id} style={{...css.card,marginBottom:6}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <button onClick={()=>toggle(t.id)} style={{background:'none',border:`2px solid ${t.done?'#2d8a3e':T.border}`,borderRadius:5,width:26,height:26,cursor:'pointer',color:'#2d8a3e',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0,touchAction:'manipulation'}}>{t.done?'✓':''}</button>
          <span style={{flex:1,color:t.done?T.muted:T.text,textDecoration:t.done?'line-through':'none',fontSize:14}}>{t.text}</span>
          <button onClick={()=>del(t.id)} style={{background:'none',border:'none',color:T.muted,cursor:'pointer',fontSize:22,lineHeight:1,touchAction:'manipulation'}}>×</button>
        </div>
        {!t.done&&<div style={{marginTop:8,paddingLeft:36,display:'flex',gap:4,flexWrap:'wrap'}}>{MISS_REASONS.map(r=><Chip key={r} label={r} active={t.missReason===r} color={T.crimson} onClick={()=>setMiss(t.id,r)} sm/>)}</div>}
      </div>))}
    </div>
  );
};

// ─── WEEKLY SUMMARY ───────────────────────────────────────────────────
const WeeklySummary = ({dailyLogs,workouts,foodLogs,ycycle}) => {
  const [offset,setOffset]=useState(0);
  const getWeek=off=>{const d=new Date(),day=d.getDay();const mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1)+(off*7));return Array.from({length:7},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return x.toISOString().split('T')[0];});};
  const dates=getWeek(offset);
  const logs=dates.map(d=>({d,...(dailyLogs[d]||{})}));
  const avgWater=Math.round((logs.reduce((a,l)=>a+(l.water||0),0)/7)*10)/10;
  const sLogs=logs.filter(l=>l.sleepHours);
  const avgSleep=sLogs.length?Math.round((sLogs.reduce((a,l)=>a+l.sleepHours,0)/sLogs.length)*10)/10:0;
  const zLogs=logs.filter(l=>l.zcycle!==undefined);
  const avgZ=zLogs.length?Math.round(zLogs.reduce((a,l)=>a+l.zcycle,0)/zLogs.length):0;
  const coffee=logs.reduce((a,l)=>a+(l.coffee||0),0);
  const restDays=logs.filter(l=>l.restDay).length;
  const wonDays=dates.filter(d=>workouts.some(w=>w.date===d)).length;
  const fEvents=foodLogs.filter(f=>dates.includes(f.date)).length;
  const income=ycycle.filter(e=>dates.includes(e.date)&&e.type==='income').reduce((a,e)=>a+e.amount,0);
  const expense=ycycle.filter(e=>dates.includes(e.date)&&e.type==='expense').reduce((a,e)=>a+e.amount,0);
  return (
    <div style={{padding:14}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <h2 style={{...css.h2,margin:0}}>Intel — Weekly</h2>
        <div style={{display:'flex',gap:5}}>
          <button onClick={()=>setOffset(o=>o-1)} style={{...css.btnG,padding:'8px 14px'}}>‹</button>
          {offset<0&&<button onClick={()=>setOffset(0)} style={{...css.btnG,padding:'8px 10px',fontSize:11}}>Now</button>}
          <button onClick={()=>setOffset(o=>Math.min(0,o+1))} style={{...css.btnG,padding:'8px 14px'}} disabled={offset===0}>›</button>
        </div>
      </div>
      <div style={{color:T.muted,fontSize:11,marginBottom:12}}>{fmt(dates[0])} — {fmt(dates[6])}</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:10}}>
        {[[`${wonDays}/${7-restDays}`,'Battles',T.gold],[`${avgWater}L`,'Avg Water','#4a9edd'],[`${avgSleep}h`,'Avg Sleep','#7a7add'],[`${avgZ>0?'+':''}${avgZ}%`,'Avg Z','#aa7add'],[`${coffee}`,'Coffee','#c97a2a'],[`${fEvents}`,'Food Events',fEvents>3?T.crimson:T.muted],[income.toLocaleString(),'Income','#2d8a3e'],[expense.toLocaleString(),'Expense',T.crimson],[`${restDays}`,'Rest Days','#4a8aaa']].map(([v,l,c])=>(
          <div key={l} style={{...css.card,marginBottom:0,textAlign:'center',padding:10}}><div style={{color:c,fontSize:16,fontWeight:700}}>{v}</div><div style={{color:T.muted,fontSize:8,textTransform:'uppercase',letterSpacing:0.5,marginTop:2}}>{l}</div></div>
        ))}
      </div>
      <div style={css.card}><div style={css.h3}>Daily Breakdown</div>{dates.map(d=>{const l=dailyLogs[d]||{};const won=workouts.some(w=>w.date===d);return(<div key={d} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:`1px solid ${T.border}`}}><span style={{color:T.muted,fontSize:10,width:50}}>{new Date(d+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric'})}</span><span style={{color:won?'#2d8a3e':l.restDay?'#4a8aaa':T.crimson,fontSize:10,width:52}}>{won?'⚔ Won':l.restDay?'🛡 Rest':'— Miss'}</span><span style={{color:'#4a9edd',fontSize:10}}>{l.water||0}L</span><span style={{color:'#7a7add',fontSize:10}}>{l.sleepHours||'—'}h</span><span style={{color:'#aa7add',fontSize:10}}>{l.zcycle!==undefined?`${l.zcycle>0?'+':''}${l.zcycle}%`:'—'}</span><span style={{color:l.weight?T.gold:T.dim,fontSize:10}}>{l.weight?`${l.weight}kg`:'—'}</span></div>);})}</div>
    </div>
  );
};

// ─── SETTINGS ─────────────────────────────────────────────────────────
const Settings = ({settings,setSettings,dailyLogs,workouts,foodLogs,ycycle,relations,campaigns,stories,todos}) => {

  const addQuote=()=>{if(!newQuote.trim())return;setForm(f=>({...f,motivationQuotes:[...(f.motivationQuotes||[]),newQuote]}));setNewQuote('');};

    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(campaigns),'Campaigns');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(stories),'Lore');

    XLSX.writeFile(wb,`SOVEREIGN_export_${today()}.xlsx`);

      <div style={css.card}>
        <div style={css.h3}>Commanders</div>
        {form.commanderNames.map((c,i)=>(<div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,paddingBottom:8,borderBottom:`1px solid ${T.border}`}}><span style={{color:T.text,fontSize:13}}>{c}</span><button onClick={()=>delCmd(i)} style={{...css.btnD,padding:'4px 10px',fontSize:11,minHeight:32}}>Remove</button></div>))}

      </div>
      <div style={css.card}>
        <div style={css.h3}>Commander per Page</div>
        <div style={{color:T.muted,fontSize:11,marginBottom:10}}>Assign which commander leads each section.</div>
        {NAV.map(n=>(<div key={n.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}><span style={{color:T.text,fontSize:12,width:80}}>{n.label}</span><div style={{display:'flex',gap:4,flexWrap:'wrap',flex:1,justifyContent:'flex-end'}}>{form.commanderNames.map((c,i)=><Chip key={i} label={c.replace('Commander ','')} active={(form.pageCommanders||{})[n.id]===i} color={T.gold} onClick={()=>setPageCmd(n.id,i)} sm/>)}</div></div>))}
      </div>
      <div style={css.card}><div style={css.h3}>Weight Goals</div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}><div><label style={css.lbl}>Start (kg)</label><input type="number" style={css.inp} value={form.startWeight||''} onChange={e=>setForm(f=>({...f,startWeight:Number(e.target.value)}))}/></div><div><label style={css.lbl}>Target (kg)</label><input type="number" style={css.inp} value={form.targetWeight||''} onChange={e=>setForm(f=>({...f,targetWeight:Number(e.target.value)}))}/></div></div></div>
      <div style={css.card}>
        <div style={css.h3}>Motivation Quotes</div>
        <div style={{color:T.muted,fontSize:11,marginBottom:8}}>Rotate on dashboard. Write your own.</div>
        {(form.motivationQuotes||[]).map((q,i)=>(<div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:7,paddingBottom:7,borderBottom:`1px solid ${T.border}`}}><span style={{color:T.text,fontSize:12,flex:1,fontStyle:'italic',lineHeight:1.5}}>{q}</span><button onClick={()=>delQuote(i)} style={{...css.btnD,padding:'3px 8px',fontSize:11,minHeight:30,marginLeft:8}}>×</button></div>))}
        <div style={{display:'flex',gap:8,marginTop:4}}><input placeholder="Write a war quote..." style={css.inp} value={newQuote} onChange={e=>setNewQuote(e.target.value)}/><button onClick={addQuote} style={{...css.btn,padding:'11px 14px'}}>Add</button></div>
      </div>
      <button onClick={save} style={{...css.btn,width:'100%',padding:14,marginBottom:10,fontSize:15,background:saved?'#1a5c2a':T.gold}}>{saved?'✓ Saved':'Save All Settings'}</button>
      <div style={css.card}><div style={css.h3}>Export Data</div><div style={{color:T.muted,fontSize:11,marginBottom:10}}>All modules exported as separate Excel sheets.</div><button onClick={exportExcel} style={{...css.btn,background:'#1a5c2a',width:'100%'}}>↓ Export to Excel</button></div>
    </div>
  );
};

// ─── MAIN APP ─────────────────────────────────────────────────────────
const App = () => {
  const [page,setPage]=useState('dashboard');
  const [settings,setSettings]=useState(DEFAULT_SETTINGS);
  const [dailyLogs,setDailyLogs]=useState({});
  const [workouts,setWorkouts]=useState([]);
  const [foodLogs,setFoodLogs]=useState([]);
  const [ycycle,setYcycle]=useState([]);
  const [relations,setRelations]=useState([]);
  const [campaigns,setCampaigns]=useState([]);
  const [stories,setStories]=useState([]);
  const [todos,setTodos]=useState({});
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    (async()=>{
      const[s,dl,w,fl,y,r,c,st,t]=await Promise.all([db.get('settings'),db.get('daily_logs'),db.get('workouts'),db.get('food_logs'),db.get('ycycle'),db.get('relations'),db.get('campaigns'),db.get('stories'),db.get('todos')]);
      if(s)setSettings({...DEFAULT_SETTINGS,...s,pageCommanders:{...DEFAULT_SETTINGS.pageCommanders,...(s.pageCommanders||{})}});
      if(dl)setDailyLogs(dl);if(w)setWorkouts(w);if(fl)setFoodLogs(fl);if(y)setYcycle(y);if(r)setRelations(r);if(c)setCampaigns(c);if(st)setStories(st);if(t)setTodos(t);
      setLoading(false);
    })();
    if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
  },[]);

  if(loading)return(
    <div style={{background:T.bg,height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:10}}>
      <div style={{color:T.gold,fontFamily:"'Cinzel',serif",fontSize:26,letterSpacing:8}}>SOVEREIGN</div>
      <div style={{color:T.muted,fontSize:10,letterSpacing:3}}>THE PERSONAL WAR ROOM</div>
    </div>
  );

  const renderPage=()=>{
    switch(page){
      case'dashboard':return<Dashboard dailyLogs={dailyLogs} settings={settings} todos={todos} campaigns={campaigns} workouts={workouts}/>;
      case'vitals':return<Vitals dailyLogs={dailyLogs} setDailyLogs={setDailyLogs}/>;
      case'workout':return<Workout workouts={workouts} setWorkouts={setWorkouts}/>;
      case'zcycle':return<ZCycle dailyLogs={dailyLogs} setDailyLogs={setDailyLogs}/>;
      case'ycycle':return<YCycle ycycle={ycycle} setYcycle={setYcycle}/>;
      case'food':return<FoodCycle foodLogs={foodLogs} setFoodLogs={setFoodLogs}/>;
      case'lore':return<LorePage stories={stories} setStories={setStories}/>;
      case'campaigns':return<Campaigns campaigns={campaigns} setCampaigns={setCampaigns}/>;
      case'calendar':return<WeightCalendar dailyLogs={dailyLogs} setDailyLogs={setDailyLogs} settings={settings} workouts={workouts}/>;
      case'relations':return<Relationships relations={relations} setRelations={setRelations}/>;
      case'todos':return<TodoList todos={todos} setTodos={setTodos}/>;
      case'summary':return<WeeklySummary dailyLogs={dailyLogs} workouts={workouts} foodLogs={foodLogs} ycycle={ycycle}/>;
      case'settings':return<Settings settings={settings} setSettings={setSettings} dailyLogs={dailyLogs} workouts={workouts} foodLogs={foodLogs} ycycle={ycycle} relations={relations} campaigns={campaigns} stories={stories} todos={todos}/>;
      default:return null;
    }
  };

  return(
    <div id="root" style={{background:T.bg,color:T.text,fontFamily:"'Crimson Text',serif",display:'flex',flexDirection:'column',overflow:'hidden',maxWidth:480,margin:'0 auto',height:'100vh',height:'100dvh'}}>
      <TopBar settings={settings} page={page}/>
      <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
        {renderPage()}
        <div style={{height:20}}/>
      </div>
      <BottomNav page={page} setPage={setPage}/>
    </div>
  );
};

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
