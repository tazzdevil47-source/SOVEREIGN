 a specific comet to align before attacking — a draconic superstition. The comet's path is magically diverted. He waits forever for a sign that never comes.",lose:"The comet aligns. Kethmorax attacks with ten days of accumulated patience behind him. His first strike destroys the gate in one blow. General Halveth is on the other side of it."},{id:158,type:'Dragon',name:'Zurvethax the Silence Bringer',threat:"Zurvethax removes the ability to speak from anyone who hears his voice. Three hundred soldiers are mute. Command has collapsed.",win:"Zurvethax is defeated by a deaf soldier who leads the attack. The mute soldiers recover within hours of his death. They have a lot to say.",lose:"Five hundred soldiers are permanently mute. A full written command system is hastily implemented. The first written order takes forty minutes to reach the front. It arrives too late."},{id:159,type:'Dragon',name:'Tharexon the World Splitter',threat:"Tharexon cracked the earth east of the capital — a fifty-metre chasm, three miles long — as a greeting. He has not introduced himself yet.",win:"Tharexon introduces himself formally. He follows strict protocols of contest. He challenges the Emperor to a formal game of territorial wager. The Emperor's court jester wins by accident.",lose:"Tharexon's second greeting destroys the aqueduct. His third destroys the eastern bridge. His fourth is interrupted when a guard shoots at him. Tharexon stops greeting and starts attacking."},{id:160,type:'Dragon',name:'Omethvex the Last Dragon',threat:"Omethvex is the last of his line. A founders' treaty grants him the throne upon his line's extinction. He is the last. The treaty is legally valid.",win:"Historians find one egg from Omethvex's line in trust in a foreign monastery. The line is not extinct. The treaty does not trigger. Omethvex is furious but legally defeated.",lose:"The treaty is valid and witnessed. Omethvex technically rules the empire for seventy-two hours under ancient law. His seventy-two hours of decrees are reviewed. Two were actually quite good."},{id:161,type:'Undead',name:'The Vampire Lord Serath',threat:"Serath has lived disguised as a noble for two hundred years. He owns half the eastern court. He is done being quiet.",win:"Serath is exposed in open court. The daylight windows are uncovered. He burns spectacularly. His two-century property portfolio is seized and redistributed to the families of his victims.",lose:"Serath feeds openly. The eastern court is turned within a week. Defence Minister Aldric discovers three of his senior staff are vampires and cannot decide which meetings to cancel."},{id:162,type:'Undead',name:'Countess Velith the Bloodless',threat:"Countess Velith's finishing school has twelve vampire staff and three hundred enrolled noble children.",win:"A night raid extracts all three hundred children simultaneously while twelve specialist vampire hunters deal with the staff. All children safe. Velith is destroyed at dawn.",lose:"Velith turns fourteen children before the rescue. Their parents are devastated. The diplomatic fallout from whose child was turned occupies the court for months."},{id:163,type:'Undead',name:'The Pale Court of Ashenveil',threat:"An entire noble court of sixty-four vampires has been governing their province perfectly for months. Nobody outside knows.",win:"A routine inspection reveals the truth. The court is quietly and completely purged. The province transitions to new governance without public knowledge of the vampire situation.",lose:"The vampire court's existence leaks publicly. Mass panic. Three provinces demand inspections. The inspections required to answer this take eight months."},{id:164,type:'Undead',name:'Duke Morrath the Undying',threat:"Duke Morrath returns with documentation proving his execution was fabricated. It was. He wants his title, his lands, and the heads of the ministers responsible.",win:"The injustice is acknowledged. Morrath's title is restored. The ministers face a public tribunal. Morrath accepts justice and returns peacefully to his duchy.",lose:"Justice is delayed for bureaucratic reasons. Morrath takes his duchy back personally, killing the current occupant. The legal case against him for the killing takes three years."},{id:165,type:'Undead',name:'The Wailing Legion of Sorrath',threat:"Ten thousand ghosts haunt the northern province. Their grief drives the living mad within days. The province is emptying.",win:"The ghosts' unfinished business — a mass burial never completed after a forgotten battle — is identified and performed. They depart peacefully.",lose:"The province of Sorrath empties of all living inhabitants. It becomes a ghost territory. The tax revenue disappears. General Morvaine refuses to patrol it."},{id:166,type:'Undead',name:'Archbishop Veldris the Hollow',threat:"The empire's most beloved religious leader has been undead for six months. He has been conducting services and counselling the Emperor since. Nobody noticed.",win:"Veldris is gently exposed and lovingly put to rest by the priests who knew him. His final service — delivered knowingly as an undead — is considered his most moving.",lose:"Veldris's true nature is exposed publicly and messily. Religious panic sweeps the capital. Three minor churches declare the empire spiritually compromised."},{id:167,type:'Undead',name:'The Bone Tide',threat:"A wave of undead rises from the sea every night, each wave larger than the last. Each leaves more behind.",win:"The source — an ancient shipwreck filled with cursed gold on the seafloor — is located and the gold neutralised. The tide stops. The accumulated undead collapse simultaneously.",lose:"The Bone Tide reaches the harbour walls by the seventh night. Admiral Keth abandons the outer docks. The docks are lost to an ever-growing undead settlement."},{id:168,type:'Undead',name:'General Kreth the Unburied',threat:"General Kreth died unburied and has risen furious. He commands his own regiment of undead and remembers their names.",win:"Kreth is given a full military funeral — honours, salute, the works — while still animated. The gesture fulfils his unfinished business. He and his regiment rest peacefully mid-march.",lose:"Kreth's regiment attacks the military district. Sir Davos faces his former colleague in combat. He wins but is visibly shaken. Kreth is finally buried. The headstone just says: Better late."},{id:169,type:'Undead',name:'The Lich Twins Mordax and Vael',threat:"Twin liches sharing a single phylactery. Both must be destroyed at exactly the same moment or the survivor inherits all power.",win:"Two teams coordinate a simultaneous strike to the second. Both fall at once. The phylactery, deprived of both hosts simultaneously, implodes.",lose:"The timing is off by four seconds. The surviving twin absorbs the destroyed one's power and becomes twice as formidable. Captain Reth's strike team is wiped out."},{id:170,type:'Undead',name:'The Ghost Army of Valdross',threat:"A complete ghost army — cavalry, infantry, archers, siege weapons — marches on the capital. They pass through walls. Weapons pass through them.",win:"A ward of sacred salt is laid in a ring around the capital. The ghost army piles up against the ward unable to cross. Trapped and purposeless, they fade over several days.",lose:"The ghost army occupies the city. They cannot harm the living physically but their presence drives the population into terror. Three weeks of paralysed governance follow."},{id:171,type:'Undead',name:'The Undead Spymaster Orveth',threat:"Orveth knows every imperial secret and is sharing everything from beyond the grave with a foreign power.",win:"Orveth's unfinished business is identified — a promise made to him that was broken. The promise is posthumously honoured. Satisfied, he stops spying and departs.",lose:"Every active intelligence asset is compromised within a month. The entire spy network must be rebuilt. Defence Minister Aldric is personally embarrassed when his private correspondence is read at a foreign court."},{id:172,type:'Undead',name:'The Risen Admiral Keth',threat:"The undead Admiral Keth commands an undead fleet that sails without wind and does not sink.",win:"Admiral Keth the living challenges Admiral Keth the undead to the traditional naval duel. He wins. Undead-Keth is satisfied. The fleet disperses.",lose:"The undead fleet blockades the capital's river approach. Supply ships cannot pass. Three weeks of blockade starve the river trade. Admiral Keth the living is deeply uncomfortable."},{id:173,type:'Undead',name:'The Hollow Children of Vel',threat:"Three hundred undead children walk through the city streets weeping silently. They are not aggressive. Their presence is devastating.",win:"The children's orphanage — burned forty years ago — is reconstructed on its original site as a memorial. The children feel seen. They find their way to it and rest.",lose:"The weeping children cause city-wide trauma. Thousands flee the capital. When they return, the children are still there. The city learns to live with silent weeping children."},{id:174,type:'Undead',name:"The Lich Queen's Hand",threat:"The Lich Queen Morreva's severed hand is in the treasury writing messages in blood. It is not restrained.",win:"The hand is contained in a sealed silver box. The messages are decoded — they are coordinates for Morreva's return ritual. The ritual site is destroyed. The hand goes quiet.",lose:"The hand escapes containment and writes seventeen more messages. Three are financial advice. The financial advice is very good. This makes it worse somehow."},{id:175,type:'Undead',name:'The Undead Parliament',threat:"Every deceased member of the imperial council for two centuries conducts a session of parliament. Their legislation predates all current laws.",win:"A constitutional historian finds a precedent that living successors to office supersede deceased holders. The undead parliament is legally outranked. They accept the ruling, impressed by the research.",lose:"The undead parliament passes forty-seven resolutions that legally override current law. The resulting chaos takes six months to unwind. Defence Minister Aldric discovers three of his own powers have been revoked."},{id:176,type:'Undead',name:'The Revenant Empress Theldra',threat:"Empress Theldra — beloved ruler from three centuries ago — has returned. She claims she was murdered and names the murderer's descendants. They are current senior ministers.",win:"The investigation confirms Theldra was murdered. A formal inquiry is opened. Theldra agrees to rest pending its completion. She rests.",lose:"Theldra pursues her case without waiting. She personally confronts the named ministers. Two resign before she reaches them. One is caught. The trial is constitutionally unprecedented."},{id:177,type:'Undead',name:'The Thousand-Year Necromancer Halvath',threat:"Halvath has maintained his undead existence by willpower alone for a thousand years. He cannot be killed. He simply wants to speak with the Emperor.",win:"The Emperor agrees to the meeting. Halvath wants recognition — a thousand years of existence acknowledged. He is given a certificate of historical significance. He departs satisfied.",lose:"The meeting is refused four times. On the fourth refusal, Halvath stops being polite. His thousand years of patience has run out. His thousand years of power has not."},{id:178,type:'Undead',name:'The Shroud of Morrath',threat:"A supernatural fog from the western hills changes those who enter it. They return quieter, colder, and loyal in a new unsettling way.",win:"The fog's source — a corrupted ley line — is purified. The fog disperses. Those changed by it are gradually restored. The western hills are beautiful in the clear weather.",lose:"Two hundred soldiers return from the fog changed. They follow orders efficiently. But they follow ALL orders. Without judgment, question, or conscience."},{id:179,type:'Undead',name:'The Plague Choir',threat:"Sixty undead singers whose combined voice causes instant death perform nightly concerts. The city has emptied within earshot.",win:"The Choir is ambushed by a deaf assault team. The singing affects nothing. The Choir is destroyed mid-performance. Their final note is their last.",lose:"The Choir migrates into the city centre. The entire western district evacuates. The silence where the choir walks is more terrifying than the singing."},{id:180,type:'Undead',name:'The Spectral Tax Collector',threat:"The ghost of an executed tax collector returns to collect unpaid taxes with compound interest. He accepts only souls.",win:"A legal team argues that soul-payment constitutes torture under three legal precedents. The ghost accepts a cash settlement at fair market soul value. He departs satisfied.",lose:"Three hundred citizens who cannot prove their tax compliance lose fragments of their souls. They become mildly translucent and slightly sad. The condition is not fatal but is deeply undignified."},{id:181,type:'Undead',name:'The Death Knights of the Old Empire',threat:"Seven death knights claim the throne under ancient law and will accept seven simultaneous duels as legal resolution.",win:"Sir Davos accepts all seven simultaneously — blindfolded, to make it sporting. He defeats four. The remaining three accept a lesser settlement: perpetual tomb rights and a plaque.",lose:"The seven champions fielded by the empire lose five duels. The death knights claim the five territories their fallen champions represent. The map of the empire changes in an afternoon."},{id:182,type:'Undead',name:'The Weeping King Orrath',threat:"The undead king of an absorbed kingdom wanders the streets weeping poisonous tears, searching for his people.",win:"Orrath's people — absorbed into the empire three centuries ago — are found in records. Their descendants are gathered and presented to him. He weeps once more, cleanly, and fades.",lose:"Orrath's tears contaminate the eastern river. Three hundred poisoned. Captain Reth attempts to contain him and is wept on. Orrath continues to wander, permanently grief-stricken."},{id:183,type:'Undead',name:'The Bone Sculptor Veth',threat:"Veth creates bone siege engines that assault the walls nightly and must be destroyed by morning.",win:"Veth is captured alive by a team who follows his bone constructs back to his studio. He is given a commission to produce bone sculptures for the palace garden instead. His work is considered remarkable.",lose:"The nightly sieges wear down the outer wall over three weeks. Veth's bone catapult collapses a tower. He creates a bone battering ram that requires two hundred soldiers to destroy."},{id:184,type:'Undead',name:'The Night Mayor of Aldrath',threat:"The undead mayor has governed excellently for two years while raising the dead on the side.",win:"The mayor is confronted. He agrees to stop raising the dead in exchange for continued official governance. The population votes to keep him. He wins by a significant margin.",lose:"The mayor's secret gets out. The population flees Aldrath. The excellent governance means nothing without a population. The city stands empty and well-administered."},{id:185,type:'Undead',name:"The Lich King's Messenger",threat:"A skeletal courier delivers a formal diplomatic request from a Lich King to the east. He waits in the palace antechamber for a reply.",win:"Diplomatic relations are opened. The Lich Kingdom is a significant power. Trade deals are established. The Lich King turns out to be a reliable partner who requires very little beyond acknowledgement.",lose:"The messenger is killed in a panic by a guard. The Lich King sends a second messenger with the same letter and a bill for damages. The bill is larger than expected. His accountants are thorough."},{id:186,type:'Undead',name:'The Hungry Dead of Sorrath',threat:"Intelligent ghouls have established a community and will eat people until they receive legal recognition.",win:"Legal recognition is granted with conditions. The ghouls sign a covenant regarding feeding practices. They become an unusual but functional part of the eastern province's civic life.",lose:"Recognition is refused. Three citizens are eaten. The empire attacks the ghoul community. The ghouls, being undead, do not stay dead. The conflict enters its second month."},{id:187,type:'Undead',name:'The Immortal General Varek',threat:"Varek cannot die. He has been executed three times and returned angrier each time. He is at the gate for the fourth time.",win:"A scholar determines Varek's immortality is conditional — he must be acknowledged as the greatest general in imperial history. This is done publicly. His purpose fulfilled, he accepts death. The fourth execution is final.",lose:"The fourth execution fails. Varek's fifth return is notably more destructive. He destroys three barracks and demands to see the Emperor personally."},{id:188,type:'Undead',name:'The Shadow Lich Morvel',threat:"Morvel exists as a shadow watching silently from the Emperor's private chambers. He has been there for three weeks.",win:"The chambers are flooded with magical light for three days, destroying Morvel's shadow form. He disperses. The Emperor sleeps well for the first time in a month.",lose:"Morvel watches the Emperor for three weeks, learning the empire's most private strategic thinking. He writes a comprehensive intelligence report in the form of a shadow on the wall at dawn and leaves."},{id:189,type:'Undead',name:'The Pale Tide of Sorrath',threat:"The dead rise nightly across the province and stand watching the capital. They return at dawn. Someone is organising this rehearsal.",win:"The organiser — a rogue necromancer testing his abilities — is identified and arrested. His rehearsal army disperses. He accepts a position in the empire's necromantic research division.",lose:"The organiser finishes his rehearsal. On the eighth night, the dead do not return at dawn. They remain. All of them. The siege begins."},{id:190,type:'Undead',name:'The Undead Court Jester Pip',threat:"Pip — executed for the crime of not being funny — has returned. His jokes are lethally accurate and ministers are terrified to laugh.",win:"Pip is given a permanent royal position with a simple agreement: he will only perform for those who consent. The court is never the same again but nobody important dies.",lose:"Pip tells a joke about Defence Minister Aldric that is so accurate it constitutes a formal accusation. The accusation is legally binding. The subsequent trial is strange and long."},{id:191,type:'Undead',name:'The Bone Cathedral',threat:"A bone cathedral grew overnight in the city centre. Worshippers enter. None return.",win:"The cathedral's summoning source — a cursed relic in the city's founding stone — is removed. The cathedral crumbles. The worshippers inside are found preserved and somewhat changed, but alive.",lose:"The cathedral grows. Twelve hundred have entered over three days. The empire cannot attack a building full of citizens. The cathedral begins making demands."},{id:192,type:'Undead',name:'The Lich Cartographer',threat:"An ancient lich has completed a three-hundred-year map of the empire and claims it as his territory under arcane law.",win:"A counter-cartographic legal argument establishes that continuous habitation supersedes ancient arcane claim. The lich concedes the legal point and accepts naming rights to several mountains.",lose:"The arcane courts rule in the lich's favour. He technically owns the empire. He is a surprisingly lenient landlord but the rent he charges is in experience, not gold."},{id:193,type:'Undead',name:'The Forgotten Battalion',threat:"A regiment following a forty-year-old order to take the capital returns from a battle that ended long ago.",win:"The regiment is met with full honours, informed the war ended decades ago, and welcomed as heroes. They are stunned but appreciative.",lose:"The regiment attacks before communications can be established. Eighteen soldiers are killed in both directions before the misunderstanding is identified. The paperwork around friendly-fire deaths from forty-year-old orders is extraordinary."},{id:194,type:'Undead',name:'The Revenant Chancellor',threat:"The previous Emperor's chancellor returns with real evidence of widespread corruption in the current administration.",win:"The evidence is accepted and the named officials investigated. The cleanup is painful but thorough. The chancellor departs once justice is demonstrably underway. Three ministers are imprisoned.",lose:"The evidence is suppressed. The chancellor releases it to the public. The scandal is larger than any military threat the empire faces that year. Sir Davos publicly supports the chancellor's findings."},{id:195,type:'Undead',name:'The Undead Horologist',threat:"An undead clockmaker's repairs make time run slightly backward in the capital district. Citizens age in reverse.",win:"The horologist's repairs are methodically reversed by the living clockmakers' guild. Time normalises. Citizens return to their correct ages, some with interesting memories of being slightly younger.",lose:"The clockmaker repairs seventeen more timepieces. The capital ages backward by six years. Soldiers forget recent training. Alliances formed in the last five years are forgotten by their signatories."},{id:196,type:'Undead',name:'The Shrieking Court',threat:"Twelve undead courtiers shriek inaudibly to the living but commandingly to the dead. The graveyards are emptying.",win:"The shriek's frequency is determined and countered with a resonant tone that cancels it. The silent command dies. The risen dead collapse. The courtiers dissipate.",lose:"Three thousand additional undead follow the shriek's command into the city. The dead outnumber the living in the capital district for two days."},{id:197,type:'Undead',name:'The Pale Librarian',threat:"The imperial library's head librarian died forty years ago. Nobody noticed. He has been cataloguing books and adding prophetic entries continuously.",win:"The prophetic entries are identified and cross-referenced. They are accurate and useful. The librarian is officially retained as the empire's first undead civil servant.",lose:"The prophetic entries are found but misread. Acting on a misinterpreted prophecy, General Morvaine repositions three regiments to the wrong border. The correct border is exposed."},{id:198,type:'Undead',name:'The Cold Feast',threat:"An invitation to a banquet hosted by the long-dead Lord Mortharath goes to every noble house. Attendees have not returned.",win:"Investigators enter using cold-iron protection and find the attendees alive in enchanted stasis mid-meal. They are restored. The banquet's enchantment is broken. The canapés are still warm.",lose:"Eighty nobles are lost to the Cold Feast. The power vacuum in the noble houses creates a succession crisis in three provinces."},{id:199,type:'Undead',name:'The Undead Siege Engineer',threat:"The most brilliant siege engineer in history, raised by an enemy, directs a siege using techniques not seen in two hundred years.",win:"His original notes and designs — kept in the imperial archive — are found and used to predict his every move. The predictability makes him manageable. He collapses.",lose:"The siege engineer breaches the outer wall using a technique of extraordinary elegance. General Halveth quietly compliments it while retreating."},{id:200,type:'Undead',name:'The Last Soldier',threat:"A single ancient undead soldier from the first war ever fought on this land walks slowly toward the capital, carrying a flag no one recognises. He will not stop.",win:"Historians identify the soldier's regiment. His war ended in his favour — he won. A formal victory ceremony is organised for a war fought four thousand years ago. He is given the honour. He stops walking.",lose:"The soldier reaches the capital and stands at the gate. He will not enter. He will not leave. He stands. He has been standing for three weeks. Tourists begin arriving to see him."},{id:201,type:'Undead',name:'The Grave Tide of Velreth',threat:"Every grave within fifty miles opens at midnight for the seventh consecutive night. The dead stand watching. Someone is organising this rehearsal.",win:"The organiser is found through tracking the pattern of graves — they always rise nearest a specific hilltop. A necromancer is arrested mid-rehearsal. The dead collapse. He is outraged at the interruption.",lose:"On the eighth night, the dead do not return at dawn. The rehearsal becomes the performance. A sea of undead surrounds the capital with no gaps."},{id:202,type:'Undead',name:'The Undead Physician',threat:"The empire's greatest healer has returned and is treating patients. His patients recover and are then compelled to serve him.",win:"The compulsion is identified as a subtle binding in the treatment. The binding is countered. The cured patients are freed. The physician is given a choice: stop healing, or heal properly. He chooses to heal properly.",lose:"Three hundred compelled citizens follow the physician loyally. He now has a private army of the recently healed. He makes demands regarding their release. The demands are complex."},{id:203,type:'Undead',name:'The Midnight Court of Ashenveil',threat:"Ghost court holds full session in the palace throne room every midnight. They pass laws that are mysteriously carried out by morning.",win:"The throne room is blessed at midnight by the High Priest, banishing all ghost presence. The enacted laws are reviewed — two were actually beneficial and are kept.",lose:"The midnight court passes a law granting itself daytime hours. The ghost court begins session at noon. The living court cannot use the throne room at the same time. A scheduling conflict between living and dead government lasts months."},{id:204,type:'Undead',name:'The Lich Astronomer',threat:"The undead astronomer predicts the empire ceases to exist in thirty days. His previous thirty predictions were accurate. He offers a solution for a price.",win:"The price is investigated before acceptance. It is reasonable — recognition of astronomical discoveries made during his undeath. The deal is struck. The solution works. His name goes on three stars.",lose:"The price is refused as unseemly. The thirty days pass. The astronomer's thirty-first prediction is, for the record, accurate."},{id:205,type:'Undead',name:'The Revenant Judge Morthain',threat:"Judge Morthain — whose false verdicts executed three hundred innocents — has returned and is reversing his verdicts. Each reversal requires the current holder of the convicted's property to return it. Immediately.",win:"A property commissioner is appointed to manage orderly restitution. The process takes six months but is completed fairly. Judge Morthain rests once the last case is closed.",lose:"The immediate forced returns trigger a property crisis. Families evicted from homes they've held for forty years riot. Three districts are in chaos. Judge Morthain does not consider this his problem."},{id:206,type:'Undead',name:'The Death Parade',threat:"Every thirty years, the undead of the region march through the capital in a parade. The parade is scheduled for tomorrow. Three hundred thousand undead are already forming up.",win:"The parade is permitted and managed. Three hundred thousand undead march through in perfect order, are formally acknowledged by the Emperor, and return to their rest. It is extremely unsettling and completed without incident.",lose:"The parade permit is refused. The undead march anyway. The army cannot stop three hundred thousand. The parade happens on its own terms. Several buildings are accidentally walked through."},{id:207,type:'Undead',name:'The Pale Inventor',threat:"An undead genius has invented an uncounterable siege weapon and is auctioning it to the highest bidder at midnight.",win:"The empire wins the auction at extraordinary cost. The weapon is locked in the deepest vault. The inventor is offered a living position at the imperial engineering corps. He accepts.",lose:"An enemy kingdom outbids the empire by one gold coin. The weapon is deployed three weeks later against the northern wall. General Halveth watches it work and says nothing for the rest of the day."},{id:208,type:'Undead',name:'The Undead Census Taker',threat:"An undead bureaucrat's census grants the dead equal legal standing with the living. The implications are enormous.",win:"Legal scholars identify a flaw: the census was conducted on an off-day legally invalid for official counts. The census is thrown out. The census taker is devastated on procedural grounds.",lose:"The census is legally valid. The dead outnumber the living in the empire by twelve to one. The democratic implications alone occupy the courts for three years. Defence Minister Aldric considers retiring."},{id:209,type:'Undead',name:"The Bone Throne's Emissary",threat:"A skeleton diplomat with credentials requests a formal audience and will not leave the palace antechamber without one.",win:"The audience is granted. The Bone Throne wishes to formalise borders. A treaty is negotiated. The skeleton diplomat shakes hands. Cold, but firm.",lose:"The audience is denied. The skeleton diplomat sits in the antechamber for three months. He is polite, professional, and immovable. General Morvaine physically removes him and regrets it immediately."},{id:210,type:'Undead',name:'The Risen Judges of Old Law',threat:"Seven undead judges who served under the old imperial code have risen. Under old law, every edict issued in the last century is invalid. They intend to restore order. Their order.",win:"The judges are given a formal hearing. A legal successor council rules the old code superseded by continuous legitimate governance. The judges accept the ruling — they respect proper legal process — and return to rest.",lose:"The judges begin issuing rulings. Forty imperial decisions are invalidated in a week. Three current lords' titles cease to exist under old law."},{id:211,type:'Undead',name:'The Weeping Fortress',threat:"The abandoned eastern fortress weeps black tears. Soldiers stationed nearby weep uncontrollably. The district around it is emptying.",win:"The fortress's original commander — murdered by his own garrison — is found to be the source. His story is documented and recognised officially. The fortress weeps no more.",lose:"The fortress begins weeping more. Three soldiers stationed nearby suffer permanent grief disorders. The district becomes depopulated. The tax revenue disappears."},{id:212,type:'Undead',name:'The Night Magistrate',threat:"An undead magistrate issues warrants for living officials. Those who ignore three consecutive summons are found dead the next morning.",win:"The magistrate's grievances are examined. His warrants are all legally valid claims against genuinely corrupt officials. Seven officials cooperate with his process. Three are convicted.",lose:"Defence Minister Aldric ignores three summons. He is found dead at his desk with a stamp on his forehead. His replacement inherits the pending warrant."},{id:213,type:'Undead',name:'The Pale Crown',threat:"An ancient crown makes its wearer rule with absolute authority — and become undead. Three ministers have already tried it on.",win:"The crown is contained using tongs and sealed in a lead box. The three ministers who tried it on are treated with a life-restoration ritual before the undeath fully takes hold.",lose:"A fourth minister tries it on in secret and rules for six hours with absolute authority before being restrained. His six hours of absolute decrees include several things that cannot be easily undone."},{id:214,type:'Undead',name:"The Hundred Year War's Dead",threat:"Soldiers who died in the Hundred Year War rise one year early, believing the war is still ongoing. They fight with a century of pent-up fury.",win:"Veterans who fought in the war's final year deliver the news of peace personally. The dead stand down and rest with news of victory.",lose:"The early-risen dead attack border fortifications believing them enemy. Eighteen living soldiers are killed by their own predecessors before the misunderstanding is identified."},{id:215,type:'Undead',name:'The Lich Economist',threat:"An undead economist shows the empire is bankrupt under undead accounting methods and offers to resolve it for a price.",win:"Counter-economists challenge the methodology. The undead accounting uses an outdated valuation standard. Under current standards, the empire is solvent. The lich accepts the revised calculation.",lose:"The economy is technically bankrupt under undead law. The lich's resolution involves a thirty-year austerity plan administered by him personally. The plan is effective. Living under a lich economist is humbling."},{id:216,type:'Undead',name:'The Bone Rain',threat:"Fresh human bones fall from the sky over the capital. Someone above the clouds is removing bones from living people. The source has not been found.",win:"A sky expedition traces the bone trail to a floating sorcerer's laboratory. The sorcerer is arrested. His subjects are restored using emergency bone-replacement magic.",lose:"The sky laboratory escapes before it is found. Forty more people are de-boned. The empire cannot protect its citizens from attacks originating above cloud level."},{id:217,type:'Undead',name:'The Undead Architect',threat:"The empire's original architect makes unauthorised modifications to his designs at night. Buildings rearrange. Streets shift. Doors open to nowhere.",win:"The architect is approached professionally. He agrees the original designs needed updating and negotiates official consultant status. His modifications are actually improvements.",lose:"The architect's changes are structural and random. Two bridges swap positions. The palace kitchen is now outside. The treasury is accessible from under the river."},{id:218,type:'Undead',name:'The Ghost Fleet of Aldrath',threat:"The entire merchant fleet lost forty years ago has returned as ghost ships. They sail the harbour as if they never sank. They accept cargo. The cargo vanishes. They offer money. The money is real.",win:"The arrangement is investigated and found benign — the ghost ships carry cargo to the afterlife delivering it to long-dead merchants. A formal ghost-shipping charter is established.",lose:"Three merchants discover their cargo vanished. Lawsuits are filed. The ghost ships are non-responsive to legal proceedings. The case of living vs. deceased shipping companies occupies the courts for eighteen months."},{id:219,type:'Undead',name:'The Pale Merchant',threat:"An undead merchant runs the most successful trading house in the capital. His supply chain is a mystery. His business partner is a lich who handles imports.",win:"The supply chain is investigated. The lich's goods come from ancient ruins in territories legally belonging to the empire. The empire claims its share under salvage law. A commercial arrangement is formalised.",lose:"The supply chain is raided. The lich sources goods by looting neighbouring kingdoms. The diplomatic fallout when those kingdoms trace the goods to the imperial trading house is immense."},{id:220,type:'Undead',name:'The Risen Emperor Valdros the First',threat:"The empire's founder has risen after four centuries, appalled at what his successors have done with his creation. He has begun his own reforms.",win:"The Emperor meets Valdros the First privately. The meeting is difficult, honest, and productive. Valdros imparts the founding principles directly and returns to rest, somewhat satisfied.",lose:"Valdros the First holds open court. His comparison of the founding vision to the current state is publicly devastating. Three provinces declare they are returning to founding principles. That means three different things to three different provinces."},{id:221,type:'Plague',name:'The Laughter Plague',threat:"Uncontrollable laughter until death from exhaustion has broken out in the barracks. The barracks have been laughing for six hours.",win:"The laughter is identified as a magical contagion triggered by sound. Silence is enforced. The laughter dies out. The affected soldiers survive, exhausted and no longer finding anything funny.",lose:"The laughter spreads to the civilian district. Eight hundred infected, forty dead. Defence Minister Aldric requests daily briefings on a situation he cannot describe with a straight face."},{id:222,type:'Plague',name:'The Mirror Sickness',threat:"The infected mimic whoever stands before them and then their internal thoughts. Three interrogators went insane after interviewing patients.",win:"The sickness burns out after seventy-two hours with no new exposure. Patients are isolated in single rooms. All three interrogators recover. Two find the experience professionally enlightening.",lose:"An infected soldier is placed in a room with another infected soldier. They mirror each other recursively. The feedback loop produces something unprecedented. The room is sealed."},{id:223,type:'Plague',name:'The Forgetting',threat:"Memories are removed in reverse chronological order. Generals have forgotten the empire exists. Soldiers have forgotten their names.",win:"The cure — immediate re-immersion in sensory memory triggers — is discovered. Generals are walked through their own battle rooms touching their medals. Memory returns. The senior general cries, which he does not remember doing.",lose:"The Forgetting reaches the Emperor's council. Ministers forget their own portfolios. Defence Minister Aldric forgets which war is currently ongoing. Sir Davos finds himself the only person in the room who knows anything."},{id:224,type:'Plague',name:'The Iron Sickness',threat:"Bones become metallic and eventually solid. The hospitals are full of conscious, motionless figures with terrified eyes.",win:"The iron process is reversible in the early stages. Mass early treatment saves eighty percent of the affected. The remaining twenty percent are cared for while a cure for the final stage is researched.",lose:"Three hundred soldiers are permanently immobile. The empire cannot end their suffering — they are alive. The logistics of housing, feeding, and caring for three hundred conscious metal statues is solved grimly."},{id:225,type:'Plague',name:'The Colour Drain',threat:"Infected become completely transparent. Invisible. Still alive. Still able to move. Still able to fight.",win:"The transparent soldiers are equipped with enchanted bells so their positions can be tracked. The plague is cured before total transparency is reached in most cases. The bells become a brief fashion trend.",lose:"Forty soldiers become fully invisible. They are armed and dangerous and the empire cannot track them. Three begin acting as private vigilantes. Two are found immediately because they keep bumping into things."},{id:226,type:'Plague',name:'The Truth Plague',threat:"The infected cannot lie. Diplomacy and politics have collapsed. Two ministers have been arrested for involuntary confessions.",win:"The truth plague runs its course in two weeks. The information revealed during those two weeks is catalogued carefully. Several useful truths are extracted from the damage.",lose:"The truth plague reaches the negotiating table during a foreign summit. Every lie of the past decade is involuntarily confessed. The diplomatic rupture lasts two years. Three treaties are voided."},{id:227,type:'Plague',name:'The Hunger That Cannot Be Fed',threat:"The infected eat constantly and starve regardless. They are consuming all available food reserves.",win:"The hunger is identified as magical and not physical. Interrupting the magical signal ends both the hunger and the starvation simultaneously. The infected eat one normal meal and sleep deeply.",lose:"Three months of food reserves are consumed in six days. The infected spread the plague further as hunger drives them to desperate acts. Rationing begins. The mood is grim."},{id:228,type:'Plague',name:'The Growing Dark',threat:"Twenty infected soldiers project magical darkness that spreads with the disease. The darkness is consuming the barracks.",win:"The darkness is contained by sealing all exits. The infected are treated within the sealed dark. The darkness dies with the disease. When the barracks re-open, soldiers blink in the light.",lose:"The darkness spreads to three city blocks. A city district operates in permanent magical midnight. Crime increases. Property values collapse. The military district is renamed the Night Quarter."},{id:229,type:'Plague',name:'The Stone Sleep',threat:"The infected fall asleep and slowly petrify while remaining conscious inside the stone. For years.",win:"An alchemical solvent found in old mining records dissolves the stone without harming the sleeping body within. All infected are cracked open carefully. They wake confused. Very confused.",lose:"Sixty soldiers are stone. The empire cannot find the cure. A wing of the palace is converted to house conscious stone people. Scribes visit to take down their thoughts. The accounts are eventually published."},{id:230,type:'Plague',name:'The Singing Death',threat:"The infected compulsively sing, spreading infection. Forty singers have spread it to half the capital.",win:"The song's specific harmonic that triggers infection is identified. A countersong broadcast drowns the infectious frequency. The singing fades. The capital is tuneless and relieved.",lose:"The song leaves the city on the wind. Three neighbouring villages become infected. The empire must quarantine and treat its neighbours. The diplomatic apology is conducted in writing to avoid singing it."},{id:231,type:'Plague',name:'The Plague of Generosity',threat:"The infected compulsively give away everything they own. Generals have given away weapons. Ministers have given away seals of office.",win:"The magical compulsion is traced to cursed imported goods. The goods are burned. The infection ends. A remarkable amount of gifted property is returned over the following week.",lose:"The infected give away three military fortifications, two weapons stockpiles, and the eastern armour reserve. The empire's enemies find valuable items arriving at their doors with confused thank-you notes."},{id:232,type:'Plague',name:'The Amber Fever',threat:"The infected excrete hardening golden resin. Forty soldiers are amber statues. Still alive. Still blinking.",win:"The resin is soluble in a specific acid identified in a physician's notes. All forty soldiers are dissolved free, unharmed. The amber is found to be valuable. The soldiers receive hazard pay.",lose:"Forty amber soldiers cannot fight. They are positioned on the walls as decoys. They are extremely convincing. They are also desperately uncomfortable. The plague spreads to twenty more."},{id:233,type:'Plague',name:'The Red Tide Fever',threat:"Infected blood boils visibly. The infected glow red and cook from the inside. The river is contaminated.",win:"The river is sealed upstream and the contamination source is found and purged. Affected soldiers cool naturally once away from the water source.",lose:"The boiling blood condition becomes contagious through proximity before being identified as water-borne. Defence Minister Aldric is among the first infected. He resigns, glowing."},{id:234,type:'Plague',name:'The Dream Plague',threat:"The infected cannot distinguish dreams from reality. Twelve are waging a campaign against an enemy only they can see.",win:"The dream campaign is mapped and taken seriously. The infected have unconscious knowledge of a real threat. Their dream-campaign information leads to an actual intelligence breakthrough.",lose:"The twelve infected soldiers attack the treasury, believing it to be a fortress in their shared dream. The damage is significant. Three more join the hallucinated war."},{id:235,type:'Plague',name:'The Silence Plague',threat:"The infected and a radius around them fall into absolute silence. They live isolated in quiet. They cannot warn anyone.",win:"A visual communication system is rapidly devised for the silent zones. The infected are treated using sound therapy. They recover hearing gradually, cherishing it enormously.",lose:"The silence spreads to the command centre. Orders cannot be shouted, horns cannot be heard. Twelve silent zones within the military district make coordinated response impossible."},{id:236,type:'Plague',name:'The Kindness Plague',threat:"Soldiers refuse to fight. Guards open gates. Sentries offer their posts. The defences are being dismantled by good manners.",win:"The kindness plague is identified as a magical pollen from a corrupted garden plant. The plant is removed. Unkindness gradually returns.",lose:"The kindness plague is in full effect when the Bloody Red Army's advance scouts test the northern gate. The gate guard smiles and opens it. The scout reports back."},{id:237,type:'Plague',name:'The Weight Plague',threat:"The infected become progressively heavier. Three infected soldiers have fallen through the upper barracks floor.",win:"The weight increase is magical and reversed by physical distance from a cursed stone in the building materials. The stone is found and removed. The infected float back to normal weight.",lose:"Fifteen infected soldiers have fallen through floors. Two have sunk into the ground. The floor of the barracks is structurally compromised. Three weeks of repairs."},{id:238,type:'Plague',name:'The Plague of Perfect Memory',threat:"Every insult, betrayal, and slight is remembered perfectly. Three infected ministers have declared vendettas.",win:"A magical amnesty ritual suppresses the most damaging memories. The infected retain the useful memories and let go of the corrosive ones. The vendettas are diplomatically resolved.",lose:"Three infected ministers pursue their vendettas with total precision. They remember every slight from twenty years of service and act on all of them simultaneously."},{id:239,type:'Plague',name:'The Splitting Plague',threat:"The infected physically split in two. Both halves survive, infected, and split again in twenty-four hours.",win:"Immediate surgical counter-procedure prevents the split if performed within four hours of infection. All infected are treated in time. The procedure becomes standard.",lose:"Twelve infected soldiers become twenty-four, then forty-eight. In five days there are three hundred and eighty-four versions. Distinguishing which is which is logistically catastrophic."},{id:240,type:'Plague',name:'The Bright Sickness',threat:"The infected generate light — blinding by day five. They have been in the armoury.",win:"The bright soldiers are redirected as lighthouse-equivalents on the coast — genuinely useful. The plague runs its natural course. The coast has excellent visibility all winter.",lose:"The infected soldiers illuminate the armoury's location perfectly in the dark. An enemy nighttime raid uses them as navigation. The armoury is raided. The glowing soldiers are apologetic."},{id:241,type:'Plague',name:'The Plague of Wills',threat:"Three hundred soldiers stand frozen wherever they are, unable to choose to move.",win:"The will-restoration ritual is found: physical guided movement by an uninfected person re-engages the decision pathway. Three hundred soldiers are hand-walked back to normal.",lose:"The three hundred frozen soldiers are found by an enemy scout. The report: three hundred perfectly positioned statue-soldiers requiring no maintenance or feeding."},{id:242,type:'Plague',name:'The Iron Will Plague',threat:"The infected pursue whatever they were doing at time of infection obsessively until death. Three infected soldiers have been digging the same hole for eleven days.",win:"The obsession can be redirected — if the original task is completed, the compulsion ends. The infected soldiers finish their hole. All recover.",lose:"Seven infected soldiers were mid-combat when infected. They have been fighting the same enemy soldier for eleven days. He has long since surrendered but they cannot stop."},{id:243,type:'Plague',name:'The Vanishing',threat:"The infected turn invisible for increasing periods daily until they vanish permanently. They remain in the city. Alive. Unseen.",win:"An enchanted tracking powder sticks to invisible skin. The vanished are located, treated with a visibility-restoration ritual, and returned. They are very relieved. It was getting lonely.",lose:"Thirty citizens vanish permanently. They move through the city invisibly, unable to communicate. Three discover this is quite useful and do not report for treatment."},{id:244,type:'Plague',name:'The Plague of Reversed Time',threat:"The infected age backward. The senior general is now three years old and cannot remember his battle plans.",win:"The reversal stops at birth-age. An age-restoration potion returns all infected to their correct age within hours. The senior general is restored and takes a long, quiet drink of water.",lose:"Forty-two senior officers are between the ages of two and six. Command passes to Captain Reth, the most senior uninfected officer. He is not ready for this."},{id:245,type:'Plague',name:'The Glass Plague',threat:"The infected become increasingly brittle. Two hundred soldiers are made of glass. Command insists they remain at their posts.",win:"The brittleness is stabilised and eventually reversed using a mineral treatment. All two hundred glass soldiers are restored with only seventeen breakages — all survivable.",lose:"A glass soldier's elbow cracks in cold weather, spreading glass fragments that cut twenty nearby soldiers. The chain reaction produces twenty new infections. The glass population grows."},{id:246,type:'Plague',name:'The Plague of Empathy',threat:"The infected feel everything around them amplified to madness. The hospitals are full of people screaming at others' pain.",win:"Empathic isolation chambers are constructed. The overwhelmed infected are calmed. The plague runs its course in isolation. The infected emerge permanently gentler.",lose:"Infected soldiers on the wall feel the enemy's battle-excitement as their own and find it hard to resist. Three infected soldiers defect — not from conviction, but from empathy with the opposing side's enthusiasm."},{id:247,type:'Plague',name:'The Sleeping War',threat:"The infected wage war in dreams. Dream wounds appear on waking bodies. Nobody knows why.",win:"Dreamwalking mages enter the shared battlefield and negotiate a ceasefire. The dream war ends. Existing wounds are healed magically. Several soldiers are disappointed.",lose:"Infected soldiers take real damage from their dream battles. Three die of dream wounds with no visible cause. The general in charge of a sleeping campaign room cannot explain the casualty reports."},{id:248,type:'Plague',name:"The Plague of Honesty's Twin",threat:"The infected say the opposite of what they mean but accidentally tell the truth. Court proceedings are incomprehensible.",win:"A translation protocol is developed: ask what they do NOT want, reverse the answer. All proceedings continue with a translator. The infected find this exhausting but workable.",lose:"Defence Minister Aldric is infected mid-summit with a foreign delegation. His accidental truths about imperial capabilities are diplomatically catastrophic. Three concessions are made before anyone realises he is infected."},{id:249,type:'Plague',name:'The Burning Map',threat:"A plague delivered through poisoned cartographic materials has infected every navigator and mapmaker in the empire. All navigation has failed.",win:"Emergency non-cartographic navigation by sun, stars, and landmarks is implemented. The poisoned materials are traced and destroyed. The old cartographers eventually stop drawing impossible places.",lose:"Two imperial fleets are lost at sea without navigation. Four land regiments march to entirely wrong provinces using their useless, beautiful, impossible maps."},{id:250,type:'Plague',name:'The Hollow Hunger',threat:"The infected consume memories from nearby people. They are fat and cheerful. Their victims cannot remember their own names.",win:"The infected are quarantined before the drain reaches dangerous levels. The memory-drain is reversed when the infected release what they absorbed. Victims recover.",lose:"The infected reach the command centre. Generals leave their meetings unable to recall the subject. The command centre is emptied of memories within a day. Strategic planning must start from written records only."},{id:251,type:'Plague',name:'The Plague of Shadows',threat:"The infected cast shadows that detach and act maliciously and independently while the infected person appears normal.",win:"The shadows are pinned by light at specific angles. Pinned shadows cannot act. The infected are kept in specific lighting until cured. Three pinned shadows make reasonable offers.",lose:"Forty malicious shadows from forty infected soldiers are loose in the barracks. They steal equipment, open gates, and tip over candles. The shadows are harder to fight than most enemies."},{id:252,type:'Plague',name:'The Rot of Ambition',threat:"The infected become overwhelmingly ambitious. Generals declare themselves emperors. Captains execute their superiors. It spreads through command.",win:"The ambition is chemically neutralised by a calming draught mixed into the water supply. The infected ambitious officers are calmed and slightly embarrassed. Two resign voluntarily.",lose:"The command chain collapses in three days. Seven self-declared emperors hold seven different portions of the military. None will defer to the others. The empire technically has eight emperors for a week."},{id:253,type:'Plague',name:'The Love Plague',threat:"Two infected generals fell in love with enemy commanders and have been sharing classified information as love letters.",win:"The plague is cured before further information is shared. The generals are mortified. The love letters are retrieved from enemy headquarters through a daring raid. They are never discussed.",lose:"Comprehensive classified intelligence has been shared in forty-seven letters. The generals recover from the plague and are devastated. Defence Minister Aldric reads the letters and is embarrassed on the empire's behalf."},{id:254,type:'Plague',name:'The Plague of Questions',threat:"Two hundred infected soldiers cannot act without every question answered. The command structure has collapsed under interrogation.",win:"The questioning compulsion is satisfied by a single written document answering every possible military question exhaustively. The infected read it, are satisfied, and recover.",lose:"The infected soldiers ask questions faster than they can be answered. Three command officers resign from the interrogation. Captain Reth attempts to answer every question personally and is hospitalised for exhaustion."},{id:255,type:'Plague',name:'The Melting Sickness',threat:"The infected become liquid. Conscious, mobile, communicative. They flow under doors. Twenty are in the palace.",win:"The liquid state is reversible with warmth — warmth resolidifies them. Twenty warm rooms are prepared. The palace liquid soldiers are herded gently to warming rooms. They re-solidify gratefully.",lose:"The liquid soldiers reach the palace basement and flow into the treasury drainage. Fourteen emerge outside the walls and are technically escaped prisoners. Three choose not to re-solidify and enjoy the freedom."},{id:256,type:'Plague',name:'The Rage That Never Ends',threat:"The infected become cold, patient, focused rage. They are the most effective soldiers the empire has ever had. On the wrong side.",win:"The rage is channelled toward a legitimate shared enemy before it can redirect. The infected army is devastatingly effective. After the victory, the rage naturally subsides.",lose:"Forty rage-infected soldiers turn against the empire with total efficiency. They know the defences perfectly. Sir Davos contains them with difficulty. Three are not recovered."},{id:257,type:'Plague',name:'The Peace Plague',threat:"Soldiers are physically incapable of violence. The military has stopped working.",win:"The plague is exploited diplomatically — peace negotiations conducted with infected diplomats are extraordinarily successful. Three treaties are signed before the plague passes. All three are upheld.",lose:"The Bloody Red Army hears of the peace plague and attacks within twenty-four hours. The infected soldiers stand between armies smiling, unable to raise a weapon. Sir Davos is furious and healthy."},{id:258,type:'Plague',name:'The Plague of Faces',threat:"The infected cycle through the faces of everyone they have ever seen. Three generals, the treasury head, and someone who has apparently met the Emperor are infected.",win:"A grounding therapy — repeating their own name and history — anchors the infected back to their original face. Recovery takes three days.",lose:"An infected general assumes the face of the enemy's supreme commander during a parley. The parley becomes deeply confusing. The resulting peace treaty is signed by a man who is not himself."},{id:259,type:'Plague',name:'The Reversal',threat:"A plague inverts loyalties. Those who loved the empire hate it. Those who served it sabotage it. Fourteen infected soldiers are in the armoury.",win:"The armoury is sealed before the infected soldiers can act. The reversal runs its course in forty-eight hours. The soldiers emerge re-loyal and appalled at their own impulses.",lose:"The infected soldiers destroy the armoury contents before being contained. Six months of weapons production gone. The infection spreads to three more soldiers sent to stop the first fourteen."},{id:260,type:'Plague',name:'The Flesh Map',threat:"Infected citizens are being used as living intelligence reports by enemy agents. The maps update in real time.",win:"The map is identified and the citizens quarantined. The infection source is sealed. The enemy agents reading the maps are identified and arrested.",lose:"Enemy agents extract complete intelligence from twenty infected citizens before the plague is identified. Troop positions, supply routes, and fortification weaknesses are all compromised simultaneously."},{id:261,type:'Army',name:'The Iron Widow Queen Sareth',threat:"Queen Sareth spent twenty years building an army specifically to destroy this empire. It is now finished. It is enormous. It is here.",win:"Sareth is offered the one thing that can satisfy her — a full public acknowledgement that her husband's execution was unjust. The acknowledgement is made. She accepts it as victory and withdraws.",lose:"Sareth refuses all terms. The battle is decisive and brutal. She is eventually turned back but at tremendous cost. General Halveth is killed at the forward position."},{id:262,type:'Army',name:"The Children's Crusade of Velreth",threat:"Ten thousand children march under a holy banner claiming divine mandate. No soldier will raise a weapon against them. They walk toward the gate unopposed.",win:"The children's true leader — an adult hiding behind the children's legitimacy — is identified and arrested quietly. Without direction, the children stop marching and are taken home.",lose:"The children reach the capital gate. The gate opens — every soldier's instinct refuses to hold it closed. The children occupy the palace garden and refuse to leave. The negotiations are unprecedented."},{id:263,type:'Army',name:'The Eternal Brotherhood',threat:"A five-hundred-year-old mercenary company that has never failed a contract has been contracted to take the capital.",win:"The contract's purchaser is identified and the contract legally voided by eliminating the contracting party. Without a valid contract, the Brotherhood stands down — their honour forbids working without payment.",lose:"The Eternal Brotherhood takes the outer district in three days of precise, professional combat. General Morvaine calls it the finest military he has ever faced, while retreating."},{id:264,type:'Army',name:'The Architects of Ruin',threat:"An organisation that has professionally dismantled eleven empires is working on this one. They start with the treasury.",win:"The Architects' internal ledger of targets is obtained by intelligence. Each target is pre-secured. Finding every move predicted, the Architects withdraw — they prefer easy work.",lose:"The treasury is emptied through eleven different financial mechanisms over six weeks. When the last mechanism triggers, the Architects are already at their twelfth target."},{id:265,type:'Army',name:'The Grand Khagan Borzath',threat:"Borzath commands ninety thousand cavalry from the eastern steppes. He does not want to rule — only to ride through. Repeatedly.",win:"Borzath is offered a formal cavalry route across the empire's least populated territories. He finds this honourable. The army rides through. It is very loud. Nothing burns.",lose:"The cavalry sweeps through three provinces. The destruction is not malicious — it is simply ninety thousand horses and the path they require. The aftermath takes two years to repair."},{id:266,type:'Army',name:'The Sea Lords of Keth',threat:"Eight sea lords with five hundred ships combined have blockaded every port simultaneously and demand the empire's entire naval fleet surrendered.",win:"The eight sea lords are negotiated with individually. Three accept trade concessions. Two accept territorial waters rights. Two are neutralised diplomatically. One accepts a duel with Admiral Keth. Keth wins.",lose:"The naval fleet is blockaded into harbour and systematically destroyed over three weeks. The empire loses all naval capability. Admiral Keth evacuates the flagship personally. The harbour burns."},{id:267,type:'Army',name:'The Hidden Army',threat:"An army living underground beneath the empire for thirty years emerges simultaneously from six hundred points inside the walls. They are already inside.",win:"The tunnels were found three days earlier. The exits are sealed from above. The army, unable to emerge, surrenders underground in conditions of total tactical humiliation.",lose:"Six hundred simultaneous ambushes inside the capital. The chaos is total. Sir Davos coordinates the response from street level. By nightfall the army is contained. The damage to the city is immense."},{id:268,type:'Army',name:'The War Priests of Sorrath',threat:"A religiously silent army communicating through hand signals attacks in perfect coordination without drums or orders.",win:"The hand signal code is broken by a linguist who studied religious order sign languages. Every manoeuvre is predicted and countered. The priests fight in silence; they lose noisily.",lose:"The silent army's unpredictability defeats the standard response. Three gates fall before a counter-doctrine is developed. General Halveth describes it as fighting smoke."},{id:269,type:'Army',name:'The Last King of Velreth',threat:"The one-hundred-and-seven-year-old last king has waited his whole life to reclaim his kingdom. His army is here.",win:"The king is met at the border with acknowledgement — his kingdom was wrongly absorbed. A principality is returned to his descendants. He watches the flag raised, smiles, and dies three days later.",lose:"The king dies of excitement during the first engagement. His death transforms his army from soldiers into mourners and from mourners into avengers. They fight harder than planned."},{id:270,type:'Army',name:'The Undefeated Army of Morthex',threat:"Two hundred battles. Zero losses. They fight with certainty, not tactics. They have never planned for failure.",win:"Their certainty is used against them — a situation of apparent certain defeat is manufactured. They have no contingency for failure. They collapse strategically under a loss they cannot process.",lose:"The Undefeated Army wins the two hundred and first battle in exactly the same way. General Halveth calls the loss instructive. He has been relieved of command before finishing the sentence."},{id:271,type:'Army',name:'The Paper Army',threat:"Forged documents have reassigned three regiments to non-existent postings and ordered two forts to stand down.",win:"The forgeries are identified through a paper analysis that catches inconsistent sealing wax. The regiments are recalled. The forts are re-staffed. The forgers' printing operation is raided.",lose:"Three regiments march into empty country. Two forts stand open. The enemy advances through the gaps before anyone understands what happened. Defence Minister Aldric begins personally verifying every document."},{id:272,type:'Army',name:'The Hundred Warlords',threat:"One hundred independent warlords attack from different directions simultaneously with no shared communication. They cannot be predicted or countered in one place.",win:"Each warlord's independent motivation is identified and targeted individually. Thirty-three accept territorial deals. Thirty retreat when adjacent warlords fall. The remaining thirty-four are defeated in sequence.",lose:"The simultaneous hundred-front attack cannot be managed centrally. The empire defends forty-one fronts successfully and loses fifty-nine others."},{id:273,type:'Army',name:'The Ghost War',threat:"No army is visible but soldiers keep dying in the night. Something is out there.",win:"A detection sorcerer identifies the army — enchanted with perfect concealment. The concealment spell has a vulnerability at precisely midnight when it must refresh. A midnight attack destroys it.",lose:"Twenty soldiers die over ten days with no explanation. Morale collapses. The enemy completes its reconnaissance undisturbed and delivers a perfect intelligence report to its generals."},{id:274,type:'Army',name:'The Tax Rebellion of the East',threat:"Forty eastern lords with 60,000 soldiers refuse taxation. Declaring war on imperial citizens is legally complex.",win:"An emergency taxation review finds the lords were right — they were overtaxed by thirty percent through a ministerial error. The error is corrected. The rebellion dissolves without a battle.",lose:"Legal proceedings delay military response for three months. The lords use this time to fortify. The eventual military solution takes six months and costs more than twenty years of the disputed taxes."},{id:275,type:'Army',name:"The Veterans' Legion",threat:"Ten thousand retired soldiers with unpaid pensions march on the capital.",win:"The pensions are paid. All of them. Immediately. The veterans stop marching, shake hands, and go home. The financial pain is acute. The alternative was worse.",lose:"The pensions remain unpaid through bureaucratic delay. The veterans take the treasury district and help themselves. They are methodical and precise and take only what they are owed."},{id:276,type:'Army',name:'The Stone Wall Army',threat:"An army building walls behind and around itself, sealing all exits. The capital is being walled in.",win:"The wall-building requires specialised engineers who are captured in a targeted raid. Without them, the walls stop. The incomplete seal is insufficient. The army retreats.",lose:"The sealing is completed. The capital is surrounded by its own stone. The siege that follows is conducted from inside a cage the empire did not build."},{id:277,type:'Army',name:'Warlord Kreth the Unbroken',threat:"Kreth has never been defeated in forty years. He commands from safety and never goes near the front.",win:"Intelligence locates Kreth's command position — very far from the battle and very well hidden. A small special unit bypasses the army entirely and captures Kreth himself. His army collapses without him.",lose:"The direct assault on Kreth's army fails as it has failed forty previous opponents. General Morvaine retreats and drafts a very long strategic analysis. Kreth advances."},{id:278,type:'Army',name:'The Sunken Fleet',threat:"A fleet thought sunk twenty years ago surfaces fully repaired. Someone told them exactly when to surface.",win:"The traitor who gave the signal is identified and arrested mid-transmission. The fleet surfaces blind and is engaged without its preparation advantage.",lose:"The fleet surfaces with complete knowledge of every imperial naval position. Admiral Keth's contingency plans were planned around a fleet that was supposed to be sunk. He has no counter."},{id:279,type:'Army',name:'The Invisible Army of Keth',threat:"An army invisible to magical detection has been inside the borders for three weeks, sabotaging nightly.",win:"The army's invisibility requires regular reapplication at a specific location. The site is found through tracking the sabotage pattern. The army is ambushed during the one hour they are visible.",lose:"The sabotage campaign destroys six supply routes and four fortifications before the army is detected by pure chance. The damage represents three months of setback."},{id:280,type:'Army',name:'The Alliance of Broken Empires',threat:"Seven conquered and dismantled kingdoms unite as one nation. Their combined anger and army are both larger than expected.",win:"The alliance's seven members cannot agree on post-victory governance. The alliance fractures politically before military victory is achieved. Three kingdoms accept individual peace deals.",lose:"The Alliance of Broken Empires fights with seven centuries of combined institutional knowledge. General Halveth faces seven nations' worth of tactics simultaneously. The northern border is lost."},{id:281,type:'Army',name:'The Pirate King Dravos',threat:"Dravos commands forty thousand sailors, has blockaded all ports, and demands acknowledgement as King of the Seas.",win:"Dravos is given a ceremonial title — Warden of the Eastern Waters — that satisfies his ego without ceding real authority. He accepts enthusiastically and lifts the blockade.",lose:"Dravos's blockade holds for six weeks. Three ports sign individual agreements with him directly, bypassing imperial authority. He becomes a permanent regional power."},{id:282,type:'Army',name:'The Night Army of Sorrath',threat:"Farmers and merchants become soldiers at night. The empire cannot identify them during the day.",win:"Intelligence identifies the command structure through night-surveillance patterns. The commanders are arrested during daylight. Without coordination, the night army disperses.",lose:"The night army continues for three months without a discoverable command structure. It is leaderless and self-organising. The empire cannot arrest its way to a solution."},{id:283,type:'Army',name:'The Poisoner Generals',threat:"Five enemy generals have poisoned the water supply at its source. They are waiting for it to spread.",win:"The poisoning is detected before widespread exposure. Emergency alternative water distribution is implemented. The five generals, deprived of their weapon, are tracked and engaged conventionally.",lose:"The poison reaches the capital before detection. Two thousand citizens fall ill. The water is closed for eleven days. The emergency distribution system is insufficient. Defence Minister Aldric drinks poisoned tea."},{id:284,type:'Army',name:'Lord Vethrix and his Clockwork Soldiers',threat:"Three hundred mechanical soldiers with mathematical precision in combat advance on the eastern gate. Twelve thousand more are ordered.",win:"The clockwork soldiers require wound springs. The spring-winding facility is located and raided. The existing three hundred wind down and stop. The order of twelve thousand is cancelled.",lose:"The three hundred clockwork soldiers are unkillable by conventional weapons. They process through the defence lines with mechanical exactness. By the time their springs wind down, they have taken the eastern gate."},{id:285,type:'Army',name:'The Winter Host of Jarl Keth',threat:"An army bred for the worst winters has been waiting thirty years for this one. The harshest winter in recorded history is here.",win:"The Winter Host is engaged in the one environment it doesn't control — indoors. The army is drawn into the city where its cold-weather advantages mean nothing. Jarl Keth is defeated on a battlefield he didn't choose.",lose:"The Winter Host advances through the cold with ease. Imperial soldiers suffer hypothermia while their enemy fights normally. General Halveth loses three fingers. Jarl Keth camps comfortably outside the walls."},{id:286,type:'Army',name:'The Silver Legion of Orrath',threat:"Five thousand elite soldiers — each worth twenty — send one hundred to the gate as a demonstration. The demonstration is at the gate.",win:"The hundred are received formally and met with proportionate elite response. The demonstration ends in a draw. The five thousand accept negotiated terms rather than certain high casualties.",lose:"The hundred kill eighty imperial soldiers before being driven off. The message delivered by the five thousand remaining is heard clearly. The terms they offer are accepted without further demonstration."},{id:287,type:'Army',name:'The Tide of Sorrath',threat:"A thousand small armies of fifty to a hundred attack from every direction simultaneously. No command structure. No centre to target. Everywhere and nowhere.",win:"Without central command, the small armies cannot coordinate follow-up. Each is picked off individually once the initial chaos is managed. The strategy is excellent. The execution without communication is impossible.",lose:"The initial chaos is unmanageable. Forty simultaneous breaches cannot all be responded to. The empire closes thirty-eight but two remain open and two small armies are inside the walls."},{id:288,type:'Army',name:'The False Allies of Keth',threat:"Three allied kingdoms have been secretly arming against the empire for a decade. Their armies are positioned on the borders. They remain allies on paper.",win:"Intelligence reveals the positioning before activation. A diplomatic ultimatum — knowing what they have done — causes all three to stand down rather than face exposure.",lose:"The three kingdoms activate simultaneously on the same morning. The empire is attacked from three allied directions it didn't defend. General Morvaine calls it the worst intelligence failure of his career."},{id:289,type:'Army',name:'The Returning Conquerors',threat:"The empire's eastern army returns after thirty years — changed by what they found out there. They are not the same soldiers. Their orders still technically stand.",win:"The army's original commanding general — now elderly, retired — issues a formal stand-down order the army must legally obey. They stand down, confused. Their general dies peacefully a week later.",lose:"The returned army follows their old orders to guard the eastern pass — against the empire's own current forces stationed there. The fratricidal conflict takes three days to resolve."},{id:290,type:'Army',name:'The Empire Breakers',threat:"A coalition specialising in making empires disappear from history has started on this one. They work methodically.",win:"Their methodology — dismantling cultural memory first — is countered by a deliberate massive cultural investment: festivals, histories, monument-building. The empire becomes impossible to forget.",lose:"Three generations later, historians note the empire's founding story has three different versions and nobody can agree which is correct. The Empire Breakers' long work is visible in hindsight."},{id:291,type:'Army',name:'The Army of Perfect Law',threat:"An army operating under a legal code so strict every death is documented advances with immaculate paperwork. They are slow, predictable, and administratively terrifying.",win:"The legal code is used against the army — they are served with lawsuits regarding historical actions. They cannot legally advance while lawsuits are pending. Ninety-three lawsuits are filed. The army waits.",lose:"The Army of Perfect Law advances. Every imperial counteraction is immediately legally contested. The battle is decided simultaneously in the field and in court. The empire loses both."},{id:292,type:'Army',name:'The Foreign Liberators',threat:"An army claiming to liberate the empire's people has received a warm welcome. Three cities opened their gates voluntarily. The liberators are not what they claimed.",win:"The liberators' true intentions are exposed publicly before they reach the capital. The three cities that opened their gates close them again. The liberators lose their popular legitimacy.",lose:"The liberators reach the capital with popular support. Their true nature emerges only after three months of occupation. By then the population has learned two things: what they thought they wanted and what they actually got."},{id:293,type:'Army',name:'Admiral Reth the Drowned',threat:"The undead Admiral Reth returns commanding a fleet of drowned-sailor ships. He remembers the empire's coastal defences perfectly.",win:"Admiral Keth, who succeeded Reth, sends a personal message: Reth's family is cared for, his name honoured, his legacy intact. Reth, satisfied, accepts the peace. The fleet disperses.",lose:"Reth's fleet uses his complete knowledge of coastal defences to breach the harbour. Admiral Keth faces his predecessor's ship at the entrance. He survives. Reth does not."},{id:294,type:'Army',name:'The Iron Compact',threat:"Seven assassination guilds have coordinated to eliminate every military leader at midnight tomorrow.",win:"The coordination meeting is identified and raided tonight. Eight of the fourteen coordinators are arrested. The midnight attack falls apart without synchronisation.",lose:"The midnight attack succeeds for twenty-two of thirty-six targets. The empire loses two-thirds of its military leadership overnight. Captain Reth is promoted to general in the morning. He is not ready. He tries."},{id:295,type:'Army',name:'The Bankrupt King Valdris',threat:"Valdris has sold everything to finance this campaign. He has nothing left to lose.",win:"His emptiness is his vulnerability — he can be bought. A small sum directed to his remaining debts gives him something to lose again. His army's fury cools.",lose:"Valdris's army fights with the desperation of people who cannot go home to anything. They are terrifyingly effective. General Halveth notes: soldiers with nothing to protect are more dangerous than soldiers with everything."},{id:296,type:'Army',name:'The Army of the Perfect Siege',threat:"Engineers carrying only siege equipment — no weapons — methodically breach one fortress per day.",win:"The engineers' equipment depot is located and destroyed. Without material, they cannot continue. The engineers surrender professionally. Several are offered positions in the imperial engineering corps.",lose:"Three fortresses fall in three days before the depot can be found. The last fortress between the engineers and the capital has twelve hours. The depot is found. The engineers stop. The damage is done."},{id:297,type:'Army',name:'The Grain Army',threat:"An enemy owns the empire's food supply through purchasing, not warfare. They announce food prices have increased by ten thousand percent.",win:"Emergency domestic grain cultivation is maximised and an alternative supply route opened. The monopoly is broken within thirty days. Trade law proceedings are initiated.",lose:"The empire cannot replace the supply in time. The price increase is paid at enormous cost for six months. The treasury is devastated. The grain monopoly remains. The power it represents is permanent."},{id:298,type:'Army',name:'The Children of the Fallen',threat:"Forty thousand children and grandchildren of soldiers the empire killed in its wars of conquest march under their parents' names.",win:"The empire acknowledges the losses publicly and opens compensation discussions. Half the marchers accept the acknowledgement. The remaining half are offered a formal memorial. All stop marching.",lose:"The acknowledgement is refused. Three imperial generals refuse to fight them. Sir Davos does not refuse but is p
