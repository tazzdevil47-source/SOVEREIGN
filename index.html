in progress. Clause thirty-seven voids the contract if the problem resolves naturally first. The problem is encouraged to resolve naturally. It does.",lose:"The contract is signed without reading clause fourteen. Clause fourteen defines sovereignty in a very specific way. For one year, the sorcerer technically owns every citizen's name. He uses this mainly to rename minor geographical features. It is annoying and permanent."},{id:440,type:'Sorcerer',name:'The Mage Storm',threat:"Every mage in the empire simultaneously enters a catastrophic magical fugue. Uncontrolled casting. Buildings phase in and out. Reality is uncertain.",win:"One mage — deaf, away from the communication that triggered the fugue — is unaffected. She methodically guides each mage back from their fugue individually over six hours. Reality stabilises.",lose:"The mage storm lasts twelve hours. Three buildings are swapped with their reflections. The palace garden is now underground. The treasury is on the roof. Some of these are eventually discovered to be improvements."},{id:441,type:'Political',name:'The Second Emperor',threat:"A man of completely legitimate birth reveals himself as the Emperor's older brother — legally senior in the succession. He has documentation, supporters, and an army.",win:"A constitutional examination confirms the older brother was legally excluded from succession by a prior act — made before his birth, for this exact reason. The act is valid. His claim fails. He accepts it after a public hearing.",lose:"The constitutional examination takes three months. During those three months, the brother governs a third of the empire under claim. His governance is competent. The comparison is noted."},{id:442,type:'Political',name:'The Minister of Everything',threat:"One minister has accumulated the portfolios of every other ministry over thirty years. He now controls every function of government. He resigns today. Simultaneously from all positions.",win:"Emergency succession appointments are made to all portfolios within four hours. The institutional knowledge gap is severe but covered. The resigned minister is watched carefully — he clearly had a reason.",lose:"The simultaneous resignation creates a governance vacuum. Seven days of unclear authority produce three policy contradictions, one unilateral military decision, and a tax exemption that costs the empire significantly."},{id:443,type:'Political',name:'The Imperial Census Disaster',threat:"The empire has half the population it believed. Every plan based on population data is invalid.",win:"An emergency recalibration applies new population figures to all strategic plans. The plans are smaller. The army is smaller. The tax base is smaller. The empire governs within its actual means. It is humbling and correct.",lose:"The discovery is made during an active military campaign calculated for twice the available resources. The campaign is half-staffed and under-supplied. General Halveth receives revised figures mid-operation."},{id:444,type:'Political',name:'The Divine Withdrawal',threat:"The gods publicly withdraw their blessing from the empire. The divine mandate is visibly, undeniably gone.",win:"Court theologians argue successfully that divine blessing was always symbolic — governance derives from popular mandate, not divine sanction. The argument is accepted. The empire continues on a different philosophical basis.",lose:"The divine withdrawal triggers three allied kingdoms to withdraw their own alliances — they were allies of a divinely sanctioned empire, not this one. The diplomatic isolation is immediate."},{id:445,type:'Political',name:'The Legitimate Heir of Everything',threat:"One peasant farmer is the legitimate heir to the empire, two kingdoms, a holy order, and a draconic bloodline. The documentation is genuine.",win:"The farmer declines everything. He is perfectly happy farming. He signs three legal disclaimers and is given a tax exemption. He considers this quite enough.",lose:"The farmer is persuaded by a foreign power to accept the claims. He becomes a figurehead with genuine legal authority. The foreign power governs through him. He keeps asking if he can go home."},{id:446,type:'Political',name:"The Emperor's Confession",threat:"A genuine thirty-year-old letter confessing to three crimes has been published everywhere. Under imperial law, execution is required.",win:"The crimes are examined under current law — two have statutes of limitations that have expired. The third requires the accuser to be a living victim. They are not. The law is satisfied.",lose:"The legal examination finds all three crimes prosecutable. The trial of the Emperor by his own law is constitutionally unprecedented. Sir Davos provides character testimony. Defence Minister Aldric provides evidence of the crimes. Both are correct."},{id:447,type:'Political',name:'The Silent Coup',threat:"One year of governance is voided through a technical legal flaw. Everything passed in twelve months is legally erased.",win:"The flaw is identified and challenged in court. The challenge succeeds — the flaw was manufactured, not genuine. The voiding is voided. The legal team responsible for the flaw is arrested.",lose:"The year of governance is legally erased. Three military treaties, two trade deals, and one war declaration are void. The war that was declared is ongoing. It is now, legally, undeclared. The enemy continues fighting regardless."},{id:448,type:'Political',name:'The Empty Treasury',threat:"The entire treasury is invested in a scheme that collapsed overnight. The empire has no money. Soldiers are unpaid from tomorrow.",win:"Emergency measures — a temporary tax, a war bond, a foreign loan — are combined to cover the immediate military payroll. The responsible minister is prosecuted.",lose:"Soldiers go unpaid. Three thousand refuse duty. One thousand five hundred accept payment in kind — land grants, titles. The remaining fifteen hundred walk home. The army is significantly smaller."},{id:449,type:'Political',name:'The Plague of Popularity',threat:"An enemy leader is more popular inside the empire than the Emperor. Three provinces petition to join his nation voluntarily.",win:"The popular enemy leader is invited to the capital on a diplomatic visit — where his actual policies are examined publicly. His popularity, based on myth, survives contact with reality poorly.",lose:"The three provinces hold referenda. Two vote to leave. The referenda are legally invalid — but enforcing invalidity against a popular vote requires military action against the empire's own population."},{id:450,type:'Political',name:'The Rogue Province of Sorrath',threat:"The province of Sorrath has passed its own laws, raised its own army, coined its own money, and declared internal sovereignty while arguing it remains part of the empire. Their lawyers might be right.",win:"A constitutional resolution grants Sorrath enhanced autonomy — real, meaningful, but within the imperial framework. The province accepts it. The precedent is alarming but manageable.",lose:"The legal argument succeeds in international court. Sorrath is internally sovereign. Three other provinces immediately file similar claims."},{id:451,type:'Political',name:'The Spy Who Stayed',threat:"A forty-year spy who chose a third option is writing a complete account of both powers. It comes out tomorrow.",win:"The book is purchased and suppressed. The spy is offered genuine peaceful retirement with complete immunity. He accepts. The book is never published.",lose:"The book is published. It is accurate, devastating, and extremely well-written. Both powers it covers are embarrassed simultaneously. The spy receives substantial royalties."},{id:452,type:'Political',name:'The Beloved Enemy',threat:"The besieging enemy general is more beloved by the empire's own people than its generals. Citizens bring him food.",win:"The general's humanity is met with equal humanity — the siege ends through genuine respect between commanders. The resulting agreement is known as the Gentleman's Peace and holds for forty years.",lose:"Three imperial units refuse to engage him. Sir Davos fights him personally. Sir Davos wins. The general is killed. He is mourned on both sides. The subsequent peace is bitter."},{id:453,type:'Political',name:'The Treaty of Shame',threat:"A legally valid, never-expired treaty grants another nation permanent sovereignty over a central province.",win:"Historians find an addendum — a reversibility clause exercisable once by either party with appropriate compensation. The empire exercises it. The cost is significant but the province is retained.",lose:"The province is handed over legally. Its population is divided on the handover. Half are loyal to the empire, half to the incoming nation. The cultural division takes a generation to resolve."},{id:454,type:'Political',name:'The Hereditary Debt',threat:"A thousand years of compound interest exceeds the empire's total net worth. The creditors have lawyers and patience.",win:"The debt is found to have been partially serviced through trade agreements in amounts that legally constitute acknowledgement, resetting the compound calculation. The adjusted debt is manageable.",lose:"The debt is uncontestable. The empire pays forty percent of all future tax revenue to the creditors for one hundred years. Defence Minister Aldric calculates what forty percent looks like. He sits down."},{id:455,type:'Political',name:'The Democratic Uprising',threat:"A peaceful popular demand for representative government fills the streets. The concept is constitutionally incompatible with imperial rule. The people will not go home.",win:"The Emperor convenes a genuine constitutional assembly. A representative council with real but limited powers is created. The people accept the genuine step. The streets clear.",lose:"The assembly is convened performatively. The people know the difference. The streets remain full. Three other cities join. Defence Minister Aldric writes a memo titled Thoughts on Genuine Reform that he cannot bring himself to send."}];

// ── HELPERS ───────────────────────────────────────────────────────────
const Chip=({label,active,color=T.gold,onClick,sm})=>(
  <button onClick={onClick} style={{background:active?color+'33':'transparent',border:`1px solid ${active?color:T.border}`,borderRadius:20,padding:sm?'3px 9px':'5px 12px',cursor:'pointer',color:active?color:T.dim,fontSize:sm?10:12,fontFamily:'inherit',minHeight:sm?28:36,touchAction:'manipulation',whiteSpace:'nowrap'}}>{label}</button>
);
const GraphPanel=({title,data,dataKey,color,range,setRange})=>(
  <div style={S.card}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
      <span style={{color:T.gold,fontSize:12,fontWeight:600}}>{title}</span>
      <div style={{display:'flex',gap:3}}>
        {['7D','14D','30D','90D','ALL'].map(r=><button key={r} onClick={()=>setRange(r)} style={{...S.btnO,padding:'3px 7px',fontSize:9,minHeight:28,background:r===range?T.gold:'transparent',color:r===range?'#000':T.gold}}>{r}</button>)}
      </div>
    </div>
    <ResponsiveContainer width="100%" height={130}>
      <AreaChart data={data}><CartesianGrid strokeDasharray="3 3" stroke={T.border}/><XAxis dataKey="date" tick={{fill:T.muted,fontSize:8}}/><YAxis tick={{fill:T.muted,fontSize:8}} width={28}/><Tooltip contentStyle={{background:T.card,border:`1px solid ${T.border}`,color:T.text,fontSize:11}}/><Area type="monotone" dataKey={dataKey} stroke={color} fill={color+'22'} strokeWidth={2} dot={false}/></AreaChart>
    </ResponsiveContainer>
  </div>
);
const buildGraph=(logs,field,range)=>{
  const days=range==='7D'?7:range==='14D'?14:range==='30D'?30:range==='90D'?90:180;
  return Array.from({length:days},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(days-1-i));const key=d.toISOString().split('T')[0];return{date:fmt(key),[field]:(logs[key]||{})[field]??0};});
};

// ── TOP BAR ───────────────────────────────────────────────────────────
const TopBar=({settings,page})=>{
  const idx=(settings.pageCommanders||{})[page]??0;
  const cmd=settings.commanderNames?.[idx]||'—';
  return(
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 14px',background:'#090912',borderBottom:`1px solid ${T.border}`,flexShrink:0,minHeight:`calc(48px * var(--sovereign-bar-scale))`}}>
      <div style={{display:'flex',flexDirection:'column',gap:1,maxWidth:`calc(140px * var(--sovereign-bar-scale))`}}>
        <span style={{color:T.gold,fontFamily:"'Cinzel',serif",fontSize:`calc(10px * var(--sovereign-bar-scale))`,letterSpacing:.3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{settings.emperorName}{settings.capitalName?` · ${settings.capitalName}`:''}</span>
        <span style={{color:T.muted,fontSize:`calc(8px * var(--sovereign-bar-scale))`}}>{cmd}</span>
      </div>
      <span style={{color:T.gold,fontFamily:"'Cinzel',serif",fontSize:`calc(11px * var(--sovereign-bar-scale))`,letterSpacing:4,opacity:.7}}>SOVEREIGN</span>
      <span style={{color:T.muted,fontSize:`calc(8px * var(--sovereign-bar-scale))`}}>{new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}</span>
    </div>
  );
};

// ── BOTTOM NAV ────────────────────────────────────────────────────────
const BottomNav=({page,setPage})=>{
  const ref=useRef(null);
  useEffect(()=>{const el=ref.current?.querySelector(`[data-id="${page}"]`);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});},[page]);
  return(
    <div style={{background:'#090912',borderTop:`1px solid ${T.border}`,flexShrink:0,overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
      <div ref={ref} style={{display:'flex',padding:'3px 4px',gap:1,width:'max-content',minWidth:'100%'}}>
        {NAV.map(n=>(
          <button key={n.id} data-id={n.id} onClick={()=>setPage(n.id)}
            style={{background:page===n.id?T.goldDim:'transparent',border:`1px solid ${page===n.id?T.gold+'55':'transparent'}`,cursor:'pointer',borderRadius:7,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'4px 9px',gap:2,minHeight:`calc(50px * var(--sovereign-nav-scale))`,minWidth:`calc(50px * var(--sovereign-nav-scale))`,touchAction:'manipulation'}}>
            <span style={{fontSize:`calc(15px * var(--sovereign-nav-scale))`,color:page===n.id?T.gold:T.muted,lineHeight:1}}>{n.sym}</span>
            <span style={{color:page===n.id?T.gold:T.dim,fontSize:`calc(7px * var(--sovereign-nav-scale))`,letterSpacing:.3,textTransform:'uppercase',whiteSpace:'nowrap'}}>{n.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
};

// ── DASHBOARD ─────────────────────────────────────────────────────────
const Dashboard=({dailyLogs,settings,todos,campaigns,workouts,academySessions=[],meds=[],medLog={},ycycle=[],setYcycle})=>{
  const td=today(),log=dailyLogs[td]||{};
  const todayTodos=todos[td]||[];
  const done=todayTodos.filter(t=>t.done).length;
  const hasWorkout=workouts.some(w=>w.date===td);
  const todayAcademy=academySessions.filter(s=>s.date===td).reduce((a,s)=>a+(Number(s.minutes)||0),0);
  const activeCampaigns=campaigns.filter(c=>c.status==='active');
  const todayMedLog=medLog[td]||{};
  const activeMeds=(meds||[]).filter(m=>m.active!==false).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const projectedTx=(ycycle||[]).filter(e=>e.projected).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const applyProjected=(id)=>{const u=(ycycle||[]).map(e=>e.id===id?{...e,projected:false,date:today(),appliedAt:new Date().toISOString()}:e); if(setYcycle){setYcycle(u);db.set('ycycle',u);}};
  const quotes=settings.motivationQuotes||[];
  const quote=quotes.length>0?quotes[new Date().getDay()%quotes.length]:null;
  const stats=[
    {l:'Water',v:`${log.water||0}L`,c:'#4a9edd'},{l:'Coffee',v:`${log.coffee||0}`,c:'#c97a2a'},
    {l:'Sleep',v:log.sleepHours?`${log.sleepHours}h`:'—',c:'#7a7add'},{l:'Z Cycle',v:log.zcycle!==undefined?`${log.zcycle>0?'+':''}${log.zcycle}%`:'—',c:'#aa7add'},
    {l:'Weight',v:log.weight?`${log.weight}kg`:'—',c:T.gold},{l:'Academy',v:todayAcademy?`${todayAcademy}m`:'—',c:'#7a7add'},{l:'Orders',v:`${done}/${todayTodos.length}`,c:'#2d8a3e'},
  ];
  return(
    <div style={{padding:14}}>
      {quote&&<div style={{...S.card,borderLeft:`3px solid ${T.gold}`,fontStyle:'italic',color:T.muted,fontSize:13,lineHeight:1.6}}>"{quote}"</div>}
      <div style={{...S.card,textAlign:'center',padding:10,borderTop:`2px solid ${hasWorkout?'#2d8a3e':log.restDay?T.steel:T.border}`}}>
        <span style={{color:hasWorkout?'#2d8a3e':log.restDay?'#4a8aaa':T.muted,fontSize:11,letterSpacing:2}}>{hasWorkout?'⚔ BATTLE WON':log.restDay?'🛡 NO BATTLE':'NO BATTLE LOGGED'}</span>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:10}}>
        {stats.map(s=><div key={s.l} style={{...S.card,marginBottom:0,textAlign:'center',padding:10,borderTop:`2px solid ${s.c}44`}}><div style={{color:s.c,fontSize:17,fontWeight:700,fontFamily:"'Cinzel',serif"}}>{s.v}</div><div style={{color:T.muted,fontSize:8,textTransform:'uppercase',letterSpacing:.5,marginTop:2}}>{s.l}</div></div>)}
      </div>
      {projectedTx.length>0&&<div style={S.card}><div style={S.h3}>Projected Treasury</div>{projectedTx.slice(0,5).map(e=><div key={e.id} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',borderBottom:`1px solid ${T.border}`}}><button type="button" onClick={()=>applyProjected(e.id)} style={{background:'none',border:`2px solid ${T.gold}`,borderRadius:5,width:26,height:26,color:T.gold,cursor:'pointer'}}>✓</button><div style={{flex:1}}><div style={{color:T.text,fontSize:12}}>{e.desc||YTYPES[e.type]?.label}</div><div style={{color:T.muted,fontSize:10}}>{fmt(e.date)} · {e.type==='income'?'+':'-'}{Number(e.amount||0).toLocaleString()}</div></div></div>)}</div>}

// ── VITALS ────────────────────────────────────────────────────────────

  const calcSleep=(bed,wake)=>{if(!bed||!wake)return null;const[bh,bm]=bed.split(':').map(Number),[wh,wm]=wake.split(':').map(Number);let d=(wh*60+wm)-(bh*60+bm);if(d<0)d+=1440;return Math.round(d/60*10)/10;};

    <div style={{padding:14}}>
      <h2 style={S.h2}>Vitals</h2>

        <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:8}}>{[0.25,0.5,1,1.5,2,2.5,3].map(v=><Chip key={v} label={`${v}L`} active={log.water===v} color={T.gold} onClick={()=>upd('water',v)} sm/>)}</div>
        <div style={{display:'flex',gap:8}}><button onClick={()=>upd('water',Math.max(0,Math.round(((log.water||0)-0.25)*100)/100))} style={{...S.btnG,flex:1}}>− 0.25L</button><button onClick={()=>upd('water',Math.round(((log.water||0)+0.25)*100)/100)} style={{...S.btn,flex:2}}>+ 0.25L</button></div>
      </div>
      <div style={S.card}>

        <div style={{display:'flex',gap:8}}><button onClick={()=>upd('coffee',Math.max(0,(log.coffee||0)-1))} style={{...S.btnG,flex:1}}>− 1 cup</button><button onClick={()=>upd('coffee',(log.coffee||0)+1)} style={{...S.btn,flex:2}}>Had a cup</button></div>

          <div><label style={S.lbl}>Wake Up</label><input type="time" style={S.inp} value={safeTime(log.wakeup)} onChange={e=>{const hrs=calcSleep(log.bedtime,e.target.value);const u={...(dailyLogs[td]||{}),wakeup:e.target.value};if(hrs!==null)u.sleepHours=hrs;const updated={...dailyLogs,[td]:u};setDailyLogs(updated);db.set('daily_logs',updated);}}/></div>

  const del=id=>{const u=ycycle.filter(e=>e.id!==id);setYcycle(u);db.set('ycycle',u);};
  const applyProjected=id=>{const u=ycycle.map(e=>e.id===id?{...e,projected:false,date:today(),appliedAt:new Date().toISOString()}:e);setYcycle(u);db.set('ycycle',u);};
  const signed=e=>e.type==='income'?Number(e.amount||0):-Number(e.amount||0);

        <div style={{...S.card,textAlign:'center',borderTop:`3px solid ${projectedBalance>=0?'#2d8a3e':T.crimson}`}}><div style={{color:T.muted,fontSize:9,letterSpacing:2}}>PROJECTED BALANCE</div><div style={{color:projectedBalance>=0?'#2d8a3e':T.crimson,fontSize:30,fontWeight:700,fontFamily:"'Cinzel',serif"}}>{projectedBalance>=0?'+':''}{projectedBalance.toLocaleString()}</div></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>{Object.entries(YTYPES).map(([k,v])=>{const total=ycycle.filter(e=>!e.projected&&e.type===k).reduce((a,e)=>a+Number(e.amount||0),0);return<div key={k} style={{...S.card,marginBottom:0,textAlign:'center',padding:10}}><div style={{color:T.muted,fontSize:9}}>{v.label}</div><div style={{color:v.color,fontSize:16,fontWeight:700}}>{v.sym}{total.toLocaleString()}</div></div>;})}</div>

        <input type="number" placeholder="Amount" style={{...S.inp,marginBottom:8}} value={amount} onChange={e=>setAmount(e.target.value)}/>

// ── LORE ──────────────────────────────────────────────────────────────
const LorePage=({stories,setStories})=>{
  const [title,setTitle]=useState('');
  const [content,setContent]=useState('');
  const [editId,setEditId]=useState(null);
  const [loreImage,setLoreImage]=useState('');

  const save=()=>{
    if(!content.trim()&&!loreImage)return;
    if(editId){
      const u=stories.map(e=>e.id===editId?{...e,title,content,image:loreImage||e.image||''}:e);
      setStories(u);
      db.set('stories',u);
      setEditId(null);
    }else{
      const u=[...stories,{id:Date.now(),date:today(),title,content,image:loreImage||''}];
      setStories(u);
      db.set('stories',u);
    }
    setTitle('');
    setContent('');
    setLoreImage('');
  };

  const del=id=>{
    const u=stories.filter(e=>e.id!==id);
    setStories(u);
    db.set('stories',u);
  };

  const startEdit=e=>{
    setTitle(e.title||'');
    setContent(e.content||'');
    setLoreImage(e.image||'');
    setEditId(e.id);

  const cancelEdit=()=>{

    setContent('');

          </label>
          {loreImage&&(
            <div style={{marginTop:10}}>
              <img src={loreImage} style={{width:'100%',borderRadius:12,border:`1px solid ${T.border}`}}/>
              <button type="button" onClick={()=>setLoreImage('')} style={{...S.btnD,width:'100%',marginTop:8}}>Remove Photo</button>
            </div>

        <div style={{display:'flex',gap:8}}>
          <button type="button" onClick={save} style={{...S.btn,flex:2}}>{editId?'Update Entry':'Save Entry'}</button>

      {stories.slice().reverse().map(e=>(

          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>

// ── DAILY CHALLENGE ───────────────────────────────────────────────────
const DailyChallenge=({challengeLog,setChallengeLog})=>{
  const [timeLeft,setTimeLeft]=useState('');
  const td=today();

  useEffect(()=>{
    const closed=closeExpiredDailyMissions(challengeLog);
    if(closed!==challengeLog){
      setChallengeLog(closed);
      db.set('challenge_log',closed);
    }
  },[]);
  const entry=challengeLog[td]||{};
  const threat=getRandomDailyThreat(td,entry);
  const outcome=entry.outcome;
  const challengeDefinition=entry.challengeDefinition||'';
  const challengeStatus=entry.challengeStatus||'Not started';
  const tc=THREAT_COLOR[threat.type]||T.gold;
  useEffect(()=>{if(!entry.threatId){const u={...challengeLog,[td]:{...entry,threatId:threat.id}};setChallengeLog(u);db.set('challenge_log',u);}},[]);
  const updateChallengeField=(key,val)=>{
    const u={...challengeLog,[td]:{...entry,threatId:threat.id,[key]:val}};
    setChallengeLog(u);
    db.set('challenge_log',u);
  };
  const calcTime=()=>{const midnight=new Date();midnight.setHours(0,0,0,0);const expiry=midnight.getTime()+25*3600000;const diff=Math.max(0,expiry-Date.now());const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;};
  useEffect(()=>{
    setTimeLeft(calcTime());
    const iv=setInterval(()=>{
      const t=calcTime();
      setTimeLeft(t);
      if(t==='00:00:00'&&!outcome){const u={...challengeLog,[td]:{...entry,threatId:threat.id,outcome:'lost'}};setChallengeLog(u);db.set('challenge_log',u);}
    },1000);
    return()=>clearInterval(iv);
  },[outcome,td]);
  const resolve=result=>{const u={...challengeLog,[td]:{...entry,threatId:threat.id,outcome:result}};setChallengeLog(u);db.set('challenge_log',u);};
  return(
    <div style={{...S.card,borderLeft:`3px solid ${tc}`,background:'#080810',marginBottom:14}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
        <div style={{flex:1}}>
          <div style={{color:tc,fontSize:9,letterSpacing:1.5,textTransform:'uppercase',marginBottom:4}}>{threat.type} · Threat #{threat.id}</div>
          <div style={{color:T.text,fontFamily:"'Cinzel',serif",fontSize:15,fontWeight:600,lineHeight:1.2}}>{threat.name}</div>
        </div>
        {!outcome&&<div style={{textAlign:'right',flexShrink:0,marginLeft:10}}><div style={{color:timeLeft<'02:00:00'?T.crimson:T.gold,fontFamily:"'Cinzel',serif",fontSize:18,fontVariantNumeric:'tabular-nums'}}>{timeLeft}</div><div style={{color:T.muted,fontSize:8}}>remaining</div></div>}
      </div>
      <div style={{color:T.muted,fontSize:12,lineHeight:1.6,marginBottom:12}}>{threat.threat}</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr',gap:8,marginBottom:12}}>
        <div>
          <label style={S.lbl}>Define the Challenge</label>
          <textarea
            placeholder="What exactly must be done today to defeat this threat?"
            style={{...S.inp,height:70,resize:'vertical'}}
            value={challengeDefinition}
            onChange={e=>updateChallengeField('challengeDefinition',e.target.value)}
          />
        </div>
        <div>
          <label style={S.lbl}>Challenge Status</label>
          <select
            style={S.inp}
            value={challengeStatus}
            onChange={e=>updateChallengeField('challengeStatus',e.target.value)}
          >
            <option>Not started</option>
            <option>In progress</option>
            <option>Blocked</option>
            <option>Completed</option>
            <option>Failed</option>
          </select>
        </div>
      </div>
      {!outcome?(
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>resolve('won')} style={{...S.btn,flex:2,background:'#1a5c2a',fontSize:13}}>⚔ Defeated</button>
          <button onClick={()=>resolve('lost')} style={{...S.btnD,flex:1,fontSize:12}}>Expired</button>
        </div>
      ):(
        <div style={{background:outcome==='won'?'#0a1a0a':'#1a0808',border:`1px solid ${outcome==='won'?'#2d8a3e':T.crimson}`,borderRadius:8,padding:'10px 12px'}}>
          <div style={{color:outcome==='won'?'#2d8a3e':T.crimson,fontSize:9,letterSpacing:1.5,textTransform:'uppercase',marginBottom:6}}>{outcome==='won'?'⚔ VICTORY — THREAT ELIMINATED':'✗ DEFEAT — THE ENEMY PREVAILS'}</div>
          <div style={{color:T.text,fontSize:12,lineHeight:1.6}}>{outcome==='won'?threat.win:threat.lose}</div>
        </div>
      )}
    </div>
  );
};

// ── WEIGHT CALENDAR ───────────────────────────────────────────────────
const WeightCalendar=({dailyLogs,setDailyLogs,settings,workouts,academySessions=[],disciplines=[],foodLogs={},ycycle=[],challengeLog={},campaigns=[],events=[]})=>{
  const [inputW,setInputW]=useState('');const [viewMonth,setViewMonth]=useState(new Date());
  const [selectedDate,setSelectedDate]=useState(today());const [range,setRange]=useState('30D');
  const logWeight=()=>{if(!inputW)return;const u={...dailyLogs,[today()]:{...(dailyLogs[today()]||{}),weight:Number(inputW)}};setDailyLogs(u);db.set('daily_logs',u);setInputW('');};
  const toggleRest=date=>{const u={...dailyLogs,[date]:{...(dailyLogs[date]||{}),restDay:!(dailyLogs[date]?.restDay)}};setDailyLogs(u);db.set('daily_logs',u);};
  const y=viewMonth.getFullYear(),m=viewMonth.getMonth();
  const firstDay=new Date(y,m,1).getDay(),daysInMonth=new Date(y,m+1,0).getDate();
  const cells=[...Array(firstDay).fill(null),...Array.from({length:daysInMonth},(_,i)=>i+1)];
  const dayBg=day=>{const key=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;const l=dailyLogs[key]||{};if(l.restDay)return'#0a1a2a';if(workouts.some(w=>w.date===key))return'#0a2a0a';if(new Date(key)<new Date(today()))return'#1a0808';return T.card;};
  const days=range==='7D'?7:range==='14D'?14:range==='30D'?30:range==='90D'?90:180;
  const graphData=(()=>{const pts=[];for(let i=days-1;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const key=d.toISOString().split('T')[0];const w=(dailyLogs[key]||{}).weight;if(w)pts.push({date:fmt(key),weight:w,target:settings.targetWeight});}return pts;})();
  return(
    <div style={{padding:14}}>
      <h2 style={S.h2}>War Map — Weight</h2>

      <div style={S.card}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}><button onClick={()=>setViewMonth(new Date(y,m-1))} style={{...S.btnG,padding:'7px 14px',minHeight:38}}>‹</button><span style={{color:T.gold,fontFamily:"'Cinzel',serif",fontSize:13}}>{viewMonth.toLocaleDateString('en-GB',{month:'long',year:'numeric'})}</span><button onClick={()=>setViewMonth(new Date(y,m+1))} style={{...S.btnG,padding:'7px 14px',minHeight:38}}>›</button></div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}}>
          {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=><div key={d} style={{color:T.dim,fontSize:9,textAlign:'center',paddingBottom:4}}>{d}</div>)}
          {cells.map((day,i)=>{if(!day)return<div key={i}/>;const key=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;const l=dailyLogs[key]||{};return<div key={i} onClick={()=>toggleRest(key)} style={{background:dayBg(day),borderRadius:5,padding:'3px 1px',textAlign:'center',cursor:'pointer',border:`1px solid ${key===today()?T.gold:T.border}`,minHeight:34}}><div style={{color:T.muted,fontSize:10}}>{day}</div>{l.weight&&<div style={{color:T.gold,fontSize:8}}>{l.weight}</div>}{l.restDay&&<div style={{color:'#4a8aaa',fontSize:7}}>rest</div>}</div>;})}
        </div>
        <div style={{display:'flex',gap:8,marginTop:8,fontSize:9,color:T.muted}}>{[['#0a2a0a','Won'],['#1a0808','Miss'],['#0a1a2a','Rest']].map(([c,l])=><div key={l} style={{display:'flex',gap:4,alignItems:'center'}}><div style={{width:8,height:8,background:c,borderRadius:2,border:`1px solid ${T.border}`}}/><span>{l}</span></div>)}<span>· tap = rest</span></div>
      </div>

    const file=e.target.files?.[0];

  };
  const save=()=>{if(!form.name.trim())return;if(editId){const u=relations.map(r=>r.id===editId?{...r,...form}:r);setRelations(u);db.set('relations',u);}else{const u=[...relations,{...form,id:Date.now()}];setRelations(u);db.set('relations',u);}setForm(emptyForm());setEditId(null);setShowForm(false);};

  const filtered=relations.filter(r=>{if(!search)return true;const q=search.toLowerCase();return[r.name,r.connectionType,r.trustLevel,...(r.utility||[]),...(r.interests||[]),...(r.energy||[])].some(v=>v?.toLowerCase().includes(q));});

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}><h2 style={{...S.h2,margin:0}}>Factions — {relations.length}/500</h2><button onClick={()=>{setShowForm(!showForm);setEditId(null);setForm(emptyForm());}} style={{...S.btn,padding:'9px 14px'}}>+ Add</button></div>
      <input placeholder="Search name, tag, trust..." style={{...S.inp,marginBottom:12}} value={search} onChange={e=>setSearch(e.target.value)}/>

        <div style={S.h3}>{editId?'Edit':'New'} Contact</div>

        <label style={S.lbl}>Utility</label>{Object.entries(UTIL_CATS).map(([cat,items])=><div key={cat} style={{marginBottom:8}}><div style={{color:T.dim,fontSize:9,letterSpacing:1,marginBottom:4,textTransform:'uppercase'}}>{cat}</div><div style={{display:'flex',gap:3,flexWrap:'wrap'}}>{items.map(i=><Chip key={i} label={i} active={form.utility.includes(i)} color={T.gold} onClick={()=>toggle('utility',i)} sm/>)}</div></div>)}
        <label style={{...S.lbl,marginTop:6}}>Interests</label><div style={{display:'flex',gap:3,flexWrap:'wrap',marginBottom:10}}>{INTERESTS.map(t=><Chip key={t} label={t} active={form.interests.includes(t)} color="#4a9edd" onClick={()=>toggle('interests',t)} sm/>)}</div>
        <label style={S.lbl}>Trust Level</label><div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:10}}>{TRUST_LEVELS.map(t=><Chip key={t} label={t} active={form.trustLevel===t} color={trustColor(t)} onClick={()=>setForm(f=>({...f,trustLevel:t}))} sm/>)}</div>
        <label style={S.lbl}>Energy</label><div style={{display:'flex',gap:3,flexWrap:'wrap',marginBottom:10}}>{ENERGY_OPTS.map(t=>{const neg=['Draining','Negative','Flaky','Ego-heavy','Opportunistic'].includes(t);return<Chip key={t} label={t} active={form.energy.includes(t)} color={neg?T.crimson:'#2d8a3e'} onClick={()=>toggle('energy',t)} sm/>;})}</div>
        <label style={S.lbl}>Power Tags</label><div style={{display:'flex',gap:3,flexWrap:'wrap',marginBottom:10}}>{POWER_OPTS.map(t=><Chip key={t} label={t} active={form.powerTags.includes(t)} color="#aa7add" onClick={()=>toggle('powerTags',t)} sm/>)}</div>
        <label style={S.lbl}>Last Contacted</label><input type="date" style={{...S.inp,marginBottom:8}} value={form.lastContacted} onChange={e=>setForm(f=>({...f,lastContacted:e.target.value}))}/>

      {!filtered.length&&<div style={{color:T.muted,textAlign:'center',padding:40,fontSize:13}}>{search?'No contacts match.':'No contacts yet. Build your alliance.'}</div>}
    </div>
  );
};

const TodoList=({todos,setTodos})=>{
  const [order,setOrder]=useState('');
  const [why,setWhy]=useState('');
  const list=Array.isArray(todos.__global)
    ? todos.__global
    : Object.entries(todos||{}).flatMap(([date,items])=>date==='__global'?[]:(items||[]).map(t=>({...t,createdDate:t.createdDate||date})));
  const upd=nl=>{const u={...todos,__global:nl};setTodos(u);db.set('todos',u);};
  const add=()=>{if(!order.trim())return;upd([...list,{id:Date.now(),createdDate:today(),text:order.trim(),why:why.trim(),done:false,failReason:''}]);setOrder('');setWhy('');};
  const toggle=id=>upd(list.map(t=>t.id===id?{...t,done:!t.done,completedDate:!t.done?today():''}:t));
  const setFail=(id,r)=>upd(list.map(t=>t.id===id?{...t,failReason:r}:t));
  const del=id=>upd(list.filter(t=>t.id!==id));
  const done=list.filter(t=>t.done).length;
  return(
    <div style={{padding:14}}>
      <h2 style={S.h2}>Orders — To-Do</h2>
      <div style={{...S.card,textAlign:'center'}}><div style={{color:T.gold,fontSize:34,fontWeight:700,fontFamily:"'Cinzel',serif"}}>{done}/{list.length}</div><div style={{color:T.muted,fontSize:9,letterSpacing:1,textTransform:'uppercase'}}>Orders Completed</div>{list.length>0&&<div style={{background:T.border,borderRadius:4,height:5,marginTop:8}}><div style={{background:done===list.length?'#2d8a3e':T.gold,width:`${list.length?(done/list.length)*100:0}%`,height:5,borderRadius:4}}/></div>}</div>
      <div style={S.card}>
        <label style={S.lbl}>What is the order?</label>
        <input placeholder="Order..." style={{...S.inp,marginBottom:8}} value={order} onChange={e=>setOrder(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}/>
        <label style={S.lbl}>Why this order?</label>
        <textarea placeholder="Reason / purpose..." style={{...S.inp,height:64,resize:'vertical',marginBottom:8}} value={why} onChange={e=>setWhy(e.target.value)}/>
        <button type="button" onClick={add} style={{...S.btn,width:'100%'}}>Add Order</button>
      </div>
      {list.map(t=><div key={t.id} style={{...S.card,marginBottom:6}}>
        <div style={{display:'flex',alignItems:'flex-start',gap:10}}>
          <button type="button" onClick={()=>toggle(t.id)} style={{background:'none',border:`2px solid ${t.done?'#2d8a3e':T.border}`,borderRadius:5,width:28,height:28,cursor:'pointer',color:'#2d8a3e',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0}}>{t.done?'✓':''}</button>
          <div style={{flex:1}}>
            <div style={{color:t.done?T.muted:T.text,textDecoration:t.done?'line-through':'none',fontSize:14,fontWeight:700}}>{t.text}</div>
            {(t.why||t.reason)&&<div style={{color:T.muted,fontSize:12,marginTop:3,lineHeight:1.4}}>Why: {t.why||t.reason}</div>}
            <div style={{color:T.dim,fontSize:10,marginTop:3}}>Created: {fmt(t.createdDate||today())}{t.completedDate?` · Completed: ${fmt(t.completedDate)}`:''}</div>
            {!t.done&&<div style={{marginTop:8}}>
              <label style={S.lbl}>Why did it fail?</label>
              <textarea placeholder="Type failure reason..." style={{...S.inp,height:54,resize:'vertical'}} value={t.failReason||t.missReason||''} onChange={e=>setFail(t.id,e.target.value)}/>
            </div>}
          </div>
          <button type="button" onClick={()=>del(t.id)} style={{background:'none',border:'none',color:T.muted,cursor:'pointer',fontSize:22,lineHeight:1}}>×</button>
        </div>
      </div>)}
      {!list.length&&<div style={{color:T.muted,textAlign:'center',padding:40,fontSize:13}}>No standing orders. Add one and it stays until you delete it.</div>}
    </div>
  );
};

const DailyHistory=({date,dailyLogs={},workouts=[],foodLogs={},ycycle=[],challengeLog={},campaigns=[],academySessions=[],events=[]})=>{
  if(!date)return null;
  const log=dailyLogs[date]||{};
  const dayWorkouts=workouts.filter(w=>w.date===date);
  const dayFood=foodLogs[date]||[];
  const dayY=Array.isArray(ycycle)?ycycle.filter(x=>x.date===date):[];
  const challenge=challengeLog[date]||{};
  const threat=challenge.threatId?THREATS.find(t=>t.id===challenge.threatId):null;
  const dayAcademy=academySessions.filter(s=>s.date===date);
  const dayEvents=events.filter(e=>e.date===date);
  const dayCampaigns=campaigns.filter(c=>
    (c.startDate===date)||(c.endDate===date)||(c.completedDate===date)||(c.failedDate===date)
  );
  const hasAnything=Object.keys(log).length||dayWorkouts.length||dayFood.length||dayY.length||challenge.outcome||threat||dayAcademy.length||dayEvents.length||dayCampaigns.length;
  return(
    <div style={{...S.card,border:`1px solid ${T.gold}55`}}>
      <h3 style={S.h3}>Archive — {fmt(date)}</h3>
      {!hasAnything&&<div style={{color:T.muted,fontSize:13}}>No records found for this date.</div>}

      {Object.keys(log).length>0&&<div style={{marginBottom:10}}>
        <div style={{color:T.gold,fontSize:12,fontWeight:700,marginBottom:4}}>Vitals / Daily Log</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
          {Object.entries(log).map(([k,v])=><div key={k} style={{color:T.muted,fontSize:12}}><b style={{color:T.text}}>{k}:</b> {String(v)}</div>)}
        </div>
      </div>}

      {(threat||challenge.outcome)&&<div style={{marginBottom:10}}>
        <div style={{color:T.gold,fontSize:12,fontWeight:700,marginBottom:4}}>Daily Battle</div>
        {threat&&<div style={{color:T.text,fontSize:13}}>{threat.name}</div>}
        {challenge.challengeDefinition&&<div style={{color:T.muted,fontSize:12,marginTop:3}}>Challenge: {challenge.challengeDefinition}</div>}
        {challenge.challengeStatus&&<div style={{color:T.muted,fontSize:12}}>Status: {challenge.challengeStatus}</div>}
        {challenge.outcome&&<div style={{color:challenge.outcome==='won'?'#2d8a3e':T.crimson,fontSize:12}}>Outcome: {challenge.outcome}</div>}
      </div>}

      {dayCampaigns.length>0&&<div style={{marginBottom:10}}>
        <div style={{color:T.gold,fontSize:12,fontWeight:700,marginBottom:4}}>Campaigns</div>
        {dayCampaigns.map(c=><div key={c.id} style={{borderTop:`1px solid ${T.border}`,padding:'6px 0'}}>
          <div style={{color:T.text,fontSize:13}}>{c.name} · {campaignTypeLabel(c.type)}</div>
          {c.commander&&<div style={{color:T.gold,fontSize:11}}>Commander: {c.commander}</div>}
          <div style={{color:T.muted,fontSize:12}}>Status: {c.status}</div>
          {c.target&&<div style={{color:T.muted,fontSize:12}}>Target: {c.target}</div>}
        </div>)}
      </div>}

      {dayEvents.length>0&&<div style={{marginBottom:10}}>
        <div style={{color:T.gold,fontSize:12,fontWeight:700,marginBottom:4}}>Events</div>
        {dayEvents.map(e=><div key={e.id} style={{borderTop:`1px solid ${T.border}`,padding:'6px 0'}}>
          <div style={{color:T.text,fontSize:13}}>{e.title} {e.time?`· ${e.time}`:''}</div>
          <div style={{color:T.muted,fontSize:12}}>{e.type} · {e.status}</div>
          {e.notes&&<div style={{color:T.muted,fontSize:12}}>{e.notes}</div>}
        </div>)}
      </div>}

      {dayAcademy.length>0&&<div style={{marginBottom:10}}>
        <div style={{color:T.gold,fontSize:12,fontWeight:700,marginBottom:4}}>Academy</div>
        {dayAcademy.map(s=><div key={s.id} style={{color:T.muted,fontSize:12,borderTop:`1px solid ${T.border}`,padding:'6px 0'}}>{s.minutes} minutes {s.notes?`· ${s.notes}`:''}</div>)}
      </div>}

      {dayWorkouts.length>0&&<div style={{marginBottom:10}}>
        <div style={{color:T.gold,fontSize:12,fontWeight:700,marginBottom:4}}>Workout / Warfare</div>

const BackdateMap=({dailyLogs,setDailyLogs,foodLogs,setFoodLogs,ycycle,setYcycle,academySessions,setAcademySessions,disciplines=[]})=>{
  const [date,setDate]=useState(today());
  const [foodName,setFoodName]=useState('');
  const [foodCalories,setFoodCalories]=useState('');
  const [zValue,setZValue]=useState('');
  const [zNote,setZNote]=useState('');
  const [academyDisc,setAcademyDisc]=useState('');
  const [academyMins,setAcademyMins]=useState('');
  const [academyNotes,setAcademyNotes]=useState('');

  const log=dailyLogs[date]||{};
  const saveDaily=(patch)=>{
    const u={...dailyLogs,[date]:{...(dailyLogs[date]||{}),...patch}};
    setDailyLogs(u);
    db.set('daily_logs',u);
  };

  const dayFood=Array.isArray(foodLogs)?foodLogs.filter(f=>f.date===date):(foodLogs[date]||[]);
  const addFood=()=>{
    if(!foodName.trim())return;
    if(Array.isArray(foodLogs)){
      const u=[...foodLogs,{id:Date.now(),date,name:foodName.trim(),calories:Number(foodCalories)||0}];
      setFoodLogs(u);db.set('food_logs',u);
    }else{
      const u={...foodLogs,[date]:[...(foodLogs[date]||[]),{id:Date.now(),name:foodName.trim(),calories:Number(foodCalories)||0}]};
      setFoodLogs(u);db.set('food_logs',u);
    }
    setFoodName('');setFoodCalories('');
  };

  const dayY=Array.isArray(ycycle)?ycycle.filter(x=>x.date===date):[];
  const addZ=()=>{
    if(!zValue&&!zNote.trim())return;
    const entry={id:Date.now(),date,value:Number(zValue)||0,note:zNote.trim(),type:'Mind Z Cycle'};
    const u=Array.isArray(ycycle)?[...ycycle,entry]:[entry];
    setYcycle(u);db.set('ycycle',u);
    setZValue('');setZNote('');
  };

  const dayAcademy=(academySessions||[]).filter(s=>s.date===date);
  const addAcademy=()=>{
    const mins=parseInt(String(academyMins).replace(/[^0-9]/g,''),10);
    if(!academyDisc||!mins)return alert('Choose academy discipline and minutes.');
    const entry={id:Date.now(),date,disciplineId:Number(academyDisc),minutes:mins,notes:academyNotes.trim()};
    const u=[entry,...academySessions];
    setAcademySessions(u);db.set('academy_sessions',u);
    setAcademyMins('');setAcademyNotes('');
  };
  const getDisc=id=>disciplines.find(d=>String(d.id)===String(id));

  return(
    <div style={{padding:14}}>
      <h2 style={S.h2}>Backdate Map</h2>
      <div style={{color:T.muted,fontSize:12,marginBottom:10}}>Pick a past date and edit sleep, water, coffee, Mind Z Cycle, rations, and Academy logs.</div>

      <div style={S.card}>
        <label style={S.lbl}>Select Date</label>
        <input type="date" style={S.inp} value={date} onChange={e=>setDate(e.target.value)}/>
      </div>

      <div style={S.card}>
        <h3 style={S.h3}>Vitals for {fmt(date)}</h3>
        <label style={S.lbl}>Sleep Hours</label>
        <input type="number" step="0.1" style={{...S.inp,marginBottom:8}} value={log.sleepHours||''} onChange={e=>saveDaily({sleepHours:Number(e.target.value)||0})}/>
        <label style={S.lbl}>Water Litres</label>
        <input type="number" step="0.1" style={{...S.inp,marginBottom:8}} value={log.water||''} onChange={e=>saveDaily({water:Number(e.target.value)||0})}/>
        <label style={S.lbl}>Coffee Count</label>
        <input type="number" step="1" style={S.inp} value={log.coffee||''} onChange={e=>saveDaily({coffee:Number(e.target.value)||0})}/>
      </div>

      <div style={S.card}>
        <h3 style={S.h3}>Mind Z Cycle</h3>
        <div style={{color:T.muted,fontSize:12,marginBottom:8}}>Existing entries: {dayY.length}</div>
        {dayY.map(x=><div key={x.id} style={{color:T.muted,fontSize:12,borderTop:`1px solid ${T.border}`,padding:'6px 0'}}>{x.value||0}% {x.note?`· ${x.note}`:''}</div>)}
        <input type="number" placeholder="Z value / %" style={{...S.inp,marginBottom:8}} value={zValue} onChange={e=>setZValue(e.target.value)}/>
        <textarea placeholder="Mind note" style={{...S.inp,height:70,resize:'vertical',marginBottom:8}} value={zNote} onChange={e=>setZNote(e.target.value)}/>
        <button type="button" style={S.btn} onClick={addZ}>Add Z Cycle Entry</button>
      </div>

      <div style={S.card}>
        <h3 style={S.h3}>Rations</h3>

const DateArchive=({dailyLogs={},workouts=[],foodLogs={},ycycle=[],challengeLog={},campaigns=[],academySessions=[],events=[]})=>{
  const [selectedDate,setSelectedDate]=useState(today());
  const [viewMonth,setViewMonth]=useState(new Date());
  const monthKey=`${viewMonth.getFullYear()}-${String(viewMonth.getMonth()+1).padStart(2,'0')}`;

  const log=dailyLogs[selectedDate]||{};
  const dayWorkouts=(workouts||[]).filter(w=>w.date===selectedDate);
  const dayFood=Array.isArray(foodLogs)?foodLogs.filter(f=>f.date===selectedDate):(foodLogs[selectedDate]||[]);
  const dayY=Array.isArray(ycycle)?ycycle.filter(x=>x.date===selectedDate):[];
  const challenge=challengeLog[selectedDate]||{};
  const threat=challenge.threatId?THREATS.find(t=>t.id===challenge.threatId):null;
  const dayAcademy=(academySessions||[]).filter(s=>s.date===selectedDate);
  const dayEvents=(events||[]).filter(e=>e.date===selectedDate);
  const dayCampaigns=(campaigns||[]).filter(c=>
    c.startDate===selectedDate ||
    c.endDate===selectedDate ||
    c.completedDate===selectedDate ||
    c.failedDate===selectedDate
  );

  const hasData=Object.keys(log).length||dayWorkouts.length||dayFood.length||dayY.length||challenge.outcome||threat||dayAcademy.length||dayEvents.length||dayCampaigns.length;

  const countForDate=d=>{
    let count=0;
    if(dailyLogs[d]&&Object.keys(dailyLogs[d]).length)count++;
    if((workouts||[]).some(w=>w.date===d))count++;
    if(Array.isArray(foodLogs)?foodLogs.some(f=>f.date===d):(foodLogs[d]||[]).length)count++;
    if((academySessions||[]).some(s=>s.date===d))count++;
    if((events||[]).some(e=>e.date===d))count++;
    if(challengeLog[d])count++;
    if((campaigns||[]).some(c=>c.startDate===d||c.endDate===d||c.completedDate===d||c.failedDate===d))count++;
    return count;
  };

  const daysInMonth=new Date(viewMonth.getFullYear(),viewMonth.getMonth()+1,0).getDate();
  const firstDay=new Date(viewMonth.getFullYear(),viewMonth.getMonth(),1).getDay();
  const blanks=(firstDay+6)%7;
  const cells=[...Array(blanks).fill(null),...Array.from({length:daysInMonth},(_,i)=>i+1)];

  const shiftMonth=n=>{
    const d=new Date(viewMonth);
    d.setMonth(d.getMonth()+n);
    setViewMonth(d);
  };

  const Section=({title,children})=>(
    <div style={{borderTop:`1px solid ${T.border}`,paddingTop:10,marginTop:10}}>
      <div style={{color:T.gold,fontSize:12,fontWeight:700,letterSpacing:1,textTransform:'uppercase',marginBottom:6}}>{title}</div>
      {children}
    </div>
  );

  return(
    <div style={{padding:14}}>
      <h2 style={S.h2}>Archive</h2>
      <div style={{color:T.muted,fontSize:12,marginBottom:10}}>
        Pick any date. This shows what was recorded on that day.
      </div>

      <div style={S.card}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <button type="button" style={S.btnG} onClick={()=>shiftMonth(-1)}>←</button>
          <div style={{color:T.gold,fontFamily:"'Cinzel',serif",fontSize:16}}>
            {viewMonth.toLocaleDateString('en-GB',{month:'long',year:'numeric'})}
          </div>
          <button type="button" style={S.btnG} onClick={()=>shiftMonth(1)}>→</button>
        </div>

        <input
          type="date"
          style={{...S.inp,marginBottom:10}}
          value={selectedDate}
          onChange={e=>{
            setSelectedDate(e.target.value);
            const d=new Date(e.target.value+'T12:00:00');
            if(!isNaN(d))setViewMonth(d);
          }}
        />

        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4}}>
          {['M','T','W','T','F','S','S'].map((d,i)=><div key={i} style={{color:T.muted,fontSize:10,textAlign:'center'}}>{d}</div>)}
          {cells.map((day,i)=>{
            if(!day)return <div key={i}/>;
            const d=`${monthKey}-${String(day).padStart(2,'0')}`;
            const count=countForDate(d);
            return(
              <button
                type="button"
                key={i}
                onClick={()=>setSelectedDate(d)}
                style={{
                  minHeight:46,
                  borderRadius:8,
                  border:`1px solid ${selectedDate===d?T.gold:count?T.gold+'88':T.border}`,
                  background:selectedDate===d?T.goldDim:T.input,
                  color:selectedDate===d?T.gold:T.text,
                  fontFamily:'inherit',
                  position:'relative'
                }}
              >
                <div>{day}</div>
                {count>0&&<div style={{position:'absolute',right:4,bottom:3,color:T.gold,fontSize:9}}>{count}</div>}
              </button>
            );
          })}
        </div>
      </div>

      <div style={{...S.card,border:`1px solid ${T.gold}55`}}>
        <h3 style={S.h3}>Records for {fmt(selectedDate)}</h3>
        {!hasData&&<div style={{color:T.muted,fontSize:13}}>Nothing recorded on this date.</div>}

        {Object.keys(log).length>0&&(
          <Section title="Vitals / Weight / Daily Log">
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
              {Object.entries(log).map(([k,v])=>(
                <div key={k} style={{color:T.muted,fontSize:12}}>
                  <b style={{color:T.text}}>{k}:</b> {String(v)}
                </div>
              ))}
            </div>
          </Section>
        )}

        {(threat||challenge.outcome||challenge.challengeDefinition||challenge.challengeStatus)&&(
          <Section title="Daily Battle">
            {threat&&<div style={{color:T.text,fontSize:13,fontWeight:700}}>{threat.name}</div>}
            {challenge.challengeDefinition&&<div style={{color:T.muted,fontSize:12,marginTop:4}}>Challenge: {challenge.challengeDefinition}</div>}
            {challenge.challengeStatus&&<div style={{color:T.muted,fontSize:12}}>Status: {challenge.challengeStatus}</div>}
            {challenge.outcome&&<div style={{color:challenge.outcome==='won'?'#2d8a3e':T.crimson,fontSize:12}}>Outcome: {challenge.outcome}</div>}
          </Section>
        )}

        {dayCampaigns.length>0&&(
          <Section title="Campaigns">
            {dayCampaigns.map(c=>(
              <div key={c.id} style={{borderTop:`1px solid ${T.border}`,padding:'7px 0'}}>
                <div style={{color:T.text,fontSize:13,fontWeight:700}}>{c.name}</div>
                <div style={{color:T.muted,fontSize:12}}>{campaignTypeLabel(c.type)} · {c.status}</div>
                {c.commander&&<div style={{color:T.gold,fontSize:11}}>Commander: {c.commander}</div>}
                {c.target&&<div style={{color:T.muted,fontSize:12,lineHeight:1.4}}>Target: {c.target}</div>}
              </div>
            ))}
          </Section>
        )}

        {dayAcademy.length>0&&(
          <Section title="Academy">
            {dayAcademy.map(s=>(
              <div key={s.id} style={{borderTop:`1px solid ${T.border}`,padding:'7px 0'}}>
                <div style={{color:T.text,fontSize:13}}>{s.minutes} minutes</div>
                {s.notes&&<div style={{color:T.muted,fontSize:12,lineHeight:1.4}}>{s.notes}</div>}
              </div>
            ))}
          </Section>
        )}

        {dayWorkouts.length>0&&(
          <Section title="Warfare / Workouts">
            {dayWorkouts.map(w=>(
              <div key={w.id} style={{borderTop:`1px solid ${T.border}`,padding:'7px 0',color:T.muted,fontSize:12}}>
                {w.type||w.name||w.exercise||'Workout'} {w.duration?`· ${w.duration}m`:''} {w.notes?`· ${w.notes}`:''}
              </div>
            ))}
          </Section>
        )}

        {dayFood.length>0&&(
          <Section title="Rations / Food">
            {dayFood.map((f,i)=>(
              <div key={f.id||i} style={{borderTop:`1px solid ${T.border}`,padding:'7px 0',color:T.muted,fontSize:12}}>
                {f.name||f.food||f.item||'Food'} {f.calories?`· ${f.calories} cal`:''}
              </div>
            ))}
          </Section>
        )}

        {dayY.length>0&&(
          <Section title="Treasury / Y-Cycle">
            {dayY.map((y,i)=>(
              <div key={y.id||i} style={{borderTop:`1px solid ${T.border}`,padding:'7px 0',color:T.muted,fontSize:12}}>
                {y.type||'Entry'} {y.amount?`· ${y.amount}`:''} {y.note?`· ${y.note}`:''}
              </div>
            ))}
          </Section>
        )}

        {dayEvents.length>0&&(
          <Section title="Events">
            {dayEvents.map(e=>(
              <div key={e.id} style={{borderTop:`1px solid ${T.border}`,padding:'7px 0'}}>
                <div style={{color:T.text,fontSize:13,fontWeight:700}}>{e.title} {e.time?`· ${e.time}`:''}</div>
                <div style={{color:T.muted,fontSize:12}}>{e.type} · {e.status}</div>
                {e.notes&&<div style={{color:T.muted,fontSize:12,lineHeight:1.4}}>{e.notes}</div>}
              </div>
            ))}
          </Section>
        )}
      </div>
    </div>
  );
};


const EventsTab=({events,setEvents,dailyLogs={},workouts=[],foodLogs={},ycycle=[],challengeLog={},campaigns=[],academySessions=[]})=>{

    db.set('events',u);

    const u=events.filter(e=>e.id!==id);

    db.set('events',u);

    const d=new Date(viewMonth);
    d.setMonth(d.getMonth()+n);

          </div>
          <button type="button" style={S.btnG} onClick={()=>shiftMonth(1)}>→</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4}}>

              <div>{day}</div>

          <input type="date" style={S.inp} value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
          <input type="time" style={S.inp} value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))}/>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>

            <option value="done">Done</option>

  );
};


const WeeklySummary=({dailyLogs,workouts,foodLogs,ycycle,challengeLog,campaigns,settings})=>{
  const [offset,setOffset]=useState(0);
  const dates=getWeekDates(offset,settings?.weekStart||'sunday'),logs=dates.map(d=>({d,...(dailyLogs[d]||{})}));
  const intel=calcWeeklyIntel(dates,challengeLog||{},campaigns||[]);
  const avgWater=Math.round((logs.reduce((a,l)=>a+(l.water||0),0)/7)*10)/10;
  const sLogs=logs.filter(l=>l.sleepHours);const avgSleep=sLogs.length?Math.round((sLogs.reduce((a,l)=>a+l.sleepHours,0)/sLogs.length)*10)/10:0;
  const zLogs=logs.filter(l=>l.zcycle!==undefined);const avgZ=zLogs.length?Math.round(zLogs.reduce((a,l)=>a+l.zcycle,0)/zLogs.length):0;
  const coffee=logs.reduce((a,l)=>a+(l.coffee||0),0);const restDays=logs.filter(l=>l.restDay).length;
  const wonDays=dates.filter(d=>workouts.some(w=>w.date===d)).length;
  const fEvents=foodLogs.filter(f=>dates.includes(f.date)).length;
  const income=ycycle.filter(e=>dates.includes(e.date)&&e.type==='income').reduce((a,e)=>a+e.amount,0);
  const expense=ycycle.filter(e=>dates.includes(e.date)&&e.type==='expense').reduce((a,e)=>a+e.amount,0);
  return(
    <div style={{padding:14}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}><h2 style={{...S.h2,margin:0}}>Intel — Weekly</h2><div style={{display:'flex',gap:5}}><button onClick={()=>setOffset(o=>o-1)} style={{...S.btnG,padding:'7px 12px'}}>‹</button>{offset<0&&<button onClick={()=>setOffset(0)} style={{...S.btnG,padding:'7px 10px',fontSize:11}}>Now</button>}<button onClick={()=>setOffset(o=>Math.min(0,o+1))} style={{...S.btnG,padding:'7px 12px'}} disabled={offset===0}>›</button></div></div>
      <div style={{color:T.muted,fontSize:11,marginBottom:12}}>{fmt(dates[0])} — {fmt(dates[6])}</div>
      <div style={{...S.card,border:`1px solid ${intel.color}66`,overflow:'hidden',padding:0}}>
        <img src={intel.img} alt={intel.status} style={{width:'100%',display:'block',maxHeight:260,objectFit:'cover'}}/>
        <div style={{padding:12}}>
          <div style={{color:intel.color,fontFamily:"'Cinzel',serif",fontSize:18,fontWeight:700,letterSpacing:1,textTransform:'uppercase'}}>{intel.status}</div>
          <div style={{color:T.text,fontSize:13,marginTop:4}}>Weekly Victory Score: <b style={{color:intel.color}}>{intel.score}%</b></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginTop:10}}>
            <div style={{color:'#2d8a3e',fontSize:12}}>Battles Won: {intel.battleWins}</div>
            <div style={{color:T.crimson,fontSize:12}}>Battles Lost: {intel.battleLosses}</div>
            <div style={{color:'#2d8a3e',fontSize:12}}>Campaign Victories: {intel.campaignVictories}</div>
            <div style={{color:T.crimson,fontSize:12}}>Campaign Failures: {intel.campaignFailures}</div>
          </div>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:10}}>
        {[[`${wonDays}/${7-restDays}`,'Battles',T.gold],[`${avgWater}L`,'Avg Water','#4a9edd'],[`${avgSleep}h`,'Avg Sleep','#7a7add'],[`${avgZ>0?'+':''}${avgZ}%`,'Avg Z','#aa7add'],[`${coffee}`,'Coffee','#c97a2a'],[`${fEvents}`,'Food Events',fEvents>3?T.crimson:T.muted],[income.toLocaleString(),'Income','#2d8a3e'],[expense.toLocaleString(),'Expense',T.crimson],[`${restDays}`,'No Battles','#4a8aaa']].map(([v,l,c])=><div key={l} style={{...S.card,marginBottom:0,textAlign:'center',padding:10}}><div style={{color:c,fontSize:16,fontWeight:700}}>{v}</div><div style={{color:T.muted,fontSize:8,textTransform:'uppercase',letterSpacing:.5,marginTop:2}}>{l}</div></div>)}
      </div>
      <div style={S.card}><div style={S.h3}>Daily Breakdown</div>{dates.map(d=>{const l=dailyLogs[d]||{},won=workouts.some(w=>w.date===d);return<div key={d} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:`1px solid ${T.border}`}}><span style={{color:T.muted,fontSize:10,width:48}}>{new Date(d+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric'})}</span><span style={{color:won?'#2d8a3e':l.restDay?'#4a8aaa':T.crimson,fontSize:10,width:50}}>{won?'⚔ Won':l.restDay?'🛡 Rest':'— Miss'}</span><span style={{color:'#4a9edd',fontSize:10}}>{l.water||0}L</span><span style={{color:'#7a7add',fontSize:10}}>{l.sleepHours||'—'}h</span><span style={{color:'#aa7add',fontSize:10}}>{l.zcycle!==undefined?`${l.zcycle>0?'+':''}${l.zcycle}%`:'—'}</span><span style={{color:l.weight?T.gold:T.dim,fontSize:10}}>{l.weight?`${l.weight}kg`:'—'}</span></div>;})}</div>
    </div>
  );
};

const RoyalAcademy=({disciplines,setDisciplines,sessions,setSessions})=>{
  const [newDisc,setNewDisc]=useState('');
  const [newColor,setNewColor]=useState('#c9a227');
  const [selDisc,setSelDisc]=useState(null);
  const [mins,setMins]=useState('');
  const [notes,setNotes]=useState('');
  const [sessDate,setSessDate]=useState(today());
  const [viewMonth,setViewMonth]=useState(new Date());
  const [editId,setEditId]=useState(null);

  const addDisc=()=>{if(!newDisc.trim())return;const u=[...disciplines,{id:Date.now(),name:newDisc,color:newColor}];setDisciplines(u);db.set('academy_disciplines',u);setNewDisc('');};
  const delDisc=id=>{const u=disciplines.filter(d=>d.id!==id);setDisciplines(u);db.set('academy_disciplines',u);};
  const getDisc=id=>disciplines.find(d=>String(d.id)===String(id));
  const fmtMins=n=>n>=60?`${Math.floor(n/60)}h${n%60?` ${n%60}m`:''}`:n>0?`${n}m`:'—';

  const resetForm=()=>{setSelDisc(null);setMins('');setNotes('');setEditId(null);};
  const addSession=()=>{
    const cleanMinutes=parseInt(String(mins).replace(/[^0-9]/g,''),10);
    const cleanDate=sessDate||today();
    if(!String(selDisc||'').trim())return alert('Choose an academy discipline first.');
    if(!cleanMinutes||cleanMinutes<1)return alert('Enter minutes studied.');
    if(editId){
      const u=sessions.map(s=>s.id===editId?{...s,date:cleanDate,disciplineId:Number(selDisc),minutes:cleanMinutes,notes:(notes||'').trim()}:s);
      setSessions(u);db.set('academy_sessions',u);
    }else{
      const u=[{id:Date.now(),date:cleanDate,disciplineId:Number(selDisc),minutes:cleanMinutes,notes:(notes||'').trim()},...sessions];
      setSessions(u);db.set('academy_sessions',u);
    }
    resetForm();
  };
  const delSession=id=>{const u=sessions.filter(s=>s.id!==id);setSessions(u);db.set('academy_sessions',u);};
  const startEdit=s=>{setEditId(s.id);setSessDate(s.date);setSelDisc(s.disciplineId);setMins(String(s.minutes));setNotes(s.notes||'');};

  const y=viewMonth.getFullYear(),m=viewMonth.getMonth();
  const thisMonth=`${y}-${String(m+1).padStart(2,'0')}`;
  const monthSess=sessions.filter(s=>s.date.startsWith(thisMonth));
  const totalMins=monthSess.reduce((a,s)=>a+s.minutes,0);
  const activeDays=new Set(monthSess.map(s=>s.date)).size;
  const firstDay=new Date(y,m,1).getDay(),daysInMonth=new Date(y,m+1,0).getDate();
  const cells=[...Array(firstDay).fill(null),...Array.from({length:daysInMonth},(_,i)=>i+1)];
  const sessForDay=day=>{const key=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;return sessions.filter(s=>s.date===key);};
  const selectedSessions=sessions.filter(s=>s.date===sessDate);

  return(
    <div style={{padding:14}}>
      <h2 style={S.h2}>Royal Academy</h2>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:10}}>
        {[[disciplines.length,'Disciplines',T.gold],[fmtMins(totalMins),'This Month','#7a7add'],[activeDays,'Active Days','#2d8a3e']].map(([v,l,c])=><div key={l} style={{...S.card,marginBottom:0,textAlign:'center',padding:10,borderTop:`2px solid ${c}44`}}><div style={{color:c,fontSize:17,fontWeight:700,fontFamily:"'Cinzel',serif"}}>{v}</div><div style={{color:T.muted,fontSize:8,textTransform:'uppercase',letterSpacing:.5,marginTop:2}}>{l}</div></div>)}
      </div>

      <div style={S.card}>
        <div style={S.h3}>Academy Calendar</div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <button type="button" onClick={()=>setViewMonth(new Date(y,m-1))} style={{...S.btnG,padding:'7px 14px',minHeight:38}}>‹</button>
          <span style={{color:T.gold,fontFamily:"'Cinzel',serif",fontSize:13}}>{viewMonth.toLocaleDateString('en-GB',{month:'long',year:'numeric'})}</span>
          <button type="button" onClick={()=>setViewMonth(new Date(y,m+1))} style={{...S.btnG,padding:'7px 14px',minHeight:38}}>›</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}}>
          {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=><div key={d} style={{color:T.dim,fontSize:9,textAlign:'center',paddingBottom:4}}>{d}</div>)}
          {cells.map((day,i)=>{if(!day)return<div key={i}/>;const key=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;const ds=sessForDay(day);return<button type="button" key={i} onClick={()=>setSessDate(key)} style={{background:key===sessDate?T.goldDim:ds.length>0?'#0a0a2a':T.card,borderRadius:5,padding:'3px 1px',textAlign:'center',border:`1px solid ${key===sessDate?T.gold:T.border}`,minHeight:38,fontFamily:'inherit'}}><div style={{color:key===sessDate?T.gold:T.muted,fontSize:10}}>{day}</div><div style={{display:'flex',gap:1,justifyContent:'center',flexWrap:'wrap',marginTop:1}}>{ds.slice(0,4).map(s=>{const d=getDisc(s.disciplineId);return<div key={s.id} style={{width:5,height:5,borderRadius:'50%',background:d?.color||T.gold}}/>;})}</div></button>;})}
        </div>
      </div>

      <div style={S.card}>
        <div style={S.h3}>{editId?'Edit':'Log'} Study Session — {fmt(sessDate)}</div>
        {disciplines.length===0?<div style={{color:T.muted,fontSize:12}}>Enrol a discipline below to begin logging sessions.</div>:<>
          <label style={S.lbl}>Select Discipline</label>
          <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:10}}>{disciplines.map(d=><Chip key={d.id} label={d.name} active={String(selDisc)===String(d.id)} color={d.color} onClick={()=>setSelDisc(d.id)} sm/>)}</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
            <div><label style={S.lbl}>Duration (mins)</label><input type="text" inputMode="numeric" pattern="[0-9]*" placeholder="e.g. 45" style={S.inp} value={mins} onChange={e=>setMins(e.target.value.replace(/[^0-9]/g,''))}/></div>
            <div><label style={S.lbl}>Date / Backdate</label><input type="date" style={S.inp} value={sessDate} onChange={e=>setSessDate(e.target.value)}/></div>
          </div>
          <textarea placeholder="Scholar's notes (optional)" style={{...S.inp,height:60,resize:'vertical',marginBottom:8}} value={notes} onChange={e=>setNotes(e.target.value)}/>
          <button type="button" onClick={addSession} style={{...S.btn,width:'100%'}}>{editId?'Update Session':'Log Session'}</button>
          {editId&&<button type="button" onClick={resetForm} style={{...S.btnG,width:'100%',marginTop:8}}>Cancel Edit</button>}
        </>}
      </div>

      <div style={S.card}>
        <div style={S.h3}>Entries on {fmt(sessDate)}</div>
        {selectedSessions.map(s=>{const disc=getDisc(s.disciplineId);return<div key={s.id} style={{padding:'7px 0',borderBottom:`1px solid ${T.border}`}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}><div style={{flex:1}}><div style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:8,height:8,borderRadius:'50%',background:disc?.color||T.gold,flexShrink:0}}/><span style={{color:T.text,fontSize:13}}>{disc?.name||'Unknown'}</span></div><div style={{color:T.muted,fontSize:10,marginTop:2,paddingLeft:14}}>{fmtMins(s.minutes)}{s.notes&&` · ${s.notes}`}</div></div><button type="button" onClick={()=>startEdit(s)} style={{...S.btnG,padding:'3px 9px',fontSize:11,minHeight:32}}>Edit</button><button type="button" onClick={()=>delSession(s.id)} style={{...S.btnD,padding:'3px 9px',fontSize:11,minHeight:32}}>Del</button></div></div>;})}
        {!selectedSessions.length&&<div style={{color:T.muted,fontSize:12}}>No sessions on this date.</div>}
      </div>

      <div style={S.card}>
        <div style={S.h3}>Recent Sessions</div>
        {sessions.slice().reverse().slice(0,15).map(s=>{const disc=getDisc(s.disciplineId);return<div key={s.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:`1px solid ${T.border}`}}><div style={{flex:1}}><div style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:8,height:8,borderRadius:'50%',background:disc?.color||T.gold,flexShrink:0}}/><span style={{color:T.text,fontSize:13}}>{disc?.name||'Unknown'}</span></div><div style={{color:T.muted,fontSize:10,marginTop:2,paddingLeft:14}}>{fmt(s.date)} · {fmtMins(s.minutes)}{s.notes&&` · ${s.notes}`}</div></div><button type="button" onClick={()=>delSession(s.id)} style={{background:'none',border:'none',color:T.muted,cursor:'pointer',fontSize:20}}>×</button></div>;})}
        {!sessions.length&&<div style={{color:T.muted,fontSize:12}}>No sessions logged yet. Begin your studies.</div>}
      </div>

      <div style={S.card}>
        <div style={S.h3}>Enrol Disciplines</div>
        <div style={{display:'flex',gap:8,marginBottom:10}}>
          <input placeholder="Discipline name..." style={{...S.inp,flex:1}} value={newDisc} onChange={e=>setNewDisc(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addDisc()}/>
          <input type="color" value={newColor} onChange={e=>setNewColor(e.target.value)} style={{width:46,height:46,border:`1px solid ${T.border}`,borderRadius:8,background:T.input,cursor:'pointer',padding:3,flexShrink:0}}/>
          <button type="button" onClick={addDisc} style={{...S.btn,padding:'11px 14px'}}>Enrol</button>
        </div>
        {disciplines.map(d=><div key={d.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:`1px solid ${T.border}`}}><div style={{display:'flex',alignItems:'center',gap:8}}><div style={{width:12,height:12,borderRadius:'50%',background:d.color}}/><span style={{color:T.text,fontSize:13}}>{d.name}</span><span style={{color:T.muted,fontSize:10}}>{fmtMins(sessions.filter(s=>s.disciplineId===d.id).reduce((a,s)=>a+s.minutes,0))} total</span></div><button type="button" onClick={()=>delDisc(d.id)} style={{background:'none',border:'none',color:T.muted,cursor:'pointer',fontSize:20}}>×</button></div>)}
        {!disciplines.length&&<div style={{color:T.muted,fontSize:12}}>No disciplines enrolled yet.</div>}
      </div>
    </div>
  );
};



const daysSince=(date)=>{if(!date)return 9999;const a=new Date(date+'T12:00:00'),b=new Date(today()+'T12:00:00');return Math.max(0,Math.floor((b-a)/86400000));};
const pctBar=(pct,color=T.gold)=><div style={{background:T.border,borderRadius:4,height:5,marginTop:6}}><div style={{background:color,width:`${Math.max(0,Math.min(100,pct))}%`,height:5,borderRadius:4}}/></div>;

const ImperialHighWitch=({meds,setMeds,medLog,setMedLog})=>{
  const blank=()=>({name:'',dose:'',time:'08:00',instructions:'',intervalDays:1,active:true});
  const [form,setForm]=useState(blank());
  const [editId,setEditId]=useState(null);
  const td=today();
  const taken=(medLog[td]||{});
  const lastTaken=(id)=>{const keys=Object.keys(medLog||{}).sort().reverse();return keys.find(k=>medLog[k]&&medLog[k][id]);};
  const activeMeds=meds.filter(m=>m.active!==false).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const save=()=>{
    if(!form.name.trim())return alert('Name the potion first.');
    const clean={...form,name:form.name.trim(),intervalDays:Math.max(1,Number(form.intervalDays)||1)};
    if(editId){const u=meds.map(m=>m.id===editId?{...m,...clean}:m);setMeds(u);db.set('meds',u);}else{const u=[...meds,{...clean,id:Date.now(),createdAt:new Date().toISOString()}];setMeds(u);db.set('meds',u);}
    setForm(blank());setEditId(null);
  };
  const del=id=>{const u=meds.filter(m=>m.id!==id);setMeds(u);db.set('meds',u);};
  const edit=m=>{setForm({...blank(),...m,intervalDays:m.intervalDays||1});setEditId(m.id);};
  const toggleTaken=id=>{const day={...(medLog[td]||{})};day[id]=!day[id];const u={...medLog,[td]:day};setMedLog(u);db.set('med_log',u);};
  const dueInfo=m=>{const interval=Math.max(1,Number(m.intervalDays)||1);const last=lastTaken(m.id);const elapsed=last?daysSince(last):interval;const daysLeft=Math.max(0,interval-elapsed);return{interval,last,elapsed,daysLeft,due:daysLeft===0,pct:Math.min(100,(elapsed/interval)*100)};};
  const dueMeds=activeMeds.filter(m=>dueInfo(m).due || taken[m.id]);
  const done=dueMeds.filter(m=>taken[m.id]).length;
  return(
    <div style={{padding:14}}>
      <h2 style={S.h2}>Imperial High Witch</h2>
      <div style={{...S.card,textAlign:'center'}}>
        <div style={{color:T.gold,fontSize:34,fontWeight:700,fontFamily:"'Cinzel',serif"}}>{done}/{dueMeds.length}</div>
        <div style={{color:T.muted,fontSize:9,letterSpacing:1,textTransform:'uppercase'}}>Potions Due Today</div>
      </div>
      <div style={S.card}>
        <div style={S.h3}>Today's Potions</div>
        {activeMeds.map(m=>{const info=dueInfo(m);return(
          <div key={m.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:`1px solid ${T.border}`,opacity:info.due||taken[m.id]?1:.62}}>
            <button type="button" onClick={()=>toggleTaken(m.id)} style={{background:'none',border:`2px solid ${taken[m.id]?'#2d8a3e':T.border}`,borderRadius:5,width:28,height:28,cursor:'pointer',color:'#2d8a3e',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0}}>{taken[m.id]?'✓':''}</button>
            <div style={{flex:1}}><div style={{color:T.text,fontSize:14,fontWeight:700}}>{m.name}</div><div style={{color:T.gold,fontSize:12}}>{m.time||'—'} {m.dose?`· ${m.dose}`:''} · every {info.interval}d</div>{m.instructions&&<div style={{color:T.muted,fontSize:12,marginTop:3,lineHeight:1.4}}>{m.instructions}</div>}<div style={{color:info.due?T.gold:T.muted,fontSize:10,marginTop:4}}>{info.due?'Due now':`${info.daysLeft}d until next intake`}</div>{pctBar(info.pct,info.due?T.gold:'#2d8a3e')}</div>
          </div>);})}
        {!activeMeds.length&&<div style={{color:T.muted,fontSize:12}}>No potions scheduled.</div>}
      </div>
      <div style={S.card}>
        <div style={S.h3}>{editId?'Edit Potion':'Add Potion'}</div>
        <input placeholder="Potion name *" style={{...S.inp,marginBottom:8}} value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}><div><label style={S.lbl}>Time</label><input type="time" style={S.inp} value={safeTime(form.time)||'08:00'} onChange={e=>setForm(f=>({...f,time:e.target.value}))}/></div><div><label style={S.lbl}>Dose</label><input placeholder="e.g. 1 vial" style={S.inp} value={form.dose} onChange={e=>setForm(f=>({...f,dose:e.target.value}))}/></div></div>
        <div style={{marginBottom:8}}><label style={S.lbl}>Every N days</label><input type="number" min="1" style={S.inp} value={form.intervalDays||1} onChange={e=>setForm(f=>({...f,intervalDays:e.target.value}))}/></div>
        <textarea placeholder="When/how to take it..." style={{...S.inp,height:70,resize:'vertical',marginBottom:8}} value={form.instructions} onChange={e=>setForm(f=>({...f,instructions:e.target.value}))}/>
        <div style={{display:'flex',gap:8,marginBottom:8}}><button type="button" onClick={()=>setForm(f=>({...f,active:true}))} style={{...(form.active!==false?S.btn:S.btnO),flex:1}}>Active</button><button type="button" onClick={()=>setForm(f=>({...f,active:false}))} style={{...(form.active===false?S.btnD:S.btnO),flex:1}}>Paused</button></div>
        <button type="button" onClick={save} style={{...S.btn,width:'100%'}}>{editId?'Update Potion':'Add Potion'}</button>{editId&&<button type="button" onClick={()=>{setEditId(null);setForm(blank());}} style={{...S.btnG,width:'100%',marginTop:8}}>Cancel</button>}
      </div>
      <div style={S.card}><div style={S.h3}>Potion List</div>{meds.map(m=>{const info=dueInfo(m);return <div key={m.id} style={{padding:'8px 0',borderBottom:`1px solid ${T.border}`}}><div style={{display:'flex',justifyContent:'space-between',gap:8}}><div style={{flex:1}}><div style={{color:m.active===false?T.muted:T.text,fontSize:14,fontWeight:700}}>{m.name}</div><div style={{color:T.muted,fontSize:11}}>{m.time||'—'} {m.dose?`· ${m.dose}`:''} · every {info.interval}d {m.active===false?'· Paused':''}</div></div><button type="button" onClick={()=>edit(m)} style={{...S.btnG,padding:'4px 10px',fontSize:11,minHeight:32}}>Edit</button><button type="button" onClick={()=>del(m.id)} style={{...S.btnD,padding:'4px 10px',fontSize:11,minHeight:32}}>Del</button></div></div>;})}{!meds.length&&<div style={{color:T.muted,fontSize:12}}>No potion entries yet.</div>}</div>
    </div>
  );
};

const RitualsPage=({rituals,setRituals,ritualLog,setRitualLog})=>{

  const save=()=>{if(!form.name.trim())return alert('Name the ritual first.');const clean={...form,name:form.name.trim(),intervalDays:Math.max(1,Number(form.intervalDays)||1)};const u=editId?rituals.map(r=>r.id===editId?{...r,...clean}:r):[...rituals,{...clean,id:Date.now(),createdAt:new Date().toISOString()}];setRituals(u);db.set('rituals',u);setForm(blank());setEditId(null);};

'100%'}}>{editId?'Update Ritual':'Add Ritual'}</button>{editId&&<button onClick={()=>{setEditId(null);setForm(blank());}} style={{...S.btnG,width:'100%',marginTop:8}}>Cancel</button>}</div><div style={S.card}><div style={S.h3}>Ritual List</div>{rituals.map(r=><div key={r.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:`1px solid ${T.border}`}}><div><div style={{color:r.active===false?T.muted:T.text,fontSize:14,fontWeight:700}}>{r.name}</div><div style={{color:T.muted,fontSize:11}}>Every {r.intervalDays||1}d {r.active===false?'· Paused':''}</div></div><div style={{display:'flex',gap:6}}><button onClick={()=>edit(r)} style={{...S.btnG,padding:'4px 10px',minHeight:32}}>Edit</button><button onClick={()=>del(r.id)} style={{...S.btnD,padding:'4px 10px',minHeight:32}}>Del</button></div></div>)}{!rituals.length&&<div style={{color:T.muted,fontSize:12}}>No rituals created yet.</div>}</div></div>;
};

const ExpeditionsPage=({expeditions,setExpeditions})=>{
  const blank=()=>({name:'',startDate:today(),endDate:today(),goals:'',actions:'',accomplishments:'',status:'active'});
