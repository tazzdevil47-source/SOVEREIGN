const imageToSmallBase64=(file,maxW=800,quality=.55)=>new Promise((resolve,reject)=>{
  const img=new Image();
  const reader=new FileReader();
  reader.onload=()=>{
    img.onload=()=>{
      const scale=Math.min(1,maxW/img.width);
      const canvas=document.createElement('canvas');
      canvas.width=Math.round(img.width*scale);
      canvas.height=Math.round(img.height*scale);
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      resolve(canvas.toDataURL('image/jpeg',quality));
    };
    img.onerror=reject;
    img.src=reader.result;
  };
  reader.onerror=reject;
  reader.readAsDataURL(file);
});

const getWeekDates=(off,weekStart='sunday')=>{
  const d=new Date(),day=d.getDay();
  const dayMap={sunday:0,monday:1,tuesday:2,wednesday:3,thursday:4,friday:5,saturday:6};
  const startIndex=dayMap[weekStart]??0;
  const start=new Date(d);
  const diff=(day-startIndex+7)%7;
  start.setDate(d.getDate()-diff+(off*7));
  return Array.from({length:7},(_,i)=>{const x=new Date(start);x.setDate(start.getDate()+i);return x.toISOString().split('T')[0];});
};

const closeExpiredDailyMissions=(log)=>{
  const td=today();
  let changed=false;
  const next={...(log||{})};
  Object.keys(next).forEach(date=>{
    if(date<td && next[date] && !next[date].outcome){
      next[date]={...next[date],outcome:'lost',autoExpired:true,expiredAt:new Date().toISOString()};
      changed=true;
    }
  });
  return changed?next:log;
};

const getIntelTier=score=>{
  if(score>=91)return{status:'Golden Reign',img:'./images/intel/91.jpg',color:'#8bdc4a'};

  if(score>=11)return{status:'Fallen Kingdom',img:'./images/intel/11.jpg',color:'#ff4a3d'};
  return{status:'Kingdom in Shambles',img:'./images/intel/0.jpg',color:'#ff3b30'};
};
const calcWeeklyIntel=(dates,challengeLog,campaigns)=>{
  const battleWins=dates.filter(d=>(challengeLog[d]||{}).outcome==='won').length;
  const battleLosses=dates.filter(d=>(challengeLog[d]||{}).outcome==='lost').length;
  const campaignVictories=campaigns.filter(c=>dates.includes((c.completedDate||c.endDate||'').slice(0,10))&&(c.status==='completed'||c.status==='victory')).length;
  const campaignFailures=campaigns.filter(c=>dates.includes((c.failedDate||c.endDate||'').slice(0,10))&&c.status==='failed').length;
  const wins=battleWins+campaignVictories;
  const losses=battleLosses+campaignFailures;
  const total=wins+losses;
  const score=total?Math.round((wins/total)*100):50;
  return{score,...getIntelTier(score),battleWins,battleLosses,campaignVictories,campaignFailures,wins,losses,total};
};
const getRandomDailyThreat=(date,currentEntry)=>{
  if(currentEntry?.threatId){
    return THREATS.find(t=>t.id===currentEntry.threatId)||THREATS[0];
  }
  let used=[];
  try{used=JSON.parse(localStorage.getItem('sovereign_used_threats')||'[]');}catch{used=[];}
  if(used.length>=THREATS.length)used=[];
  const available=THREATS.filter(t=>!used.includes(t.id));
  const pick=available[Math.floor(Math.random()*available.length)]||THREATS[Math.floor(Math.random()*THREATS.length)];
  used.push(pick.id);
  localStorage.setItem('sovereign_used_threats',JSON.stringify(used));
  return pick;
};

const hashSeal=async text=>{
  const str=String(text||'');
  if(window.crypto&&crypto.subtle&&window.TextEncoder){
    const data=new TextEncoder().encode(str);
    const hash=await crypto.subtle.digest('SHA-256',data);
    return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  let h1=0x811c9dc5,h2=0x01000193;
  for(let i=0;i<str.length;i++){
    h1^=str.charCodeAt(i);
    h1=Math.imul(h1,16777619);
    h2=Math.imul(h2^str.charCodeAt(i),2166136261);
  }
  return 'fallback-'+((h1>>>0).toString(16))+((h2>>>0).toString(16));
};

endary three-day battle recorded as the greatest achievement in imperial history.",lose:"Malgorath takes the palace as his lair. The Emperor is exiled. The empire fractures — three lords declare independence."},{id:11,type:'Dragon',name:'Raxthar the Twin-Headed',threat:"Raxthar besieges Port Halveth, one head watching each gate. No ship enters or leaves. The port's food runs out in five days.",win:"One head is poisoned, driving Raxthar into a maddened frenzy. He is steered into the sea and drowns.",lose:"Port Halveth starves. Admiral Reth surrenders. Raxthar makes the harbour his permanent roost."},{id:12,type:'Dragon',name:'Virenth the Plague Drake',threat:"Virenth spreads a flesh-rotting sickness through his breath. Every soldier within 200 metres becomes infected within hours.",win:"Virenth is brought down by ballista from outside his breath range. His plague dies with him.",lose:"The plague spreads to the capital. Defence Minister Aldric dies of infection. 40,000 civilians quarantined."},{id:13,type:'Dragon',name:'Corvanax the Golden Deceiver',threat:"Corvanax visits the nobility in human form, offering immortality and wealth. Four lords have already pledged loyalty to him.",win:"Corvanax's human disguise is exposed and he is shot down. The four corrupted lords are arrested and tried.",lose:"Corvanax controls eight lords, two generals, and the treasury council. Civil war is inevitable."},{id:14,type:'Dragon',name:'Sorveth the Night Terror',threat:"Sorveth hunts exclusively at night. Two hundred soldiers found dead at their posts — burned from behind. She vanishes before dawn.",win:"Sorveth is caught in a sunlight trap and blinded. She crashes and is slain. Night patrols resume.",lose:"Sorveth kills the night-watch commander. No soldier will stand night patrol. Two supply convoys are raided."},{id:15,type:'Dragon',name:'Hexathar the Bone Wyrm',threat:"Vigil the Necromancer has raised Hexathar — a long-dead ancient dragon — as an undead weapon. Steel and fire do nothing against him.",win:"Vigil's phylactery is smashed, breaking his control. Hexathar collapses mid-flight and shatters across the southern fields.",lose:"Hexathar tears the southern gate from its hinges. Vigil rides the undead dragon into the capital square."},{id:16,type:'Undead',name:'Vigil the Necromancer',threat:"Vigil has raised 10,000 of your own fallen soldiers who now march against you. They remember every fortification. He watches from a floating black tower.",win:"Vigil is defeated and his phylactery destroyed. The undead collapse in unison. Vigil is imprisoned in a cell of living flame.",lose:"Vigil's horde breaches the capital. He murders half the population to grow his army. Defence Minister Aldric is raised as his personal champion."},{id:17,type:'Undead',name:'The Lich Queen Morreva',threat:"The Lich Queen Morreva has awakened beneath the oldest cathedral. She considers all living rule an insult to her eternal reign.",win:"Morreva's phylactery — hidden inside the cathedral's altar — is found and destroyed. She screams for six minutes as she dissolves.",lose:"Morreva takes control of the cathedral. She declares herself Eternal Empress. Sir Davos is slain attempting to reach her chamber."},{id:18,type:'Undead',name:'Baron Ashveil and his Wraith Legion',threat:"3,000 wraiths pass through walls and armour alike. Steel does nothing. They have already passed through the outer wall and killed 40 soldiers.",win:"Ashveil is banished using a ritual of sacred light. His Wraith Legion dissolves instantly.",lose:"The Wraith Legion occupies the barracks. Ashveil possesses the court wizard, who burns the imperial library."},{id:19,type:'Undead',name:'Korroth the Death Knight',threat:"Korroth — once the empire's greatest paladin — commands 500 skeletal riders. He knows every imperial battle tactic from the inside.",win:"Korroth is unhorsed and his cursed armour shattered. The paladin within is briefly freed — he thanks the Emperor before fading.",lose:"Korroth's cavalry slaughters the imperial mounted regiment. Captain Reth is killed. The horses refuse to be ridden for weeks."},{id:20,type:'Undead',name:'The Risen Plague Walkers',threat:"Plague Walkers march from the eastern cemetery. Anyone they touch dies within an hour and rises to join the horde. It doubles every six hours.",win:"The Plague Walkers are contained by fire before reaching the city. The eastern cemetery is salted and blessed.",lose:"The Plague Walkers breach the lower city. 400 citizens rise within an hour. 3,000 living souls are trapped inside."},{id:21,type:'Undead',name:'Xereth the Soul Collector',threat:"Xereth passes unseen through the barracks each night harvesting sleeping soldiers' souls. They wake physically unharmed but hollow — unable to fight or speak. 300 are already soulless.",win:"Xereth is trapped inside a soul-mirror and shattered. All 300 stolen souls return. The soldiers wake gasping.",lose:"1,000 soldiers are soulless. Xereth takes General Morvaine's soul — the general walks into the enemy camp and opens the gate."},{id:22,type:'Undead',name:'The Bone Throne of Soromar',threat:"10,000 ancient soldiers from an empire that predates yours have awakened. The Bone Throne floats above them directing the assault. It remembers only war.",win:"The Bone Throne is shattered by siege weapons. Without direction, the skeleton army collapses into loose bones.",lose:"The Bone Throne breaches the palace gate and sits upon the Emperor's throne. The throne room is destroyed."},{id:23,type:'Undead',name:'Duskvar the Revenant',threat:"General Duskvar — executed wrongly for treason twenty years ago — has returned as a revenant. He seeks only the Defence Minister who signed his death warrant.",win:"The injustice is formally acknowledged. Duskvar's name is cleared by royal decree. He fades peacefully.",lose:"Duskvar tears Defence Minister Aldric apart with his bare hands then kills 80 guards before dawn."},{id:24,type:'Undead',name:'The Hollow Court',threat:"The entire eastern noble district was murdered in their sleep and risen as undead aristocrats who continue to attend functions and sign false decrees.",win:"The Hollow Court is identified and purged in a single night operation. Real noble families fill the vacant titles.",lose:"The Hollow Court passes three false edicts diverting funds from the army. Two real lords are framed and arrested."},{id:25,type:'Undead',name:'Morthaxa the Wailing Witch',threat:"Morthaxa has taken residence in the city's bell tower. Her scream kills anyone within 400 metres instantly three times per day. The district stands empty.",win:"Morthaxa's true name is spoken beneath her tower, binding her voice. She shrieks in silence forever, imprisoned in the bell.",lose:"Morthaxa expands her range. Three members of the Emperor's council are found dead at their desks."},{id:26,type:'Undead',name:'The Crypt Legion',threat:"10,000 corpse soldiers sealed beneath the city's founding stone have been accidentally released during construction work. They march through the sewers in perfect silence.",win:"The Legion is met underground with fire. They are driven back into the crypts, sealed with iron and blessed stone.",lose:"The Crypt Legion emerges in the market district at dawn. 600 civilians killed. The founding stone is never repaired."},{id:27,type:'Undead',name:'Aethon the Pale Rider',threat:"Aethon — a skeletal horseman faster than any living horse — has poisoned every well, cistern, and water source within the city walls. Hours of clean water remain.",win:"Aethon is unhorsed by the cavalry regiment and his bones scattered to the four winds. The wells are purified.",lose:"The capital runs dry. Riots begin by afternoon. Defence Minister Aldric is found dead on the road the next morning."},{id:28,type:'Undead',name:'The Banshee of Valdross',threat:"The Banshee wails through the city every midnight. Her cry drives soldiers slowly mad. After three nights, 200 have deserted or turned violent.",win:"The Banshee's anchor — a locket belonging to her murdered daughter — is found and returned to her. She weeps once and disperses.",lose:"After seven nights, 800 soldiers are combat-ineffective. Three have killed fellow soldiers. Morale collapses entirely."},{id:29,type:'Undead',name:'Necros the Unliving King',threat:"Necros produces ancient documents proving he ruled this land 600 years ago — making his throne claim legally valid. He arrives with 5,000 undead soldiers and a lawyer.",win:"The legal challenge is defeated in court. Necros's claim is nullified. He attempts to take it by force and is destroyed.",lose:"The court rules in Necros's favour for six hours. He is expelled by force but the legal precedent lets three lords challenge the Emperor's legitimacy."},{id:30,type:'Undead',name:'The Shadow Priests of the Void',threat:"The Shadow Priests have exhumed Emperor Valdren the Mad and are mid-ritual to resurrect him. The ritual completes at midnight.",win:"The ritual is interrupted. Valdren the Mad is re-killed before fully waking. The Shadow Priests are captured.",lose:"Valdren the Mad returns. He executes six current ministers for incompetence. A 48-hour reign of terror leaves 200 dead."},{id:31,type:'Plague',name:'The Rovan Plague',threat:"The Rovan Plague has reached the capital via infected grain. Flesh rots within 48 hours of exposure. Three barracks are already infected.",win:"The Rovan Plague is contained through quarantine. A cure is found in an old physician's notes. All infected soldiers recover.",lose:"The Rovan Plague spreads to the general population. 8,000 dead in ten days. The empire is internationally quarantined."},{id:32,type:'Plague',name:'The Crimson Fever',threat:"The Crimson Fever spreads through airborne blood — infected soldiers bleed from the eyes and the vapour infects anyone nearby. 40 soldiers lost overnight.",win:"The Crimson Fever is identified as originating from poisoned arrows. The source is traced and destroyed.",lose:"The Crimson Fever reaches the palace staff. The court physician is infected and dies. The Emperor's guard is reduced from 200 to 60."},{id:33,type:'Plague',name:'The Grey Death',threat:"The Grey Death causes soldiers to fall into a deep sleep from which they never wake. 150 are currently sleeping in the eastern barracks. It spreads nightly.",win:"The Grey Death is traced to poisoned incense burned in the barracks. The incense-maker is arrested. All sleeping soldiers wake.",lose:"500 soldiers sleep forever. The eastern barracks becomes a silent dormitory of the dead. The incense-maker is never found."},{id:34,type:'Plague',name:'The Iron Rust',threat:"The Iron Rust corrodes metal from inside — armour crumbles while being worn, weapons snap at the blade. The entire armoury is infected. 3,000 soldiers are unarmoured.",win:"The Iron Rust is neutralised by a salt-and-fire treatment. The armoury is purged and restocked before the enemy learns of it.",lose:"The Bloody Red Army discovers the empire's armament failure and attacks during the vulnerability window. 200 unarmoured soldiers die."},{id:35,type:'Plague',name:'Plague Bearer Theron',threat:"Plague Bearer Theron — a formerly holy priest consumed by disease — wanders the capital blessing the faithful, spreading infection through gesture. 300 infected and he believes he is healing.",win:"Theron is compassionately quarantined. The disease is destroyed. Theron, freed from infection, weeps at what he has done.",lose:"Theron reaches the central temple and blesses the entire congregation at once — 800 infected in a single hour."},{id:36,type:'Plague',name:'The Black Breath Epidemic',threat:"Enemy agents released Virenth the Plague Drake's breath into the water supply. Citizens are mutating — growing scales and losing reason — and attacking their neighbours.",win:"The mutagen is identified and an antidote synthesised. All 400 mutating citizens are returned to human form. The agent is captured.",lose:"80 citizens mutate fully into something inhuman. Three escape into the city. Public panic costs the empire significant political stability."},{id:37,type:'Plague',name:'The Weeping Sickness',threat:"The Weeping Sickness causes permanent blindness after 24 hours — victims weep black tears before sight fails. It has blinded 200 soldiers. It spreads through eye contact.",win:"The Weeping Sickness is cured with a rare extract. All 200 blinded soldiers regain sight.",lose:"600 soldiers are permanently blinded. The archery corps is destroyed entirely. All ranged defence is compromised for months."},{id:38,type:'Plague',name:'The Void Spores',threat:"The Void Spores — a black fungal infection — control their hosts like puppets while appearing fully human. Infected soldiers carry out subtle sabotage. 100 confirmed infected.",win:"A detection ritual identifies all infected soldiers. They are cured using antifungal flame therapy. The sabotage is reversed.",lose:"An infected general destroys the grain stores. Three months of food is gone. The Void Spores are found in the palace kitchen staff."},{id:39,type:'Plague',name:'The Burning Madness',threat:"The Burning Madness is a rage-plague — infected soldiers attack whoever is nearest. Three internal battles have already occurred. Twenty soldiers dead from friendly fire.",win:"The Burning Madness is traced to a specific grain batch. It is destroyed. Infected soldiers are restrained until the madness passes.",lose:"The Burning Madness triggers a full internal battle in the western barracks. 80 soldiers die fighting each other."},{id:40,type:'Plague',name:'The Last Harvest Blight',threat:"The Last Harvest Blight has destroyed every crop within 50 miles of the capital. The imperial food supply will last thirty days. Winter begins in twenty.",win:"Emergency trade routes are established and the Blight's source — a saboteur's buried ritual stone — is found and destroyed.",lose:"The empire faces famine. Two outer provinces declare independence. Riots in the capital kill 40 civilians."},{id:41,type:'Army',name:'The Bloody Red Army',threat:"50,000 berserkers march on the capital with no terms and no mercy. Their war standard is made from the skins of the last three emperors they defeated.",win:"The Bloody Red Army is broken at the Valley of Sorrath. Their warlord is captured and publicly tried. The standard is burned.",lose:"The Bloody Red Army breaches the outer wall. Three districts are sacked. General Halveth is killed holding the second gate."},{id:42,type:'Army',name:'The Iron Veil Alliance',threat:"Three neighbouring kingdoms have unified for the first time in a century expressly to destroy the empire. Their combined army of 80,000 assembles at the border.",win:"The Alliance is fractured diplomatically before battle. One kingdom is bribed, one threatened, one fights alone and loses.",lose:"The Iron Veil pushes through the northern border. Two frontier provinces are occupied. The empire loses 20% of its territory in two weeks."},{id:43,type:'Army',name:'The Shadow Compact',threat:"The Shadow Compact has accepted a contract to eliminate every imperial leader above captain rank within thirty days. Three have already died this week.",win:"The Shadow Compact's contract is bought out by a higher counter-offer. They stand down. Three rogue agents are captured.",lose:"The Shadow Compact kills four ministers, two generals, and Admiral Keth within the month."},{id:44,type:'Army',name:"Jarl Theron's Northern Warhost",threat:"Jarl Theron leads 15,000 northern raiders who breached the coastal fortifications using the frozen sea as a road. Three coastal towns are already ash.",win:"Jarl Theron's fleet is trapped by a southern thaw. His warhost is surrounded and forced to surrender.",lose:"Jarl Theron sacks Port Halveth. Admiral Reth's entire northern squadron is burned at anchor."},{id:45,type:'Army',name:'Lord Valdris and his Steel Legion',threat:"Lord Valdris has deployed forbidden mechanical war machines — steam-powered constructs that feel no pain and never tire — advancing on the eastern gate.",win:"The constructs' fuel lines are sabotaged. They grind to a halt. Lord Valdris is captured and his engineering blueprints confiscated.",lose:"Two constructs breach the eastern gate and rampage through the docklands. Lord Valdris escapes with half his blueprints."},{id:46,type:'Army',name:'The Crimson Brotherhood',threat:"The Crimson Brotherhood has declared the Emperor a heretic and laid siege to the capital with 20,000 faithful who fight without fear of death.",win:"The Brotherhood's High Priest is captured and put on public trial. His rhetoric collapses. Half the Brotherhood lays down arms.",lose:"The Brotherhood holds the eastern gate for six days. Sir Davos the Knight is captured trying to break the siege, held for ransom."},{id:47,type:'Army',name:'The Sand Kings Coalition',threat:"Seven desert kingdoms have blockaded every southern trade road. The empire's silk, spice, and potion imports are cut. The economy begins bleeding immediately.",win:"The Coalition is divided by targeted diplomacy. Three Sand Kings defect for individual trade deals. The blockade dissolves.",lose:"The southern blockade holds for two months. Potion shortages affect three hospitals. Inflation rises 40%."},{id:48,type:'Army',name:'Admiral Keth and the Iron Fleet',threat:"Admiral Keth — the empire's former naval hero, now defected — commands 200 warships blockading every port. Coastal cities have ten days of supplies.",win:"Keth's flagship is sunk in a daring night raid. The Iron Fleet scatters. Keth is captured. He reveals he was blackmailed.",lose:"Coastal cities run out of supplies. Port Halveth opens its gate without a siege. Three cities change flags within the week."},{id:49,type:'Army',name:'The Mercenary King Drogan',threat:"Drogan has been hired by an unknown power and arrives with 30,000 professional soldiers — better equipped than the imperial army. He makes no demands. He simply advances.",win:"Drogan's employers are identified and their payment intercepted. With no gold, Drogan's army dissolves. Half offer to switch sides.",lose:"Drogan's army defeats the western regiment. Captain Halveth surrenders. Drogan claims the western province for his unknown employer."},{id:50,type:'Army',name:"The Eastern Khanate of Bor'ak",threat:"25,000 light cavalry sweep into the empire's agricultural heartland. They do not siege — they burn and move. Three breadbasket provinces are already on fire.",win:"The Khanate cavalry is funnelled into a canyon ambush. 8,000 riders captured. A favourable border treaty is signed.",lose:"The Khanate burns twelve farming villages. Agricultural output falls 30% for the year. General Morvaine is demoted after failing to stop them."},{id:51,type:'Army',name:'Warlord Raxis the Skull Banner',threat:"Warlord Raxis has united every criminal faction into a single army of 18,000. They know the empire's roads better than its own soldiers.",win:"Raxis is betrayed by a rival crime lord bought off by the empire. He is arrested. Without him, the Skull Banner fractures.",lose:"Raxis captures three major road junctions. Trade within the empire halves overnight. The tax collector's regiment is ambushed and destroyed."},{id:52,type:'Army',name:'General Morvaine the Betrayer',threat:"General Morvaine — fourth in imperial command — has defected with full knowledge of every battle plan, fortress weakness, and troop deployment.",win:"Morvaine is captured in a counter-trap using false intelligence he would know is real. He is brought back in chains and publicly stripped of all honours.",lose:"Morvaine leads three perfectly executed ambushes using stolen knowledge. Two forward regiments are annihilated."},{id:53,type:'Army',name:'The Red Sun Cult',threat:"Red Sun Cult suicide soldiers embedded within the capital as civilians are activated. They fight to destroy specific targets. Three have already died killing senior officers.",win:"The Cult's network is identified through a captured member. 80 sleeper agents are arrested before activating.",lose:"Twelve cult members activate simultaneously. The imperial armoury, main bridge, and three barracks storerooms are destroyed."},{id:54,type:'Army',name:'The Phantom Army of Velreth',threat:"The Phantom Army appears and disappears without warning — attacking, withdrawing, and materialising elsewhere. They have hit four locations in six hours and cannot be tracked.",win:"The Phantoms' anchor — a portal stone — is located and destroyed. The army is stranded in the physical world and rapidly defeated.",lose:"The Phantom Army kills 300 soldiers across seven hit-and-run strikes. Soldiers refuse night duty. Two commanders resign."},{id:55,type:'Army',name:'The Siege Masters of Khorath',threat:"The finest engineers on the continent have built a fully operational siege fortress outside the capital's walls in twelve hours. They attack from a stronger position than the empire itself.",win:"The Khorath fortress is undermined and collapsed. The Siege Masters surrender. Three agree to defect and join the imperial engineering corps.",lose:"The Khorath fortress outlasts three counterattacks. From it, they batter the western wall until a 40-metre section collapses."},{id:56,type:'Army',name:'The Black Arrows Guild',threat:"Precision archer-assassins have deployed on every high point surrounding the capital. Every general, minister, or official who appears in public is immediately targeted.",win:"All Black Arrow positions are simultaneously raided. Twenty-two archers captured. The Guild withdraws its contract.",lose:"Three generals are killed in daylight within the first day. All public functions are cancelled. Governance grinds to a halt for two weeks."},{id:57,type:'Army',name:'The Twin Tyrants of Ghal',threat:"Two kings sharing a telepathic link and acting as a single perfect military mind lead 35,000 soldiers. They cannot be surprised, outmanoeuvred, or deceived.",win:"One twin is poisoned, severing the telepathic link. The surviving twin falls apart psychologically and surrenders within hours.",lose:"The Twin Tyrants defeat the imperial field army in a masterpiece of tactics. Captain Halveth is taken prisoner. A siege begins."},{id:58,type:'Army',name:'The Undying Battalion',threat:"5,000 soldiers cursed to feel no pain advance on the gates. Two were seen fighting on with three arrows each. They cannot be frightened or worn down.",win:"The curse is identified and reversed using the enemy sorcerer's own formula. The Battalion collapses — they were hiding catastrophic wounds. They surrender.",lose:"The Battalion takes the gate. The gate is now held by corpses that refused to fall. The empire retreats to the inner wall."},{id:59,type:'Army',name:'The Mountain Clans Uprising',threat:"Forty mountain tribes that have warred for two centuries have unified under a single leader and descend as one force of 22,000. Their unity is unprecedented.",win:"The Clan leader is identified as the only force holding the unity. He is brought to the table. A historic accord is signed.",lose:"The Mountain Clans sack two border fortresses. The unifying leader declares himself King of the Mountains — a new rival power is born."},{id:60,type:'Army',name:"The Sea Witch's Armada",threat:"The Sea Witch Nareth commands 80 ships powered by eternal storms. Her ships cannot be sunk — the storms repair them. They blockade the harbour.",win:"The Sea Witch's storm source — a trident driven into the harbour floor — is recovered by divers and destroyed. The fleet is exposed as ordinary ships.",lose:"The Sea Witch's fleet holds the harbour for three weeks. Two merchant convoys are destroyed. The empire cedes one coastal island in a peace deal."},{id:61,type:'Army',name:'The Burning Host of Kerath',threat:"The Burning Host carries alchemical fire that cannot be extinguished by water. 15,000 soldiers armed with fire-throwers advance on the wooden districts.",win:"The alchemical fire's solvent is identified and deployed in advance. The Burning Host's weapons sputter and die on contact.",lose:"The wooden districts are set ablaze. 6,000 civilians evacuated. The fire burns for two days. Three entire city blocks are destroyed."},{id:62,type:'Army',name:'The Pale Riders of Sorrath',threat:"The Pale Riders move three times faster than any cavalry. In three hours they have hit eleven positions simultaneously across the eastern front.",win:"The Pale Riders' supernatural speed requires a ritual fuel — a specific rare potion. The fuel is embargoed and they slow to normal speed.",lose:"The Pale Riders destroy four supply depots in a single day. The eastern front collapses. Three commanders break under the pressure."},{id:63,type:'Army',name:'The Rebel Alliance of the Red Throne',threat:"Four noble houses, the merchant guild, and a rogue regiment have united to storm the palace. They claim corruption and misrule. They have 8,000 soldiers and the public's sympathy.",win:"The genuine grievances are acknowledged publicly. Three corrupt officials are dismissed. The rebel lords are brought into a reformed council.",lose:"The rebel alliance takes the palace courtyard. The Emperor flees the city for twelve days. Sir Davos holds the inner palace alone with 40 guards."},{id:64,type:'Army',name:"The Exiled Prince Rovan's Return",threat:"Exiled Prince Rovan returns with a foreign army of 28,000 soldiers and a legitimate throne claim backed by three foreign courts. Half the border lords are already wavering.",win:"Prince Rovan's claim is legally defeated in the Council of Lords. The foreign army retreats. The wavering lords are watched carefully.",lose:"Three border lords defect to Rovan. He controls the northwestern quarter. A civil war line is drawn."},{id:65,type:'Army',name:'The Iron Church Inquisition',threat:"The Iron Church has declared a Holy Inquisition against the empire citing seventeen heresies. Their army of 30,000 faithful march under divine mandate. They believe they cannot lose.",win:"A theological debate defeats the Inquisition's case publicly. Three senior church figures defect. The Inquisition loses divine sanction and collapses.",lose:"The Iron Church burns the imperial library — 40,000 texts lost forever. The empire is declared heretical by six allied kingdoms."},{id:66,type:'Monster',name:'The Kraken of the Eastern Sea',threat:"The Kraken — the size of a warship — has destroyed twelve vessels in four days. The entire eastern sea route is closed. The naval base at Port Halveth is under attack now.",win:"The Kraken is lured into shallow water and slain with harpoon batteries. Its oil fuels the harbour lamps for a decade.",lose:"The Kraken destroys Port Halveth naval base entirely. Admiral Reth's flagship goes down with him aboard. The empire has no eastern fleet."},{id:67,type:'Monster',name:'The Colossus of Morrath',threat:"A 100-foot stone giant awakened by sorcery walks slowly but unstoppably toward the capital. It has already flattened two villages. It will reach the walls in twenty hours.",win:"The Colossus's animating rune — carved on the base of its left foot — is destroyed by a daring climber. It freezes mid-stride and becomes a monument.",lose:"The Colossus breaches the northern wall with a single step. It walks through four city blocks. The structural damage is catastrophic."},{id:68,type:'Monster',name:"The Swarm of Vel'thor",threat:"Billions of tiny flesh-eating insects drift toward the capital on the wind. They have stripped three horses to the bone in under a minute. They do not fight. They consume.",win:"The Swarm's hive mind is disrupted by a high-frequency horn discovered in the vaults. The swarm disperses harmlessly. The horn is locked away.",lose:"The Swarm passes through the eastern district. 200 civilians and 40 soldiers are lost before the city seals itself."},{id:69,type:'Monster',name:'The Bone Giants of the Wastes',threat:"Five Bone Giants — ancient magical constructs, each thirty feet tall — emerge from the eastern wastes. They feel nothing and follow a single ancient protocol: destroy.",win:"The Giants' deactivation command is found in ancient texts and spoken aloud. All five freeze simultaneously and become eerie monuments.",lose:"Two Bone Giants tear a fifty-metre wall section down. General Halveth is killed when the wall collapses on the command post."},{id:70,type:'Monster',name:'Gorrax the Troll King',threat:"Gorrax the Troll King has united 10,000 trolls who descend from the mountains in a disorganised but unstoppable wave. Trolls regenerate all wounds. Fire is the only answer.",win:"Gorrax is isolated and killed with directed fire. Without their king, the trolls lose coherence and retreat to their separate mountains.",lose:"The troll wave reaches the outer farms. Villages are flattened. 400 soldiers are injured fighting trolls without fire."},{id:71,type:'Monster',name:'The Leviathan Plague Serpent',threat:"A 200-foot river serpent bloated with disease has entered the River Aldrath. Its very body poisons the water. Downstream cities are already reporting sickness.",win:"The Leviathan is drawn to a tributary and killed using massive harpoon engines. Its body is burned on a raft. The river runs clean within three days.",lose:"The Leviathan reaches the capital's river gate. The water supply is poisoned. 4,000 civilians fall ill. The river is closed for a month."},{id:72,type:'Monster',name:'The Void Wolves of Arkon',threat:"Shadow wolves that cannot be harmed by steel or fire pass through walls. Three have been spotted inside the barracks. Seven soldiers are dead and no one saw how.",win:"The Void Wolves' weakness — sacred salt — is found in an old bestiary. Salt lines are laid throughout the barracks. The Wolves leave for easier prey.",lose:"The Void Wolves kill twelve more soldiers and wound General Reth before being accidentally driven off. Barracks morale is devastated."},{id:73,type:'Monster',name:'The Chimera Brood of Selthas',threat:"Selthas the Breeder has released 500 chimera simultaneously into the surrounding countryside attacking in coordinated groups. The roads to the capital are severed.",win:"Selthas is found and killed, dispersing the brood's coordination. Individual chimera are hunted efficiently. The last one is killed twelve days later.",lose:"The chimera sever all three supply roads. Forty soldiers are killed in road-clearing attempts. Two aerial couriers are killed mid-flight."},{id:74,type:'Monster',name:'Basilisk Queen Essa',threat:"Basilisk Queen Essa leads 200 basilisks toward the gate. Her own gaze can turn a group of ten to stone in a single glance. 80 soldiers are already statues in the eastern field.",win:"Essa is faced with a mirror array. Her own reflected gaze turns her to stone. Her basilisks scatter. A cure for the 80 stone soldiers is eventually found.",lose:"Essa reaches the gate and turns the entire gate guard — 40 soldiers — to stone in one look. The east gate is permanently closed."},{id:75,type:'Monster',name:'The Storm Titans of Velrath',threat:"Four Storm Titans — living tempests in humanoid form — tear apart the outer wall with elemental lightning and wind. They were summoned by a sorcerer and cannot be reasoned with.",win:"The Titans' summoner is found and killed, severing the call. The Titans disperse into ordinary storms. The wall damage is contained.",lose:"Two sections of the outer wall are destroyed. One Titan reaches the market district and tears apart the trading hall. Six people die."},{id:76,type:'Monster',name:'The Deep Crawler of Sorrath',threat:"A vast subterranean creature is tunnelling directly beneath the capital's foundations. Tremors grow hourly. The central plaza could collapse within the day.",win:"The Deep Crawler is redirected by vibration rings — its only fear. It burrows away. Its tunnel is sealed and the foundation reinforced.",lose:"The central plaza collapses into the Crawler's tunnel. Six buildings fall. The palace experiences structural damage."},{id:77,type:'Monster',name:'The Hydra of Redmere',threat:"The seven-headed Hydra of Redmere has made its nest on the main supply road bridge. Every cut spawns two more heads. No supply convoy can pass for three days.",win:"The Hydra's necks are cauterised with fire after each cut. Unable to regrow, it is killed with seven simultaneous strikes. The bridge is renamed the Hydra Crossing.",lose:"The supply road is blocked for two weeks. An impatient general tries a solo attack and is killed. His regiment follows him into disaster."},{id:78,type:'Monster',name:'The Mirror Wraith',threat:"The Mirror Wraith copies the appearance, voice, and skills of any soldier it encounters. Three people claiming to be General Halveth were found this morning. Command is paralysed.",win:"The Mirror Wraith cannot copy wounds. Every command figure is given a small identifying mark. The false Halveths are identified and the Wraith is cornered and shattered.",lose:"The Mirror Wraith impersonates Defence Minister Aldric and issues three false orders — withdrawing two regiments and opening a gate."},{id:79,type:'Monster',name:'The Corrupted Treants of Vel',threat:"The ancient forest of Vel has been corrupted by dark magic. 300 living trees — treants — march on the western district. They are magically on fire without burning up.",win:"The corruption's source — a buried sorcerer's totem — is found and destroyed. The treants stop and slowly walk back to the forest. The fire dies.",lose:"The treants reach the western granary and burn it. The entire granary is lost. The western gate is destroyed by a treant walking through it."},{id:80,type:'Monster',name:'The Wyvern Rider Army',threat:"500 wyvern-mounted warriors attack from the sky. They bypass the walls entirely. Arrows have limited effect at altitude. The central barracks is already being bombed.",win:"Anti-air ballista batteries thin the wyvern flock. Without air superiority, the riders retreat. Twelve wyverns are captured and an imperial sky cavalry program begins.",lose:"The wyvern riders destroy the command tower and imperial signal station. General Reth is injured. Communications are disrupted for two weeks."},{id:81,type:'Monster',name:'The Sea Drake of Port Halveth',threat:"The Sea Drake has destroyed the fishing fleet in three days. Forty vessels sunk. The coastal city's food and economy depend entirely on the sea. Winter approaches.",win:"The Sea Drake is baited with a false fleet and harpooned in shallow water. The fishing economy recovers within a week. Three fishermen are given minor lordship.",lose:"The fishing fleet is entirely destroyed. Port Halveth's economy collapses. The city requests emergency food aid."},{id:82,type:'Monster',name:'The Behemoth of the Black Wastes',threat:"The Behemoth — the size of a castle, completely mindless — walks toward the capital crushing everything in its path. It does not attack. It simply walks. It arrives in eighteen hours.",win:"The Behemoth is led off course by a chain of decoy sounds and smells, steering it into uninhabited wastes. Its footprints are later used as roads.",lose:"The Behemoth walks through the northern wall section. The destruction is accidental and total. A 60-metre wall section is gone. Two towers are rubble."},{id:83,type:'Monster',name:'Spider Queen Veth',threat:"Spider Queen Veth — the size of a horse — has laid eggs in the food stores. Her millions of children have hatched and consumed three months of grain.",win:"Veth's pheromone signal is identified and reversed. Her children turn on her. She flees. All her children disperse harmlessly. The stores are fumigated and restocked.",lose:"Spider Queen Veth's children infest the entire storage network. All grain is contaminated. The empire faces immediate food shortages."},{id:84,type:'Monster',name:'The Shade Stalkers',threat:"Invisible predatory creatures that hunt by heartbeat have entered the barracks. Seven soldiers found dead with no visible cause. Fear itself guides them to their targets.",win:"Soldiers are trained to control their heartbeat using old meditation texts. The Shade Stalkers, starved of signal, leave for easier prey.",lose:"Twenty soldiers dead. The rest refuse to sleep in the barracks. All sleep in the palace halls, cramped and demoralised."},{id:85,type:'Monster',name:'The Ancient Golem of Kheth',threat:"A fifty-foot walking fortress of enchanted iron has been activated by unknown parties. Its only programming: reach the capital. It walks through mountains. Three hours away.",win:"The Golem's activation crystal — in its chest cavity — is extracted by a climber mid-stride. It shuts down. The empire strips its enchanted iron for weapons.",lose:"The Golem reaches the walls and walks through them. It reaches the central square and stands dormant. Demolishing it takes six months."},{id:86,type:'Sorcerer',name:'Archmage Kelvorn the Fallen',threat:"Archmage Kelvorn — the empire's court wizard for thirty years — has defected after a funding dispute, taking full knowledge of the empire's magical defences with him.",win:"Kelvorn is brought back through a personal appeal from an old colleague. He agrees to return if his research is funded. His constructs are dismantled peacefully.",lose:"Kelvorn destroys the imperial magic academy using knowledge of its defences. Twelve master mages are killed. The empire's magical capability drops by half."},{id:87,type:'Sorcerer',name:'The Hex Circle of Morrath',threat:"Thirteen witches working in unison have cursed the entire imperial army. Soldiers' weapons are heavy as stone. Armour weighs double. The army's physical ability has halved overnight.",win:"The Hex Circle's ritual focus — a circle of thirteen stones — is found and three stones removed, breaking the ritual. The curse lifts.",lose:"The army cannot march or fight effectively for five days. During those days, the Bloody Red Army's scouts probe the weakened defences and take two outlying positions."},{id:88,type:'Sorcerer',name:'Sorceress Elara the Void-Touched',threat:"Sorceress Elara has opened a portal to a hostile dimension in the city's lower district. Void creatures — formless and destructive — stream through continuously. The portal grows wider every hour.",win:"Elara is reached and persuaded to sacrifice herself to close the portal from inside. Three remaining void creatures are hunted over weeks.",lose:"The portal grows for twelve hours before Elara is killed. Forty void creatures are loose in the city. The lower district is evacuated."},{id:89,type:'Sorcerer',name:'The Rune Storm of Vaketh',threat:"A magical tempest has passed over the empire. Every steel weapon and armour piece within the walls has crumbled to powder. The army stands completely unarmed.",win:"Emergency bronze weapons from old armoury vaults — forgotten for two centuries — are distributed. The Rune Storm's caster is assassinated before they can repeat it.",lose:"The Bloody Red Army attacks during the weaponless window knowing of the Rune Storm. 400 soldiers are killed defending with bronze and improvised weapons."},{id:90,type:'Sorcerer',name:'The Dream Witch Narova',threat:"The Dream Witch Narova has cursed the army into sleeping. Perfectly alive, breathing peacefully, completely unreachable. The palace guard of 500 and three regiments are asleep at their posts.",win:"Narova's dream anchor — an enchanted hourglass — is smashed by the few unsleeping soldiers. All cursed soldiers wake instantly, confused but unharmed.",lose:"The sleeping army is helpless for 48 hours. Enemy scouts walk unchallenged through every fortification. When soldiers wake, the empire's secrets are comprehensively compromised."},{id:91,type:'Sorcerer',name:'The Blood Mage Covenant',threat:"The Blood Mage Covenant performs nightly sacrifice rituals draining the empire's magical ley lines. The empire's protective enchantments — walls, alarms, barriers — are fading. Two days until they are gone.",win:"The Covenant's ritual site is located and destroyed. The ley lines recover. All magical defences are restored. Two Blood Mages are captured.",lose:"The magical defences go dark simultaneously. Enemy spies exploit the 48-hour window to extract enormous amounts of palace intelligence."},{id:92,type:'Sorcerer',name:'The Curse of Duskavar',threat:"Duskavar's Curse has activated. Every crop within the capital's walls turns to ash at sunrise. It repeats daily.",win:"Duskavar's original burial site is found and properly consecrated. The curse lifts. The gardens are replanted. Duskavar's spirit is finally at peace.",lose:"The curse lasts a week before being broken — but a week's crops are ash. Emergency rationing is implemented. A black market for food emerges."},{id:93,type:'Sorcerer',name:'The Mind Breaker Osseth',threat:"Osseth — a telepath of terrifying ability — has taken control of two imperial generals. They appear normal and attend meetings, but every order they give subtly weakens the empire's position.",win:"Osseth is identified by his limitation — he cannot control left-handed people. A left-handed soldier traces the signal back and neutralises Osseth. Both generals are freed.",lose:"Osseth controls three generals and one minister for a month. Misdirected forces, cancelled supply orders, opened gates — the damage takes three months to fully identify."},{id:94,type:'Sorcerer',name:'The Soul Forge of Khet',threat:"The approaching enemy army carries weapons forged from the souls of captured imperial soldiers — your soldiers whose families believe them still alive. The weapons are unbreakable.",win:"The Soul Forge itself is located and destroyed, freeing all captured souls. The weapons crumble. The freed souls return — some to their families in dreams.",lose:"Soul-forged weapons carve through imperial armour without resistance. 600 soldiers fall in a single battle. The prisoners whose souls were forged cannot be rescued."},{id:95,type:'Sorcerer',name:'The Temporal Siege',threat:"Enemy soldiers arrive from different moments in time — past and future versions of the same attack, layered. Three simultaneous sieges from different time periods are happening at once.",win:"The Time Anchor — the device sustaining the temporal assault — is found and deactivated. All time-displaced soldiers snap back to their origin moments. The siege collapses.",lose:"The temporal siege overwhelms three gate positions simultaneously. The outer walls are breached twice — once by the past force, once by the future one."},{id:96,type:'Political',name:"The Poisoner's Guild",threat:"The Poisoner's Guild has contaminated every food source in the capital simultaneously. The poison is tasteless, delayed by six hours. Half the capital has already eaten.",win:"The antidote — held by the Guild as leverage — is seized before the six hours expire. Every affected citizen receives treatment. The Guild's membership list is confiscated.",lose:"Treatment arrives too late for 3,000 citizens and 200 soldiers. Defence Minister Aldric, who ate early, dies at his desk. The Poisoner's Guild vanishes without a trace."},{id:97,type:'Political',name:'The False Emperor Dravos',threat:"The Emperor has been replaced by a doppelganger — False Emperor Dravos — at some point in the last week. The real Emperor is imprisoned in the palace. Dravos has already signed three ruinous edicts.",win:"The real Emperor is found in the wine cellar, bound but unharmed. Dravos is unmasked in the throne room. The three ruinous edicts are voided.",lose:"Dravos signs a treaty ceding two provinces before being unmasked. The treaty is legally binding. The real Emperor must honour a treaty he never signed."},{id:98,type:'Political',name:'The Grand Betrayal',threat:"Every minister on the Defence Council has been revealed as a foreign spy — all turned years ago. Every meeting for two years was relayed to the enemy. Everything is compromised.",win:"The ministers are arrested simultaneously before they can act on the revelation. Emergency replacements are made. A full audit of two years of damage is carried out.",lose:"Three ministers destroy critical documents before arrest. Two escape. The empire rebuilds its entire intelligence network from nothing."},{id:99,type:'Political',name:'Sir Davos the Fallen Knight',threat:"Sir Davos the Knight — the empire's greatest living champion, undefeated in 200 duels — has defected to the enemy. He cites the empire's corruption and names the Emperor personally.",win:"Sir Davos's corruption evidence is addressed publicly. The corruption is found real — three officials are removed. Davos, seeing genuine change, returns. The people respect both acts.",lose:"Sir Davos leads the enemy's vanguard against his former comrades. He defeats twelve imperial champions in succession. Soldiers he trained refuse to fight him."},{id:100,type:'Political',name:'The Night of Long Knives',threat:"A coordinated assassination of every military commander above captain rank has begun simultaneously. Sixteen commanders are already dead. You have minutes before the next wave launches.",win:"The assassins' signal network is severed before the final wave. Nine commanders survive. The network is traced to the Iron Veil Alliance. A decisive counter-strike is launched.",lose:"Twenty-three commanders are dead by sunrise. The empire's military leadership is completely decapitated. For one week, the empire has no coherent military command. Enemies move immediately."},{id:101,type:'Dragon',name:'Pyraxis the World-Burner',threat:"Pyraxis sets the ocean itself on fire. Three coastal cities watch the sea burn. Ships cannot leave or enter. The fire spreads toward land.",win:"Pyraxis is lured over the open ocean and drowned by a coordinated naval trap. The sea-fire dies with him. The coast rebuilds. His teeth become foundation stones for the new harbour wall.",lose:"The coast burns for eleven days. Port Halveth is ash. Admiral Keth loses his entire eastern squadron. The empire has no southern coast for a generation."},{id:102,type:'Dragon',name:'Gelathon the Frost Lich',threat:"A dragon who died and returned as an undead frost behemoth. His breath freezes soldiers mid-stride. He leaves an army of frozen statues in his wake.",win:"Gelathon's phylactery — frozen inside his own chest — is extracted by a fire mage and destroyed. He collapses into frost. The frozen soldiers thaw unharmed.",lose:"Two hundred soldiers are frozen permanently in the eastern field. Gelathon nests in the northern fortress. General Halveth retreats with frostbite and never recovers full use of his hands."},{id:103,type:'Dragon',name:'Vorthex the Mind Shatterer',threat:"Vorthex attacks the mind, not the body. Soldiers who look at him begin screaming and never stop. He advances slowly, enjoying the noise.",win:"Vorthex is defeated by blind soldiers guided by voice command. Unable to shatter minds he cannot meet, he is cornered and killed.",lose:"Three hundred soldiers are permanently catatonic. Defence Minister Aldric is found screaming at his desk. General Morvaine flees the command post."},{id:104,type:'Dragon',name:'Khareth the Stone Emperor',threat:"Everything Khareth breathes on turns to grey stone. Three villages are now silent stone museums. He is turning the farmlands into a sculpture garden.",win:"Khareth is driven into the river where the water neutralises his breath. He drowns slowly, turning to stone himself — a permanent island monument.",lose:"The eastern farmlands are stone. Khareth walks through the outer wall. Captain Reth is found as a perfect stone statue mid-command."},{id:105,type:'Dragon',name:'Sylvara the Poison Mist',threat:"Sylvara exhales a permanent cloud of violet death that follows her. She drifts toward the capital. The cloud is five miles wide and expands hourly.",win:"Sylvara is brought down by archers outside the cloud using wind calculations. The cloud disperses without her will sustaining it.",lose:"The cloud reaches the outer districts. Forty thousand civilians evacuate. Defence Minister Aldric is found violet-stained at his desk, dead."},{id:106,type:'Dragon',name:'Rhaznak the Twin Flame',threat:"Two dragons sharing one soul — if one dies, the other inherits both lifetimes of rage. They attack from opposite sides of the city simultaneously.",win:"Both dragons are killed within three seconds of each other using coordinated ballista teams. The shared soul has no body to inhabit and dissipates.",lose:"One dragon is killed first. The second inherits double rage. Sir Davos fights the empowered dragon personally and is severely injured, retired from active duty for six months."},{id:107,type:'Dragon',name:'Urdath the Tidal Dragon',threat:"Urdath controls water. He has redirected three rivers to flood the eastern farmlands. The capital's water district is underwater. He circles overhead observing his work.",win:"Urdath is baited to ground level and killed by ground forces. The rivers correct themselves within a week. The eastern farms drain and recover.",lose:"The eastern farmlands are flooded for two months. The water district is destroyed. Admiral Keth's harbour floods. The empire imports grain at ruinous cost for a year."},{id:108,type:'Dragon',name:'Molvex the Void Devourer',threat:"Molvex breathes nothing — a cone of absolute void that erases everything it touches from existence. No ash. No rubble. Just gone.",win:"Molvex is tricked into breathing his own void reflected back by an enchanted mirror. He erases himself. The mirror survives. It is kept behind seven locks.",lose:"Molvex erases the eastern gate and forty soldiers from existence. General Halveth, standing at the gate, simply ceases to have been. He is never mourned because no one remembers him."},{id:109,type:'Dragon',name:'Thessorath the Dream Stalker',threat:"Thessorath visits the Emperor in dreams to negotiate. The dreams are traps. Every general who attended last night's war council is now comatose.",win:"Thessorath is killed in the waking world while he is in someone's dream — vulnerable and divided. He dies in both places at once. The comatose generals wake alive.",lose:"The entire war council sleeps indefinitely. Defence Minister Aldric assumes command. His first three decisions are all wrong."},{id:110,type:'Dragon',name:'Carnax the Blood Drinker',threat:"Carnax requires blood tribute to remain dormant. Previous emperors paid it. You stopped. He has arrived to collect three centuries of unpaid debt at once.",win:"Carnax is offered a single vial of the Emperor's blood — magically amplified to satisfy centuries of debt. He accepts, considers the debt settled, and returns to dormancy.",lose:"Carnax attacks the outer city. He is eventually driven off but 400 soldiers are drained. Defence Minister Aldric negotiates a new tribute treaty on humiliating terms."},{id:111,type:'Dragon',name:'Zyndara the Eclipse Bringer',threat:"Zyndara's wingspan blocks the sun. She has been circling for three days. The crops are dying. Soldiers fight in permanent artificial night.",win:"Zyndara is hit by reflected sunlight concentrated through mirror arrays during a gap in her circling. Blinded, she crashes and is slain. The sun returns.",lose:"The crops die. Zyndara circles for twenty-two days. Three outer provinces report famine conditions. Sir Davos leads the famine relief effort personally."},{id:112,type:'Dragon',name:'Fulgrath the Thunder Emperor',threat:"Fulgrath summons lightning from cloudless skies. He has already destroyed the armoury, the signal tower, and the Emperor's stables. He is warming up.",win:"Fulgrath is grounded using an ancient lightning-rod array from old engineering texts. Grounded, he cannot fly and is slain.",lose:"Fulgrath strikes the treasury, the command centre, and three barracks in a single afternoon. Defence Minister Aldric is struck by secondary lightning and hospitalised for a month."},{id:113,type:'Dragon',name:'Ossiveth the Bone Sculptor',threat:"Ossiveth collects bones artistically. He has been raiding graveyards across the province building something enormous. It moves. It is almost finished.",win:"Ossiveth's creation is incomplete when he is slain. Without his will, the bone construct collapses. Scholars study it for years.",lose:"Ossiveth completes his creation — a bone colossus that walks. It destroys the eastern gate. Captain Reth leads the counter-attack and loses twelve men."},{id:114,type:'Dragon',name:'Verathos the Mirror Drake',threat:"Verathos reflects every attack back at its source. Arrows return to archers. Fire returns to siege weapons. He hasn't attacked once. He just walks forward.",win:"Verathos is attacked with nothing — pure silence and inaction. Confused, he stops. A single soldier strikes him from behind where there is no mirror. He falls immediately.",lose:"Verathos reaches the walls and the empire's own siege weapons destroy their own fortifications. The dragon walks through the open gate unchallenged."},{id:115,type:'Dragon',name:'Serpharax the Eternal Hunger',threat:"Serpharax cannot be sated. He has eaten three villages without slowing. The capital's food stores would last him an afternoon.",win:"Serpharax is fed a magical feast laced with a sleep enchantment. He gorges, slows, and crashes into the eastern wastes, sleeping for fifty years.",lose:"Serpharax eats the grain reserves — four months of food — in one sitting. He then eats the cavalry horses. The empire faces immediate rationing."},{id:116,type:'Dragon',name:'Kraelith the Plague Wing',threat:"Every surface Kraelith's wings touch blooms with fast-growing black mold that poisons on contact. He has landed on the outer wall. The mold spreads inward.",win:"Kraelith is driven off the wall by fire before the mold fully establishes. The mold-covered section is burned away. Kraelith is hunted and killed within days.",lose:"The mold spreads through the outer district. Two hundred civilians are poisoned. The entire outer wall section must be demolished and rebuilt."},{id:117,type:'Dragon',name:'Draveth the Shadow Emperor',threat:"Draveth exists as living shadow. He passes through solid surfaces. He has been inside the palace for three days before anyone noticed.",win:"Draveth is trapped in a room of pure light with no shadows. He cannot exist without darkness. He burns away slowly, cursing loudly.",lose:"Draveth spends a week in the palace reading every document, attending every meeting. He departs with complete intelligence. Three military secrets are compromised within a month."},{id:118,type:'Dragon',name:'Ixaroth the Crystal Dragon',threat:"Ixaroth's scales are living crystal that shatters into razor shards when struck. Every attack on him turns his own body into a devastating weapon.",win:"Ixaroth is wrapped in enchanted cloth and crushed at distance using a siege device. No shards escape. The crystal remains are sold to gem merchants.",lose:"Three infantry waves are shredded attacking Ixaroth conventionally. Sixty soldiers are lost. Ixaroth claims the eastern market district as his lair."},{id:119,type:'Dragon',name:'Thalvex the Ocean Caller',threat:"Thalvex has pulled the tide inland by twenty miles. Everything within that boundary is submerged. The eastern harbour district is ten feet underwater.",win:"Thalvex is slain by naval forces operating above the inland tide. The tide snaps back with his death, returning to normal within hours.",lose:"The inland tide persists for three weeks. Admiral Keth loses the eastern harbour permanently to silt. Fourteen coastal villages are abandoned."},{id:120,type:'Dragon',name:'Morgreth the Ash Emperor',threat:"Morgreth reduces everything he breathes on to fine grey ash. Three forests, two towns. He stands outside the capital and slowly inhales.",win:"Morgreth's jaw is wired shut by an enchanted chain snared during one of his rare ground landings. He suffocates on his own unexpelled breath and dies.",lose:"Morgreth exhales on the outer market. Six city blocks become grey powder. Defence Minister Aldric evacuates the city centre. Rebuilding takes four years."},{id:121,type:'Dragon',name:'Naethrax the Hunger Storm',threat:"Naethrax is perpetually surrounded by a tornado of his own making that eats everything it touches. He steers it toward the capital's grain district.",win:"Naethrax is lured into the canyon east of the city where the tornado has no room and turns against him. He is destroyed by his own weapon.",lose:"The grain district is consumed. The tornado carries three thousand tonnes of food into the sky. The empire faces a six-month food crisis."},{id:122,type:'Dragon',name:'Noctharax the Nightmare',threat:"Noctharax only exists at night. But the nights are getting longer. Astronomers confirm the sun rises later each day. Noctharax is responsible.",win:"The astronomical device controlling the sun's delay is found in the high mountains and destroyed. Days return to normal length. Noctharax flickers out.",lose:"The nights grow to eighteen hours. Noctharax has twelve hours of existence per day. He devastates every night shift in every military installation."},{id:123,type:'Dragon',name:'Velthrix the Storm Emperor',threat:"Velthrix has parked a permanent hurricane over the capital. The city is being slowly disassembled by wind and rain. He watches from above the clouds.",win:"Velthrix is reached by skyborn archers who ascend above the hurricane. He is slain above his own storm. The storm loses its anchor and drifts out to sea.",lose:"The hurricane lasts forty days. Half the city's roofs are stripped. The palace takes structural damage. Defence Minister Aldric's office ceiling collapses during an important meeting."},{id:124,type:'Dragon',name:'Goraxis the Earth Shaker',threat:"Goraxis flies low and the impact of his wingbeats causes earthquakes. He has been circling the capital for two hours. The foundations are cracking.",win:"Goraxis is brought down by enchanted chains strung between towers. He crashes outside the walls. The subsequent earthquake is smaller than feared.",lose:"Goraxis circles for six hours. Four buildings collapse. The old eastern tower — irreplaceable — falls. Captain Reth is buried in rubble and recovered three hours later with a broken arm."},{id:125,type:'Dragon',name:'Xeraphon the Soul Cage',threat:"Xeraphon wears the souls of three past generals as jewellery and speaks with their voices. He uses their knowledge to plan his assault.",win:"Xeraphon is killed and the soul-cages shatter. The three generals' souls are freed and ascend with visible relief. One pauses to give the Emperor one last piece of tactical advice.",lose:"Xeraphon uses the generals' knowledge to circumvent every defence they designed. Two positions are abandoned. General Morvaine's retreat is described as the most efficient in imperial history — an achievement he did not want."},{id:126,type:'Dragon',name:'Blightfang the Corrupted',threat:"Blightfang was the empire's guardian dragon. Someone freed him. He remembers everything about the empire's defences. He built some of them.",win:"Blightfang is reasoned with — the original binding was unjust. A new voluntary compact is negotiated. He agrees to stand down and returns as a genuine protector.",lose:"Blightfang dismantles three fortifications he personally designed. He is eventually driven off but the northern wall has been opened in four places."},{id:127,type:'Dragon',name:'Solvarex the Light Eater',threat:"Solvarex moves inside a bubble of absolute darkness. Soldiers cannot see. Torches die. Magic light dies. He hunts by sound.",win:"Soldiers are issued enchanted blindfolds and trained to fight by pure sound, removing his advantage. Unable to hunt by sound in battle-noise, Solvarex is cornered and killed.",lose:"Solvarex hunts through the darkened barracks for three nights. Forty soldiers dead. Sir Davos is injured fighting in darkness."},{id:128,type:'Dragon',name:'Kraekoth the Deep One',threat:"Kraekoth rose from the deepest ocean. He has never seen land before. He is curious about everything — including what the capital looks like from the inside.",win:"Kraekoth is fascinated by mirrors brought to the gate. He becomes absorbed in his own reflection. While distracted, he is gently herded back to the ocean. He leaves content.",lose:"Kraekoth explores the capital with destructive curiosity. He opens buildings to look inside. He tastes the aqueduct. Three districts are structurally compromised when he finally returns to the ocean."},{id:129,type:'Dragon',name:'Virathon the Living Plague',threat:"Virathon is not infected — he is the disease itself. His blood, breath, and shed scales are each a different lethal contagion.",win:"Virathon is killed at extreme range by enchanted artillery. His body is burned at a distance using fire launched from siege weapons. The plague dies with the host.",lose:"Virathon crashes into the outer city. Three different plagues escape from his destroyed body. One thousand quarantined. Defence Minister Aldric declares a public health emergency lasting eight weeks."},{id:130,type:'Dragon',name:'Dendrakos the Forest Sovereign',threat:"Dendrakos considers himself the true ruler of all living things. He has commanded every plant in the empire to stop growing. The harvest will not come.",win:"Dendrakos is defeated and his command over plant life broken. Growth resumes within hours. The harvest is late but possible.",lose:"The harvest fails entirely. Three provinces declare food emergencies. Sir Davos leads relief convoys under constant bandit attack."},{id:131,type:'Dragon',name:'Aethrix the Hollow Dragon',threat:"Aethrix has no organs. No blood. She is an empty shell animated by pure hatred. She cannot be poisoned, bled, or starved. Every scale must be destroyed.",win:"Aethrix's scales are systematically stripped using enchanted tools until nothing remains. She dies scale by scale, still furious to the last. The final scale is mounted in the war museum.",lose:"Conventional weapons shatter against Aethrix. Three assault attempts fail. She takes the eastern fortress as her lair. General Halveth calls it the worst strategic loss of his career."},{id:132,type:'Dragon',name:'Morthex the Bone Collector',threat:"Morthex has one million undead followers drawn from ancient battlefields. He walks toward the capital.",win:"Morthex is killed before reaching the walls. Without his will, the million undead simply stop moving. They are gradually dismantled over the following weeks.",lose:"Morthex reaches the capital. The million undead surround the city completely. The siege lasts three weeks. Defence Minister Aldric negotiates terms that include acknowledging the ancient dead."},{id:133,type:'Dragon',name:'Skrathon the Iron Wing',threat:"Skrathon's iron wings fire feathers like arrows. He has been hovering over the capital for two hours. The streets below are empty.",win:"Skrathon's iron feathers are magnetically redirected back at him using an ancient lodestone array. He is perforated by his own feathers. He descends slowly, leaking.",lose:"Skrathon's feathers kill forty soldiers before a retreat is called. He claims the market district. The economic loss from the closed market is forty thousand gold per week."},{id:134,type:'Dragon',name:'Zephyrath the Breath Thief',threat:"Zephyrath steals air from any creature in his radius. Soldiers at the eastern gate are suffocating without visible cause. He has not landed yet.",win:"Soldiers approach Zephyrath in enchanted breathing apparatus from the mining corps. He cannot steal air from a closed system. Suffocating himself trying, he retreats and is hunted down.",lose:"The eastern gate guard suffocates completely. Sixty soldiers dead. Zephyrath opens the gate from inside. The Bloody Red Army's advance scouts are already waiting."},{id:135,type:'Dragon',name:'Terrax the Tomb Warden',threat:"Terrax has been asleep inside the mountain for four thousand years. The mining operations woke him. He is confused and enormous and moving toward the source of disturbance.",win:"The miners are ceremonially apologised to by imperial decree. A formal apology is delivered to Terrax's mountain in seven ancient languages. He accepts, grumbles, and returns to sleep.",lose:"Terrax destroys the mining district entirely. He then falls asleep in the mountain pass, blocking the trade route for a generation."},{id:136,type:'Dragon',name:'Caelith the Sky Tyrant',threat:"Caelith has declared the sky above the empire his territory. No flying creature or object permitted. Aerial communications are dead.",win:"Caelith is challenged to aerial combat — a duel he cannot legally refuse under dragon law. The pilot wins on a technicality. Caelith concedes territory by ancient compact.",lose:"The aerial communications blackout lasts three weeks. Three army divisions receive no orders and act independently. One creates a diplomatic incident."},{id:137,type:'Dragon',name:'Rixathor the Blood Rain',threat:"Rixathor wounds himself constantly. His wounds bleed upward, creating acid rain above him. He moves toward the capital.",win:"Rixathor is directed over the ocean where his acid rain falls harmlessly. Cut off from land targets, he circles uselessly until exhausted and brought down by ships.",lose:"Rixathor passes over the capital. The acid rain strips the outer fortifications of their metal fittings. Three hundred soldiers are chemically burned. Defence Minister Aldric loses his famous moustache."},{id:138,type:'Dragon',name:'Coldrix the Arctic Sovereign',threat:"Coldrix has begun winter early, cooling the entire region from altitude. It is summer. The crops are freezing in the fields.",win:"Coldrix is driven southward by fire balloons into warmer air where he cannot sustain the cold. The unnatural cold front breaks. The crops are damaged but not destroyed.",lose:"Summer crops fail entirely. A genuine winter on top of this artificial one creates the worst cold season in three centuries. Thousands die."},{id:139,type:'Dragon',name:'Embrath the Living Volcano',threat:"Embrath has merged with the eastern mountain. He breathes through the volcano's crater. The mountain erupts on his command. He is choosing when.",win:"Embrath is separated from the mountain using ancient earth magic. Disconnected from the volcano, he is merely a massive dragon and is driven north.",lose:"Embrath erupts the mountain. Ash covers the eastern provinces for two weeks. The farmlands under ash are lost for years. Admiral Keth's coastal fleet is damaged by pyroclastic fallout."},{id:140,type:'Dragon',name:'Phantarex the Illusion Emperor',threat:"Phantarex appears as anything he chooses. Yesterday he appeared as the Emperor and gave three contradictory orders. The real Emperor struggles to prove his own identity.",win:"A foolproof imperial identification system is implemented overnight — a unique magical signature only the true Emperor can produce. Phantarex is exposed and driven away.",lose:"Two more false Emperors appear. Command authority collapses. General Morvaine stops following orders until identity can be verified. The empire operates without executive direction for eleven days."},{id:141,type:'Dragon',name:'Thornax the Bone Garden',threat:"Thornax plants carnivorous bone trees from his tail-spines. He has planted three forests. The bone trees spread.",win:"Thornax is killed before reaching the fourth planting site. His existing bone forests, severed from his will, stop growing and are burned.",lose:"Thornax plants a bone forest inside the outer wall. Forty soldiers are consumed by carnivorous trees in the first hour. The district is abandoned."},{id:142,type:'Dragon',name:'Duskroth the Twilight Sovereign',threat:"Duskroth can only be harmed at sunrise or sunset — a window of minutes. He attacks precisely between those windows.",win:"Astronomers calculate the exact sunrise moment precisely. Every weapon is aimed and fired at the exact second. Duskroth, caught in the window, dies at dawn.",lose:"Three consecutive sunrises fail to land a decisive blow. Duskroth destroys a fortification between each window. By the fourth sunrise he has taken the outer perimeter."},{id:143,type:'Dragon',name:'Netharak the Rift Dragon',threat:"Netharak tears holes in reality with his claws. Portals open wherever he walks. So far: spiders, cold void, and something screaming.",win:"Netharak is pushed back through one of his own portals which is then immediately sealed. He is stranded wherever he came from. The remaining portals close without his maintenance.",lose:"Twelve portals are open throughout the capital. The spiders multiply. Two soldiers fall into the void permanently. The screaming from portal seven does not stop for weeks."},{id:144,type:'Dragon',name:'Vexathos the Corruptor',threat:"Every advisor or knight who spends an hour near Vexathos has betrayed the empire. He has been here a week. Fourteen officials and three generals are compromised.",win:"Vexathos is killed and a corruption cleansing ritual restores all affected individuals simultaneously. They are horrified to learn what they did while compromised.",lose:"The fourteen officials and three generals act. The extent of the betrayals takes three months to fully catalogue and reverse. Sir Davos's senior lieutenant is among them."},{id:145,type:'Dragon',name:'Skorreth the Siege Dragon',threat:"Skorreth is not attacking. He sits across the main supply road. He is not aggressive. He is simply an immovable obstacle.",win:"Skorreth is offered a superior resting location — a warm valley with excellent acoustics. He considers this reasonable and moves. He sleeps for forty years.",lose:"Skorreth sits for nineteen days. The supply shortage behind him creates a food crisis before he moves of his own accord."},{id:146,type:'Dragon',name:'Lumrath the Blinding',threat:"Lumrath's scales create devastating light beams in sunlight. Soldiers fight with their eyes closed. Direct engagement in daylight is impossible.",win:"Soldiers attack at night under overcast sky. Blind in the dark, Lumrath is surrounded and brought down by sound and touch.",lose:"Lumrath blinds three battalions in a single morning engagement. Sixty soldiers suffer permanent vision damage. General Halveth leads the retreat with his shield over his face."},{id:147,type:'Dragon',name:'Rhexathar the Chain Dragon',threat:"Rhexathar controls metal. He has pulled every sword, spear, and piece of armour in the garrison toward himself. Three thousand soldiers stand unarmed.",win:"Soldiers arm themselves with wood, bone, and stone — material Rhexathar cannot magnetically control. He cannot handle stone weapons and is bludgeoned to the ground.",lose:"The unarmed army is exposed during the Bloody Red Army's intelligence window. A raiding force takes advantage of the undefended eastern approach. Captain Reth is captured."},{id:148,type:'Dragon',name:'Vorethax the Time Eater',threat:"Vorethax ages everything in his radius to dust within minutes. He approaches slowly.",win:"Vorethax is stopped cold by an ancient ward found in the founding vaults — explicitly designed against temporal predators. He cannot advance. Eventually he accepts negotiation.",lose:"Three fortifications crumble to ancient dust in minutes. Forty soldiers age and die. General Halveth looks twenty years older. He minds this a great deal."},{id:149,type:'Dragon',name:'Crystareth the Sleeping God',threat:"Crystareth arrived, walked into the palace courtyard, and lay down six days ago. Nobody knows what happens when he wakes.",win:"A sleep extension potion of legendary proportion is administered through the water supply. Crystareth sleeps for another three hundred years. The courtyard is redesigned around him.",lose:"Crystareth wakes. He is not hostile — merely confused about where he is. His confused repositioning destroys four palace wings. He leaves. The palace is structurally unsound."},{id:150,type:'Dragon',name:'Abyssarax the Depth Bringer',threat:"Abyssarax arrived from below the earth. He smells of deep ocean. He speaks an unknown language. He gestures toward the palace. His intentions are completely unknown.",win:"The gesture is eventually decoded — he wants passage through to the other side of the continent. A route is negotiated. He passes underground causing manageable tremors. He leaves a thank-you gift. It is gold.",lose:"Unable to communicate, combat is initiated. Abyssarax destroys the palace wing he was gesturing at and leaves, apparently offended."},{id:151,type:'Dragon',name:'Malvethrix the Plague Father',threat:"Malvethrix carries one thousand diseases simultaneously. He is curious, not hostile. He lands gently near the capital. The diseases do the rest.",win:"Malvethrix is redirected using a trail of interesting mineral formations that lead him away from population centres. He follows them happily, infecting rocks.",lose:"Malvethrix breathes near the city gate. Forty different diseases appear in the population simultaneously. The medical corps collapses under the variety. Defence Minister Aldric becomes ill with six things at once."},{id:152,type:'Dragon',name:'Gravethon the Weight Dragon',threat:"Gravethon increases gravity around him. Soldiers cannot lift weapons. The outer wall collapsed inward under its own weight.",win:"Gravethon is countered with enchanted lighter-than-air platforms. Soldiers fight from above, outside his gravity field. He cannot increase gravity upward. He is slain from altitude.",lose:"Gravethon reaches the second wall. It collapses. Twelve soldiers are crushed by their own armour. General Morvaine orders all armour removed — which creates a different problem."},{id:153,type:'Dragon',name:'Sorrathax the Sound Dragon',threat:"Sorrathax weaponises sound. His roar collapses stone walls. He has been silent for three days, building to something.",win:"The city is equipped with enchanted dampening crystals. When Sorrathax finally roars, the sound is eaten entirely. He roars himself unconscious. He is slain quietly.",lose:"Sorrathax roars once. The eastern wall collapses entirely. Two watchtowers fall. Captain Reth is deafened permanently in one ear."},{id:154,type:'Dragon',name:'Hexaveth the Rune Dragon',threat:"Hexaveth's scales carry living runes. Fourteen catastrophic runes remain unread. His shed scales are everywhere.",win:"Scholars in enchanted non-reading goggles collect and destroy all shed scales. Hexaveth, losing his rune armour, becomes merely a dragon. He is driven away by archers.",lose:"Three more runes are accidentally read. One floods the lower city. One puts half the court into temporary paralysis. One does something to the palace cats that is never fully explained."},{id:155,type:'Dragon',name:'Pyrexathos the Eternal Flame',threat:"Pyrexathos was put out seven hundred years ago. He spent those centuries reigniting. He is back. He is furious about seven hundred years of nothing.",win:"Pyrexathos is met with genuine acknowledgement that seven hundred years of nothing was unjust. A formal apology is read to him. Mollified, he accepts a new territorial agreement.",lose:"Pyrexathos vents seven hundred years of accumulated rage on the eastern quarter. The fires burn for three days. Admiral Keth's drydock is destroyed. Sir Davos loses his eyebrows."},{id:156,type:'Dragon',name:'Verathrex the Gravity Tyrant',threat:"Verathrex has reversed gravity inside the capital. Soldiers fall upward. Buildings drain skyward stone by stone. The palace floats.",win:"Verathrex is killed. Gravity restores instantly. Everything that floated upward comes down. The damage from the descent is significant but the palace survives, dented.",lose:"Gravity stays reversed for seven days before Verathrex is driven away. Everything that floated is gone. Defence Minister Aldric falls upward into the sky and is retrieved by a soldier on a rope."},{id:157,type:'Dragon',name:'Kethmorax the Patience Dragon',threat:"Kethmorax has sat at the gate for ten days without moving. Scouts report he is waiting for something specific.",win:"Scouts determine Kethmorax is waiting for
