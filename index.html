const SealGate=({children})=>{
  const [ready,setReady]=useState(false);
  const [locked,setLocked]=useState(true);
  const [hasSeal,setHasSeal]=useState(false);
  const [pass,setPass]=useState('');
  const [confirm,setConfirm]=useState('');
  const [msg,setMsg]=useState('');
  useEffect(()=>{setHasSeal(!!localStorage.getItem('sovereign_seal_hash'));setReady(true);},[]);
  const establish=async()=>{
    if(pass.length<3)return setMsg('Use at least 3 characters.');
    if(pass!==confirm)return setMsg('Seal confirmation does not match.');
    localStorage.setItem('sovereign_seal_hash',await hashSeal(pass));
    setLocked(false);setHasSeal(true);
  };
  const unlock=async()=>{
    const h=localStorage.getItem('sovereign_seal_hash');
    if(await hashSeal(pass)===h){setLocked(false);setMsg('');}
    else setMsg('Wrong Imperial Seal.');
  };
  const reset=()=>{
    if(confirm('Resetting deletes the saved seal and local Sovereign data on this device. Continue?')){
      try{localStorage.clear();}catch(e){}
      try{indexedDB.deleteDatabase('sovereign-db');indexedDB.deleteDatabase('SOVEREIGN');indexedDB.deleteDatabase('sovereign');}catch(e){}
      location.reload();
    }
  };
  if(!ready)return null;
  if(!locked)return children;
  return(
    <div style={{background:T.bg,minHeight:'100vh',color:T.text,fontFamily:"'Crimson Text',serif",display:'flex',alignItems:'center',justifyContent:'center',padding:18}}>
      <div style={{...S.card,width:'100%',maxWidth:420,border:`1px solid ${T.gold}66`,textAlign:'center'}}>
        <h1 style={{color:T.gold,fontFamily:"'Cinzel',serif",fontSize:24,letterSpacing:3,margin:'6px 0 4px'}}>SOVEREIGN</h1>
        <div style={{color:T.muted,fontSize:12,marginBottom:16}}>{hasSeal?'Enter Imperial Seal':'Establish Imperial Seal'}</div>
        <input type="password" placeholder="Imperial Seal" style={{...S.inp,marginBottom:8}} value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&(hasSeal?unlock():establish())}/>
        {!hasSeal&&<input type="password" placeholder="Confirm Seal" style={{...S.inp,marginBottom:8}} value={confirm} onChange={e=>setConfirm(e.target.value)} onKeyDown={e=>e.key==='Enter'&&establish()}/>}
        {msg&&<div style={{color:T.crimson,fontSize:12,marginBottom:8}}>{msg}</div>}
        <button type="button" style={{...S.btn,width:'100%',marginBottom:8}} onClick={hasSeal?unlock:establish}>{hasSeal?'Unlock':'Set Seal'}</button>
        <button type="button" style={{...S.btnD,width:'100%'}} onClick={reset}>Forgot Seal / Reset Sovereign</button>
        <div style={{color:T.dim,fontSize:10,marginTop:12,lineHeight:1.4}}>This is a local device lock, not cloud security.</div>
      </div>
    </div>
  );
};

const SOVEREIGN_ARCHIVE_KEYS=[
  'settings','daily_logs','workouts','food_logs','ycycle','relations','campaigns','stories',
  'todos','challenge_log','academy_disciplines','academy_sessions','events','fiefs','meds','med_log','rituals','ritual_log','expeditions'
];

const exportSovereignArchive=async()=>{
  const data={version:'sovereign-v16',exportedAt:new Date().toISOString(),localStorage:{},db:{}};
  try{
    ['sovereign_seal_hash','sovereign_music'].forEach(k=>{
      const v=localStorage.getItem(k);
      if(v!==null)data.localStorage[k]=v;
    });
  }catch(e){}
  for(const k of SOVEREIGN_ARCHIVE_KEYS){
    try{data.db[k]=await db.get(k);}catch(e){data.db[k]=null;}
  }
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`sovereign-archive-${today()}.json`;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},500);
};

const importSovereignArchive=file=>new Promise((resolve,reject)=>{
  const reader=new FileReader();
  reader.onload=async()=>{
    try{
      const data=JSON.parse(reader.result);
      if(!data||!data.db)throw new Error('Invalid Sovereign archive.');
      if(!confirm('Import this Sovereign archive? This will overwrite current saved data on this device.'))return resolve(false);
      try{
        Object.entries(data.localStorage||{}).forEach(([k,v])=>localStorage.setItem(k,v));
      }catch(e){}
      for(const [k,v] of Object.entries(data.db||{})){
        if(SOVEREIGN_ARCHIVE_KEYS.includes(k))await db.set(k,v);
      }
      alert('Imperial Archive imported. The app will reload.');
      location.reload();
      resolve(true);
    }catch(err){reject(err);}
  };
  reader.onerror=reject;
  reader.readAsText(file);
});

const Settings=({settings,setSettings,dailyLogs,workouts,foodLogs,ycycle,relations,campaigns,stories,todos,disciplines,academySessions,challengeLog})=>{
  const [form,setForm]=useState({...settings});const [newCmd,setNewCmd]=useState('');const [newQuote,setNewQuote]=useState('');const [saved,setSaved]=useState(false);const [deleteConfirm,setDeleteConfirm]=useState('');const [oldSeal,setOldSeal]=useState('');const [newSeal,setNewSeal]=useState('');const [newSeal2,setNewSeal2]=useState('');
  const clearAllData=()=>{
    if(deleteConfirm!=='DELETE'){
      alert('Type DELETE first.');
      return;
    }
    const ok=confirm('This will delete ALL Sovereign data on this device/browser. Continue?');
    if(!ok)return;
    try{localStorage.clear();}catch(e){}
    try{
      if(window.indexedDB&&indexedDB.deleteDatabase){
        indexedDB.deleteDatabase('sovereign-db');
        indexedDB.deleteDatabase('SOVEREIGN');
        indexedDB.deleteDatabase('sovereign');
      }
    }catch(e){}
    alert('Sovereign data cleared. The app will reload fresh.');
    location.reload();
  };
  const changeImperialSeal=async()=>{
    const current=localStorage.getItem('sovereign_seal_hash');
    if(!current)return alert('No Imperial Seal exists yet.');
    if(await hashSeal(oldSeal)!==current)return alert('Current Imperial Seal is wrong.');
    if(newSeal.length<3)return alert('New Seal must be at least 3 characters.');
    if(newSeal!==newSeal2)return alert('New Seal confirmation does not match.');
    localStorage.setItem('sovereign_seal_hash',await hashSeal(newSeal));
    setOldSeal('');setNewSeal('');setNewSeal2('');
    alert('Imperial Seal changed.');
  };

  const save=()=>{setSettings(form);db.set('settings',form);setSaved(true);setTimeout(()=>setSaved(false),2000);};
  const addCmd=()=>{if(!newCmd.trim())return;setForm(f=>({...f,commanderNames:[...f.commanderNames,newCmd]}));setNewCmd('');};
  const delCmd=i=>setForm(f=>({...f,commanderNames:f.commanderNames.filter((_,idx)=>idx!==i)}));
  const addQuote=()=>{if(!newQuote.trim())return;setForm(f=>({...f,motivationQuotes:[...(f.motivationQuotes||[]),newQuote]}));setNewQuote('');};
  const delQuote=i=>setForm(f=>({...f,motivationQuotes:f.motivationQuotes.filter((_,idx)=>idx!==i)}));
  const setPageCmd=(pageId,cmdIdx)=>setForm(f=>({...f,pageCommanders:{...(f.pageCommanders||{}),[pageId]:cmdIdx}}));
  const exportExcel=()=>{
    const wb=XLSX.utils.book_new();
    const dlRows=Object.entries(dailyLogs).map(([date,l])=>({Date:date,Water_L:l.water,Coffee:l.coffee,Sleep_h:l.sleepHours,Weight_kg:l.weight,Z_Cycle:l.zcycle,Rest_Day:l.restDay}));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(dlRows),'Daily Logs');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(workouts),'Workouts');
    const academyRows=academySessions.map(s=>{const d=disciplines.find(x=>x.id===s.disciplineId);return{Date:s.date,Discipline:d?.name||s.disciplineId,Minutes:s.minutes,Notes:s.notes||''};});
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(academyRows),'Academy');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(foodLogs),'Food Events');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(ycycle),'Y Cycle');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(relations.map(r=>({...r,utility:r.utility?.join(', '),interests:r.interests?.join(', '),energy:r.energy?.join(', '),powerTags:r.powerTags?.join(', ')}))),'Factions');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(campaigns),'Campaigns');
    const clRows=Object.entries(challengeLog).map(([date,e])=>{const t=THREATS.find(x=>x.id===e.threatId);return{Date:date,Threat:t?.name,Type:t?.type,Define_Challenge:e.challengeDefinition,Challenge_Status:e.challengeStatus,Outcome:e.outcome};});
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(clRows),'Daily Threats');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(stories),'Lore');
    const todoRows=(Array.isArray(todos.__global)?todos.__global:Object.entries(todos).flatMap(([date,list])=>date==='__global'?[]:list.map(t=>({...t,createdDate:t.createdDate||date})))).map(t=>({Created_Date:t.createdDate,Completed_Date:t.completedDate,Order:t.text,Why:t.why||t.reason,Done:t.done,Failure_Reason:t.failReason||t.missReason}));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(todoRows),'Orders');
    const acadRows=academySessions.map(s=>{const d=disciplines.find(x=>x.id===s.disciplineId);return{Date:s.date,Discipline:d?.name,Minutes:s.minutes,Notes:s.notes};});
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(acadRows),'Royal Academy');
    XLSX.writeFile(wb,`SOVEREIGN_${today()}.xlsx`);
  };
  return(
    <div style={{padding:14}}>
      
      

      
      

      <h2 style={S.h2}>Forge — Settings</h2>

      <div style={S.card}>
        <div style={S.h3}>Intel Week Definition</div>
        <label style={S.lbl}>Week Starts On</label>
        <select style={S.inp} value={form.weekStart||'sunday'} onChange={e=>setForm(f=>({...f,weekStart:e.target.value}))}>
          <option value="sunday">Sunday</option>
          <option value="monday">Monday</option>
          <option value="tuesday">Tuesday</option>
          <option value="wednesday">Wednesday</option>
          <option value="thursday">Thursday</option>
          <option value="friday">Friday</option>
          <option value="saturday">Saturday</option>
        </select>
        <div style={{color:T.muted,fontSize:12,marginTop:8}}>Intel will calculate weekly status using this start day.</div>
      </div>

      <div style={S.card}>
        <div style={S.h3}>Top & Bottom Bar Size</div>
        <label style={S.lbl}>Panel Font Size: {Math.round((form.barScale||form.navFontScale||1.35)*100)}%</label>
        <input type="range" min="0.85" max="2.25" step="0.05" value={form.barScale||form.navFontScale||1.35}
          onChange={e=>setForm(f=>({...f,barScale:Number(e.target.value),navFontScale:Number(e.target.value)}))}
          style={{width:'100%',margin:'8px 0 8px'}}/>
        <div style={{color:T.muted,fontSize:12,marginTop:8}}>One slider controls the top emperor/date bar and the bottom navigation bar.</div>
      </div>


      <div style={S.card}>
        <div style={S.h3}>Emperor & Empire</div>
        <label style={S.lbl}>Emperor Name</label><input placeholder="Emperor name" style={{...S.inp,marginBottom:10}} value={form.emperorName} onChange={e=>setForm(f=>({...f,emperorName:e.target.value}))}/>
        <label style={S.lbl}>Capital City</label><input placeholder="Your capital city name..." style={S.inp} value={form.capitalName||''} onChange={e=>setForm(f=>({...f,capitalName:e.target.value}))}/>
      </div>
      <div style={S.card}>
        <div style={S.h3}>Commanders</div>
        {form.commanderNames.map((c,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,paddingBottom:8,borderBottom:`1px solid ${T.border}`}}><span style={{color:T.text,fontSize:13}}>{c}</span><button onClick={()=>delCmd(i)} style={{...S.btnD,padding:'3px 10px',fontSize:11,minHeight:30}}>Remove</button></div>)}
        <div style={{display:'flex',gap:8,marginTop:4}}><input placeholder="New commander name" style={S.inp} value={newCmd} onChange={e=>setNewCmd(e.target.value)}/><button onClick={addCmd} style={{...S.btn,padding:'11px 14px'}}>Add</button></div>
      </div>
      <div style={S.card}>
        <div style={S.h3}>Commander per Page</div>
        {NAV.map(n=><div key={n.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}><span style={{color:T.text,fontSize:11,width:70}}>{n.label}</span><div style={{display:'flex',gap:3,flexWrap:'wrap',flex:1,justifyContent:'flex-end'}}>{form.commanderNames.map((c,i)=><Chip key={i} label={c.replace('Commander ','')} active={(form.pageCommanders||{})[n.id]===i} color={T.gold} onClick={()=>setPageCmd(n.id,i)} sm/>)}</div></div>)}
      </div>
      <div style={S.card}><div style={S.h3}>Weight Goals</div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}><div><label style={S.lbl}>Start (kg)</label><input type="number" style={S.inp} value={form.startWeight||''} onChange={e=>setForm(f=>({...f,startWeight:Number(e.target.value)}))}/></div><div><label style={S.lbl}>Target (kg)</label><input type="number" style={S.inp} value={form.targetWeight||''} onChange={e=>setForm(f=>({...f,targetWeight:Number(e.target.value)}))}/></div></div></div>
      <div style={S.card}>
        <div style={S.h3}>Motivation Quotes</div>
        <div style={{color:T.muted,fontSize:11,marginBottom:8}}>Rotate on Command dashboard. Write your own.</div>
        {(form.motivationQuotes||[]).map((q,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:7,paddingBottom:7,borderBottom:`1px solid ${T.border}`}}><span style={{color:T.text,fontSize:12,flex:1,fontStyle:'italic',lineHeight:1.5}}>{q}</span><button onClick={()=>delQuote(i)} style={{...S.btnD,padding:'2px 8px',fontSize:11,minHeight:28,marginLeft:8}}>×</button></div>)}
        <div style={{display:'flex',gap:8,marginTop:4}}><input placeholder="Write a war quote..." style={S.inp} value={newQuote} onChange={e=>setNewQuote(e.target.value)}/><button onClick={addQuote} style={{...S.btn,padding:'11px 14px'}}>Add</button></div>
      </div>
      <button onClick={save} style={{...S.btn,width:'100%',padding:14,marginBottom:10,fontSize:15,background:saved?'#1a5c2a':T.gold}}>{saved?'✓ Saved — All changes applied':'Save All Settings'}</button>
      

      <div style={S.card}>
        <div style={S.h3}>Imperial Archive</div>
        <div style={{color:T.muted,fontSize:12,lineHeight:1.5,marginBottom:10}}>
          Export all Sovereign data into one archive file, or import an archive onto this device.
        </div>
        <button type="button" onClick={exportSovereignArchive} style={{...S.btn,width:'100%',marginBottom:8}}>Export Imperial Archive</button>
        <label style={{...S.btnO,display:'block',textAlign:'center',width:'100%',boxSizing:'border-box'}}>
          Import Imperial Archive
          <input type="file" accept="application/json,.json,.sov" style={{display:'none'}} onChange={e=>{const f=e.target.files?.[0];if(f)importSovereignArchive(f).catch(err=>alert(err.message||'Import failed'));e.target.value='';}}/>
        </label>
      </div>

      <div style={S.card}>
        <div style={S.h3}>Change Imperial Seal</div>
        <input type="password" placeholder="Current Seal" style={{...S.inp,marginBottom:8}} value={oldSeal} onChange={e=>setOldSeal(e.target.value)}/>
        <input type="password" placeholder="New Seal" style={{...S.inp,marginBottom:8}} value={newSeal} onChange={e=>setNewSeal(e.target.value)}/>
        <input type="password" placeholder="Confirm New Seal" style={{...S.inp,marginBottom:8}} value={newSeal2} onChange={e=>setNewSeal2(e.target.value)}/>
        <button type="button" onClick={changeImperialSeal} style={{...S.btn,width:'100%'}}>Change Seal</button>
      </div>

      <div style={{...S.card,border:`1px solid ${T.crimson}`}}>
        <div style={{...S.h3,color:T.crimson}}>Danger Zone — Clear All Data</div>
        <div style={{color:T.muted,fontSize:12,lineHeight:1.5,marginBottom:10}}>
          This deletes all Sovereign data saved on this device/browser: vitals, academy, campaigns, lore, factions, events, orders, and Intel history.
        </div>
        <label style={S.lbl}>Type DELETE to confirm</label>
        <input style={{...S.inp,marginBottom:8}} value={deleteConfirm} onChange={e=>setDeleteConfirm(e.target.value)} placeholder="DELETE"/>
        <button type="button" onClick={clearAllData} style={{...S.btnD,width:'100%',padding:14}}>
          Clear All Data On This Device
        </button>
      </div>

      <div style={S.card}><div style={S.h3}>Export Data</div><div style={{color:T.muted,fontSize:11,marginBottom:10}}>Core modules exported as separate Excel sheets.</div><button onClick={exportExcel} style={{...S.btn,background:'#1a5c2a',width:'100%'}}>↓ Export to Excel</button></div>
    </div>
  );
};

// ── MAIN APP ──────────────────────────────────────────────────────────

const QuickTabNavigator=({setPage})=>{
  const [open,setOpen]=useState(false);
  const tabs=[
    ['dashboard','COMMAND'],
    ['vitals','VITALS'],
    ['healer','WITCH'],
    ['workout','WARFARE'],
    ['zcycle','MIND'],
    ['ycycle','TREASURY'],
    ['food','RATIONS'],
    ['lore','LORE'],
    ['rituals','RITUALS'],
    ['campaigns','CAMPAIGNS'],
    ['expeditions','EXPEDITIONS'],
    ['calendar','WAR MAP'],
    ['events','EVENTS'],
    ['backdate','BACKDATE'],
    ['archive','ARCHIVE'],
    ['fiefs','FIEFS'],
    ['relations','FACTIONS'],
    ['todos','ORDERS'],
    ['summary','INTEL'],
    ['academy','ACADEMY'],
    ['settings','FORGE']
  ];
  return(
    <>
      {open&&<div className="quickNavMenu">
        {tabs.map(([id,label])=>
          <button key={id} type="button" className="quickNavChip" onClick={()=>{setPage(id);setOpen(false);}}>
            {label}
          </button>
        )}
      </div>}
      <button type="button" className="quickNavBtn" onClick={()=>setOpen(o=>!o)} aria-label="Quick tab selector">☰</button>
    </>
  );
};

const App=()=>{
  const [page,setPage]=useState('dashboard');
  const [settings,setSettings]=useState(DEF);
  const [dailyLogs,setDailyLogs]=useState({});
  const [workouts,setWorkouts]=useState([]);
  const [foodLogs,setFoodLogs]=useState([]);
  const [ycycle,setYcycle]=useState([]);
  const [relations,setRelations]=useState([]);
  const [campaigns,setCampaigns]=useState([]);
  const [commander,setCommander]=useState('');
  const [target,setTarget]=useState('');
  const [stories,setStories]=useState([]);
  const [todos,setTodos]=useState({});
  const [challengeLog,setChallengeLog]=useState({});
  const [disciplines,setDisciplines]=useState([]);
  const [academySessions,setAcademySessions]=useState([]);
  const [events,setEvents]=useState([]);
  const [fiefs,setFiefs]=useState([]);
  const [meds,setMeds]=useState([]);
  const [medLog,setMedLog]=useState({});
  const [rituals,setRituals]=useState([]);
  const [ritualLog,setRitualLog]=useState({});
  const [expeditions,setExpeditions]=useState([]);
  const [selectedArchiveDate,setSelectedArchiveDate]=useState(today());
  const [dayKey,setDayKey]=useState(today());

  useEffect(()=>{
    const scale=settings.barScale||settings.navFontScale||1.35;
    document.documentElement.style.setProperty('--sovereign-font-scale',1);
    document.documentElement.style.setProperty('--sovereign-nav-scale',scale);
    document.documentElement.style.setProperty('--sovereign-bar-scale',scale);
  },[settings.barScale,settings.navFontScale]);
  
  useEffect(()=>{
    const tick=()=>{
      const t=today();
      if(t!==dayKey)setDayKey(t);
    };
    const iv=setInterval(tick,30000);
    return()=>clearInterval(iv);
  },[dayKey]);

  const [musicOn,setMusicOn]=useState(localStorage.getItem('sovereign_music')!=='off');
  const toggleMusic=()=>{
    const audio=document.getElementById('imperial-audio');
    if(!audio)return;
    audio.volume=0.12;
    if(audio.paused){
      audio.play().then(()=>{
        setMusicOn(true);
        localStorage.setItem('sovereign_music','on');
      }).catch(err=>console.warn('Audio blocked until user taps again',err));
    }else{
      audio.pause();
      setMusicOn(false);
      localStorage.setItem('sovereign_music','off');
    }
  };
  useEffect(()=>{
    const audio=document.getElementById('imperial-audio');
    if(!audio)return;
    audio.volume=0.12;
    if(localStorage.getItem('sovereign_music')==='off'){
      setMusicOn(false);
      return;
    }
    const tryPlay=()=>{
      audio.play().then(()=>setMusicOn(true)).catch(()=>setMusicOn(false));
      window.removeEventListener('pointerdown',tryPlay);
      window.removeEventListener('keydown',tryPlay);
    };
    audio.play().then(()=>setMusicOn(true)).catch(()=>{
      window.addEventListener('pointerdown',tryPlay,{once:true});
      window.addEventListener('keydown',tryPlay,{once:true});
    });
  },[]);

  useEffect(()=>{
    const splash=document.getElementById('splash');
    (async()=>{
      const[s,dl,w,fl,y,r,c,st,t,cl,disc,as]=await Promise.all([
        db.get('settings'),db.get('daily_logs'),db.get('workouts'),db.get('food_logs'),
        db.get('ycycle'),db.get('relations'),db.get('campaigns'),db.get('stories'),
        db.get('todos'),db.get('challenge_log'),db.get('academy_disciplines'),db.get('academy_sessions'),
      ]);
      if(s)setSettings({...DEF,...s,pageCommanders:{...DEF.pageCommanders,...(s.pageCommanders||{})}});
      if(dl)setDailyLogs(dl);if(w)setWorkouts(w);if(fl)setFoodLogs(fl);if(y)setYcycle(y);
      if(r)setRelations(r);if(c)setCampaigns(c);if(st)setStories(st);if(t)setTodos(t);
      if(cl)setChallengeLog(cl);if(disc)setDisciplines(disc);if(as)setAcademySessions(as);
      const ev=await db.get('events'); if(ev&&typeof setEvents==='function')setEvents(ev);
      const fh=await db.get('fiefs'); if(fh)setFiefs(fh);
      const md=await db.get('meds'); if(md)setMeds(md);
      const ml=await db.get('med_log'); if(ml)setMedLog(ml);
      const rt=await db.get('rituals'); if(rt)setRituals(rt);
      const rl=await db.get('ritual_log'); if(rl)setRitualLog(rl);
      const ex=await db.get('expeditions'); if(ex)setExpeditions(ex);
      if(splash)splash.style.display='none';
    })().catch(err=>{
      console.error('SOVEREIGN startup failed',err);
      if(splash){
        splash.style.display='flex';
        splash.innerHTML='<h1>SOVEREIGN ERROR</h1><p style="max-width:320px;text-align:center;color:#c9a227;line-height:1.5;">'+(err.message||'Startup failed')+'</p><p style="color:#6a5a45;">Open Console for details.</p>';
      }
    });
    if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
  },[]);

  const render=()=>{
    switch(page){
      case'dashboard':return<Dashboard dailyLogs={dailyLogs} settings={settings} todos={todos} campaigns={campaigns} workouts={workouts} academySessions={academySessions} meds={meds} medLog={medLog} ycycle={ycycle} setYcycle={setYcycle}/>;
      case'vitals':return<Vitals dailyLogs={dailyLogs} setDailyLogs={setDailyLogs}/>;
      case'healer':return<ImperialHighWitch meds={meds} setMeds={setMeds} medLog={medLog} setMedLog={setMedLog}/>;
      case'workout':return<Workout workouts={workouts} setWorkouts={setWorkouts}/>;
      case'zcycle':return<ZCycle dailyLogs={dailyLogs} setDailyLogs={setDailyLogs}/>;
      case'ycycle':return<YCycle ycycle={ycycle} setYcycle={setYcycle}/>;
      case'food':return<FoodCycle foodLogs={foodLogs} setFoodLogs={setFoodLogs}/>;
      case'lore':return<LorePage stories={stories} setStories={setStories}/>;
      case'rituals':return<RitualsPage rituals={rituals} setRituals={setRituals} ritualLog={ritualLog} setRitualLog={setRitualLog}/>;
      case'campaigns':return<Campaigns campaigns={campaigns} setCampaigns={setCampaigns} challengeLog={challengeLog} setChallengeLog={setChallengeLog}/>;
      case'expeditions':return<ExpeditionsPage expeditions={expeditions} setExpeditions={setExpeditions}/>;
      case'backdate':return<BackdateMap dailyLogs={dailyLogs} setDailyLogs={setDailyLogs} foodLogs={foodLogs} setFoodLogs={setFoodLogs} ycycle={ycycle} setYcycle={setYcycle} academySessions={academySessions} setAcademySessions={setAcademySessions} disciplines={disciplines}/>;
      case'archive':return<DateArchive dailyLogs={dailyLogs} workouts={workouts} foodLogs={foodLogs} ycycle={ycycle} challengeLog={challengeLog} campaigns={campaigns} academySessions={academySessions} events={events}/>;
      case'events':return<EventsTab events={events} setEvents={setEvents} dailyLogs={dailyLogs} workouts={workouts} foodLogs={foodLogs} ycycle={ycycle} challengeLog={challengeLog} campaigns={campaigns} academySessions={academySessions}/>;
      case'calendar':return<WeightCalendar dailyLogs={dailyLogs} setDailyLogs={setDailyLogs} settings={settings} workouts={workouts} academySessions={academySessions} disciplines={disciplines} foodLogs={foodLogs} ycycle={ycycle} challengeLog={challengeLog} campaigns={campaigns} events={events}/>;
      case'fiefs':return<FiefsPage fiefs={fiefs} setFiefs={setFiefs}/>;
      case'relations':return<Relationships relations={relations} setRelations={setRelations}/>;
      case'todos':return<TodoList todos={todos} setTodos={setTodos}/>;
      case'summary':return<WeeklySummary dailyLogs={dailyLogs} workouts={workouts} foodLogs={foodLogs} ycycle={ycycle} challengeLog={challengeLog} campaigns={campaigns} settings={settings}/>;
      case'academy':return<RoyalAcademy disciplines={disciplines} setDisciplines={setDisciplines} sessions={academySessions} setSessions={setAcademySessions}/>;
      case'settings':return<Settings settings={settings} setSettings={setSettings} dailyLogs={dailyLogs} workouts={workouts} foodLogs={foodLogs} ycycle={ycycle} relations={relations} campaigns={campaigns} stories={stories} todos={todos} disciplines={disciplines} academySessions={academySessions} challengeLog={challengeLog}/>;
      default:return null;
    }
  };

  return(
    <div style={{background:T.bg,height:'100vh',height:'100dvh',color:T.text,fontFamily:"'Crimson Text',serif",fontSize:`calc(16px * var(--sovereign-font-scale))`,display:'flex',flexDirection:'column',overflow:'hidden',maxWidth:480,margin:'0 auto'}}>
      <audio id="imperial-audio" src="./music/The_Dark_Castle.mp3" loop preload="none"></audio>
      <button onClick={toggleMusic} title="Toggle imperial ambience" style={{position:'fixed',right:12,bottom:68,zIndex:1000,background:musicOn?T.gold:T.card,color:musicOn?'#000':T.gold,border:`1px solid ${T.gold}66`,borderRadius:999,padding:'9px 12px',fontSize:12,fontWeight:700,fontFamily:'inherit',boxShadow:'0 6px 20px #0008'}}>
        {musicOn?'♫ ON':'♫ OFF'}
      </button>
      <TopBar settings={settings} page={page}/>
      <div key={dayKey} style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
        <TabHero page={page}/>
        {render()}
        <div style={{height:24}}/>
      </div>
      <QuickTabNavigator setPage={setPage}/>
      <BottomNav page={page} setPage={setPage}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<SealGate><App/></SealGate>);
</script>
</body>
</html>
