window.addEventListener('error', function(e) {

  }
});

  var splash = document.getElementById('splash');
  if (splash) {
    splash.style.display = 'flex';
    splash.innerHTML =
      '<h1>SOVEREIGN ERROR</h1>' +

      '<p style="max-width:320px;text-align:center;line-height:1.5;color:#6a5a45;">Open Console for details.</p>';
  }
});
</script>

const imageToSmallBase64=(file,maxW=900,quality=.72)=>new Promise((resolve,reject)=>{
  const img=new Image();
  const reader=new FileReader();
  reader.onload=()=>{
    img.onload=()=>{
      const scale=Math.min(1,maxW/img.width);
      const canvas=document.createElement('canvas');
      canvas.width=Math.round(img.width*scale);
      canvas.height=Math.round(img.height*scale);
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      resolve(canvas.toDataURL('image/jpeg',quality));
    };
    img.onerror=reject;
    img.src=reader.result;
  };
  reader.onerror=reject;
  reader.readAsDataURL(file);
});

const getWeekDates=off=>{
  const d=new Date(),day=d.getDay();
  const mon=new Date(d);
  mon.setDate(d.getDate()-(day===0?6:day-1)+(off*7));
  return Array.from({length:7},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return x.toISOString().split('T')[0];});
};
const getIntelTier=score=>{
  if(score>=91)return{status:'Golden Reign',img:'./images/intel/91.jpg',color:'#8bdc4a'};
  if(score>=76)return{status:'Strong Kingdom',img:'./images/intel/76.jpg',color:'#8bdc4a'};
  if(score>=61)return{status:'Steady Kingdom',img:'./images/intel/61.jpg',color:T.gold};
  if(score>=41)return{status:'Wounded Kingdom',img:'./images/intel/41.jpg',color:'#f08a24'};
  if(score>=26)return{status:'Crumbling Kingdom',img:'./images/intel/26.jpg',color:'#ff6a1a'};
  if(score>=11)return{status:'Fallen Kingdom',img:'./images/intel/11.jpg',color:'#ff4a3d'};
  return{status:'Kingdom in Shambles',img:'./images/intel/0.jpg',color:'#ff3b30'};
};
const calcWeeklyIntel=(dates,challengeLog,campaigns)=>{
  const battleWins=dates.filter(d=>(challengeLog[d]||{}).outcome==='won').length;
  const battleLosses=dates.filter(d=>(challengeLog[d]||{}).outcome==='lost').length;
  const campaignVictories=campaigns.filter(c=>dates.includes((c.completedDate||c.endDate||'').slice(0,10))&&(c.status==='completed'||c.status==='victory')).length;
  const campaignFailures=campaigns.filter(c=>dates.includes((c.failedDate||c.endDate||'').slice(0,10))&&c.status==='failed').length;
  const wins=battleWins+campaignVictories;
  const losses=battleLosses+campaignFailures;
  const total=wins+losses;
  const score=total?Math.round((wins/total)*100):50;
  return{score,...getIntelTier(score),battleWins,battleLosses,campaignVictories,campaignFailures,wins,losses,total};
};
const getRandomDailyThreat=(date,currentEntry)=>{
  if(currentEntry?.threatId){
    return THREATS.find(t=>t.id===currentEntry.threatId)||THREATS[0];
  }
  let used=[];
  try{used=JSON.parse(localStorage.getItem('sovereign_used_threats')||'[]');}catch{used=[];}
  if(used.length>=THREATS.length)used=[];
  const available=THREATS.filter(t=>!used.includes(t.id));
  const pick=available[Math.floor(Math.random()*available.length)]||THREATS[Math.floor(Math.random()*THREATS.length)];
  used.push(pick.id);
  localStorage.setItem('sovereign_used_threats',JSON.stringify(used));
  return pick;
};

{id:33,type:'Plague',name:'The Grey Death',threat:"The Grey Death causes soldiers to fall into a deep sleep from which they never wake. 150 are currently sleeping in the eastern barracks. It spreads nightly.",win:"The Grey Death is traced to poisoned incense burned in the barracks. The incense-maker is arrested. All sleeping soldiers wake.",lose:"500 soldiers sleep forever. The eastern barracks becomes a silent dormitory of the dead. The incense-maker is never found."},
{id:34,type:'Plague',name:'The Iron Rust',threat:"The Iron Rust corrodes metal from inside — armour crumbles while being worn, weapons snap at the blade. The entire armoury is infected. 3,000 soldiers are unarmoured.",win:"The Iron Rust is neutralised by a salt-and-fire treatment. The armoury is purged and restocked before the enemy learns of it.",lose:"The Bloody Red Army discovers the empire's armament failure and attacks during the vulnerability window. 200 unarmoured soldiers die."},
{id:35,type:'Plague',name:'Plague Bearer Theron',threat:"Plague Bearer Theron — a formerly holy priest consumed by disease — wanders the capital blessing the faithful, spreading infection through gesture. 300 infected and he believes he is healing.",win:"Theron is compassionately quarantined. The disease is destroyed. Theron, freed from infection, weeps at what he has done.",lose:"Theron reaches the central temple and blesses the entire congregation at once — 800 infected in a single hour."},
{id:36,type:'Plague',name:'The Black Breath Epidemic',threat:"Enemy agents released Virenth the Plague Drake's breath into the water supply. Citizens are mutating — growing scales and losing reason — and attacking their neighbours.",win:"The mutagen is identified and an antidote synthesised. All 400 mutating citizens are returned to human form. The agent is captured.",lose:"80 citizens mutate fully into something inhuman. Three escape into the city. Public panic costs the empire significant political stability."},
{id:37,type:'Plague',name:'The Weeping Sickness',threat:"The Weeping Sickness causes permanent blindness after 24 hours — victims weep black tears before sight fails. It has blinded 200 soldiers. It spreads through eye contact.",win:"The Weeping Sickness is cured with a rare extract. All 200 blinded soldiers regain sight.",lose:"600 soldiers are permanently blinded. The archery corps is destroyed entirely. All ranged defence is compromised for months."},
{id:38,type:'Plague',name:'The Void Spores',threat:"The Void Spores — a black fungal infection — control their hosts like puppets while appearing fully human. Infected soldiers carry out subtle sabotage. 100 confirmed infected.",win:"A detection ritual identifies all infected soldiers. They are cured using antifungal flame therapy. The sabotage is reversed.",lose:"An infected general destroys the grain stores. Three months of food is gone. The Void Spores are found in the palace kitchen staff."},
{id:39,type:'Plague',name:'The Burning Madness',threat:"The Burning Madness is a rage-plague — infected soldiers attack whoever is nearest. Three internal battles have already occurred. Twenty soldiers dead from friendly fire.",win:"The Burning Madness is traced to a specific grain batch. It is destroyed. Infected soldiers are restrained until the madness passes.",lose:"The Burning Madness triggers a full internal battle in the western barracks. 80 soldiers die fighting each other."},
{id:40,type:'Plague',name:'The Last Harvest Blight',threat:"The Last Harvest Blight has destroyed every crop within 50 miles of the capital. The imperial food supply will last thirty days. Winter begins in twenty.",win:"Emergency trade routes are established and the Blight's source — a saboteur's buried ritual stone — is found and destroyed.",lose:"The empire faces famine. Two outer provinces declare independence. Riots in the capital kill 40 civilians."},
{id:41,type:'Army',name:'The Bloody Red Army',threat:"50,000 berserkers march on the capital with no terms and no mercy. Their war standard is made from the skins of the last three emperors they defeated.",win:"The Bloody Red Army is broken at the Valley of Sorrath. Their warlord is captured and publicly tried. The standard is burned.",lose:"The Bloody Red Army breaches the outer wall. Three districts are sacked. General Halveth is killed holding the second gate."},
{id:42,type:'Army',name:'The Iron Veil Faction',threat:"Three neighbouring kingdoms have unified for the first time in a century expressly to destroy the empire. Their combined army of 80,000 assembles at the border.",win:"The Faction is fractured diplomatically before battle. One kingdom is bribed, one threatened, one fights alone and loses.",lose:"The Iron Veil pushes through the northern border. Two frontier provinces are occupied. The empire loses 20% of its territory in two weeks."},
{id:43,type:'Army',name:'The Shadow Compact',threat:"The Shadow Compact has accepted a contract to eliminate every imperial leader above captain rank within thirty days. Three have already died this week.",win:"The Shadow Compact's contract is bought out by a higher counter-offer. They stand down. Three rogue agents are captured.",lose:"The Shadow Compact kills four ministers, two generals, and Admiral Keth within the month."},
{id:44,type:'Army',name:"Jarl Theron's Northern Warhost",threat:"Jarl Theron leads 15,000 northern raiders who breached the coastal fortifications using the frozen sea as a road. Three coastal towns are already ash.",win:"Jarl Theron's fleet is trapped by a southern thaw. His warhost is surrounded and forced to surrender.",lose:"Jarl Theron sacks Port Halveth. Admiral Reth's entire northern squadron is burned at anchor."},
{id:45,type:'Army',name:'Lord Valdris and his Steel Legion',threat:"Lord Valdris has deployed forbidden mechanical war machines — steam-powered constructs that feel no pain and never tire — advancing on the eastern gate.",win:"The constructs' fuel lines are sabotaged. They grind to a halt. Lord Valdris is captured and his engineering blueprints confiscated.",lose:"Two constructs breach the eastern gate and rampage through the docklands. Lord Valdris escapes with half his blueprints."},
{id:46,type:'Army',name:'The Crimson Brotherhood',threat:"The Crimson Brotherhood has declared the Emperor a heretic and laid siege to the capital with 20,000 faithful who fight without fear of death.",win:"The Brotherhood's High Priest is captured and put on public trial. His rhetoric collapses. Half the Brotherhood lays down arms.",lose:"The Brotherhood holds the eastern gate for six days. Sir Davos the Knight is captured trying to break the siege, held for ransom."},
{id:47,type:'Army',name:'The Sand Kings Coalition',threat:"Seven desert kingdoms have blockaded every southern trade road. The empire's silk, spice, and medicine imports are cut. The economy begins bleeding immediately.",win:"The Coalition is divided by targeted diplomacy. Three Sand Kings defect for individual trade deals. The blockade dissolves.",lose:"The southern blockade holds for two months. Medicine shortages affect three hospitals. Inflation rises 40%."},
{id:48,type:'Army',name:'Admiral Keth and the Iron Fleet',threat:"Admiral Keth — the empire's former naval hero, now defected — commands 200 warships blockading every port. Coastal cities have ten days of supplies.",win:"Keth's flagship is sunk in a daring night raid. The Iron Fleet scatters. Keth is captured. He reveals he was blackmailed.",lose:"Coastal cities run out of supplies. Port Halveth opens its gate without a siege. Three cities change flags within the week."},
{id:49,type:'Army',name:'The Mercenary King Drogan',threat:"Drogan has been hired by an unknown power and arrives with 30,000 professional soldiers — better equipped than the imperial army. He makes no demands. He simply advances.",win:"Drogan's employers are identified and their payment intercepted. With no gold, Drogan's army dissolves. Half offer to switch sides.",lose:"Drogan's army defeats the western regiment. Captain Halveth surrenders. Drogan claims the western province for his unknown employer."},
{id:50,type:'Army',name:"The Eastern Khanate of Bor'ak",threat:"25,000 light cavalry sweep into the empire's agricultural heartland. They do not siege — they burn and move. Three breadbasket provinces are already on fire.",win:"The Khanate cavalry is funnelled into a canyon ambush. 8,000 riders captured. A favourable border treaty is signed.",lose:"The Khanate burns twelve farming villages. Agricultural output falls 30% for the year. General Morvaine is demoted after failing to stop them."},
{id:51,type:'Army',name:'Warlord Raxis the Skull Banner',threat:"Warlord Raxis has united every criminal faction into a single army of 18,000. They know the empire's roads better than its own soldiers.",win:"Raxis is betrayed by a rival crime lord bought off by the empire. He is arrested. Without him, the Skull Banner fractures.",lose:"Raxis captures three major road junctions. Trade within the empire halves overnight. The tax collector's regiment is ambushed and destroyed."},
{id:52,type:'Army',name:'General Morvaine the Betrayer',threat:"General Morvaine — fourth in imperial command — has defected with full knowledge of every battle plan, fortress weakness, and troop deployment.",win:"Morvaine is captured in a counter-trap using false intelligence he would know is real. He is brought back in chains and publicly stripped of all honours.",lose:"Morvaine leads three perfectly executed ambushes using stolen knowledge. Two forward regiments are annihilated."},
{id:53,type:'Army',name:'The Red Sun Cult',threat:"Red Sun Cult suicide soldiers embedded within the capital as civilians are activated. They fight to destroy specific targets. Three have already died killing senior officers.",win:"The Cult's network is identified through a captured member. 80 sleeper agents are arrested before activating.",lose:"Twelve cult members activate simultaneously. The imperial armoury, main bridge, and three barracks storerooms are destroyed."},
{id:54,type:'Army',name:'The Phantom Army of Velreth',threat:"The Phantom Army appears and disappears without warning — attacking, withdrawing, and materialising elsewhere. They have hit four locations in six hours and cannot be tracked.",win:"The Phantoms' anchor — a portal stone — is located and destroyed. The army is stranded in the physical world and rapidly defeated.",lose:"The Phantom Army kills 300 soldiers across seven hit-and-run strikes. Soldiers refuse night duty. Two commanders resign."},
{id:55,type:'Army',name:'The Siege Masters of Khorath',threat:"The finest engineers on the continent have built a fully operational siege fortress outside the capital's walls in twelve hours. They attack from a stronger position than the empire itself.",win:"The Khorath fortress is undermined and collapsed. The Siege Masters surrender. Three agree to defect and join the imperial engineering corps.",lose:"The Khorath fortress outlasts three counterattacks. From it, they batter the western wall until a 40-metre section collapses."},
{id:56,type:'Army',name:'The Black Arrows Guild',threat:"Precision archer-assassins have deployed on every high point surrounding the capital. Every general, minister, or official who appears in public is immediately targeted.",win:"All Black Arrow positions are simultaneously raided. Twenty-two archers captured. The Guild withdraws its contract.",lose:"Three generals are killed in daylight within the first day. All public functions are cancelled. Governance grinds to a halt for two weeks."},
{id:57,type:'Army',name:'The Twin Tyrants of Ghal',threat:"Two kings sharing a telepathic link and acting as a single perfect military mind lead 35,000 soldiers. They cannot be surprised, outmanoeuvred, or deceived.",win:"One twin is poisoned, severing the telepathic link. The surviving twin falls apart psychologically and surrenders within hours.",lose:"The Twin Tyrants defeat the imperial field army in a masterpiece of tactics. Captain Halveth is taken prisoner. A siege begins."},
{id:58,type:'Army',name:'The Undying Battalion',threat:"5,000 soldiers cursed to feel no pain advance on the gates. Two were seen fighting on with three arrows each. They cannot be frightened or worn down.",win:"The curse is identified and reversed using the enemy sorcerer's own formula. The Battalion collapses — they were hiding catastrophic wounds. They surrender.",lose:"The Battalion takes the gate. The gate is now held by corpses that refused to fall. The empire retreats to the inner wall."},
{id:59,type:'Army',name:'The Mountain Clans Uprising',threat:"Forty mountain tribes that have warred for two centuries have unified under a single leader and descend as one force of 22,000. Their unity is unprecedented.",win:"The Clan leader is identified as the only force holding the unity. He is brought to the table. A historic accord is signed.",lose:"The Mountain Clans sack two border fortresses. The unifying leader declares himself King of the Mountains — a new rival power is born."},
{id:60,type:'Army',name:"The Sea Witch's Armada",threat:"The Sea Witch Nareth commands 80 ships powered by eternal storms. Her ships cannot be sunk — the storms repair them. They blockade the harbour.",win:"The Sea Witch's storm source — a trident driven into the harbour floor — is recovered by divers and destroyed. The fleet is exposed as ordinary ships.",lose:"The Sea Witch's fleet holds the harbour for three weeks. Two merchant convoys are destroyed. The empire cedes one coastal island in a peace deal."},
{id:61,type:'Army',name:'The Burning Host of Kerath',threat:"The Burning Host carries alchemical fire that cannot be extinguished by water. 15,000 soldiers armed with fire-throwers advance on the wooden districts.",win:"The alchemical fire's solvent is identified and deployed in advance. The Burning Host's weapons sputter and die on contact.",lose:"The wooden districts are set ablaze. 6,000 civilians evacuated. The fire burns for two days. Three entire city blocks are destroyed."},
{id:62,type:'Army',name:'The Pale Riders of Sorrath',threat:"The Pale Riders move three times faster than any cavalry. In three hours they have hit eleven positions simultaneously across the eastern front.",win:"The Pale Riders' supernatural speed requires a ritual fuel — a specific rare herb. The fuel is embargoed and they slow to normal speed.",lose:"The Pale Riders destroy four supply depots in a single day. The eastern front collapses. Three commanders break under the pressure."},
{id:63,type:'Army',name:'The Rebel Faction of the Red Throne',threat:"Four noble houses, the merchant guild, and a rogue regiment have united to storm the palace. They claim corruption and misrule. They have 8,000 soldiers and the public's sympathy.",win:"The genuine grievances are acknowledged publicly. Three corrupt officials are dismissed. The rebel lords are brought into a reformed council.",lose:"The rebel alliance takes the palace courtyard. The Emperor flees the city for twelve days. Sir Davos holds the inner palace alone with 40 guards."},
{id:64,type:'Army',name:"The Exiled Prince Rovan's Return",threat:"Exiled Prince Rovan returns with a foreign army of 28,000 soldiers and a legitimate throne claim backed by three foreign courts. Half the border lords are already wavering.",win:"Prince Rovan's claim is legally defeated in the Council of Lords. The foreign army retreats. The wavering lords are watched carefully.",lose:"Three border lords defect to Rovan. He controls the northwestern quarter. A civil war line is drawn."},
{id:65,type:'Army',name:'The Iron Church Inquisition',threat:"The Iron Church has declared a Holy Inquisition against the empire citing seventeen heresies. Their army of 30,000 faithful march under divine mandate. They believe they cannot lose.",win:"A theological debate defeats the Inquisition's case publicly. Three senior church figures defect. The Inquisition loses divine sanction and collapses.",lose:"The Iron Church burns the imperial library — 40,000 texts lost forever. The empire is declared heretical by six allied kingdoms."},
{id:66,type:'Monster',name:'The Kraken of the Eastern Sea',threat:"The Kraken — the size of a warship — has destroyed twelve vessels in four days. The entire eastern sea route is closed. The naval base at Port Halveth is under attack now.",win:"The Kraken is lured into shallow water and slain with harpoon batteries. Its oil fuels the harbour lamps for a decade.",lose:"The Kraken destroys Port Halveth naval base entirely. Admiral Reth's flagship goes down with him aboard. The empire has no eastern fleet."},
{id:67,type:'Monster',name:'The Colossus of Morrath',threat:"A 100-foot stone giant awakened by sorcery walks slowly but unstoppably toward the capital. It has already flattened two villages. It will reach the walls in twenty hours.",win:"The Colossus's animating rune — carved on the base of its left foot — is destroyed by a daring climber. It freezes mid-stride and becomes a monument.",lose:"The Colossus breaches the northern wall with a single step. It walks through four city blocks. The structural damage is catastrophic."},
{id:68,type:'Monster',name:"The Swarm of Vel'thor",threat:"Billions of tiny flesh-eating insects drift toward the capital on the wind. They have stripped three horses to the bone in under a minute. They do not fight. They consume.",win:"The Swarm's hive mind is disrupted by a high-frequency horn discovered in the vaults. The swarm disperses harmlessly. The horn is locked away.",lose:"The Swarm passes through the eastern district. 200 civilians and 40 soldiers are lost before the city seals itself."},
{id:69,type:'Monster',name:'The Bone Giants of the Wastes',threat:"Five Bone Giants — ancient magical constructs, each thirty feet tall — emerge from the eastern wastes. They feel nothing and follow a single ancient protocol: destroy.",win:"The Giants' deactivation command is found in ancient texts and spoken aloud. All five freeze simultaneously and become eerie monuments.",lose:"Two Bone Giants tear a fifty-metre wall section down. General Halveth is killed when the wall collapses on the command post."},
{id:70,type:'Monster',name:'Gorrax the Troll King',threat:"Gorrax the Troll King has united 10,000 trolls who descend from the mountains in a disorganised but unstoppable wave. Trolls regenerate all wounds. Fire is the only answer.",win:"Gorrax is isolated and killed with directed fire. Without their king, the trolls lose coherence and retreat to their separate mountains.",lose:"The troll wave reaches the outer farms. Villages are flattened. 400 soldiers are injured fighting trolls without fire."},
{id:71,type:'Monster',name:'The Leviathan Plague Serpent',threat:"A 200-foot river serpent bloated with disease has entered the River Aldrath. Its very body poisons the water. Downstream cities are already reporting sickness.",win:"The Leviathan is drawn to a tributary and killed using massive harpoon engines. Its body is burned on a raft. The river runs clean within three days.",lose:"The Leviathan reaches the capital's river gate. The water supply is poisoned. 4,000 civilians fall ill. The river is closed for a month."},
{id:72,type:'Monster',name:'The Void Wolves of Arkon',threat:"Shadow wolves that cannot be harmed by steel or fire pass through walls. Three have been spotted inside the barracks. Seven soldiers are dead and no one saw how.",win:"The Void Wolves' weakness — sacred salt — is found in an old bestiary. Salt lines are laid throughout the barracks. The Wolves leave for easier prey.",lose:"The Void Wolves kill twelve more soldiers and wound General Reth before being accidentally driven off. Barracks morale is devastated."},
{id:73,type:'Monster',name:'The Chimera Brood of Selthas',threat:"Selthas the Breeder has released 500 chimera simultaneously into the surrounding countryside attacking in coordinated groups. The roads to the capital are severed.",win:"Selthas is found and killed, dispersing the brood's coordination. Individual chimera are hunted efficiently. The last one is killed twelve days later.",lose:"The chimera sever all three supply roads. Forty soldiers are killed in road-clearing attempts. Two aerial couriers are killed mid-flight."},
{id:74,type:'Monster',name:'Basilisk Queen Essa',threat:"Basilisk Queen Essa leads 200 basilisks toward the gate. Her own gaze can turn a group of ten to stone in a single glance. 80 soldiers are already statues in the eastern field.",win:"Essa is faced with a mirror array. Her own reflected gaze turns her to stone. Her basilisks scatter. A cure for the 80 stone soldiers is eventually found.",lose:"Essa reaches the gate and turns the entire gate guard — 40 soldiers — to stone in one look. The east gate is permanently closed."},
{id:75,type:'Monster',name:'The Storm Titans of Velrath',threat:"Four Storm Titans — living tempests in humanoid form — tear apart the outer wall with elemental lightning and wind. They were summoned by a sorcerer and cannot be reasoned with.",win:"The Titans' summoner is found and killed, severing the call. The Titans disperse into ordinary storms. The wall damage is contained.",lose:"Two sections of the outer wall are destroyed. One Titan reaches the market district and tears apart the trading hall. Six people die."},
{id:76,type:'Monster',name:'The Deep Crawler of Sorrath',threat:"A vast subterranean creature is tunnelling directly beneath the capital's foundations. Tremors grow hourly. The central plaza could collapse within the day.",win:"The Deep Crawler is redirected by vibration rings — its only fear. It burrows away. Its tunnel is sealed and the foundation reinforced.",lose:"The central plaza collapses into the Crawler's tunnel. Six buildings fall. The palace experiences structural damage."},
{id:77,type:'Monster',name:'The Hydra of Redmere',threat:"The seven-headed Hydra of Redmere has made its nest on the main supply road bridge. Every cut spawns two more heads. No supply convoy can pass for three days.",win:"The Hydra's necks are cauterised with fire after each cut. Unable to regrow, it is killed with seven simultaneous strikes. The bridge is renamed the Hydra Crossing.",lose:"The supply road is blocked for two weeks. An impatient general tries a solo attack and is killed. His regiment follows him into disaster."},
{id:78,type:'Monster',name:'The Mirror Wraith',threat:"The Mirror Wraith copies the appearance, voice, and skills of any soldier it encounters. Three people claiming to be General Halveth were found this morning. Command is paralysed.",win:"The Mirror Wraith cannot copy wounds. Every command figure is given a small identifying mark. The false Halveths are identified and the Wraith is cornered and shattered.",lose:"The Mirror Wraith impersonates Defence Minister Aldric and issues three false orders — withdrawing two regiments and opening a gate."},
{id:79,type:'Monster',name:'The Corrupted Treants of Vel',threat:"The ancient forest of Vel has been corrupted by dark magic. 300 living trees — treants — march on the western district. They are magically on fire without burning up.",win:"The corruption's source — a buried sorcerer's totem — is found and destroyed. The treants stop and slowly walk back to the forest. The fire dies.",lose:"The treants reach the western granary and burn it. The entire granary is lost. The western gate is destroyed by a treant walking through it."},
{id:80,type:'Monster',name:'The Wyvern Rider Army',threat:"500 wyvern-mounted warriors attack from the sky. They bypass the walls entirely. Arrows have limited effect at altitude. The central barracks is already being bombed.",win:"Anti-air ballista batteries thin the wyvern flock. Without air superiority, the riders retreat. Twelve wyverns are captured and an imperial sky cavalry program begins.",lose:"The wyvern riders destroy the command tower and imperial signal station. General Reth is injured. Communications are disrupted for two weeks."},
{id:81,type:'Monster',name:'The Sea Drake of Port Halveth',threat:"The Sea Drake has destroyed the fishing fleet in three days. Forty vessels sunk. The coastal city's food and economy depend entirely on the sea. Winter approaches.",win:"The Sea Drake is baited with a false fleet and harpooned in shallow water. The fishing economy recovers within a week. Three fishermen are given minor lordship.",lose:"The fishing fleet is entirely destroyed. Port Halveth's economy collapses. The city requests emergency food aid. Three fishing families emigrate to a rival kingdom."},
{id:82,type:'Monster',name:'The Behemoth of the Black Wastes',threat:"The Behemoth — the size of a castle, completely mindless — walks toward the capital crushing everything in its path. It does not attack. It simply walks. It arrives in eighteen hours.",win:"The Behemoth is led off course by a chain of decoy sounds and smells, steering it into uninhabited wastes. Its footprints are later used as roads.",lose:"The Behemoth walks through the northern wall section. The destruction is accidental and total. A 60-metre wall section is gone. Two towers are rubble."},
{id:83,type:'Monster',name:'Spider Queen Veth',threat:"Spider Queen Veth — the size of a horse — has laid eggs in the food stores. Her millions of children have hatched and consumed three months of grain.",win:"Veth's pheromone signal is identified and reversed. Her children turn on her. She flees. All her children disperse harmlessly. The stores are fumigated and restocked.",lose:"Spider Queen Veth's children infest the entire storage network. All grain is contaminated. The empire faces immediate food shortages."},
{id:84,type:'Monster',name:'The Shade Stalkers',threat:"Invisible predatory creatures that hunt by heartbeat have entered the barracks. Seven soldiers found dead with no visible cause. Fear itself guides them to their targets.",win:"Soldiers are trained to control their heartbeat using old meditation texts. The Shade Stalkers, starved of signal, leave for easier prey.",lose:"Twenty soldiers dead. The rest refuse to sleep in the barracks. All sleep in the palace halls, cramped and demoralised."},
{id:85,type:'Monster',name:'The Ancient Golem of Kheth',threat:"A fifty-foot walking fortress of enchanted iron has been activated by unknown parties. Its only programming: reach the capital. It walks through mountains. Three hours away.",win:"The Golem's activation crystal — in its chest cavity — is extracted by a climber mid-stride. It shuts down. The empire strips its enchanted iron for weapons.",lose:"The Golem reaches the walls and walks through them. It reaches the central square and stands dormant. Demolishing it takes six months."},
{id:86,type:'Sorcerer',name:'Archmage Kelvorn the Fallen',threat:"Archmage Kelvorn — the empire's court wizard for thirty years — has defected after a funding dispute, taking full knowledge of the empire's magical defences with him.",win:"Kelvorn is brought back through a personal appeal from an old colleague. He agrees to return if his research is funded. His constructs are dismantled peacefully.",lose:"Kelvorn destroys the imperial magic academy using knowledge of its defences. Twelve master mages are killed. The empire's magical capability drops by half."},
{id:87,type:'Sorcerer',name:'The Hex Circle of Morrath',threat:"Thirteen witches working in unison have cursed the entire imperial army. Soldiers' weapons are heavy as stone. Armour weighs double. The army's physical ability has halved overnight.",win:"The Hex Circle's ritual focus — a circle of thirteen stones — is found and three stones removed, breaking the ritual. The curse lifts.",lose:"The army cannot march or fight effectively for five days. During those days, the Bloody Red Army's scouts probe the weakened defences and take two outlying positions."},
{id:88,type:'Sorcerer',name:'Sorceress Elara the Void-Touched',threat:"Sorceress Elara has opened a portal to a hostile dimension in the city's lower district. Void creatures — formless and destructive — stream through continuously. The portal grows wider every hour.",win:"Elara is reached and persuaded to sacrifice herself to close the portal from inside. Three remaining void creatures are hunted over weeks.",lose:"The portal grows for twelve hours before Elara is killed. Forty void creatures are loose in the city. The lower district is evacuated."},
{id:89,type:'Sorcerer',name:'The Rune Storm of Vaketh',threat:"A magical tempest has passed over the empire. Every steel weapon and armour piece within the walls has crumbled to powder. The army stands completely unarmed.",win:"Emergency bronze weapons from old armoury vaults — forgotten for two centuries — are distributed. The Rune Storm's caster is assassinated before they can repeat it.",lose:"The Bloody Red Army attacks during the weaponless window knowing of the Rune Storm. 400 soldiers are killed defending with bronze and improvised weapons."},
{id:90,type:'Sorcerer',name:'The Dream Witch Narova',threat:"The Dream Witch Narova has cursed the army into sleeping. Perfectly alive, breathing peacefully, completely unreachable. The palace guard of 500 and three regiments are asleep at their posts.",win:"Narova's dream anchor — an enchanted hourglass — is smashed by the few unsleeping soldiers. All cursed soldiers wake instantly, confused but unharmed.",lose:"The sleeping army is helpless for 48 hours. Enemy scouts walk unchallenged through every fortification. When soldiers wake, the empire's secrets are comprehensively compromised."},
{id:91,type:'Sorcerer',name:'The Blood Mage Covenant',threat:"The Blood Mage Covenant performs nightly sacrifice rituals draining the empire's magical ley lines. The empire's protective enchantments — walls, alarms, barriers — are fading. Two days until they are gone.",win:"The Covenant's ritual site is located and destroyed. The ley lines recover. All magical defences are restored. Two Blood Mages are captured.",lose:"The magical defences go dark simultaneously. Enemy spies exploit the 48-hour window to extract enormous amounts of palace intelligence."},
{id:92,type:'Sorcerer',name:'The Curse of Duskavar',threat:"Duskavar's Curse — activated by the Revenant's death if improperly handled — has activated. Every crop within the capital's walls turns to ash at sunrise. It repeats daily.",win:"Duskavar's original burial site is found and properly consecrated. The curse lifts. The gardens are replanted. Duskavar's spirit is finally at peace.",lose:"The curse lasts a week before being broken — but a week's crops are ash. Emergency rationing is implemented. A black market for food emerges."},
{id:93,type:'Sorcerer',name:'The Mind Breaker Osseth',threat:"Osseth — a telepath of terrifying ability — has taken control of two imperial generals. They appear normal and attend meetings, but every order they give subtly weakens the empire's position.",win:"Osseth is identified by his limitation — he cannot control left-handed people. A left-handed soldier traces the signal back and neutralises Osseth. Both generals are freed.",lose:"Osseth controls three generals and one minister for a month. Misdirected forces, cancelled supply orders, opened gates — the damage takes three months to fully identify."},
{id:94,type:'Sorcerer',name:'The Soul Forge of Khet',threat:"The approaching enemy army carries weapons forged from the souls of captured imperial soldiers — your soldiers whose families believe them still alive. The weapons are unbreakable.",win:"The Soul Forge itself is located and destroyed, freeing all captured souls. The weapons crumble. The freed souls return — some to their families in dreams.",lose:"Soul-forged weapons carve through imperial armour without resistance. 600 soldiers fall in a single battle. The prisoners whose souls were forged cannot be rescued."},
{id:95,type:'Sorcerer',name:'The Temporal Siege',threat:"Enemy soldiers arrive from different moments in time — past and future versions of the same attack, layered. Three simultaneous sieges from different time periods are happening at once.",win:"The Time Anchor — the device sustaining the temporal assault — is found and deactivated. All time-displaced soldiers snap back to their origin moments. The siege collapses.",lose:"The temporal siege overwhelms three gate positions simultaneously. The outer walls are breached twice — once by the past force, once by the future one."},
{id:96,type:'Political',name:"The Poisoner's Guild",threat:"The Poisoner's Guild has contaminated every food source in the capital simultaneously. The poison is tasteless, delayed by six hours. Half the capital has already eaten.",win:"The antidote — held by the Guild as leverage — is seized before the six hours expire. Every affected citizen receives treatment. The Guild's membership list is confiscated.",lose:"Treatment arrives too late for 3,000 citizens and 200 soldiers. Defence Minister Aldric, who ate early, dies at his desk. The Poisoner's Guild vanishes without a trace."},
{id:97,type:'Political',name:'The False Emperor Dravos',threat:"The Emperor has been replaced by a doppelganger — False Emperor Dravos — at some point in the last week. The real Emperor is imprisoned in the palace. Dravos has already signed three ruinous edicts.",win:"The real Emperor is found in the wine cellar, bound but unharmed. Dravos is unmasked in the throne room. The three ruinous edicts are voided.",lose:"Dravos signs a treaty ceding two provinces before being unmasked. The treaty is legally binding. The real Emperor must honour a treaty he never signed."},
{id:98,type:'Political',name:'The Grand Betrayal',threat:"Every minister on the Defence Council has been revealed as a foreign spy — all turned years ago. Every meeting for two years was relayed to the enemy. Everything is compromised.",win:"The ministers are arrested simultaneously before they can act on the revelation. Emergency replacements are made. A full audit of two years of damage is carried out.",lose:"Three ministers destroy critical documents before arrest. Two escape. The empire rebuilds its entire intelligence network from nothing."},

const GraphPanel=({title,data,dataKey,color,range,setRange})=>(
  <div style={S.card}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
      <span style={{color:T.gold,fontSize:12,fontWeight:600}}>{title}</span>

const buildGraph=(logs,field,range)=>{
  const days=range==='7D'?7:range==='14D'?14:range==='30D'?30:range==='90D'?90:180;
  return Array.from({length:days},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(days-1-i));const key=d.toISOString().split('T')[0];return{date:fmt(key),[field]:(logs[key]||{})[field]??0};});
};

// ── WORKOUT ───────────────────────────────────────────────────────────
const Workout=({workouts,setWorkouts})=>{
  const [cat,setCat]=useState('Core');
  const [exercise,setExercise]=useState('');
  const [value,setValue]=useState('');
  const [unit,setUnit]=useState('reps');
  const [timer,setTimer]=useState(0);
  const [timerOn,setTimerOn]=useState(false);
  const timerRef=useRef(null);
  const td=today();
  useEffect(()=>{if(timerOn)timerRef.current=setInterval(()=>setTimer(t=>t+1),1000);else clearInterval(timerRef.current);return()=>clearInterval(timerRef.current);},[timerOn]);
  const fmtT=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const addEx=()=>{if(!exercise||!value)return;const u=[...workouts,{id:Date.now(),date:td,category:cat,exercise,value,unit}];setWorkouts(u);db.set('workouts',u);setValue('');};
  const delEx=id=>{const u=workouts.filter(w=>w.id!==id);setWorkouts(u);db.set('workouts',u);};
  const todayW=workouts.filter(w=>w.date===td);
  const histByDate=workouts.reduce((acc,w)=>{if(!acc[w.date])acc[w.date]=[];acc[w.date].push(w);return acc;},{});
  return(
    <div style={{padding:14}}>
      <h2 style={S.h2}>Warfare</h2>
      <div style={{...S.card,textAlign:'center'}}>
        <div style={{color:T.gold,fontFamily:"'Cinzel',serif",fontSize:44,fontWeight:700,letterSpacing:4}}>{fmtT(timer)}</div>
        <div style={{display:'flex',gap:8,justifyContent:'center',marginTop:10}}>
          <button onClick={()=>setTimerOn(!timerOn)} style={timerOn?{...S.btnD,flex:2}:{...S.btn,flex:2}}>{timerOn?'⏸ Pause':'▶ Start'}</button>
          <button onClick={()=>{setTimer(0);setTimerOn(false);}} style={{...S.btnG,flex:1}}>Reset</button>
        </div>
      </div>
      <div style={S.card}>
        <div style={S.h3}>Log Exercise</div>
        <div style={{display:'flex',gap:5,overflowX:'auto',paddingBottom:6,marginBottom:8,WebkitOverflowScrolling:'touch'}}>
          {Object.keys(WCATS).map(c=><Chip key={c} label={c} active={cat===c} color={T.gold} onClick={()=>{setCat(c);setExercise('');}}/>)}
        </div>
        <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:8}}>{WCATS[cat].map(e=><Chip key={e} label={e} active={exercise===e} color={T.goldLight} onClick={()=>setExercise(e)} sm/>)}</div>
        <input placeholder="Or type custom exercise" style={{...S.inp,marginBottom:8}} value={exercise} onChange={e=>setExercise(e.target.value)}/>
        <div style={{display:'flex',gap:8,marginBottom:8}}>
          <input type="number" placeholder="Value" style={{...S.inp,flex:1}} value={value} onChange={e=>setValue(e.target.value)}/>
          <select style={{...S.inp,flex:1}} value={unit} onChange={e=>setUnit(e.target.value)}>{['reps','sets','mins','km','m','laps'].map(u=><option key={u}>{u}</option>)}</select>
        </div>
        <button onClick={addEx} style={{...S.btn,width:'100%'}}>Log Exercise</button>
      </div>
      {todayW.length>0&&<div style={S.card}><div style={S.h3}>Today's Battles</div>{todayW.map(w=><div key={w.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:`1px solid ${T.border}`}}><span style={{color:T.text,fontSize:13}}>{w.exercise}</span><div style={{display:'flex',gap:8,alignItems:'center'}}><span style={{color:T.gold,fontSize:13}}>{w.value} {w.unit}</span><button onClick={()=>delEx(w.id)} style={{background:'none',border:'none',color:T.muted,cursor:'pointer',fontSize:20}}>×</button></div></div>)}</div>}
      <div style={S.card}><div style={S.h3}>History</div>{Object.entries(histByDate).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,14).map(([date,entries])=><div key={date} style={{marginBottom:10}}><div style={{color:T.gold,fontSize:10,letterSpacing:1,marginBottom:4}}>{fmt(date)}</div>{entries.map(w=><div key={w.id} style={{display:'flex',justifyContent:'space-between',fontSize:12,paddingLeft:8,marginBottom:2}}><span style={{color:T.text}}>{w.exercise}</span><span style={{color:T.muted}}>{w.value} {w.unit}</span></div>)}</div>)}{!workouts.length&&<div style={{color:T.muted,fontSize:12}}>No battles yet.</div>}</div>
    </div>
  );
};

// ── Z CYCLE ───────────────────────────────────────────────────────────

  const td=today(),log=dailyLogs[td]||{};
  const [range,setRange]=useState('14D');
  const z=log.zcycle!==undefined?log.zcycle:0;
  const zColor=z>200?'#2d8a3e':z>50?T.gold:z>-50?'#c97a2a':z>-200?T.crimson:'#5a0a0a';
  const zLabel=z>300?'UNSTOPPABLE':z>150?'Elevated':z>50?'Good':z>0?'Neutral+':z>-50?'Neutral−':z>-150?'Low':z>-300?'Broken':'DESTROYED';
  const upd=v=>{const u={...dailyLogs,[td]:{...(dailyLogs[td]||{}),zcycle:v}};setDailyLogs(u);db.set('daily_logs',u);};
  return(
    <div style={{padding:14}}>
      <h2 style={S.h2}>Mind — Z Cycle</h2>

        <div style={{textAlign:'center',marginBottom:16}}><div style={{color:zColor,fontSize:52,fontWeight:700,fontFamily:"'Cinzel',serif",lineHeight:1}}>{z>0?'+':''}{z}%</div><div style={{color:zColor,fontSize:10,letterSpacing:3,textTransform:'uppercase',marginTop:6}}>{zLabel}</div></div>
        <input type="range" min="-500" max="500" value={z} step="5" style={{width:'100%',accentColor:zColor,height:28}} onChange={e=>upd(Number(e.target.value))}/>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:T.muted,marginBottom:12}}><span>−500%</span><span>0</span><span>+500%</span></div>
        <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>{[-500,-300,-150,-50,0,50,150,300,500].map(v=><Chip key={v} label={`${v>0?'+':''}${v}%`} active={z===v} color={zColor} onClick={()=>upd(v)} sm/>)}</div>
      </div>
      <GraphPanel title="Z Cycle History" data={buildGraph(dailyLogs,'zcycle',range)} dataKey="zcycle" color={zColor} range={range} setRange={setRange}/>

  );
};

// ── DAILY CHALLENGE ───────────────────────────────────────────────────
const DailyChallenge=({challengeLog,setChallengeLog})=>{
  const [timeLeft,setTimeLeft]=useState('');
  const td=today();
  const entry=challengeLog[td]||{};
  const threat=getRandomDailyThreat(td,entry);
  const outcome=entry.outcome;
  const challengeDefinition=entry.challengeDefinition||'';
  const challengeStatus=entry.challengeStatus||'Not started';
  const tc=THREAT_COLOR[threat.type]||T.gold;
  useEffect(()=>{if(!entry.threatId){const u={...challengeLog,[td]:{...entry,threatId:threat.id}};setChallengeLog(u);db.set('challenge_log',u);}},[]);
  const updateChallengeField=(key,val)=>{
    const u={...challengeLog,[td]:{...entry,threatId:threat.id,[key]:val}};
    setChallengeLog(u);
    db.set('challenge_log',u);
  };
  const calcTime=()=>{const midnight=new Date();midnight.setHours(0,0,0,0);const expiry=midnight.getTime()+25*3600000;const diff=Math.max(0,expiry-Date.now());const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;};
  useEffect(()=>{
    setTimeLeft(calcTime());
    const iv=setInterval(()=>{
      const t=calcTime();
      setTimeLeft(t);
      if(t==='00:00:00'&&!outcome){const u={...challengeLog,[td]:{...entry,threatId:threat.id,outcome:'lost'}};setChallengeLog(u);db.set('challenge_log',u);}
    },1000);
    return()=>clearInterval(iv);
  },[outcome,td]);
  const resolve=result=>{const u={...challengeLog,[td]:{...entry,threatId:threat.id,outcome:result}};setChallengeLog(u);db.set('challenge_log',u);};
  return(
    <div style={{...S.card,borderLeft:`3px solid ${tc}`,background:'#080810',marginBottom:14}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
        <div style={{flex:1}}>
          <div style={{color:tc,fontSize:9,letterSpacing:1.5,textTransform:'uppercase',marginBottom:4}}>{threat.type} · Threat #{threat.id}/100</div>
          <div style={{color:T.text,fontFamily:"'Cinzel',serif",fontSize:15,fontWeight:600,lineHeight:1.2}}>{threat.name}</div>
        </div>
        {!outcome&&<div style={{textAlign:'right',flexShrink:0,marginLeft:10}}><div style={{color:timeLeft<'02:00:00'?T.crimson:T.gold,fontFamily:"'Cinzel',serif",fontSize:18,fontVariantNumeric:'tabular-nums'}}>{timeLeft}</div><div style={{color:T.muted,fontSize:8}}>remaining</div></div>}
      </div>
      <div style={{color:T.muted,fontSize:12,lineHeight:1.6,marginBottom:12}}>{threat.threat}</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr',gap:8,marginBottom:12}}>
        <div>
          <label style={S.lbl}>Define the Challenge</label>
          <textarea
            placeholder="What exactly must be done today to defeat this threat?"
            style={{...S.inp,height:70,resize:'vertical'}}
            value={challengeDefinition}
            onChange={e=>updateChallengeField('challengeDefinition',e.target.value)}
          />
        </div>
        <div>
          <label style={S.lbl}>Challenge Status</label>
          <select
            style={S.inp}
            value={challengeStatus}
            onChange={e=>updateChallengeField('challengeStatus',e.target.value)}
          >
            <option>Not started</option>
            <option>In progress</option>
            <option>Blocked</option>
            <option>Completed</option>
            <option>Failed</option>
          </select>
        </div>
      </div>
      {!outcome?(
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>resolve('won')} style={{...S.btn,flex:2,background:'#1a5c2a',fontSize:13}}>⚔ Defeated</button>
          <button onClick={()=>resolve('lost')} style={{...S.btnD,flex:1,fontSize:12}}>Expired</button>
        </div>
      ):(
        <div style={{background:outcome==='won'?'#0a1a0a':'#1a0808',border:`1px solid ${outcome==='won'?'#2d8a3e':T.crimson}`,borderRadius:8,padding:'10px 12px'}}>
          <div style={{color:outcome==='won'?'#2d8a3e':T.crimson,fontSize:9,letterSpacing:1.5,textTransform:'uppercase',marginBottom:6}}>{outcome==='won'?'⚔ VICTORY — THREAT ELIMINATED':'✗ DEFEAT — THE ENEMY PREVAILS'}</div>
          <div style={{color:T.text,fontSize:12,lineHeight:1.6}}>{outcome==='won'?threat.win:threat.lose}</div>
        </div>
      )}
    </div>
  );
};

  const [selectedDate,setSelectedDate]=useState(today());const [range,setRange]=useState('30D');
  const logWeight=()=>{if(!inputW)return;const u={...dailyLogs,[today()]:{...(dailyLogs[today()]||{}),weight:Number(inputW)}};setDailyLogs(u);db.set('daily_logs',u);setInputW('');};
  const toggleRest=date=>{const u={...dailyLogs,[date]:{...(dailyLogs[date]||{}),restDay:!(dailyLogs[date]?.restDay)}};setDailyLogs(u);db.set('daily_logs',u);};
  const y=viewMonth.getFullYear(),m=viewMonth.getMonth();
  const firstDay=new Date(y,m,1).getDay(),daysInMonth=new Date(y,m+1,0).getDate();
  const cells=[...Array(firstDay).fill(null),...Array.from({length:daysInMonth},(_,i)=>i+1)];

  const days=range==='7D'?7:range==='14D'?14:range==='30D'?30:range==='90D'?90:180;
  const graphData=(()=>{const pts=[];for(let i=days-1;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const key=d.toISOString().split('T')[0];const w=(dailyLogs[key]||{}).weight;if(w)pts.push({date:fmt(key),weight:w,target:settings.targetWeight});}return pts;})();
  return(

        <label style={S.lbl}>Connection Type</label><div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:10}}>{CONN_TYPES.map(t=><Chip key={t} label={t} active={form.connectionType===t} color="#4a8aaa" onClick={()=>setForm(f=>({...f,connectionType:t}))} sm/>)}</div>

        <label style={{...S.lbl,marginTop:6}}>Interests</label><div style={{display:'flex',gap:3,flexWrap:'wrap',marginBottom:10}}>{INTERESTS.map(t=><Chip key={t} label={t} active={form.interests.includes(t)} color="#4a9edd" onClick={()=>toggle('interests',t)} sm/>)}</div>
        <label style={S.lbl}>Trust Level</label><div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:10}}>{TRUST_LEVELS.map(t=><Chip key={t} label={t} active={form.trustLevel===t} color={trustColor(t)} onClick={()=>setForm(f=>({...f,trustLevel:t}))} sm/>)}</div>
        <label style={S.lbl}>Energy</label><div style={{display:'flex',gap:3,flexWrap:'wrap',marginBottom:10}}>{ENERGY_OPTS.map(t=>{const neg=['Draining','Negative','Flaky','Ego-heavy','Opportunistic'].includes(t);return<Chip key={t} label={t} active={form.energy.includes(t)} color={neg?T.crimson:'#2d8a3e'} onClick={()=>toggle('energy',t)} sm/>;})}</div>
        <label style={S.lbl}>Power Tags</label><div style={{display:'flex',gap:3,flexWrap:'wrap',marginBottom:10}}>{POWER_OPTS.map(t=><Chip key={t} label={t} active={form.powerTags.includes(t)} color="#aa7add" onClick={()=>toggle('powerTags',t)} sm/>)}</div>

const TodoList=({todos,setTodos})=>{
  const [text,setText]=useState('');
  const td=today(),list=todos[td]||[];
  const upd=nl=>{const u={...todos,[td]:nl};setTodos(u);db.set('todos',u);};
  const add=()=>{if(!text.trim())return;upd([...list,{id:Date.now(),text,done:false,missReason:''}]);setText('');};
  const toggle=id=>upd(list.map(t=>t.id===id?{...t,done:!t.done}:t));
  const setMiss=(id,r)=>upd(list.map(t=>t.id===id?{...t,missReason:r}:t));
  const del=id=>upd(list.filter(t=>t.id!==id));
  const done=list.filter(t=>t.done).length;
  return(
    <div style={{padding:14}}>
      <h2 style={S.h2}>Orders — To-Do</h2>
      <div style={{...S.card,textAlign:'center'}}><div style={{color:T.gold,fontSize:34,fontWeight:700,fontFamily:"'Cinzel',serif"}}>{done}/{list.length}</div><div style={{color:T.muted,fontSize:9,letterSpacing:1,textTransform:'uppercase'}}>Orders Completed</div>{list.length>0&&<div style={{background:T.border,borderRadius:4,height:5,marginTop:8}}><div style={{background:done===list.length?'#2d8a3e':T.gold,width:`${list.length?(done/list.length)*100:0}%`,height:5,borderRadius:4}}/></div>}</div>
      <div style={{display:'flex',gap:8,marginBottom:12}}><input placeholder="New order..." style={S.inp} value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}/><button onClick={add} style={{...S.btn,padding:'11px 16px'}}>Add</button></div>
      {list.map(t=><div key={t.id} style={{...S.card,marginBottom:6}}><div style={{display:'flex',alignItems:'center',gap:10}}><button onClick={()=>toggle(t.id)} style={{background:'none',border:`2px solid ${t.done?'#2d8a3e':T.border}`,borderRadius:5,width:26,height:26,cursor:'pointer',color:'#2d8a3e',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0}}>{t.done?'✓':''}</button><span style={{flex:1,color:t.done?T.muted:T.text,textDecoration:t.done?'line-through':'none',fontSize:14}}>{t.text}</span><button onClick={()=>del(t.id)} style={{background:'none',border:'none',color:T.muted,cursor:'pointer',fontSize:22,lineHeight:1}}>×</button></div>{!t.done&&<div style={{marginTop:8,paddingLeft:36,display:'flex',gap:4,flexWrap:'wrap'}}>{MISS_REASONS.map(r=><Chip key={r} label={r} active={t.missReason===r} color={T.crimson} onClick={()=>setMiss(t.id,r)} sm/>)}</div>}</div>)}
    </div>
  );
};

const DailyHistory=({date,dailyLogs={},workouts=[],foodLogs={},ycycle=[],challengeLog={},campaigns=[],academySessions=[],events=[]})=>{
  if(!date)return null;
  const log=dailyLogs[date]||{};
  const dayWorkouts=(workouts||[]).filter(w=>w.date===date);
  const dayFood=Array.isArray(foodLogs)?foodLogs.filter(f=>f.date===date):(foodLogs[date]||[]);
  const dayY=Array.isArray(ycycle)?ycycle.filter(x=>x.date===date):[];
  const challenge=challengeLog[date]||{};
  const threat=challenge.threatId?THREATS.find(t=>t.id===challenge.threatId):null;
  const dayAcademy=(academySessions||[]).filter(s=>s.date===date);
  const dayEvents=(events||[]).filter(e=>e.date===date);
  const dayCampaigns=(campaigns||[]).filter(c=>c.startDate===date||c.endDate===date||c.completedDate===date||c.failedDate===date);
  const hasAnything=Object.keys(log).length||dayWorkouts.length||dayFood.length||dayY.length||challenge.outcome||threat||dayAcademy.length||dayEvents.length||dayCampaigns.length;
  const Section=({title,children})=><div style={{borderTop:`1px solid ${T.border}`,paddingTop:10,marginTop:10}}><div style={{color:T.gold,fontSize:12,fontWeight:700,marginBottom:6}}>{title}</div>{children}</div>;
  return(
    <div style={{...S.card,border:`1px solid ${T.gold}55`}}>
      <h3 style={S.h3}>Archive — {fmt(date)}</h3>
      {!hasAnything&&<div style={{color:T.muted,fontSize:13}}>No records found for this date.</div>}
      {Object.keys(log).length>0&&<Section title="Vitals / Daily Log"><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>{Object.entries(log).map(([k,v])=><div key={k} style={{color:T.muted,fontSize:12}}><b style={{color:T.text}}>{k}:</b> {String(v)}</div>)}</div></Section>}
      {(threat||challenge.outcome||challenge.challengeDefinition)&&<Section title="Daily Battle">{threat&&<div style={{color:T.text,fontSize:13}}>{threat.name}</div>}{challenge.challengeDefinition&&<div style={{color:T.muted,fontSize:12}}>Challenge: {challenge.challengeDefinition}</div>}{challenge.challengeStatus&&<div style={{color:T.muted,fontSize:12}}>Status: {challenge.challengeStatus}</div>}{challenge.outcome&&<div style={{color:challenge.outcome==='won'?'#2d8a3e':T.crimson,fontSize:12}}>Outcome: {challenge.outcome}</div>}</Section>}
      {dayCampaigns.length>0&&<Section title="Campaigns">{dayCampaigns.map(c=><div key={c.id} style={{borderTop:`1px solid ${T.border}`,padding:'6px 0'}}><div style={{color:T.text,fontSize:13}}>{c.name} · {campaignTypeLabel(c.type)}</div><div style={{color:T.muted,fontSize:12}}>Status: {c.status}</div>{c.target&&<div style={{color:T.muted,fontSize:12}}>Target: {c.target}</div>}</div>)}</Section>}
      {dayEvents.length>0&&<Section title="Events">{dayEvents.map(e=><div key={e.id} style={{borderTop:`1px solid ${T.border}`,padding:'6px 0'}}><div style={{color:T.text,fontSize:13}}>{e.title} {e.time?`· ${e.time}`:''}</div><div style={{color:T.muted,fontSize:12}}>{e.type} · {e.status}</div>{e.notes&&<div style={{color:T.muted,fontSize:12}}>{e.notes}</div>}</div>)}</Section>}
      {dayAcademy.length>0&&<Section title="Academy">{dayAcademy.map(s=><div key={s.id} style={{color:T.muted,fontSize:12,borderTop:`1px solid ${T.border}`,padding:'6px 0'}}>{s.minutes} minutes {s.notes?`· ${s.notes}`:''}</div>)}</Section>}
      {dayWorkouts.length>0&&<Section title="Warfare / Workouts">{dayWorkouts.map(w=><div key={w.id} style={{color:T.muted,fontSize:12,borderTop:`1px solid ${T.border}`,padding:'6px 0'}}>{w.type||w.name||'Workout'} {w.duration?`· ${w.duration}m`:''}</div>)}</Section>}
      {dayFood.length>0&&<Section title="Rations / Food">{dayFood.map((f,i)=><div key={f.id||i} style={{color:T.muted,fontSize:12,borderTop:`1px solid ${T.border}`,padding:'6px 0'}}>{f.name||f.food||'Food'} {f.calories?`· ${f.calories} cal`:''}</div>)}</Section>}
    </div>
  );
};

        <div style={S.h3}>Motivation Quotes</div>
        {(form.motivationQuotes||[]).map((q,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:7,paddingBottom:7,borderBottom:`1px solid ${T.border}`}}><span style={{color:T.text,fontSize:12,flex:1,fontStyle:'italic',lineHeight:1.5}}>{q}</span><button type="button" onClick={()=>delQuote(i)} style={{...S.btnD,padding:'2px 8px',fontSize:11,minHeight:28,marginLeft:8}}>×</button></div>)}
        <div style={{display:'flex',gap:8,marginTop:4}}><input placeholder="Write a war quote..." style={S.inp} value={newQuote} onChange={e=>setNewQuote(e.target.value)}/><button type="button" onClick={addQuote} style={{...S.btn,padding:'11px 14px'}}>Add</button></div>
      </div>
      <button type="button" onClick={save} style={{...S.btn,width:'100%',padding:14,marginBottom:10,fontSize:15,background:saved?'#1a5c2a':T.gold}}>{saved?'✓ Saved — All changes applied':'Save All Settings'}</button>
      <div style={S.card}><div style={S.h3}>Export Data</div><div style={{color:T.muted,fontSize:11,marginBottom:10}}>Export/backup controls.</div><button type="button" onClick={exportExcel} style={{...S.btn,background:'#1a5c2a',width:'100%'}}>↓ Export</button></div>
    </div>
  );
};

const PhotoPanel=({title,storageKey,photos,setPhotos})=>{
  const [caption,setCaption]=useState('');
  const addPhoto=async e=>{
    const f=e.target.files?.[0];
    if(!f)return;
    const img=await imageToSmallBase64(f,1100,.74);
    const u=[{id:Date.now(),date:today(),caption,img},...(photos||[])];
    setPhotos(u);
    db.set(storageKey,u);
    setCaption('');
  };
  const del=id=>{
    const u=(photos||[]).filter(p=>p.id!==id);
    setPhotos(u);
    db.set(storageKey,u);
  };
  return(
    <div style={{...S.card,border:`1px solid ${T.gold}55`}}>
      <h3 style={S.h3}>{title}</h3>
      <input style={{...S.inp,marginBottom:8}} placeholder="Caption optional" value={caption} onChange={e=>setCaption(e.target.value)}/>
      <input type="file" accept="image/*" style={S.inp} onChange={addPhoto}/>
      {(photos||[]).slice(0,12).map(p=>(
        <div key={p.id} style={{marginTop:10,borderTop:`1px solid ${T.border}`,paddingTop:10}}>
          <img src={p.img} style={{width:'100%',borderRadius:12,border:`1px solid ${T.border}`}}/>
          {p.caption&&<div style={{color:T.muted,fontSize:12,marginTop:5}}>{p.caption}</div>}
          <button type="button" style={{...S.btnD,marginTop:6,minHeight:34,padding:'6px 10px'}} onClick={()=>del(p.id)}>Delete Photo</button>
        </div>
      ))}
    </div>
  );
};


const App=()=>{
  const [page,setPage]=useState('dashboard');
  const [settings,setSettings]=useState(DEF);
  const [dailyLogs,setDailyLogs]=useState({});
  const [workouts,setWorkouts]=useState([]);
  const [foodLogs,setFoodLogs]=useState([]);
  const [ycycle,setYcycle]=useState([]);
  const [relations,setRelations]=useState([]);
  const [campaigns,setCampaigns]=useState([]);
  const [commander,setCommander]=useState('');
  const [target,setTarget]=useState('');
  const [stories,setStories]=useState([]);
  const [todos,setTodos]=useState({});
  const [challengeLog,setChallengeLog]=useState({});
  const [disciplines,setDisciplines]=useState([]);
  const [academySessions,setAcademySessions]=useState([]);
  const [events,setEvents]=useState([]);
  const [chroniclePhotos,setChroniclePhotos]=useState([]);
  const [factionPhotos,setFactionPhotos]=useState([]);
  const [selectedArchiveDate,setSelectedArchiveDate]=useState(today());

  useEffect(()=>{
    const fs=settings.fontScale||1;
    const ns=settings.navFontScale||1.25;
    document.documentElement.style.setProperty('--sovereign-font-scale',fs);
    document.documentElement.style.setProperty('--sovereign-nav-scale',ns);
  },[settings.fontScale,settings.navFontScale]);
  const [musicOn,setMusicOn]=useState(localStorage.getItem('sovereign_music')!=='off');
  const toggleMusic=()=>{
    const audio=document.getElementById('imperial-audio');
    if(!audio)return;
    audio.volume=0.12;
    if(audio.paused){
      audio.play().then(()=>{
        setMusicOn(true);
        localStorage.setItem('sovereign_music','on');
      }).catch(err=>console.warn('Audio blocked until user taps again',err));
    }else{
      audio.pause();
      setMusicOn(false);
      localStorage.setItem('sovereign_music','off');
    }
  };
  useEffect(()=>{
    const audio=document.getElementById('imperial-audio');
    if(!audio)return;
    audio.volume=0.12;
    if(localStorage.getItem('sovereign_music')==='off'){
      setMusicOn(false);
      return;
    }
    const tryPlay=()=>{
      audio.play().then(()=>setMusicOn(true)).catch(()=>setMusicOn(false));
      window.removeEventListener('pointerdown',tryPlay);
      window.removeEventListener('keydown',tryPlay);
    };
    audio.play().then(()=>setMusicOn(true)).catch(()=>{
      window.addEventListener('pointerdown',tryPlay,{once:true});
      window.addEventListener('keydown',tryPlay,{once:true});
    });
  },[]);

  useEffect(()=>{
    const splash=document.getElementById('splash');
    (async()=>{
      const[s,dl,w,fl,y,r,c,st,t,cl,disc,as]=await Promise.all([
        db.get('settings'),db.get('daily_logs'),db.get('workouts'),db.get('food_logs'),
        db.get('ycycle'),db.get('relations'),db.get('campaigns'),db.get('stories'),
        db.get('todos'),db.get('challenge_log'),db.get('academy_disciplines'),db.get('academy_sessions'),
      ]);
      if(s)setSettings({...DEF,...s,pageCommanders:{...DEF.pageCommanders,...(s.pageCommanders||{})}});
      if(dl)setDailyLogs(dl);if(w)setWorkouts(w);if(fl)setFoodLogs(fl);if(y)setYcycle(y);
      if(r)setRelations(r);if(c)setCampaigns(c);if(st)setStories(st);if(t)setTodos(t);
      if(cl)setChallengeLog(cl);if(disc)setDisciplines(disc);if(as)setAcademySessions(as);
      const ev=await db.get('events'); if(ev&&typeof setEvents==='function')setEvents(ev);
      if(splash)splash.style.display='none';
    })().catch(err=>{
      console.error('SOVEREIGN startup failed',err);
      if(splash){
        splash.style.display='flex';
        splash.innerHTML='<h1>SOVEREIGN ERROR</h1><p style="max-width:320px;text-align:center;color:#c9a227;line-height:1.5;">'+(err.message||'Startup failed')+'</p><p style="color:#6a5a45;">Open Console for details.</p>';
      }
    });
    if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
  },[]);

  const render=()=>{
    switch(page){
      case'dashboard':return<Dashboard dailyLogs={dailyLogs} settings={settings} todos={todos} campaigns={campaigns} workouts={workouts} academySessions={academySessions}/>;
      case'vitals':return<Vitals dailyLogs={dailyLogs} setDailyLogs={setDailyLogs}/>;
      case'workout':return<Workout workouts={workouts} setWorkouts={setWorkouts}/>;
      case'zcycle':return<ZCycle dailyLogs={dailyLogs} setDailyLogs={setDailyLogs}/>;
      case'ycycle':return<YCycle ycycle={ycycle} setYcycle={setYcycle}/>;
      case'food':return<FoodCycle foodLogs={foodLogs} setFoodLogs={setFoodLogs}/>;
      case'lore':return <><LorePage stories={stories} setStories={setStories}/><PhotoPanel title="Chronicle Photo Archive" storageKey="chronicle_photos" photos={chroniclePhotos} setPhotos={setChroniclePhotos}/></>;
      case'campaigns':return<Campaigns campaigns={campaigns} setCampaigns={setCampaigns} challengeLog={challengeLog} setChallengeLog={setChallengeLog}/>;
      case'backdate':return<BackdateMap dailyLogs={dailyLogs} setDailyLogs={setDailyLogs} foodLogs={foodLogs} setFoodLogs={setFoodLogs} ycycle={ycycle} setYcycle={setYcycle} academySessions={academySessions} setAcademySessions={setAcademySessions} disciplines={disciplines}/>;
      case'archive':return<DateArchive dailyLogs={dailyLogs} workouts={workouts} foodLogs={foodLogs} ycycle={ycycle} challengeLog={challengeLog} campaigns={campaigns} academySessions={academySessions} events={events}/>;
      case'events':return<EventsTab events={events} setEvents={setEvents} dailyLogs={dailyLogs} workouts={workouts} foodLogs={foodLogs} ycycle={ycycle} challengeLog={challengeLog} campaigns={campaigns} academySessions={academySessions}/>;
      case'calendar':return<WeightCalendar dailyLogs={dailyLogs} setDailyLogs={setDailyLogs} settings={settings} workouts={workouts} academySessions={academySessions} disciplines={disciplines} foodLogs={foodLogs} ycycle={ycycle} challengeLog={challengeLog} campaigns={campaigns} events={events}/>;
      case'relations':return <><Relationships relations={relations} setRelations={setRelations}/><PhotoPanel title="Faction Photo Archive" storageKey="faction_photos" photos={factionPhotos} setPhotos={setFactionPhotos}/></>;
      case'todos':return<TodoList todos={todos} setTodos={setTodos}/>;
      case'summary':return<WeeklySummary dailyLogs={dailyLogs} workouts={workouts} foodLogs={foodLogs} ycycle={ycycle} challengeLog={challengeLog} campaigns={campaigns}/>;
      case'academy':return<RoyalAcademy disciplines={disciplines} setDisciplines={setDisciplines} sessions={academySessions} setSessions={setAcademySessions}/>;
      case'settings':return<Settings settings={settings} setSettings={setSettings} dailyLogs={dailyLogs} workouts={workouts} foodLogs={foodLogs} ycycle={ycycle} relations={relations} campaigns={campaigns} stories={stories} todos={todos} disciplines={disciplines} academySessions={academySessions} challengeLog={challengeLog}/>;
      default:return null;
    }
  };

  return(
    <div style={{background:T.bg,height:'100vh',height:'100dvh',color:T.text,fontFamily:"'Crimson Text',serif",fontSize:`calc(16px * var(--sovereign-font-scale))`,display:'flex',flexDirection:'column',overflow:'hidden',maxWidth:480,margin:'0 auto'}}>
      <audio id="imperial-audio" src="./music/The_Dark_Castle.mp3" loop preload="none"></audio>
      <button onClick={toggleMusic} title="Toggle imperial ambience" style={{position:'fixed',right:12,bottom:68,zIndex:1000,background:musicOn?T.gold:T.card,color:musicOn?'#000':T.gold,border:`1px solid ${T.gold}66`,borderRadius:999,padding:'9px 12px',fontSize:12,fontWeight:700,fontFamily:'inherit',boxShadow:'0 6px 20px #0008'}}>
        {musicOn?'♫ ON':'♫ OFF'}
      </button>
      <TopBar settings={settings} page={page}/>
      <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
        {render()}
        <div style={{height:24}}/>
      </div>
      <BottomNav page={page} setPage={setPage}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
